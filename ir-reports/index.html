<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR Reports | Chicken0248</title>
    <meta name="description" content="Detailed incident response reports and forensic analysis from CTF and cybersecurity platform challenges by Chicken0248." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chicken0248" />
    <meta property="og:url" content="https://chickenloner.github.io/ir-reports/" />
    <meta property="og:title" content="IR Reports | Chicken0248" />
    <meta property="og:description" content="Detailed incident response reports and forensic analysis from CTF and cybersecurity platform challenges by Chicken0248." />
    <meta property="og:image" content="https://chickenloner.github.io/chicken0248.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Chicken_0248" />
    <meta name="twitter:title" content="IR Reports | Chicken0248" />
    <meta name="twitter:description" content="Detailed incident response reports and forensic analysis from CTF and cybersecurity platform challenges by Chicken0248." />
    <meta name="twitter:image" content="https://chickenloner.github.io/chicken0248.png" />
    <link rel="canonical" href="https://chickenloner.github.io/ir-reports/" />
    <link rel="icon" href="/chicken0248.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.2/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@1.14.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="/themes/soc.css">
    <script src="/themes/soc-theme.js"></script>
    <script src="/themes/soc-nav.js"></script>
    <script src="/themes/soc-components.js"></script>
    <style>
        .soc-page-hero { background:linear-gradient(180deg,var(--soc-cy-tint-lo),transparent 40%),linear-gradient(180deg,var(--soc-bg-1),var(--soc-bg)); }
        .soc-page-hero-icon { background:var(--soc-rd-tint-md);border:1px solid var(--soc-rd-tint-bdr); }
        .soc-stat-lbl::before { background:var(--soc-rd); }
        h2.soc-section::before { background:var(--soc-rd);box-shadow:rgba(255,85,119,.7) 0 0 8px; }
    </style>
</head>
<body>
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:bg-white focus:px-4 focus:py-2 focus:rounded-lg focus:shadow-lg focus:text-blue-600 focus:font-semibold">
        Skip to content
    </a>
    <noscript>
        <style>body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}</style>
        <div style="text-align:center;padding:2rem">
            <h1>JavaScript required</h1>
            <p>This site requires JavaScript to display content. Please enable it in your browser settings.</p>
            <a href="https://chickenloner.github.io">chickenloner.github.io</a>
        </div>
    </noscript>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const { SocClock, Icon, ThemeToggle } = window.SocComponents;

        const App = () => {
            const [reports, setReports]   = useState([]);
            const [loading, setLoading]   = useState(true);
            const [search, setSearch]     = useState('');
            const [activeTag, setActiveTag] = useState(null);

            const allTags = useMemo(() =>
                [...new Set(reports.flatMap(r => r.tags))].sort(),
                [reports]
            );

            const filtered = useMemo(() => {
                let result = reports;
                if (search.trim()) {
                    const q = search.toLowerCase();
                    result = result.filter(r =>
                        r.title.toLowerCase().includes(q) ||
                        r.summary.toLowerCase().includes(q) ||
                        r.tags.some(t => t.toLowerCase().includes(q))
                    );
                }
                if (activeTag) result = result.filter(r => r.tags.includes(activeTag));
                return result;
            }, [reports, search, activeTag]);

            useEffect(() => {
                fetch('/data/ir-reports.json')
                    .then(r => r.json())
                    .then(data => { setReports(data); setLoading(false); })
                    .catch(() => setLoading(false));
            }, []);

            const platforms = useMemo(() => [...new Set(reports.map(r => r.platform))].length, [reports]);

            return (
                <div style={{minHeight:'100vh',background:'var(--soc-bg)'}}>
                    {/* Top bar */}
                    <div className="soc-tb">
                        <div className="soc-tb-row">
                            <a href="/" className="soc-live" style={{textDecoration:"none",color:"inherit"}}>UPLINK</a>
                            <span className="soc-crumb hidden md:flex">
                                SOC <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                                <a href="/" style={{color:'var(--soc-ink3)',textDecoration:'none'}}>OPERATOR.PROFILE</a>
                                <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                                <b>IR.REPORTS</b>
                            </span>
                            <span className="hidden md:flex" style={{marginLeft:'auto',gap:'8px',alignItems:'center'}}>
                                <span className="sev cyan"><span className="dot"></span>TLP:CLEAR</span>
                                <span className="sev red"><span className="dot"></span>IR-RPT</span>
                            </span>
                            <span className="hidden md:block"><SocClock /></span>
                            <span style={{flex:1}} className="md:hidden" />
                            <ThemeToggle />
                        </div>
                    </div>

                    <main id="main-content" style={{maxWidth:'1152px',margin:'0 auto',padding:'28px 22px 48px'}}>
                        <div className="animate-fadeIn">
                            {/* Page hero */}
                            <div className="soc-page-hero">
                                <div className="soc-page-hero-strap">
                                    <div className="seg"><b>console</b> <span className="v">portfolio/ir-reports</span></div>
                                    <div className="seg"><b>type</b> <span className="v">incident-response</span></div>
                                    <span style={{marginLeft:'auto'}} className="sev green"><span className="dot"></span>ACTIVE</span>
                                </div>
                                <div className="soc-hero-inner">
                                    <div className="soc-page-hero-body">
                                        <div className="soc-page-hero-icon">
                                            <Icon name="FileText" className="w-6 h-6" style={{color:'var(--soc-rd)'}} />
                                        </div>
                                        <div>
                                            <h1 className="soc-page-hero-title">IR Reports</h1>
                                            <p className="soc-page-hero-sub">incident-response · forensic-analysis · threat-investigation</p>
                                        </div>
                                    </div>
                                    {!loading && (
                                        <div className="soc-hero-stats">
                                            <div>
                                                <div className="soc-stat-lbl">Reports</div>
                                                <div className="soc-stat-val">{reports.length}</div>
                                            </div>
                                            <div>
                                                <div className="soc-stat-lbl am">Platforms</div>
                                                <div className="soc-stat-val">{platforms}</div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Filters */}
                            {!loading && (
                                <div style={{display:'flex',gap:'10px',marginTop:'20px',marginBottom:'20px',flexWrap:'wrap'}}>
                                    <div className="soc-search-bar">
                                        <Icon name="Search" className="w-4 h-4" style={{color:'var(--soc-ink4)',flexShrink:0}} />
                                        <input
                                            type="text"
                                            placeholder="Search reports, tags, platforms…"
                                            value={search}
                                            onChange={e => setSearch(e.target.value)}
                                            aria-label="Search reports"
                                        />
                                    </div>
                                    {allTags.length > 0 && (
                                        <select
                                            value={activeTag || ''}
                                            onChange={e => setActiveTag(e.target.value || null)}
                                            className="soc-select"
                                            aria-label="Filter by tag">
                                            <option value="">All Tags</option>
                                            {allTags.map(tag => <option key={tag} value={tag}>{tag}</option>)}
                                        </select>
                                    )}
                                </div>
                            )}

                            {/* Result count */}
                            {!loading && reports.length > 0 && (
                                <h2 className="soc-section">
                                    Report Index
                                    <span className="meta">
                                        <b>{filtered.length}</b> of {reports.length} reports
                                        {(search || activeTag) && (
                                            <button onClick={() => { setSearch(''); setActiveTag(null); }}
                                                style={{marginLeft:'10px',color:'var(--soc-cy)',background:'none',border:'none',cursor:'pointer',font:'inherit',fontSize:'10px'}}>
                                                clear ×
                                            </button>
                                        )}
                                    </span>
                                </h2>
                            )}

                            {/* Loading */}
                            {loading && (
                                <div style={{display:'flex',justifyContent:'center',padding:'80px 0'}}>
                                    <div style={{width:'32px',height:'32px',borderRadius:'50%',border:'3px solid var(--soc-line2)',borderTopColor:'var(--soc-rd)'}} className="animate-spin" />
                                </div>
                            )}

                            {/* Cards */}
                            {!loading && filtered.length > 0 && (
                                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:'16px'}}>
                                    {filtered.map(report => (
                                        <a key={report.slug} href={report.url} className="ir-card">
                                            <div className="ir-card-cover">
                                                <img src={report.cover} alt={report.title} loading="lazy" />
                                            </div>
                                            <div className="ir-card-body">
                                                <div className="ir-card-meta">
                                                    <Icon name="Calendar" className="w-3.5 h-3.5" />
                                                    <span>{new Date(report.date).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })}</span>
                                                    <span className="sev red" style={{fontSize:'9px',padding:'1px 6px'}}><span className="dot"></span>{report.platform}</span>
                                                </div>
                                                <div className="ir-card-title">{report.title}</div>
                                                <p className="ir-card-summary">{report.summary}</p>
                                                {report.tags.length > 0 && (
                                                    <div className="ir-card-tags">
                                                        {report.tags.map(tag => (
                                                            <span key={tag} className="ir-tag">{tag}</span>
                                                        ))}
                                                    </div>
                                                )}
                                                <div className="ir-card-cta">
                                                    <Icon name="FileSearch" className="w-3.5 h-3.5" />
                                                    <span>Read Full Report</span>
                                                    <Icon name="ArrowRight" className="w-3.5 h-3.5" style={{marginLeft:'auto'}} />
                                                </div>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            )}

                            {/* Empty state */}
                            {!loading && filtered.length === 0 && (
                                <div style={{textAlign:'center',padding:'80px 0',color:'var(--soc-ink3)'}}>
                                    <Icon name="FileSearch" className="w-12 h-12" style={{margin:'0 auto 12px',opacity:.3,display:'block'}} />
                                    <p style={{fontSize:'15px',fontWeight:600,color:'var(--soc-ink2)',margin:'0 0 6px'}}>
                                        {reports.length === 0 ? 'No reports published yet.' : 'No reports match your filters.'}
                                    </p>
                                    {reports.length > 0 && (
                                        <button onClick={() => { setSearch(''); setActiveTag(null); }}
                                            style={{marginTop:'10px',color:'var(--soc-cy)',background:'none',border:'none',cursor:'pointer',fontSize:'13px',fontFamily:'inherit'}}>
                                            Clear filters
                                        </button>
                                    )}
                                </div>
                            )}

                            {/* Footer */}
                            <div className="soc-ft">
                                SOC · IR.REPORTS · CHICKEN0248 · <a href="/" style={{color:'var(--soc-ink3)',textDecoration:'none'}}>↩ OPERATOR.PROFILE</a>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
