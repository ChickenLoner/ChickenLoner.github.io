    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SocClock = () => {
            const ref = useRef(null);
            useEffect(() => {
                const tick = () => {
                    if (!ref.current) return;
                    const n = new Date();
                    ref.current.textContent = n.toISOString().slice(0,10) + ' · ' + n.toISOString().slice(11,19) + 'Z';
                };
                tick();
                const id = setInterval(tick, 1000);
                return () => clearInterval(id);
            }, []);
            return <span ref={ref} className="soc-clock" />;
        };

        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    const el = lucide.createElement(lucide[name], { class: className });
                    ref.current.innerHTML = '';
                    ref.current.appendChild(el);
                }
            }, [name, className]);
            return <i ref={ref} className={`flex-shrink-0 ${className}`} {...props}></i>;
        };

        const IMG = '/assets/reports/btlo-halloween-2025';

        /* ── Reusable Components ── */

                    </div>
                    {title}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
                    {children}
                </div>
            </section>
        );

        const SubSection = ({ title, children }) => (
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                <h3 className="ir-subsection">{title}</h3>
                {children}

        );

        const ReportTable = ({ headers, rows, compact }) => (
            <div className="ir-table-wrap">
                <table className="ir-table" style={compact ? {fontSize:'11px'} : {}}>
                    <thead>
                        <tr>
                            {headers.map((h, i) => <th key={i}>{h}</th>)}
                        </tr>
                    </thead>
                    <tbody>
                        {rows.map((row, i) => (
                            <tr key={i}>

                            </tr>

        const CodeBlock = ({ language, children }) => (

                <div className="ir-code-lang">{language}</div>
                <div className="ir-code-body"><code>{children}</code></div>

        const Img = ({ src, alt, caption }) => (

                <img src={`${IMG}/${src}`} alt={alt || ''} loading="lazy" />
                {caption && <figcaption>{caption}</figcaption>}

        );

        const Finding = ({ number, title, children }) => (
            <div className="ir-finding" style={{display:'flex',flexDirection:'column',gap:'12px'}}>

                    <span className="ir-finding-num">FINDING #{number}</span>
                    <div className="ir-finding-title">{title}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                    {children}
                </div>
            </div>
        );

        const B = ({ children }) => <strong>{children}</strong>;
        const C = ({ children }) => <code className="ir-c">{children}</code>;

                { id: 'timeline',          label: 'Timeline',                   icon: 'Clock' },
                { id: 'scope-evidence',    label: 'Scope & Evidence',           icon: 'Database' },
                { id: 'findings',          label: 'Findings',                   icon: 'Search' },
                { id: 'iocs',              label: 'Indicators of Compromise',   icon: 'AlertTriangle' },
                { id: 'recommendations',   label: 'Recommendations',            icon: 'Shield' },

                                <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                                <a href="/ir-reports/" style={{color:'var(--soc-ink3)',textDecoration:'none'}}>IR.REPORTS</a>
                                <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                                <b>ZETA-9</b>
                            </span>
                            <span style={{marginLeft:'auto',display:'flex',gap:'8px',alignItems:'center'}}>
                                <span className="sev red"><span className="dot"></span>CONFIDENTIAL</span>
                                <span className="sev green"><span className="dot"></span>CLOSED</span>
                            </span>
                            <SocClock />
                        </div>
                    </div>

                    <main id="main-content" style={{maxWidth:'896px',margin:'0 auto',padding:'28px 22px 48px'}} className="animate-fadeIn">

                        {/* Cover image */}
                        <div className="ir-cover">
                            <img src="/assets/labs/btlo_halloween2025_ir_report.png" alt="Zeta-9 Security Incident Report" />
                            <div className="ir-cover-overlay" />
                            <div className="ir-cover-content">
                                <h1 className="ir-cover-title">Zeta-9 Security Incident Report</h1>
                                <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
                                    <span className="sev cyan"><span className="dot"></span>BTLO-Project-Z-2025</span>
                                    <span className="sev amber"><span className="dot"></span>November 2025</span>
                                    <span className="sev red"><span className="dot"></span>Confidential</span>
                                    <span className="sev green"><span className="dot"></span>Closed</span>
                                </div>
                            </div>
                        </div>

                        {/* Metadata */}
                        <div className="ir-meta-grid" style={{marginBottom:'20px'}}>
                            <div><div className="ir-meta-lbl">Incident ID</div><div className="ir-meta-val">BTLO-Project-Z-2025</div></div>
                            <div><div className="ir-meta-lbl">Date of Report</div><div className="ir-meta-val">November 2025</div></div>
                            <div><div className="ir-meta-lbl">Prepared By</div><div className="ir-meta-val">Warawut Manosong (Chicken0248)</div></div>

                        {/* ═══════════ EXECUTIVE SUMMARY ═══════════ */}
                        <ReportSection id="executive-summary" title="Executive Summary" icon="FileText">
                            <p className="ir-p">
                                During a CRISIS engagement, <B>Warawut Manosong (as Chicken0248 agent)</B> was deployed to investigate multiple security incidents across <B>Zeta-9's infrastructure</B>. The investigation revealed a <B>full compromise of four critical assets</B>, including:
                            </p>
                            <ul style={{paddingLeft:'20px',margin:'0'}}>
                                <li className="ir-li">The <B>FortiGate network firewall</B></li>
                                <li className="ir-li">Hybrid <B>cloud infrastructure</B> (AWS and Azure)</li>
                                <li className="ir-li">The <B>JUMPHOST</B> workstation</li>
                                <li className="ir-li">The <B>workstation of a key researcher</B></li>
                            </ul>
                            <p className="ir-p">
                                The first malicious activity was observed on <B>September 16, 2025</B>, targeting the FortiGate firewall to gain unauthorized access to the internal network. Subsequent actions by the adversary included:
                            </p>
                            <ol style={{paddingLeft:'20px',margin:'0'}}>
                                <li className="ir-li"><B>Exploitation of the Surveillance Storage Console</B> to obtain JUMPHOST administrator credentials.</li>
                                <li className="ir-li"><B>Lateral movement</B> to the JUMPHOST and exfiltration of AWS credentials.</li>
                                <li className="ir-li"><B>Unauthorized access and exfiltration of objects</B> from hybrid cloud storage.</li>
                                <li className="ir-li"><B>Defacement of public-facing web assets</B> hosted in Azure.</li>
                                <li className="ir-li"><B>Compromise of the researcher's workstation via a FileFix attack</B>, leading to exfiltration of sensitive data, including <B>the CURE</B> — the final antidote against the ongoing zombie outbreak scenario.</li>
                            </ol>
                            <p className="ir-p">
                                This engagement demonstrates the <B>high impact of coordinated attacks across on-premises and cloud environments</B>, highlighting risks to both critical research and corporate operations.
                            </p>

                            <SubSection title="Business & Stakeholder Impact">
                                <h4 className="ir-h4">1. Strategic Impact — Confidentiality Breach</h4>
                                <ul style={{paddingLeft:'20px',margin:'0'}}>
                                    <li className="ir-li"><B>Corporate secrets and credentials were exposed.</B> The adversary extracted local administrator credentials from surveillance video footage, AWS secret values from parameter store, and sensitive datasets from both <B>AWS S3</B> and <B>Azure Blob</B> storage.</li>
                                    <li className="ir-li"><B>High-value intellectual property and internal R&amp;D data</B> stored in cloud repositories were accessed. This includes files belonging to ZETA-9's "Secret Division," implying possible loss of proprietary research materials.</li>
                                    <li className="ir-li"><B>Brand trust compromised.</B> The defacement of the public <B>Azure Web App</B> resulted in reputational damage, as stakeholders and clients may have observed tampered content displaying adversary-controlled messaging.</li>
                                </ul>

                                <h4 className="ir-h4">2. Operational Impact — Service Disruption &amp; Persistence</h4>
                                <ul style={{paddingLeft:'20px',margin:'0'}}>
                                    <li className="ir-li">The adversary established <B>persistent remote control</B> via a <B>Sliver C2</B> implant embedded into Dr. Frankenstein Code's PowerShell profile. This persistence mechanism could have allowed long-term access, unauthorized script execution, and continuous monitoring of internal operations.</li>
                                    <li className="ir-li"><B>Automation and backup workflows</B> on compromised cloud accounts may have been disrupted due to deleted or modified configurations during the exfiltration phase.</li>
                                    <li className="ir-li"><B>Forensic indicators show data tampering and secure deletion (SDelete)</B>, suggesting permanent loss of original evidence and potential data corruption in the affected division.</li>
                                </ul>

                                <h4 className="ir-h4">3. Financial &amp; Compliance Impact</h4>
                                <ul style={{paddingLeft:'20px',margin:'0'}}>
                                    <li className="ir-li"><B>Potential Regulatory Exposure:</B> The unauthorized access to personal and research data likely violates <B>data protection obligations (GDPR/PDPA equivalents)</B>, exposing Zeta-9 to regulatory fines and reporting requirements.</li>
                                    <li className="ir-li"><B>Incident Response and Recovery Costs:</B> Containment, forensic imaging, cloud credential rotation, and rebuilding of affected environments will incur significant cost and downtime.</li>
                                    <li className="ir-li"><B>Reputational and Market Impact:</B> Investor confidence and partner relations may be affected due to public disclosure of the defacement and data leaks.</li>
                                </ul>

                        {/* ═══════════ FINDINGS ═══════════ */}
                        <ReportSection id="findings" title="Findings" icon="Search">

                            <Finding number={1} title="FortiGate Firewall Compromised Leads to Internal Network Access from VPN">
                                <Img src="img-01.png" alt="FortiGate compromise overview" />
                                <p className="ir-p">On <B>September 16, 2025</B>, the adversary identified Zeta-9's <B>FortiGate Firewall</B> exposed to the internet via its public IP address. The attacker's originating IP was recorded as <C>38[.]68[.]134[.]103</C>.</p>
                                <p className="ir-p">Shortly afterward, the firewall logs captured evidence of an <B>unauthorized administrator login</B> performed through the <B>FortiGate JSON console interface (jsconsole)</B>, which corresponds to the <B>authentication bypass vulnerability CVE-2024-55591</B>.</p>
                                <Img src="img-02.png" alt="Log entries showing the exploit" />
                                <p className="ir-p">These events indicate that the attacker exploited the vulnerability to execute API calls locally via <C>127.0.0.1</C>, bypassing normal authentication controls and logging in as the <B>administrator account "ghost."</B> Immediately after gaining administrative access, the attacker <B>modified a user group (ZetaGroup)</B> to include several new VPN accounts, establishing a <B>persistent entry point</B> into the internal network.</p>
                                <Img src="img-03.png" alt="User group modification evidence" />
                                <p className="ir-p">The adversary then leveraged these newly added credentials to initiate a <B>VPN connection</B> and access Zeta-9's internal environment without triggering perimeter authentication alerts. The adversary now had access to the internal network with an IP address of <C>10[.]1[.]1[.]10</C>.</p>
                                <Img src="img-04.png" alt="VPN connection evidence" />
                                <p className="ir-p">Once inside, the adversary conducted <B>network reconnaissance</B> within the <C>192.168.86.0/24</C> subnet, scanning for <B>SMB (445/TCP)</B>, <B>RPC/DCOM (135/TCP)</B>, and <B>LDAP (389/TCP)</B> services — typical indicators of host and domain enumeration activity.</p>
                                <Img src="img-05.png" alt="Network scan evidence" />
                                <p className="ir-p">This reconnaissance revealed the presence of a <B>JUMPHOST system</B>, which subsequently became the next stage of the attacker's lateral movement.</p>
                            </Finding>

                            <Finding number={2} title="User Credential Retrieval from Storage Console via SQL Injection Attack">
                                <Img src="img-06.png" alt="Surveillance Storage Console overview" />
                                <p className="ir-p">Another activity was observed on September 24, 2025. The adversary with an IP address of <C>91[.]90[.]124[.]21</C> had interacted with the Surveillance Storage Console.</p>
                                <Img src="img-07.png" alt="Adversary interaction evidence" />
                                <p className="ir-p">The adversary attempted to conduct a SQL injection attack on the Surveillance Storage Console.</p>
                                <Img src="img-08.png" alt="SQL injection attempt evidence" />
                                <p className="ir-p">The adversary successfully exploited the SQL injection vulnerability on the Surveillance Storage Console and was able to download the storage object with an ID of 6.</p>
                                <Img src="img-09.png" alt="Storage object download evidence" />
                                <p className="ir-p">The user-agent showed that the threat actor used PowerShell to manually exploit the SQL injection vulnerability and download storage object ID 6, which is the <C>cam06_ai_monitor_securityincident.mp4</C> video file.</p>
                                <Img src="img-10.png" alt="Video file details" />
                                <p className="ir-p">The credential of <C>operator39</C> could be obtained within the video, which would be used for lateral movement to JUMPBOX.</p>
                            </Finding>

                            <Finding number={3} title="AWS Credential Stolen from JumpBox">
                                <Img src="img-11.png" alt="JumpBox compromise overview" />
                                <p className="ir-p">With the credential obtained from the Surveillance Storage Console, the adversary conducted a WMI-based lateral movement technique to inject a malicious DLL into the legitimate <C>more.com</C> process.</p>
                                <Img src="img-12.png" alt="DLL injection evidence" />
                                <p className="ir-p">The adversary deployed the custom malware (<C>Deaddrop.dll</C>) on this jumphost, which retrieved its configuration like the ChaCha20 key and nonce from the repository hosted on <C>codeberg.org</C>.</p>
                                <Img src="img-13.png" alt="Malware configuration evidence" />
                                <p className="ir-p">The custom malware exfiltrated data via <C>dnshook[.]site</C> by appending a subdomain with the BASE32-encoded ChaCha20-Poly1305 ciphertext.</p>
                                <Img src="img-14.png" alt="DNS exfiltration evidence" />
                                <p className="ir-p">The AWS credential was stolen and would be used to access the hybrid cloud environment.</p>
                            </Finding>

                            <Finding number={4} title="Cloud Storage Exfiltration and Website Defacement">
                                <Img src="img-15.png" alt="AWS environment accessed by the threat actor" caption="AWS environment accessed by the threat actor" />
                                <p className="ir-p">Credentials exfiltrated from the jump box were used by the adversary to sign in to AWS as <B>"VictorVenom."</B> The activity was observed from <C>172[.]235[.]129[.]221</C> on September 25, 2025, in the AWS CloudTrail log.</p>
                                <Img src="img-16.png" alt="Adversary obtained AWS Secret" caption="Adversary obtained AWS Secret" />
                                <p className="ir-p">After gaining access, the adversary invoked the <B>GetSecretValue</B> API to retrieve the secret <C>zeta9/windows/admin-password</C>, which likely contains Windows administrative credentials.</p>
                                <Img src="img-17.png" alt="S3 bucket listing evidence" />
                                <p className="ir-p">Subsequently, the adversary downloaded 5 objects from 3 different Amazon S3 buckets including a database backup, secret API key, threat analysis report, and the Zombie 15 experiment.</p>
                                <Img src="img-18.png" alt="Azure Web App exploitation evidence" />
                                <p className="ir-p">After that, the adversary activity was observed from the website hosted on Azure, which was restricted to administrator-level access only. The adversary used the <C>cmd</C> parameter to run system commands to request an OAuth access token from Azure Managed Identity using a secret that was possibly obtained from an AWS S3 object.</p>
                                <Img src="img-19.png" alt="OAuth token request evidence" />
                                <p className="ir-p">Using the acquired OAuth token, the adversary accessed the <C>quantum-research-secrets</C> Azure Blob Storage container and exfiltrated sensitive files including contracts, research, and confidential laboratory information.</p>
                                <Img src="img-20.png" alt="Blob storage exfiltration evidence" />
                                <p className="ir-p">The adversary was observed retrieving malicious content from <C>hxxps[://]pastebin[.]com/raw/sBEs83q3</C>, which was then used to overwrite <C>/home/site/wwwroot/public/index.html</C>. This action resulted in the defacement of the main index page of <C>zeta9-research-portal.azurewebsites.net</C>.</p>
                                <Img src="img-21.png" alt="Defaced website hosting FileFix payload observed from Wayback Machine" caption="Defaced website hosting FileFix payload observed from Wayback Machine" />
                                <p className="ir-p">From the initial access to the AWS environment to website defacement, the adversary only took 44 minutes from 16:06:00 UTC to 16:50:00 UTC. This rapid attack sequence demonstrated sophisticated knowledge of both AWS and Azure environments, indicating a well-planned and executed intrusion.</p>
                            </Finding>

                            <Finding number={5} title="FileFix Leads to Researcher's Workstation Compromised and Critical Data Exfiltration">
                                <Img src="img-22.png" alt="FileFix attack overview" />
                                <p className="ir-p">On September 27, 2025, Dr. Frankenstein Code visited a compromised website that had been defaced by the adversary, which led to a FileFix attack being successfully deployed on this workstation.</p>
                                <Img src="img-23.png" alt="FileFix payload delivery evidence" />
                                <p className="ir-p">Upon executing the malicious PowerShell command from the defaced website, the command fetched another PowerShell script payload from <C>hxxps[://]gist[.]githubusercontent[.]com/a1l4m/.../Microsoft[.]PowerShell[.]DataV4Adapter[.]ps1</C> and this script fetched the hex-encoded shellcode from <C>hxxps[://]gist[.]githubusercontent[.]com/a1l4m/.../IamTheDanger[.]txt</C> and executed it, which established a reverse shell connection to the adversary on <C>35[.]158[.]153[.]237</C> on port 34651.</p>
                                <Img src="img-24.png" alt="Reverse shell connection evidence" />
                                <p className="ir-p">The first command after establishing the reverse shell connection was observed from the adversary at 11:18:33 with the <C>whoami</C> command to determine the level of access on this workstation. Subsequently, we observed more activity from the adversary, which utilized <C>rclone</C> to transfer the Sliver C2 implant from MEGA drive.</p>
                                <Img src="img-25.png" alt="Rclone transfer evidence" />
                                <p className="ir-p">The Sliver C2 implant was originally named <C>sapi.cpl</C> as downloaded from MEGA drive.</p>
                                <Img src="img-26.png" alt="Original filename evidence" />
                                <p className="ir-p">The adversary then renamed it to <C>RunTimeBroker.exe</C> and moved it to <C>C:\Users\Public</C>.</p>
                                <Img src="img-27.png" alt="File rename/move evidence" />
                                <p className="ir-p">The adversary achieved persistence on this workstation by creating a PowerShell profile, as observed in the USN Journal.</p>
                                <Img src="img-28.png" alt="PowerShell profile creation evidence" />
                                <p className="ir-p">The Sliver C2 implant execution was observed several times after PowerShell execution. Afterward, <C>KillTheCURE.exe</C> and <C>sdelete.exe</C> were executed from the same folder at <C>C:\Users\Dr.FrankensteinCode\AppData\Local\CureKiller\CureKiller</C> around 15:49:58 ~ 15:49:59.</p>
                                <Img src="img-29.png" alt="Prefetch/execution evidence" />
                                <p className="ir-p"><C>KillTheCURE.exe</C> and <C>sdelete.exe</C> along with several DLLs were observed being extracted from the <C>CUREKiller.zip</C> file that was downloaded with the living-off-the-land binary <C>certutil.exe</C>, and the <C>Exfiltration_data.zip</C> was created after the execution of <C>KillTheCURE.exe</C>.</p>
                                <Img src="img-30.png" alt="USN Journal extraction evidence" />
                                <p className="ir-p"><C>CUREKiller.zip</C> was downloaded from GitHub. This attachment was likely uploaded within an <B>issue</B>, a <B>pull request</B>, or a <B>comment</B> on GitHub.</p>
                                <Img src="img-31.png" alt="GitHub download evidence" />
                                <p className="ir-p">The adversary used <C>sdelete</C> to permanently delete all original files that had already been copied to the user's temporary folder.</p>
                                <Img src="img-32.png" alt="SDelete execution evidence" />
                                <p className="ir-p"><C>SDelete.exe</C> execution was observed immediately after the execution of <C>KillTheCURE.exe</C>, which deleted 6 files on the desktop:</p>
                                <ul style={{paddingLeft:'20px',margin:'0'}}>
                                    <li className="ir-li"><C>C:\Users\Dr.FrankensteinCode\Desktop\confidential.png</C></li>
                                    <li className="ir-li"><C>C:\Users\Dr.FrankensteinCode\Desktop\CURE.txt</C></li>
                                    <li className="ir-li"><C>C:\Users\Dr.FrankensteinCode\Desktop\gunman.png</C></li>
                                    <li className="ir-li"><C>C:\Users\Dr.FrankensteinCode\Desktop\Helena.txt</C></li>
                                    <li className="ir-li"><C>C:\Users\Dr.FrankensteinCode\Desktop\test.txt</C></li>
                                    <li className="ir-li"><C>C:\Users\Dr.FrankensteinCode\Desktop\outbreak.png</C></li>
                                </ul>
                                <Img src="img-33.png" alt="File deletion USN evidence" />
                                <p className="ir-p">After finishing the deletion, an image file was created with the <C>Exfiltration_data.zip</C> embedded, which contained the 6 files stolen from this workstation.</p>
                                <Img src="img-34.png" alt="Image embedding evidence" />
                                <Img src="img-35.png" alt="Zip contents evidence" />
                                <p className="ir-p"><C>KillTheCURE.exe</C> was designed to search for <C>.png</C> and <C>.txt</C> files located in the Downloads and Desktop folders of the current user and copy them to the Temp folder, zip them to <C>Exfiltrated_data.zip</C>, embed the archive in <C>BetterCallSaul.png</C>, send the image to <C>36[.]157[.]123[.]216</C> with an HTTP POST request, and finally use <C>sdelete.exe</C> to completely remove the original files from the workstation.</p>
                                <p className="ir-p">The adversary also utilized rclone as a fallback, and we successfully obtained the image file from the MEGA drive of the adversary.</p>
                                <Img src="img-36.png" alt="MEGA rclone evidence" />
                                <Img src="img-37.png" alt="Additional exfiltration evidence" />
                                <p className="ir-p">After the exfiltration phase, the adversary cleared all tracks that could be traced back to them.</p>
                                <Img src="img-38.png" alt="Track clearing evidence" />
                                <p className="ir-p">Additionally, a Wing FTP Server exploitation script (<B>CVE-2025-47812</B>) was also found on the MEGA drive and on this workstation, which indicates that the adversary also attempted to exploit the Wing FTP Server running on this workstation.</p>
                                <Img src="img-39.png" alt="Wing FTP exploit evidence" />
                                <p className="ir-p">On September 28, 2025, the adversary cleared 5 different logs, and a <C>netcat</C> executable was also observed before the log clearing event.</p>
                                <Img src="img-40.png" alt="Log clearing evidence" />
                                <p className="ir-p">The registry key that contains the information indicating the FileFix attack was deleted at <C>2025-09-28 02:20:47</C>.</p>
                                <Img src="img-41.png" alt="Registry key deletion evidence" />
                                <p className="ir-p">All of them were eventually deleted by the adversary at the end.</p>
                            </Finding>

import sys

def read_rgba_bytes(png_path):
    img = Image.open(png_path)
    img = img.convert("RGBA")
    data = img.tobytes()  # row-major RGBA
    return data

def extract(png_path, out_path):
    data = read_rgba_bytes(png_path)
    if len(data) < 16:
        raise ValueError("PNG too small or not containing embedded data.")
    header = data[:16]
    crc32_field, key_field_lo, orig_size = struct.unpack("<I Q I", header)
    key = struct.pack("<Q", key_field_lo)[:4]
    original_size = orig_size
    encrypted = data[16:16+original_size]
    if len(encrypted) < original_size:
        raise ValueError("PNG does not contain full payload (truncated).")
    key_u32 = key
    block12 = key + b'\\x00\\x00\\x00\\x00' + struct.pack("<I", original_size)
    check_crc = zlib.crc32(block12) & 0xFFFFFFFF
    if check_crc != crc32_field:
        print("Warning: CRC mismatch (payload integrity check failed).")
    key_bytes = key
    out = bytearray()
    for i, b in enumerate(encrypted):
        out.append(b ^ key_bytes[i % 4])
    with open(out_path, "wb") as f:
        f.write(out)
    print(f"Wrote {len(out)} bytes to {out_path}")

if __name__ == "__main__":
