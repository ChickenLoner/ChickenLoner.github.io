                        {/* ═══════════ EXECUTIVE SUMMARY ═══════════ */}
                        <ReportSection id="executive-summary" title="Executive Summary" icon="FileText">
                            <p className="ir-p">Between <B>November 27 and December 13, 2023</B>, North Pole Operations sustained a coordinated, multi-phase intrusion attributed to the threat actor group <B>the Grinch</B>. The campaign began with a targeted social engineering operation against a privileged insider — referred to as <B>Elfin</B> — who was manipulated over two days into exfiltrating the <C>santa_deliveries</C> project binary.</p>
                            <p className="ir-p">That binary contained hardcoded credentials and a direct reference to an AWS S3 bucket (<C>papa-noel</C>), which the threat actor exploited the following day to harvest cloud-hosted assets. Among the retrieved files was <C>claus.py</C>, a script embedding AWS access and secret keys for the <C>elfadmin</C> account and a reference to a private bucket (<C>north-pole-private</C>). Using those keys, the threat actor pivoted to the private bucket and retrieved <C>bytesparkle.ovpn</C> — a VPN configuration file that provided authenticated access into the North Pole internal network.</p>
                            <p className="ir-p">With internal network access established, the threat actor staged a weaponized archive (<C>present_for_santa.zip</C>) on a file share accessible to <C>TINKERTECH-WKS001</C>. When the Santa Claus account opened the archive, a multi-stage infection chain — LNK shortcut → PowerShell → obfuscated VBScript → shellcode loader — executed, culminating in process injection into <C>svchost.exe</C> (PID 724) and a reverse shell back to the threat actor's C2 infrastructure. From this position, Windows Defender exclusions were applied and LSASS was dumped via a renamed ProcDump binary, yielding credential material for subsequent phases.</p>
                            <p className="ir-p">On <B>December 8, 2023</B>, the threat actor pivoted laterally to the internal network printer (<B>NorthPole HP LaserJet 4200n</B>, <C>192.168.68.128</C>) and exploited the unauthenticated PJL interface on port 9100 to read files directly from its embedded filesystem. Nice and Naughty children's lists, a pending employee termination notice, a scheduled Christmas announcement, and — critically — an SSH private key for the <C>christmas.gifts</C> server were exfiltrated via <C>FSUPLOAD</C> commands.</p>
                            <p className="ir-p">On <B>December 13, 2023</B>, the threat actor executed the final and most destructive phase. <B>CVE-2020-1472 (ZeroLogon)</B> was exploited from <C>192.168.68.200</C> against <C>DC01.northpole.local</C>, instantly resetting the domain controller's machine account (<C>DC$</C>) and granting unauthenticated domain-level access. The <C>Bytesparkle</C> account was repurposed via a forced password reset, and an RDP session was established to the domain controller. A VNC backdoor (<C>svchost.exe</C> + <C>vnc2.dll</C>) and a <C>svc_vnc</C> scheduled task were deployed for persistent remote access. At <B>11:03:20 UTC</B>, the ransomware <C>splunk_svc.dll</C> was executed, encrypting files across the domain controller using a repeating XOR cipher and appending the <C>.xmax</C> extension. A ransom note demanding <B>5,000,000 XMAS tokens</B> to wallet <C>GR1NCH-5ANTA-2023XMAS</C> was deployed. Encryption completed at <B>11:07:28 UTC</B>.</p>
                            <p className="ir-p">The full attack chain — spanning <B>16 days</B> from initial social engineering to ransomware deployment — progressed entirely through exploitation of insider trust, misconfigured cloud storage, unpatched network services, and an unpatched domain controller. No zero-day capabilities were required at any stage.</p>

                            <SubSection title="Business &amp; Stakeholder Impact">
                                <h4 className="ir-h4">1. Confidentiality</h4>
                                <p className="ir-p">The threat actor exfiltrated a substantial volume of sensitive organizational data across multiple phases. The <C>santa_deliveries</C> binary and associated <C>santa-list.csv</C> exposed recipient names, home addresses, gift assignments, and behavioral classifications. The printer's onboard filesystem yielded children's Nice and Naughty classification lists, a pending employee termination notice, a scheduled organizational announcement, and an SSH private key granting potential access to the <C>christmas.gifts</C> server. AWS-hosted operational scripts and configuration files, including credentials embedded in <C>claus.py</C>, were also retrieved in full.</p>
                                <h4 className="ir-h4">2. Integrity</h4>
                                <p className="ir-p"><C>DC01.northpole.local</C> — the organization's primary domain controller — was fully encrypted, with files across <B>69 targeted extension categories</B> rendered inaccessible. The <C>DC$</C> machine account and <C>Bytesparkle</C> domain account were both tampered with directly on the controller. A VNC backdoor and persistence scheduled task were installed.</p>
                                <h4 className="ir-h4">3. Availability</h4>
                                <p className="ir-p">Ransomware execution on the domain controller caused direct operational disruption. File recovery does not require ransom payment: the encryption scheme uses a trivially reversible repeating XOR cipher with the fully recovered key <C>EncryptingC4Fun!</C>, enabling complete decryption of all <C>.xmax</C> files.</p>
                                <h4 className="ir-h4">4. Reputational and Regulatory</h4>
                                <p className="ir-p">Exfiltration of children's personal data from the Nice and Naughty lists — including names and behavioral records — may carry regulatory notification obligations. The disclosure of the <C>Announcment-25Dec.ps</C> organizational announcement prior to its scheduled release date represents an additional confidentiality breach.</p>
                            </SubSection>

                        {/* ═══════════ FINDINGS ═══════════ */}
                        <ReportSection id="findings" title="Findings" icon="Search">

                            <Finding number={1} title="Insider Threat Leads to Secret Binary Exfiltration">
                                <Img src="img-01.png" alt="Email thread recovered from DESKTOP-D32FKTI em client" />
                                <p className="ir-p">On <B>November 27, 2023</B>, the threat actor initiated contact with Elfin from the address <C>definitelynotthegrinch@gmail[.]com</C>, posing as "Wendy Elflower" and fabricating a shared familiarity — a classic pretexting technique to establish trust early in the social engineering chain.</p>
                                <Img src="img-02.png" alt="First email from threat actor to Elfin" />
                                <Img src="img-03.png" alt="Email exchange — Elfin's initial reply" />
                                <Img src="img-04.png" alt="Continued email thread" />
                                <p className="ir-p">Over the course of two days, the threat actor methodically cultivated the relationship, steering the conversation toward Elfin's workplace grievances. This allowed Elfin to voluntarily disclose that he held access to confidential Secret Santa project assets.</p>
                                <Img src="img-05.png" alt="Email — threat actor frames exfiltration as self-liberation" />
                                <Img src="img-06.png" alt="Email continuation" />
                                <p className="ir-p">Exploiting Elfin's accumulated workplace resentment, the threat actor successfully convinced him to act against his employer's interests.</p>
                                <Img src="img-07.png" alt="Elfin agrees to cooperate" />
                                <Img src="img-08.png" alt="Threat actor probes for project details" />
                                <Img src="img-09.png" alt="Elfin offers to send the binary" />
                                <Img src="img-10.png" alt="Elfin sends santa_deliveries.zip" />
                                <p className="ir-p">At <B>17:01:29 UTC</B>, MFT and USN Journal records from <C>DESKTOP-D32FKTI</C> confirm that Elfin compressed <C>santa_deliveries</C> into <C>santa_deliveries.zip</C>. At <B>17:01:46 UTC</B>, the archive was transmitted to the threat actor via the em client.</p>
                                <Img src="img-11.png" alt="MFT/USN Journal record of zip creation and transmission" />
                                <p className="ir-p">Static analysis of the <C>santa_deliveries</C> binary revealed a hardcoded credential for the <C>elf-admin</C> account. Upon successful authentication, the binary retrieves <C>santa-list.csv</C> from the AWS S3 bucket at <C>https://papa-noel.s3.eu-west-3.amazonaws.com/santa-list.csv</C>.</p>
                                <Img src="img-12.png" alt="Binary static analysis — hardcoded elf-admin credential and S3 bucket reference" />
                                <Img src="img-13.png" alt="Binary output parsing santa-list.csv" />
                                <p className="ir-p">Following the exfiltration, Chrome browser history recovered from <C>DESKTOP-D32FKTI</C> shows Elfin conducting searches related to circumventing corporate security controls, concealing insider activity, email deletion, and flights to Greece — indicating a clear attempt to cover his tracks and flee.</p>
                            </Finding>

                            <Finding number={2} title="Hardcoded Credentials in Public S3 Bucket Enable Private Bucket Access and OpenVPN Configuration Exfiltration">
                                <Img src="img-14.png" alt="AWS CloudTrail — automated retrieval from papa-noel S3 bucket" />
                                <p className="ir-p">On <B>November 29, 2023</B>, at <B>08:24:07 UTC</B>, AWS CloudTrail logs recorded an automated bulk retrieval from <C>191[.]101[.]31[.]57</C> targeting the publicly accessible <C>papa-noel</C> S3 bucket. The operation completed within nine seconds at <B>08:24:16 UTC</B>.</p>
                                <Img src="img-15.png" alt="CloudTrail — automated bulk S3 retrieval from papa-noel" />
                                <p className="ir-p">Among the files retrieved from <C>papa-noel</C> was <C>NPoleScripts/claus.py</C>, which contained hardcoded AWS access and secret keys belonging to the <C>elfadmin</C> account, along with a direct reference to the private S3 bucket <C>north-pole-private</C>.</p>
                                <Img src="img-16.png" alt="claus.py — hardcoded elfadmin AWS keys and north-pole-private reference" />
                                <p className="ir-p">At <B>10:15:02 UTC</B>, the threat actor began probing the <C>north-pole-private</C> bucket using <C>HeadBucket</C> and <C>GetBucketAcl</C> API calls. At <B>10:15:28 UTC</B>, the same <C>elfadmin</C> access key was used to successfully execute a <C>ListObjects</C> call against the bucket, confirming partial access.</p>
                                <Img src="img-17.png" alt="CloudTrail — HeadBucket, ListObjects against north-pole-private" />
                                <p className="ir-p">At <B>10:16:30 UTC</B>, activity shifted to a second IP address, <C>45[.]133[.]193[.]41</C>, from which the threat actor retrieved <C>bytesparkle.ovpn</C> at <B>10:16:53 UTC</B>. The AWS CLI user-agent string captured — <C>aws-cli/2.12.0 Python/3.11.5 Linux/6.1.0-kali9-amd64</C> — is consistent with a Kali Linux host.</p>
                                <Img src="img-18.png" alt="CloudTrail — bytesparkle.ovpn retrieval from north-pole-private" />
                                <p className="ir-p">The <C>bytesparkle.ovpn</C> OpenVPN configuration file provided the threat actor with authenticated credentials and routing configuration to establish a VPN tunnel directly into the North Pole internal network. This exfiltrated configuration is assessed to be the <B>primary access vector enabling all subsequent on-premises activity</B>.</p>
                            </Finding>

                            <Finding number={3} title="Malicious LNK Delivery Chain Leads to Process Injection and Credential Harvesting">
                                <Img src="img-19.png" alt="Internal network access via bytesparkle.ovpn" />
                                <Img src="img-20.png" alt="santaclaus.bin — present_for_santa.zip copied to Desktop" />
                                <p className="ir-p">With authenticated VPN access established, the threat actor pivoted from cloud-based operations to on-premises targets. On <B>November 30, 2023</B>, at <B>16:42:21 UTC</B>, memory forensics of <C>santaclaus.bin</C> show the Santa Claus account on <C>TINKERTECH-WKS001</C> accessing the <C>\\SANTA-FS\ImportantFiles</C> network share and copying <C>present_for_santa.zip</C> to the user's Desktop.</p>
                                <Img src="img-21.png" alt="Archive extracted — contents showing click_for_present.lnk and present.vbs" />
                                <p className="ir-p">At <B>16:42:28 UTC</B>, the archive was extracted to a <C>present_for_santa</C> folder on the Desktop. The archive contained two malicious files: <C>present.vbs</C>, a heavily obfuscated VBScript dropper, and <C>click_for_present.lnk</C>, a weaponized shortcut designed to trigger the infection chain.</p>
                                <Img src="img-22.png" alt="click_for_present.lnk details" />
                                <Img src="img-23.png" alt="LNK target — PowerShell spawning cscript for present.vbs" />
                                <p className="ir-p"><C>click_for_present.lnk</C> when executed spawned a PowerShell command that recursively searched <C>C:\Users\</C> for any file matching <C>present*.vbs</C> and invoked it via <C>cscript</C>, executing <C>present.vbs</C> without requiring user awareness of the underlying payload.</p>
                                <Img src="img-24.png" alt="LNK execution chain details" />
                                <Img src="img-25.png" alt="present.vbs obfuscated payload" />
                                <Img src="img-26.png" alt="VBScript — present.exe download URL and execution" />
                                <p className="ir-p">The VBScript payload downloaded a shellcode loader (<C>present.exe</C>) from the C2 server at <C>77[.]74[.]198[.]52</C> via <C>hxxp[://]77.74.198.52/destroy_christmas/evil_present.jpg</C>, dropping it into the executing user's temp directory before launching it to establish a reverse shell back to the C2.</p>
                                <Img src="img-27.png" alt="present.exe download from C2" />
                                <Img src="img-28.png" alt="MFT records — present.exe written and executed" />
                                <p className="ir-p">MFT records corroborate that <C>present.exe</C> was written to disk at <B>16:42:40 UTC</B> and executed one second later. The shellcode loader retrieved a second-stage shellcode from the C2 on port 445 and injected it into the <C>svchost.exe</C> process (PID 724).</p>
                                <Img src="img-29.png" alt="Process start events in memory dump" />
                                <Img src="img-30.png" alt="Shellcode injection into svchost.exe (PID 724)" />
                                <p className="ir-p">At approximately <B>16:42:59 UTC</B>, the threat actor executed a PowerShell command to clear all Windows event logs on <C>TINKERTECH-WKS001</C>.</p>
                                <Img src="img-31.png" alt="Event logs cleared via PowerShell" />
                                <p className="ir-p">At <B>16:43:04 UTC</B>, the threat actor attempted to disable Windows Defender via PowerShell, but the command failed due to a syntax error. At <B>16:43:12 UTC</B>, the threat actor added <C>C:\Users\Public</C> to the Windows Defender exclusion path instead.</p>
                                <Img src="img-32.png" alt="Windows Defender disable attempt — failed due to syntax error" />
                                <Img src="img-33.png" alt="Defender disable command details" />
                                <Img src="img-34.png" alt="Defender exclusion path added — C:\Users\Public" />
                                <Img src="img-35.png" alt="Windows Defender Event ID 5007 — exclusion applied" />
                                <p className="ir-p">At <B>16:43:18 UTC</B>, Sysinternals ProcDump was transferred onto the host as <C>C:\Users\Public\PresentForNaughtyChild.exe</C>. At <B>16:43:27 UTC</B>, it was invoked to dump the LSASS process memory to <C>C:\Users\Public\stolen_gift.dmp</C>.</p>
                                <Img src="img-36.png" alt="ProcDump dropped as PresentForNaughtyChild.exe" />
                                <Img src="img-37.png" alt="MFT — stolen_gift.dmp written to disk" />
                            </Finding>

                            <Finding number={4} title="Printer Filesystem Exploitation via PJL FSUPLOAD Leads to Sensitive Document and SSH Key Exfiltration">
                                <Img src="img-38.png" alt="Port scan against NorthPole HP LaserJet 4200n" />
                                <Img src="img-39.png" alt="Port scan results — TCP 22 and 9100 open on printer" />
                                <p className="ir-p">On <B>December 8, 2023</B>, at <B>12:01:39 UTC</B>, the threat actor conducted a port scan against the <B>NorthPole HP LaserJet 4200n</B> printer (<C>192.168.68.128</C>). The scan revealed TCP 22 (SSH) and TCP 9100 (PJL interface entry point).</p>
                                <Img src="img-41.png" alt="PJL session established on port 9100" />
                                <p className="ir-p">At <B>12:02:14 UTC</B>, the threat actor established a connection to the printer on port 9100, initiating a PJL session.</p>
                                <Img src="img-42.png" alt="PJL FSUPLOAD — Nice-kids list1.txt retrieved" />
                                <p className="ir-p">At <B>12:03:07 UTC</B>, the threat actor issued a PJL <C>FSUPLOAD</C> command to read <C>0:/christmas/2023/Nice-kids/list1.txt</C> directly from the printer's internal filesystem, containing full names of children flagged as "Nice."</p>
                                <Img src="img-43.png" alt="PJL FSUPLOAD — Naughty-kids list.txt retrieved" />
                                <p className="ir-p">At <B>12:03:21 UTC</B>, the threat actor followed up with a second <C>FSUPLOAD</C> request for <C>0:/christmas/2023/Naughty-kids/list.txt</C>.</p>
                                <Img src="img-44.png" alt="Personal-Notice-Employee43.pcl — termination notice for Elfin" />
                                <p className="ir-p">At <B>12:04:18 UTC</B>, the threat actor identified and read <C>0:/saveDevice/SavedJobs/InProgress/Layoff-notice/Personal-Notice-Employee43.pcl</C>, revealing a <B>termination notice for Elfin</B>.</p>
                                <Img src="img-45.png" alt="Announcment-25Dec.ps identified in printer filesystem" />
                                <Img src="img-46.png" alt="Christmas announcement content retrieved" />
                                <p className="ir-p">At <B>12:08:14 UTC</B>, the threat actor identified the PostScript scheduled print job <C>Announcment-25Dec.ps</C> and retrieved its contents via <C>FSUPLOAD</C> at <B>12:08:18 UTC</B>.</p>
                                <Img src="img-47.png" alt="SSH private key discovered" />
                                <Img src="img-48.png" alt="Retrieval of SSH private key" />
                                <p className="ir-p">At <B>12:09:12 UTC</B>, the threat actor discovered an SSH backup private key at <C>0:/Administration/securitykeys/ssh_systems/id_rsa</C> and retrieved its contents at <B>12:09:27 UTC</B>. An attempt to delete the key at <B>12:18:14 UTC</B> failed.</p>
                                <Img src="img-49.png" alt="Attempted to delete SSH private key" />
                            </Finding>

                            <Finding number={5} title="ZeroLogon Exploitation Leads to Domain Compromise and Ransomware Deployment">
                                <p className="ir-p">Building on the credential material harvested from the LSASS dump and internal network persistence from prior phases, the threat actor executed the most destructive stage on <B>December 13, 2023</B>.</p>
                                <Img src="img-50.png" alt="CVE-2020-1472 ZeroLogon exploit against DC01.northpole.local" />
                                <Img src="img-51.png" alt="ZeroLogon exploit — DC$ machine account password reset at 09:24:23" />
                                <p className="ir-p">At <B>09:24:21 UTC</B>, the threat actor — operating from internal IP <C>192.168.68.200</C> — exploited <B>CVE-2020-1472 (ZeroLogon)</B> against <C>DC01.northpole.local</C>, successfully resetting the <C>DC$</C> machine account password at <B>09:24:23 UTC</B>.</p>
                                <Img src="img-53.png" alt="Malicious service executable file creation" />
                                <Img src="img-52.png" alt="Service Path installed on DC at same time as ZeroLogon" />
                                <Img src="img-54.png" alt="vulnerable_to_zerologon service installed and started on DC01" />
                                <p className="ir-p">As part of the exploitation chain, a malicious service named <C>vulnerable_to_zerologon</C> was installed on the domain controller, backed by the binary <C>hAvbdksT.exe</C>.</p>
                                <Img src="img-55.png" alt="Bytesparkle domain account password forcibly reset" />
                                <p className="ir-p">At <B>09:27:36 UTC</B>, leveraging the local Administrator account now accessible via the domain controller, the threat actor reset the password of the <C>Bytesparkle</C> domain account, repurposing it as a controlled credential.</p>
                                <Img src="img-56.png" alt="RDP session established to DC01 as Bytesparkle" />
                                <p className="ir-p">At approximately <B>10:03 UTC</B>, the threat actor established an RDP session to <C>DC01.northpole.local</C> using the newly controlled <C>Bytesparkle</C> account.</p>
                                <Img src="img-57.png" alt="svchost.exe and vnc2.dll dropped to Downloads\svc" />
                                <Img src="img-58.png" alt="User executed svchost.exe — evidence from User Assist" />
                                <p className="ir-p">At <B>10:47 UTC</B>, two suspicious files — a masqueraded <C>svchost.exe</C> and an accompanying <C>vnc2.dll</C> — were dropped into <C>C:\Users\bytesparkle\Downloads\svc</C>. Execution at <B>10:53:21 UTC</B> established a VNC-based remote access channel.</p>
                                <Img src="img-59.png" alt="Threat actor opened Task Scheduler" />
                                <Img src="img-60.png" alt="Task Scheduler — svc_vnc task created" />
                                <p className="ir-p">At <B>10:57:38 UTC</B>, the threat actor created a scheduled task named <C>svc_vnc</C>, establishing a persistence mechanism that would survive a reboot.</p>
                                <Img src="img-61.png" alt="Ransomware dropped on the DC" />
                                <Img src="img-62.png" alt="Ransomware encryption routine started" />
                                <Img src="img-63.png" alt="Ransomware encryption routine ended" />
                                <p className="ir-p">At <B>11:00:16 UTC</B>, the threat actor dropped the ransomware payload <C>splunk_svc.dll</C> into <C>C:\tmp</C>. Execution followed at <B>11:03:20 UTC</B>, deploying a ransom note to <C>C:\Users\bytesparkle\Desktop\README.txt</C> and beginning file encryption. All encrypted files had their extensions replaced with <C>.xmax</C>. The encryption process completed at <B>11:07:28 UTC</B>.</p>
                                <Img src="img-64.png" alt="Ransom note — GR1NCH-5ANTA-2023XMAS wallet, 5,000,000 XMAS tokens demand" caption="Ransom note deployed to C:\Users\bytesparkle\Desktop\README.txt" />
                            </Finding>

                            <Finding number={null} title={<>Ransomware Analysis — <code className="ir-c">splunk_svc.dll</code></>} variant="vi">
                                <p className="ir-p">Static analysis of <C>splunk_svc.dll</C> — executed at 11:03:20 UTC — reveals a self-contained recursive encryption routine consistent with the observed <C>.xmax</C> extension renaming and ransom note deployment.</p>
                                <Img src="img-65.png" alt="69 targeted extensions by this ransomware" />
                                <p className="ir-p">The binary implements a depth-first directory walker using <C>FindNextFileW</C>, iterating through the filesystem and checking each discovered file against a hardcoded list of <B>69 targeted extensions</B>. The target list covers documents, source code, email stores, virtual machine disk images, databases, and archives.</p>
                                <Img src="img-66.png" alt="XOR cipher loop — 16-byte repeating key EncryptingC4Fun!" />
                                <p className="ir-p">For each matching file, the routine encrypts content byte-by-byte using a <B>repeating 16-byte XOR cipher</B>. The key — <C>EncryptingC4Fun!</C> — cycles across a 16-byte window. This encryption scheme is <B>cryptographically trivial</B>: XOR is symmetric, so the same operation restores plaintext, and the short repeating key is fully recoverable via known-plaintext attack.</p>
                                <Img src="img-67.png" alt="Ransomnote content" />
                                <p className="ir-p">The hardcoded ransom note demands <B>5,000,000 XMAS tokens</B> to wallet <C>GR1NCH-5ANTA-2023XMAS</C> and is signed "The Grinch." The note is deployed to the current user's Desktop after every encrypted file.</p>
                            </Finding>
                        </ReportSection>

                            <SubSection title="File Recovery — .xmax Decryptor">
                                <p className="ir-p">Because the ransomware uses a trivially reversible repeating XOR cipher with the hardcoded key <C>EncryptingC4Fun!</C>, all encrypted <C>.xmax</C> files can be fully recovered using the following Python script:</p>
                                <CodeBlock language="Python">
{`#!/usr/bin/env python3
"""
.xmax File Decryptor — XOR key: EncryptingC4Fun!
Usage: python xmax_decrypt.py <target_directory> [--dry-run]
"""
import os, sys, argparse, logging

XOR_KEY = b"EncryptingC4Fun!"
logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s", datefmt="%Y-%m-%d %H:%M:%S")
log = logging.getLogger(__name__)

def xor_decrypt(data, key):
    key_len = len(key)
    return bytes(b ^ key[i % key_len] for i, b in enumerate(data))

def find_xmax_files(root):
    for dirpath, _, filenames in os.walk(root):
        for fname in filenames:
            if fname.endswith(".xmax"):
                yield os.path.join(dirpath, fname)

def decrypt_file(filepath, dry_run=False):
    original_path = filepath[:-5]
    if os.path.exists(original_path):
        log.warning(f"Skipping — original already exists: {original_path}")
        return False
    try:
        with open(filepath, "rb") as f:
            encrypted_data = f.read()
        decrypted_data = xor_decrypt(encrypted_data, XOR_KEY)
        if dry_run:
            log.info(f"[DRY RUN] Would restore: {filepath} -> {original_path}")
            return True
        with open(original_path, "wb") as f:
            f.write(decrypted_data)
        os.remove(filepath)
        log.info(f"Restored: {original_path}")
        return True
    except (PermissionError, OSError) as e:
        log.error(f"Error on {filepath}: {e}")
    return False

def main():
    parser = argparse.ArgumentParser(description="Decrypt .xmax files using XOR key.")
    parser.add_argument("target", help="Directory to scan")
    parser.add_argument("--dry-run", action="store_true", help="Preview without making changes")
    args = parser.parse_args()
    if not os.path.isdir(args.target):
        log.error(f"Target is not a valid directory: {args.target}")
        sys.exit(1)
    total = recovered = skipped = failed = 0
    for xmax_file in find_xmax_files(args.target):
        total += 1
        result = decrypt_file(xmax_file, dry_run=args.dry_run)
        if result: recovered += 1
        elif os.path.exists(xmax_file[:-5]): skipped += 1
        else: failed += 1
    log.info(f"Done — Total: {total} | Recovered: {recovered} | Skipped: {skipped} | Failed: {failed}")

if __name__ == "__main__":
    main()`}
