                        {/* ═══════════ EXECUTIVE SUMMARY ═══════════ */}
                        <ReportSection id="executive-summary" title="Executive Summary" icon="FileText">
                            <p className="text-gray-700 leading-relaxed">
                                Between <B>November 27 and December 13, 2023</B>, North Pole Operations sustained a coordinated, multi-phase intrusion attributed to the threat actor group <B>the Grinch</B>. The campaign began with a targeted social engineering operation against a privileged insider — referred to as <B>Elfin</B> — who was manipulated over two days into exfiltrating the <C>santa_deliveries</C> project binary.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                That binary contained hardcoded credentials and a direct reference to an AWS S3 bucket (<C>papa-noel</C>), which the threat actor exploited the following day to harvest cloud-hosted assets. Among the retrieved files was <C>claus.py</C>, a script embedding AWS access and secret keys for the <C>elfadmin</C> account and a reference to a private bucket (<C>north-pole-private</C>). Using those keys, the threat actor pivoted to the private bucket and retrieved <C>bytesparkle.ovpn</C> — a VPN configuration file that provided authenticated access into the North Pole internal network.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                With internal network access established, the threat actor staged a weaponized archive (<C>present_for_santa.zip</C>) on a file share accessible to <C>TINKERTECH-WKS001</C>. When the Santa Claus account opened the archive, a multi-stage infection chain — LNK shortcut → PowerShell → obfuscated VBScript → shellcode loader — executed, culminating in process injection into <C>svchost.exe</C> (PID 724) and a reverse shell back to the threat actor's C2 infrastructure. From this position, Windows Defender exclusions were applied and LSASS was dumped via a renamed ProcDump binary, yielding credential material for subsequent phases.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                On <B>December 8, 2023</B>, the threat actor pivoted laterally to the internal network printer (<B>NorthPole HP LaserJet 4200n</B>, <C>192.168.68.128</C>) and exploited the unauthenticated PJL interface on port 9100 to read files directly from its embedded filesystem. Nice and Naughty children's lists, a pending employee termination notice, a scheduled Christmas announcement, and — critically — an SSH private key for the <C>christmas.gifts</C> server were exfiltrated via <C>FSUPLOAD</C> commands. An attempt to cover evidence by deleting the SSH key failed.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                On <B>December 13, 2023</B>, the threat actor executed the final and most destructive phase. <B>CVE-2020-1472 (ZeroLogon)</B> was exploited from <C>192.168.68.200</C> against <C>DC01.northpole.local</C>, instantly resetting the domain controller's machine account (<C>DC$</C>) and granting unauthenticated domain-level access. The <C>Bytesparkle</C> account was repurposed via a forced password reset, and an RDP session was established to the domain controller. A VNC backdoor (<C>svchost.exe</C> + <C>vnc2.dll</C>) and a <C>svc_vnc</C> scheduled task were deployed for persistent remote access. At <B>11:03:20 UTC</B>, the ransomware <C>splunk_svc.dll</C> was executed, encrypting files across the domain controller using a repeating XOR cipher and appending the <C>.xmax</C> extension to all targeted files. A ransom note demanding <B>5,000,000 XMAS tokens</B> to wallet <C>GR1NCH-5ANTA-2023XMAS</C> was deployed, signed by "The Grinch." Encryption completed at <B>11:07:28 UTC</B>.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                The full attack chain — spanning <B>16 days</B> from initial social engineering to ransomware deployment — progressed entirely through exploitation of insider trust, misconfigured cloud storage, unpatched network services, and an unpatched domain controller. No zero-day capabilities were required at any stage.
                            </p>

                            <SubSection title="Business &amp; Stakeholder Impact">
                                <h4 className="text-lg font-semibold text-gray-800 mt-4">1. Confidentiality</h4>
                                <p className="text-gray-700 leading-relaxed">
                                    The threat actor exfiltrated a substantial volume of sensitive organizational data across multiple phases. The <C>santa_deliveries</C> binary and associated <C>santa-list.csv</C> exposed recipient names, home addresses, gift assignments, and behavioral classifications for the current delivery cycle. The printer's onboard filesystem yielded children's Nice and Naughty classification lists, a pending employee termination notice, a scheduled organizational announcement, and an SSH private key granting potential access to the <C>christmas.gifts</C> server. AWS-hosted operational scripts and configuration files, including credentials embedded in <C>claus.py</C>, were also retrieved in full.
                                </p>

                                <h4 className="text-lg font-semibold text-gray-800 mt-4">2. Integrity</h4>
                                <p className="text-gray-700 leading-relaxed">
                                    <C>DC01.northpole.local</C> — the organization's primary domain controller — was fully encrypted, with files across <B>69 targeted extension categories</B> rendered inaccessible. The <C>DC$</C> machine account and <C>Bytesparkle</C> domain account were both tampered with directly on the controller. A VNC backdoor and persistence scheduled task were installed; the extent of any activity beyond the investigation window cannot be confirmed without further analysis.
                                </p>

                                <h4 className="text-lg font-semibold text-gray-800 mt-4">3. Availability</h4>
                                <p className="text-gray-700 leading-relaxed">
                                    Ransomware execution on the domain controller caused direct operational disruption to domain-dependent services and file access. File recovery does not require ransom payment: the encryption scheme uses a trivially reversible repeating XOR cipher with the fully recovered key <C>EncryptingC4Fun!</C>, enabling complete decryption of all <C>.xmax</C> files.
                                </p>

                                <h4 className="text-lg font-semibold text-gray-800 mt-4">4. Reputational and Regulatory</h4>
                                <p className="text-gray-700 leading-relaxed">
                                    Exfiltration of children's personal data from the Nice and Naughty lists — including names and behavioral records — may carry regulatory notification obligations depending on applicable data protection legislation. The disclosure of the <C>Announcment-25Dec.ps</C> organizational announcement prior to its scheduled release date represents an additional confidentiality breach with potential reputational consequences.
                                </p>

                        {/* ═══════════ FINDINGS ═══════════ */}
                        <ReportSection id="findings" title="Findings" icon="Search">

                            {/* Finding 1 */}
                            <Finding number={1} title="Insider Threat Leads to Secret Binary Exfiltration">
                                <Img src="img-01.png" alt="Finding 1 overview — social engineering email chain" />
                                <p>On <B>November 27, 2023</B>, the threat actor initiated contact with Elfin from the address <C>definitelynotthegrinch@gmail[.]com</C>, posing as "Wendy Elflower" and fabricating a shared familiarity by claiming to have encountered Elfin at the North Pole HQ — a classic pretexting technique to establish trust early in the social engineering chain.</p>
                                <Img src="img-02.png" alt="First email from threat actor to Elfin" />
                                <Img src="img-03.png" alt="Email exchange — Elfin's initial reply" />
                                <Img src="img-04.png" alt="Continued email thread" />
                                <p>Over the course of two days (November 27–28, 2023), the threat actor methodically cultivated the relationship, steering the conversation toward Elfin's workplace grievances. This allowed Elfin to voluntarily disclose that he held access to confidential Secret Santa project assets — evidence corroborated by the email thread recovered from the em client on Elfin's workstation (<C>DESKTOP-D32FKTI</C>).</p>
                                <Img src="img-05.png" alt="Email — threat actor frames exfiltration as self-liberation (subject: binaries)" />
                                <Img src="img-06.png" alt="Email continuation" />
                                <p>Exploiting Elfin's accumulated workplace resentment, the threat actor successfully convinced him to act against his employer's interests. Elfin agreed to cooperate, framing the action as retaliation against his manager.</p>
                                <Img src="img-07.png" alt="Elfin agrees to cooperate" />
                                <p>With Elfin's cooperation secured, the threat actor pivoted to operational objectives and probed for details on the secret project Elfin had access to.</p>
                                <Img src="img-08.png" alt="Threat actor probes for project details" />
                                <p>Elfin subsequently offered to exfiltrate the project binary, and the threat actor accepted.</p>
                                <Img src="img-09.png" alt="Elfin offers to send the binary" />
                                <Img src="img-10.png" alt="Elfin sends santa_deliveries.zip" />
                                <p>At <B>17:01:29 UTC</B>, MFT and USN Journal records from <C>DESKTOP-D32FKTI</C> confirm that Elfin compressed <C>santa_deliveries</C> into <C>santa_deliveries.zip</C>. At <B>17:01:46 UTC</B>, the archive was transmitted to the threat actor via the em client.</p>
                                <Img src="img-11.png" alt="MFT/USN Journal record of zip creation and transmission" />
                                <p>Static analysis of the <C>santa_deliveries</C> binary revealed a hardcoded credential for the <C>elf-admin</C> account. Upon successful authentication, the binary retrieves <C>santa-list.csv</C> from the AWS S3 bucket at <C>https://papa-noel.s3.eu-west-3.amazonaws.com/santa-list.csv</C> and parses its contents — including recipient names, home addresses, gifts, and behavioral records.</p>
                                <Img src="img-12.png" alt="Binary static analysis — hardcoded elf-admin credential and S3 bucket reference" />
                                <Img src="img-13.png" alt="Binary output parsing santa-list.csv" />
                                <p>Following the exfiltration, Chrome browser history recovered from <C>DESKTOP-D32FKTI</C> shows Elfin conducting searches related to circumventing corporate security controls, concealing insider activity, email deletion, and flights to Greece — indicating a clear attempt to cover his tracks and flee.</p>
                            </Finding>

                            {/* Finding 2 */}
                            <Finding number={2} title="Hardcoded Credentials in Public S3 Bucket Enable Private Bucket Access and OpenVPN Configuration Exfiltration">
                                <Img src="img-14.png" alt="Finding 2 overview — S3 bucket pivot chain" />
                                <p>On <B>November 29, 2023</B>, at <B>08:24:07 UTC</B>, AWS CloudTrail logs recorded an automated bulk retrieval from <C>191[.]101[.]31[.]57</C> targeting the publicly accessible <C>papa-noel</C> S3 bucket — the same bucket whose URL was hardcoded within the <C>santa_deliveries</C> binary exfiltrated by Elfin the previous day. The operation completed within nine seconds, concluding at <B>08:24:16 UTC</B>.</p>
                                <Img src="img-15.png" alt="CloudTrail — automated bulk S3 retrieval from papa-noel" />
                                <p>Among the files retrieved from <C>papa-noel</C> was <C>NPoleScripts/claus.py</C>, which contained hardcoded AWS access and secret keys belonging to the <C>elfadmin</C> account, along with a direct reference to the private S3 bucket <C>north-pole-private</C> — effectively handing the threat actor authenticated access to internal cloud infrastructure.</p>
                                <Img src="img-16.png" alt="claus.py — hardcoded elfadmin AWS keys and north-pole-private reference" />
                                <p>At <B>10:15:02 UTC</B>, the threat actor began probing the <C>north-pole-private</C> bucket using <C>HeadBucket</C> and <C>GetBucketAcl</C> API calls, both of which returned <C>AccessDenied</C>. Despite this, at <B>10:15:28 UTC</B>, the same <C>elfadmin</C> access key was used to successfully execute a <C>ListObjects</C> call against the bucket, confirming partial access. These events are corroborated by Sparky Cloud AWS CloudTrail logs (eu-west-2).</p>
                                <Img src="img-17.png" alt="CloudTrail — HeadBucket, ListObjects against north-pole-private" />
                                <p>At <B>10:16:30 UTC</B>, activity shifted to a second IP address, <C>45[.]133[.]193[.]41</C>, from which the threat actor issued another <C>ListObjects</C> call before retrieving <C>santa_journey_log.csv</C> and <C>bytesparkle.ovpn</C> at <B>10:16:53 UTC</B>. The AWS CLI user-agent string captured in CloudTrail — <C>aws-cli/2.12.0 Python/3.11.5 Linux/6.1.0-kali9-amd64</C> — is consistent with a Kali Linux host, suggesting a deliberate change of operational environment between the two IP addresses.</p>
                                <Img src="img-18.png" alt="CloudTrail — bytesparkle.ovpn retrieval from north-pole-private" />
                                <p>The <C>bytesparkle.ovpn</C> OpenVPN configuration file retrieved from the <C>north-pole-private</C> bucket provided the threat actor with authenticated credentials and routing configuration to establish a VPN tunnel directly into the North Pole internal network. This exfiltrated configuration is assessed to be the <B>primary access vector enabling all subsequent on-premises activity</B>.</p>
                            </Finding>

                            {/* Finding 3 */}
                            <Finding number={3} title="Malicious LNK Delivery Chain Leads to Process Injection and Credential Harvesting">
                                <Img src="img-19.png" alt="Finding 3 overview — LNK delivery chain" />
                                <Img src="img-20.png" alt="Internal network access via bytesparkle.ovpn" />
                                <p>With authenticated VPN access to the internal network established through the exfiltrated <C>bytesparkle.ovpn</C> configuration, the threat actor pivoted from cloud-based operations to on-premises targets.</p>
                                <p>On <B>November 30, 2023</B>, at <B>16:42:21 UTC</B>, memory forensics of <C>santaclaus.bin</C> show the Santa Claus account on <C>TINKERTECH-WKS001</C> accessing the <C>\\SANTA-FS\ImportantFiles</C> network share and copying <C>present_for_santa.zip</C> to the user's Desktop, with the file creation timestamped at <B>16:42:23 UTC</B>.</p>
                                <Img src="img-21.png" alt="santaclaus.bin — present_for_santa.zip copied to Desktop" />
                                <p>At <B>16:42:28 UTC</B>, the archive was extracted to a <C>present_for_santa</C> folder on the Desktop. The archive contained two malicious files: <C>present.vbs</C>, a heavily obfuscated VBScript dropper, and <C>click_for_present.lnk</C>, a weaponized shortcut designed to trigger the infection chain.</p>
                                <Img src="img-22.png" alt="Archive extracted — contents showing click_for_present.lnk and present.vbs" />
                                <Img src="img-23.png" alt="click_for_present.lnk details" />
                                <p><C>click_for_present.lnk</C> was crafted as a lure — when executed, it spawned a PowerShell command that recursively searched <C>C:\Users\</C> for any file matching the pattern <C>present*.vbs</C> and invoked it via <C>cscript</C>, executing <C>present.vbs</C> without requiring user awareness of the underlying payload.</p>
                                <Img src="img-24.png" alt="LNK target — PowerShell spawning cscript for present.vbs" />
                                <Img src="img-25.png" alt="LNK execution chain details" />
                                <Img src="img-26.png" alt="present.vbs obfuscated payload" />
                                <p>The VBScript payload was heavily obfuscated to evade static analysis. Its primary function was to download a shellcode loader (<C>present.exe</C>) from the C2 server at <C>77[.]74[.]198[.]52</C> via <C>hxxp[://]77.74.198.52/destroy_christmas/evil_present.jpg</C>, dropping it into the executing user's temp directory before launching it to establish a reverse shell back to the C2.</p>
                                <Img src="img-27.png" alt="VBScript — present.exe download URL and execution" />
                                <Img src="img-28.png" alt="present.exe download from C2" />
                                <p>MFT records corroborate that <C>present.exe</C> was written to disk at <B>16:42:40 UTC</B> and executed one second later at <B>16:42:41 UTC</B>, consistent with process start events recovered from the <C>santaclaus.bin</C> memory dump.</p>
                                <Img src="img-29.png" alt="MFT records — present.exe written and executed" />
                                <Img src="img-30.png" alt="Process start events in memory dump" />
                                <p>The shellcode loader retrieved a second-stage shellcode from the C2 on port 445 and injected it into the <C>svchost.exe</C> process (PID 724), a common process hollowing technique used to blend malicious execution into a legitimate Windows service host. The injected shellcode then established a reverse shell connection back to the C2 on port 447.</p>
                                <Img src="img-31.png" alt="Shellcode injection into svchost.exe (PID 724)" />
                                <p>At approximately <B>16:42:59 UTC</B>, the threat actor executed a PowerShell command to clear all Windows event logs on <C>TINKERTECH-WKS001</C>, consistent with active anti-forensic measures to limit incident scope reconstruction.</p>
                                <Img src="img-32.png" alt="Event logs cleared via PowerShell" />
                                <p>At <B>16:43:04 UTC</B>, the threat actor attempted to disable Windows Defender via PowerShell, but the command failed due to a syntax error, leaving Defender operational at this stage.</p>
                                <Img src="img-33.png" alt="Windows Defender disable attempt — failed due to syntax error" />
                                <Img src="img-34.png" alt="Defender disable command details" />
                                <p>Pivoting from the failed disable attempt, at <B>16:43:12 UTC</B> the threat actor added <C>C:\Users\Public</C> to the Windows Defender exclusion path. Windows Defender Event ID 5007 confirms the exclusion was successfully applied at <B>16:43:15 UTC</B>, creating a protected staging area for subsequent tooling.</p>
                                <Img src="img-35.png" alt="Defender exclusion path added — C:\Users\Public" />
                                <Img src="img-36.png" alt="Windows Defender Event ID 5007 — exclusion applied" />
                                <p>At <B>16:43:18 UTC</B>, Sysinternals ProcDump was transferred onto the host and written to the Defender-excluded path as <C>C:\Users\Public\PresentForNaughtyChild.exe</C>.</p>
                                <Img src="img-37.png" alt="ProcDump dropped as PresentForNaughtyChild.exe" />
                                <Img src="img-38.png" alt="ProcDump file details" />
                                <p>At <B>16:43:27 UTC</B>, the threat actor invoked <C>PresentForNaughtyChild.exe</C> to dump the LSASS process memory to <C>C:\Users\Public\stolen_gift.dmp</C>, enabling offline credential extraction from the captured memory image.</p>
                            </Finding>

                            {/* Finding 4 */}
                            <Finding number={4} title="Printer Filesystem Exploitation via PJL FSUPLOAD Leads to Sensitive Document and SSH Key Exfiltration">
                                <Img src="img-39.png" alt="Finding 4 overview — printer exploitation" />
                                <Img src="img-40.png" alt="Internal network topology with printer" />
                                <p>On <B>December 8, 2023</B>, at <B>12:01:39 UTC</B>, the threat actor — now operating from within the internal network — conducted a port scan against the <B>NorthPole HP LaserJet 4200n</B> printer (<C>192.168.68.128</C>), as evidenced by <C>networktraffic.pcapng</C>. The scan revealed two open ports: TCP 22 (SSH) and TCP 9100, the standard port for raw TCP/IP printing, which also serves as the PJL interface entry point.</p>
                                <Img src="img-41.png" alt="Port scan results — TCP 22 and 9100 open on printer" />
                                <p>At <B>12:02:14 UTC</B>, the threat actor established a connection to the printer on port 9100, initiating a PJL session.</p>
                                <Img src="img-42.png" alt="PJL session established on port 9100" />
                                <p>At <B>12:03:07 UTC</B>, the threat actor issued a PJL <C>FSUPLOAD</C> command to read <C>0:/christmas/2023/Nice-kids/list1.txt</C> directly from the printer's internal filesystem. The file contained full names of children flagged as "Nice" — recipients on Santa's gift delivery list.</p>
                                <Img src="img-43.png" alt="PJL FSUPLOAD — Nice-kids list1.txt retrieved" />
                                <p>At <B>12:03:21 UTC</B>, the threat actor followed up with a second <C>FSUPLOAD</C> request for <C>0:/christmas/2023/Naughty-kids/list.txt</C>, retrieving the corresponding list of children classified as "Naughty."</p>
                                <Img src="img-44.png" alt="PJL FSUPLOAD — Naughty-kids list.txt retrieved" />
                                <p>At <B>12:04:18 UTC</B>, the threat actor enumerated the printer's saved job queue and identified an in-progress print job: <C>0:/saveDevice/SavedJobs/InProgress/Layoff-notice/Personal-Notice-Employee43.pcl</C>. The file was read at <B>12:04:19 UTC</B>, revealing a <B>termination notice for Elfin</B> — issued in direct response to the security breach Elfin had facilitated.</p>
                                <Img src="img-45.png" alt="Saved job queue enumeration — layoff notice identified" />
                                <Img src="img-46.png" alt="Personal-Notice-Employee43.pcl — termination notice for Elfin" />
                                <p>At <B>12:08:14 UTC</B>, the threat actor identified a PostScript scheduled print job, <C>Announcment-25Dec.ps</C>, stored on the printer's filesystem. Its contents were retrieved via <C>FSUPLOAD</C> at <B>12:08:18 UTC</B>.</p>
                                <Img src="img-47.png" alt="Announcment-25Dec.ps identified in printer filesystem" />
                                <Img src="img-48.png" alt="Christmas announcement content retrieved" />
                                <p>At <B>12:09:12 UTC</B>, the threat actor discovered an SSH backup private key for the <C>christmas.gifts</C> server stored at <C>0:/Administration/securitykeys/ssh_systems/id_rsa</C>, and retrieved its contents at <B>12:09:27 UTC</B>.</p>
                                <Img src="img-49.png" alt="SSH private key discovered at 0:/Administration/securitykeys/ssh_systems/id_rsa" />
                                <Img src="img-50.png" alt="SSH private key content exfiltrated" />
                                <p>At <B>12:18:14 UTC</B>, the threat actor attempted to delete the backup key from the printer's storage — likely to remove evidence of access — but the operation failed.</p>
                                <p>It is worth noting that the SSH private key at <C>0:/Administration/securitykeys/ssh_systems/id_rsa</C> represents a potentially unscoped access vector to the <C>christmas.gifts</C> server whose full exploitation remains undetermined. Additionally, the printer (<C>192.168.68.128</C>) and the ZeroLogon source IP observed in the following phase (<C>192.168.68.200</C>) belong to the same internal subnet, confirming the threat actor maintained a persistent internal foothold continuously from VPN ingress through to domain compromise.</p>
                            </Finding>

                            {/* Finding 5 */}
                            <Finding number={5} title="ZeroLogon Exploitation Leads to Domain Compromise and Ransomware Deployment">
                                <Img src="img-51.png" alt="Finding 5 overview — ZeroLogon to ransomware" />
                                <Img src="img-52.png" alt="DC01 compromise overview" />
                                <p>Building on the credential material harvested from the LSASS dump and the internal network persistence established through prior phases, the threat actor executed the most destructive stage of the operation on <B>December 13, 2023</B>.</p>
                                <p>At <B>09:24:21 UTC</B>, the threat actor — operating from internal IP <C>192.168.68.200</C> — exploited the Netlogon privilege escalation vulnerability (<B>CVE-2020-1472, ZeroLogon</B>) against <C>DC01.northpole.local</C>. The attack successfully reset the <C>DC$</C> machine account password at <B>09:24:23 UTC</B>, as confirmed by Windows Security Event logs recovered from <C>DC01.northpole.local-KAPE</C>.</p>
                                <Img src="img-53.png" alt="ZeroLogon exploit — DC$ machine account password reset at 09:24:23" />
                                <Img src="img-54.png" alt="Windows Security Event Log — DC$ password reset event" />
                                <Img src="img-55.png" alt="Event log details confirming ZeroLogon exploitation" />
                                <p>As part of the exploitation chain, a malicious service named <C>vulnerable_to_zerologon</C> was installed on the domain controller, backed by the binary <C>hAvbdksT.exe</C>. The service was started one second after installation, indicating automated post-exploitation staging.</p>
                                <Img src="img-56.png" alt="vulnerable_to_zerologon service installed and started on DC01" />
                                <p>At <B>09:27:36 UTC</B>, leveraging the local Administrator account now accessible via the domain controller, the threat actor reset the password of the <C>Bytesparkle</C> domain account, repurposing it as a controlled credential for subsequent lateral movement.</p>
                                <Img src="img-57.png" alt="Bytesparkle domain account password forcibly reset" />
                                <p>At approximately <B>10:03 UTC</B>, the threat actor established an RDP session to <C>DC01.northpole.local</C> using the newly controlled <C>Bytesparkle</C> account, gaining interactive access to the domain controller.</p>
                                <Img src="img-58.png" alt="RDP session established to DC01 as Bytesparkle" />
                                <Img src="img-59.png" alt="RDP activity on DC01" />
                                <p>At <B>10:47 UTC</B>, two suspicious files — a masqueraded <C>svchost.exe</C> and an accompanying <C>vnc2.dll</C> — were dropped into <C>C:\Users\bytesparkle\Downloads\svc</C>. The binary was executed at <B>10:53:21 UTC</B>, establishing a VNC-based remote access channel to maintain persistence beyond the RDP session.</p>
                                <Img src="img-60.png" alt="svchost.exe and vnc2.dll dropped to Downloads\svc" />
                                <Img src="img-61.png" alt="VNC binary executed at 10:53:21" />
                                <p>At <B>10:57:38 UTC</B>, the threat actor opened the Task Scheduler MMC snap-in and created a scheduled task named <C>svc_vnc</C>, configured to execute the previously dropped <C>svchost.exe</C>, establishing a persistence mechanism that would survive a reboot.</p>
                                <Img src="img-62.png" alt="Task Scheduler — svc_vnc task created" />
                                <Img src="img-63.png" alt="svc_vnc scheduled task configuration" />
                                <Img src="img-64.png" alt="Scheduled task set to execute svchost.exe from Downloads\svc" />
                                <p>At <B>11:00:16 UTC</B>, the threat actor dropped the ransomware payload <C>splunk_svc.dll</C> into <C>C:\tmp</C>. Execution followed at <B>11:03:20 UTC</B>, simultaneously deploying a ransom note to <C>C:\Users\bytesparkle\Desktop\README.txt</C> and beginning file encryption across the domain controller. All encrypted files had their extensions replaced with <C>.xmax</C>. The encryption process completed at <B>11:07:28 UTC</B>, a four-minute destructive sweep across the DC filesystem.</p>
                                <Img src="img-65.png" alt="Ransom note — GR1NCH-5ANTA-2023XMAS wallet, 5,000,000 XMAS tokens demand" caption="Ransom note deployed to C:\Users\bytesparkle\Desktop\README.txt" />
                            </Finding>

                            {/* Malware Analysis */}
                            <div className="bg-white rounded-2xl border border-gray-200 p-6 space-y-4 shadow-sm">
                                <div className="flex items-start gap-3">

                                </div>
                                <div className="space-y-4 text-gray-700 leading-relaxed">
                                    <p>Static analysis of <C>splunk_svc.dll</C> — the ransomware payload dropped to <C>C:\tmp</C> and executed at 11:03:20 UTC — reveals a self-contained recursive encryption routine consistent with the observed <C>.xmax</C> extension renaming and ransom note deployment.</p>
                                    <Img src="img-66.png" alt="splunk_svc.dll static analysis — depth-first directory walker" />
                                    <p>The binary implements a depth-first directory walker using <C>FindNextFileW</C>, iterating through the filesystem and checking each discovered file against a hardcoded list of <B>69 targeted extensions</B>. The target list covers documents (<C>.doc</C>, <C>.docx</C>, <C>.pdf</C>, <C>.xls</C>, <C>.xlsx</C>, <C>.ppt</C>, <C>.pptx</C>), source code (<C>.c</C>, <C>.cpp</C>, <C>.cs</C>, <C>.py</C>, <C>.sql</C>, <C>.sln</C>), email stores (<C>.pst</C>, <C>.ost</C>, <C>.msg</C>, <C>.eml</C>), virtual machine disk images (<C>.vmdk</C>, <C>.vdi</C>, <C>.vmx</C>), databases (<C>.mdb</C>, <C>.dbf</C>, <C>.accdb</C>, <C>.ora</C>), and archives (<C>.zip</C>, <C>.7z</C>, <C>.rar</C>, <C>.tar</C>, <C>.gz</C>).</p>
                                    <Img src="img-67.png" alt="XOR cipher loop — 16-byte repeating key EncryptingC4Fun!" />
                                    <p>For each matching file, the routine opens the source in read-binary mode, creates an output file with <C>.xmax</C> appended, and encrypts the content byte-by-byte using a <B>repeating 16-byte XOR cipher</B>. The key — referenced internally as <C>EncryptingC4Fun!</C> — cycles across a 16-byte window (<C>v23 = v22 % 16</C>), meaning the entire ciphertext is produced by a key that repeats every 16 bytes. The original file is then deleted via <C>remove()</C>. This encryption scheme is <B>cryptographically trivial</B>: XOR is symmetric, so the same operation restores plaintext, and the short repeating key is fully recoverable via known-plaintext attack against any file whose original content is partially known.</p>
                                    <p>Following each encryption, the ransomware calls <C>SHGetSpecialFolderPathA</C> with <C>CSIDL_DESKTOP</C> to resolve the current user's desktop path, appends <C>\\README.TXT</C>, and overwrites the ransom note on every iteration. The hardcoded note demands <B>5,000,000 XMAS tokens</B> to wallet <C>GR1NCH-5ANTA-2023XMAS</C> and is signed "The Grinch."</p>

                            <SubSection title="File Recovery — .xmax Decryptor">
                                <p className="text-gray-700">Because the ransomware uses a trivially reversible repeating XOR cipher with the hardcoded key <C>EncryptingC4Fun!</C>, all encrypted <C>.xmax</C> files can be fully recovered using the following Python script:</p>
                                <CodeBlock language="Python">
{`#!/usr/bin/env python3
"""
.xmax File Decryptor
--------------------
Scans a target directory for files with the .xmax extension,
decrypts them using XOR with key 'EncryptingC4Fun!', restores
the original filename, and removes the encrypted copy.

Usage:
    python xmax_decrypt.py <target_directory> [--dry-run]
"""

import os
import sys
import argparse
import logging

XOR_KEY = b"EncryptingC4Fun!"

logging.basicConfig(
    level=logging.INFO,
    format="%(asctime)s [%(levelname)s] %(message)s",
    datefmt="%Y-%m-%d %H:%M:%S"
)
log = logging.getLogger(__name__)


def xor_decrypt(data: bytes, key: bytes) -> bytes:
    key_len = len(key)
    return bytes(b ^ key[i % key_len] for i, b in enumerate(data))


def find_xmax_files(root: str):
    for dirpath, _, filenames in os.walk(root):
        for fname in filenames:
            if fname.endswith(".xmax"):
                yield os.path.join(dirpath, fname)


def decrypt_file(filepath: str, dry_run: bool = False) -> bool:
    original_path = filepath[:-5]  # strip .xmax

    if os.path.exists(original_path):
        log.warning(f"Skipping — original already exists: {original_path}")
        return False

    try:
        with open(filepath, "rb") as f:
            encrypted_data = f.read()

        decrypted_data = xor_decrypt(encrypted_data, XOR_KEY)

        if dry_run:
            log.info(f"[DRY RUN] Would restore: {filepath} -> {original_path}")
            return True

        with open(original_path, "wb") as f:
            f.write(decrypted_data)

        os.remove(filepath)
        log.info(f"Restored: {original_path}")
        return True

    except PermissionError:
        log.error(f"Permission denied: {filepath}")
    except OSError as e:
        log.error(f"OS error on {filepath}: {e}")

    return False


def main():
    parser = argparse.ArgumentParser(description="Decrypt .xmax files using XOR key.")
    parser.add_argument("target", help="Directory to scan")
    parser.add_argument("--dry-run", action="store_true", help="Preview without making changes")
    args = parser.parse_args()

    if not os.path.isdir(args.target):
        log.error(f"Target is not a valid directory: {args.target}")
        sys.exit(1)

    log.info(f"Scanning: {args.target}")
    if args.dry_run:
        log.info("Dry-run mode enabled — no files will be modified")

    total = recovered = skipped = failed = 0

    for xmax_file in find_xmax_files(args.target):
        total += 1
        result = decrypt_file(xmax_file, dry_run=args.dry_run)
        if result:
            recovered += 1
        elif os.path.exists(xmax_file[:-5]):
            skipped += 1
        else:
            failed += 1

    log.info(f"Done — Total: {total} | Recovered: {recovered} | Skipped: {skipped} | Failed: {failed}")


if __name__ == "__main__":
    main()`}
