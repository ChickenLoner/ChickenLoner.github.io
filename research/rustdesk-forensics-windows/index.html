                        {/* ═══════════ INTRODUCTION ═══════════ */}
                        <Section id="introduction" title="Introduction" icon="BookOpen">
                            <p className="text-gray-700 leading-relaxed">
                                <B>RustDesk</B> is an open-source, cross-platform remote desktop application written in Rust. This article examines its normal operational behavior, logging mechanisms, persistence techniques, CLI functionality, and the encryption methods used for storing configuration data.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                RustDesk enables remote control of devices across different operating systems by specifying a target device's unique identifier. While legitimate for administrative purposes, the tool has been <B>misused by fraudsters for initial access and data theft</B>, making forensic investigation skills valuable. RustDesk is freely available, easy to deploy (including via command-line), and digitally signed by <B>"Open Source Developer, Huabing Zhou."</B>
                            </p>
                            <Img src="img-01.png" alt="RustDesk overview" caption="RustDesk forensics investigation overview" />
                        </Section>

                        {/* ═══════════ TERMINOLOGY ═══════════ */}
                        <Section id="terminology" title="Terminology" icon="BookMarked">
                            <Table
                                headers={['Term', 'Definition']}
                                rows={[
                                    ['Remote device', 'The system requesting connection to control another device'],
                                    ['End device', 'The local system accepting incoming connection requests'],
                                    ['ID', 'Unique identifier required for establishing connections between devices'],
                                ]}
                            />
                        </Section>

                        {/* ═══════════ BEHAVIOR ═══════════ */}
                        <Section id="behavior" title="RustDesk Usage and Behavior" icon="Monitor">
                            <SubSection title="Portable Installation & File Locations">
                                <p className="text-gray-700 leading-relaxed">
                                    When launched as a portable executable, RustDesk creates directories at:
                                </p>
                                <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                    <li><C>C:\Users\%username%\AppData\Local\rustdesk</C> — application files</li>
                                    <li><C>C:\Users\%username%\AppData\Roaming\rustdesk</C> — configuration and logs</li>
                                </ul>
                                <p className="text-gray-700 leading-relaxed">
                                    The primary executable (<C>rustdesk.exe</C>) extracted from the initial launcher is the <B>key forensic artifact</B> for determining if RustDesk executed on a system.
                                </p>
                                <Img src="img-02.png" alt="RustDesk portable file structure" caption="RustDesk portable execution file locations" />
                            </SubSection>

                            <SubSection title="Configuration & Logging Files">
                                <p className="text-gray-700 leading-relaxed">
                                    RustDesk stores configuration in <C>RustDesk.toml</C>, containing the device's unique ID in encrypted form along with password and salt values. The <C>rustdesk_rCURRENT.log</C> file serves as the main access log, using the system's local timezone for timestamps.
                                </p>
                                <p className="text-gray-700 leading-relaxed">
                                    Log file naming conventions include process ID (PID), thread ID (TID), and UNIX timestamps. When RustDesk restarts, previous logs are renamed to <C>rustdesk_rYYYY-MM-DD_HH-MM-SS.log</C>.
                                </p>
                                <Img src="img-03.png" alt="RustDesk.toml configuration file" caption="RustDesk.toml with encrypted ID and password" />
                                <Img src="img-04.png" alt="rustdesk_rCURRENT.log" caption="RustDesk main log file structure" />
                            </SubSection>
                        </Section>

                        {/* ═══════════ INSTALLATION ═══════════ */}
                        <Section id="installation" title="Installation Behavior on Windows" icon="Download">
                            <SubSection title="EXE Installation">
                                <p className="text-gray-700 leading-relaxed">
                                    EXE installation creates batch scripts (<C>RustDesk_install.bat</C>) that execute registry modifications, create VBScript-generated shortcuts, and install a Windows service. <B>Two service creation events</B> appear — one for configuration import and one for normal service operation.
                                </p>
                                <Img src="img-05.png" alt="RustDesk EXE installation process" caption="RustDesk EXE installer creating service and registry entries" />
                            </SubSection>

                            <SubSection title="MSI Installation">
                                <p className="text-gray-700 leading-relaxed">
                                    MSI installation uses standard Windows installer processes, creating only a <B>single service event</B> and performing direct registry modifications without pre-existing user configuration import.
                                </p>
                                <Img src="img-06.png" alt="RustDesk MSI installation" caption="RustDesk MSI installer — single service creation event" />
                            </SubSection>

                            <p className="text-gray-700 leading-relaxed">
                                Both installation types result in firewall rules allowing RustDesk network access and create an <C>install</C> folder in the RustDesk log/config directory, identifying which user performed installation.
                            </p>
                            <Img src="img-07.png" alt="RustDesk firewall rule" caption="Firewall rule created by RustDesk installation" />

                            <SubSection title="Uninstall Behavior">
                                <p className="text-gray-700 leading-relaxed">
                                    Uninstall behavior creates additional forensic artifacts worth documenting — log and configuration files may persist after uninstallation.
                                </p>
                            </SubSection>
                        </Section>

                        {/* ═══════════ CLI ═══════════ */}
                        <Section id="cli" title="RustDesk Command-Line Interface (CLI)" icon="Terminal">
                            <p className="text-gray-700 leading-relaxed">
                                RustDesk provides documented CLI options. Additionally, undocumented advanced features discoverable in source code include:
                            </p>
                            <Table
                                headers={['Flag', 'Description']}
                                rows={[
                                    ['<code>--connect &lt;ID&gt;</code>', 'Initiate a remote session to a device ID'],
                                    ['<code>--file-transfer &lt;ID&gt;</code>', 'Start a file transfer-only session'],
                                    ['<code>--port-forward &lt;ID&gt;</code>', 'Establish port forwarding'],
                                    ['<code>--elevate</code>', 'Execute with elevated privileges'],
                                    ['<code>--run-as-system</code>', 'Run under SYSTEM account'],
                                    ['<code>--install-service</code>', 'Install RustDesk as a system service'],
                                    ['<code>--password &lt;pwd&gt;</code>', 'Set unattended access permanent password'],
                                ]}
                            />
                            <Callout type="warning">
                                <p>Windows console output redirection is required for viewing CLI results on Windows systems. The undocumented flags are not listed in official documentation but are discoverable in source code.</p>
                            </Callout>
                            <Img src="img-08.png" alt="RustDesk CLI usage" caption="RustDesk CLI flag usage" />
                        </Section>

                        {/* ═══════════ CONNECTIONS ═══════════ */}
                        <Section id="connections" title="Investigate RustDesk Connection" icon="Network">
                            <SubSection title="Connection Logging Behavior">
                                <p className="text-gray-700 leading-relaxed">
                                    The <C>rustdesk_rCURRENT.log</C> records the connecting device's <B>public IP address</B> even before session acceptance. However, RustDesk doesn't log the connecting client's ID or other identifying metadata — only the external IP address is consistently recorded.
                                </p>
                                <p className="text-gray-700 leading-relaxed">
                                    Key log keywords indicating session events:
                                </p>
                                <Table
                                    headers={['Log Keyword', 'Meaning']}
                                    rows={[
                                        ['"Connection opened from"', 'Public IP and timestamp of connection attempt'],
                                        ['"new wakelock"', 'Remote session established; "require display on: true" = screen control'],
                                        ['"drop wakelock"', 'Remote session terminated'],
                                    ]}
                                />
                                <Callout type="warning">
                                    <p>RustDesk's limited logging requires supplementary investigation through <B>Windows audit policies</B>, <B>Sysmon process monitoring</B>, and <B>firewall logs</B>.</p>
                                </Callout>
                                <Img src="img-09.png" alt="RustDesk connection log entries" caption="rustdesk_rCURRENT.log showing connection activity" />
                                <Img src="img-10.png" alt="RustDesk session wakelock log" caption="Session wakelock events indicating remote control activity" />
                            </SubSection>
                        </Section>

                        {/* ═══════════ FILE TRANSFER ═══════════ */}
                        <Section id="file-transfer" title="Investigate File Transfer Activity over RustDesk" icon="FolderOpen">
                            <p className="text-gray-700 leading-relaxed">
                                File transfers establish <B>separate sessions</B> from remote-control connections. When downloading files, the log shows <C>"new read File:"</C> with full path and file size. Uploads appear in the clipboard manager log (<C>%APPDATA%\rustdesk\log\cm</C>) with <C>"new write File:"</C> entries.
                            </p>
                            <Callout type="warning">
                                <p>File transfers via clipboard (copy/paste) don't generate file path logs, making network connection and file creation event tracking essential for investigation.</p>
                            </Callout>
                            <p className="text-gray-700 leading-relaxed">
                                The command <C>rustdesk --file-transfer &lt;ID&gt;</C> initiates file-transfer-only sessions without remote desktop control.
                            </p>
                            <Img src="img-11.png" alt="RustDesk file transfer log" caption="File transfer entries in RustDesk logs" />
                            <Img src="img-12.png" alt="RustDesk clipboard manager log" caption="Clipboard manager log during file transfer" />
                        </Section>

                        {/* ═══════════ UNATTENDED ═══════════ */}
                        <Section id="unattended" title="Investigate Unattended Access / Permanent Password" icon="Lock">
                            <p className="text-gray-700 leading-relaxed">
                                Unattended access enables permanent password configuration via GUI or the <C>--password</C> flag. Passwords are encrypted and stored in <C>RustDesk.toml</C> using the same encryption as device IDs.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                When permanent passwords are set on installed services, the log file at <C>C:\Windows\ServiceProfiles\LocalService\AppData\Roaming\RustDesk\log\server\RustDesk_rCurrent.log</C> records a distinct <C>"permanent-password"</C> update event. Connections using unattended access generate logs in the service account's log directory rather than user AppData.
                            </p>
                            <Img src="img-13.png" alt="RustDesk unattended access setup" caption="Permanent password configuration log entry" />
                            <Img src="img-14.png" alt="RustDesk service account log directory" caption="Service account log directory for unattended connections" />
                        </Section>

                        {/* ═══════════ SELF-HOSTING ═══════════ */}
                        <Section id="self-hosting" title="Self-Hosting and Custom Client Configuration" icon="Server">
                            <p className="text-gray-700 leading-relaxed">
                                RustDesk offers a <B>Custom Client Generator</B> that enables:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>Pre-configured installation binaries with embedded server settings</li>
                                <li>Custom branding (logos, icons, application names)</li>
                                <li>Locked configuration preventing end-user modification</li>
                            </ul>
                            <Callout type="warning">
                                <p>This feature poses <B>significant abuse potential</B>: threat actors can create malicious clients disguised as legitimate tools, automatically connecting to attacker infrastructure with locked, unmodifiable server endpoints.</p>
                            </Callout>
                        </Section>

                        {/* ═══════════ DECRYPTION ═══════════ */}
                        <Section id="decryption" title="Decrypt RustDesk Configuration (ID and Password)" icon="KeyRound">
                            <p className="text-gray-700 leading-relaxed">
                                RustDesk encrypts IDs and passwords using:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li><B>XSalsa20-Poly1305</B> cipher</li>
                                <li>Encryption key derived from the device's <B>machine UUID</B></li>
                                <li>Static 24-byte nonce of all zeros</li>
                                <li>Base64 encoding with "00" prepended to ciphertext</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                The <a href="https://github.com/ChickenLoner/rustdesk-decrypt" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline font-medium">RustDesk Decrypt tool</a> requires:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>System machine UUID from <C>HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Cryptography\MachineGuid</C></li>
