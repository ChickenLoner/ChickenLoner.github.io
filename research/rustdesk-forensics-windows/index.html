                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                RustDesk is an <B>open-source cross-platform remote desktop software</B> written in Rust that also offers self-hosting capability. It allows users to remotely control another device over a network by specifying the target device's ID. Because it is cross-platform, the remote device does not need to run the same OS — as long as RustDesk is installed and running with the correct ID provided, a remote session can be established regardless of the OS.
                            </p>
                            <Img src="img-01.png" alt="Dr.Web research: fraudsters use remote administration software to steal money" caption="Fraudsters steal money using remote administration software — Dr.Web research" />
                            <p className="text-gray-700 leading-relaxed">
                                Since RustDesk is practically free, easy to use, and reliable, it can be abused for initial access by scammers and in some cases for persistence. There are documented cases of fraudsters tricking users into installing RustDesk to steal money and sensitive data — making RustDesk forensics knowledge valuable for any investigator.
                            </p>
                            <Img src="img-02.png" alt="RustDesk GitHub releases page with scammer disclaimer" caption="RustDesk GitHub releases — open source, CLI-downloadable; developers added a scammer disclaimer" />
                            <p className="text-gray-700 leading-relaxed">
                                Being open source, RustDesk is available on its <a href="https://github.com/rustdesk/rustdesk/releases" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">GitHub releases page</a> and downloadable via CLI — perfect for automation scripts. Both EXE (32-bit) and MSI (64-bit) installers are available for Windows, and this blog covers both.
                            </p>

                                <p className="text-gray-700 leading-relaxed">

                            </SubSection>

                            <SubSection title="Uninstall Behavior">
                                <Img src="img-26.png" alt="RustDesk uninstall via shortcut or --uninstall flag" caption="Uninstall via shortcut or rustdesk.exe --uninstall" />
                                <Img src="img-27.png" alt="RustDesk_uninstall.bat created in TEMP" caption="RustDesk_uninstall.bat in %TEMP% — removes service, certificate, printer, registry entries, shortcuts" />
                                <p className="text-gray-700 leading-relaxed">
                                    EXE uninstallation creates <C>RustDesk_uninstall.bat</C> in <C>%TEMP%</C> which removes the service, certificate, printer, registry entries, and shortcuts.
                                </p>
                                <Img src="img-28.png" alt="MSI uninstallation via msiexec /X" caption="MSI uninstallation via msiexec /X" />
                            </SubSection>
                        </Section>

                        {/* ═══ CLI ═══ */}
                        <Section id="cli" title="RustDesk Command-Line Interface (CLI)" icon="Terminal">
                            <Img src="img-29.png" alt="RustDesk official CLI documentation" caption="RustDesk client documentation — documented CLI flags" />
                            <p className="text-gray-700 leading-relaxed">
                                RustDesk provides CLI functionality enabling automation of installation and execution — useful for legitimate administration but also an abuse vector for threat actors.
                            </p>
                            <Img src="img-30.png" alt="RustDesk source code showing additional undocumented CLI flags" caption="RustDesk source code reveals additional CLI flags beyond the documentation" />
                            <p className="text-gray-700 leading-relaxed">
                                Reviewing the open-source code reveals additional undocumented commands:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li><C>--connect</C> — Initiate a session to a specified RustDesk ID</li>
                                <li><C>--file-transfer</C> — Start a file transfer-only session</li>
                                <li><C>--port-forward</C> — Establish port forwarding</li>
                                <li><C>--elevate</C> — Execute with elevated privileges</li>
                                <li><C>--run-as-system</C> — Run under the SYSTEM account</li>
                                <li><C>--portable-service</C> — Run as a portable service with elevation</li>
                                <li><C>--install-service</C> — Install as a system service</li>
                                <li><C>--service</C> — Run in service mode</li>
                            </ul>
                            <Img src="img-31.png" alt="RustDesk FAQ: no console output on Windows" caption="RustDesk FAQ — no standard console output on Windows" />
                            <Img src="img-32.png" alt="Piping rustdesk output to more command" caption="Pipe to 'more' to view CLI output: rustdesk.exe --get-id | more" />
                            <Callout type="tip">
                                <p>RustDesk on Windows does not produce console output by default. Pipe output to another utility (e.g., <C>| more</C>) to view CLI results.</p>
                            </Callout>
                        </Section>

                        {/* ═══ CONNECTIONS ═══ */}
                        <Section id="connections" title="Investigate RustDesk Connection" icon="Network">
                            <Img src="img-33.png" alt="Remote device entering RustDesk ID to initiate connection" caption="Initiating a connection by specifying the target's RustDesk ID" />
                            <p className="text-gray-700 leading-relaxed">
                                To initiate a remote connection, the remote device must specify the correct <B>RustDesk ID</B>, and the RustDesk client must be actively running on the end device.
                            </p>
                            <Img src="img-34.png" alt="Prompt for password if the remote connection user has OTP or password for unattended access" caption="Prompt for password if the remote connection user has OTP or password for unattended access" />
                            <p className="text-gray-700 leading-relaxed">
                                The connecting client first communicates with the relay/rendezvous server to locate the endpoint. If the connecting user has the <B>OTP</B> or if <B>unattended access</B> is configured, the connection can be established without manual acceptance.
                            </p>
                            <Img src="img-35.png" alt="Accept or Accept and elevate options on end device" caption="End device prompt — 'Accept' or 'Accept and elevate' with administrator privileges" />

                            <SubSection title="Connection Logging">
                                <Img src="img-36.png" alt="Public IP already logged before session accepted" caption="Public IP of connecting device is logged BEFORE the session is accepted" />
                                <p className="text-gray-700 leading-relaxed">
                                    Even before a session is accepted, <C>rustdesk_rCURRENT.log</C> already records the <B>public IP address</B> of the connecting device or private IP address if it's happened to come from the same subnet.
                                </p>
                                <Img src="img-37.png" alt="Additional log entries after Accept, but no RustDesk ID logged" caption="After Accept — more entries written, but RustDesk ID of connecting device is NOT logged" />
                                <p className="text-gray-700 leading-relaxed">
                                    Unlike AnyDesk, RustDesk does <B>not log the connecting device's RustDesk ID</B>. The only external identifier consistently recorded is the <B>public IP address</B>.
                                </p>
                                <Img src="img-38.png" alt="Clipboard manager log created in AppData Roaming rustdesk log cm" caption="Clipboard manager log at %APPDATA%\\rustdesk\\log\\cm — created when clipboard sync is used" />
                                <Img src="img-39.png" alt="Session termination log sequence" caption="Session termination sequence in rustdesk_rCURRENT.log" />
                                <p className="text-gray-700 leading-relaxed">Key search terms for <C>rustdesk_rCURRENT.log</C>:</p>
                                <Table
                                    headers={['Keyword', 'Source', 'Meaning']}
                                    rows={[
                                        ['<code>Connection opened from</code>', 'src/server/connection.rs', 'Public IP + timestamp of connection request'],
                                        ['<code>new wakelock</code>', 'src/platform/mod.rs', 'Session established; <code>require display on: true</code> = screen-sharing session'],
                                        ['<code>drop wakelock</code>', 'src/server/connection.rs', 'Session ended'],
                                    ]}
                                />
                                <Callout type="warning">
                                    <p>RustDesk's limited logging significantly restricts investigative visibility. Supplement with <B>Windows audit policies</B>, <B>Sysmon</B>, and <B>firewall/network logs</B>.</p>
                                </Callout>
                            </SubSection>

                            <SubSection title="Log Rotation">
                                <Img src="img-40.png" alt="Old log renamed to timestamped filename on new RustDesk launch" caption="On new RustDesk launch, old log renamed to rustdesk_rYYYY-MM-DD_HH-MM-SS.log" />
                                <Img src="img-41.png" alt="Same log rotation for clipboard manager logs" caption="Log rotation also applies to clipboard manager logs" />
                                <p className="text-gray-700 leading-relaxed">
                                    When RustDesk restarts, <C>rustdesk_rCURRENT.log</C> is renamed to <C>rustdesk_rYYYY-MM-DD_HH-MM-SS.log</C>. The same applies to all other logs including clipboard manager logs as shown in the image above as the example.
                                </p>
                            </SubSection>
                        </Section>

                        {/* ═══ FILE TRANSFER ═══ */}
                        <Section id="file-transfer" title="Investigate File Transfer Activity over RustDesk" icon="FolderOpen">
                            <Img src="img-42.png" alt="RustDesk file transfer utility overview" caption="RustDesk built-in file transfer utility" />
                            <p className="text-gray-700 leading-relaxed">
                                RustDesk has a built-in file transfer utility allowing file transfer between two devices.
                            </p>

                            <SubSection title="File Transfer via File Manager">
                                <Img src="img-43.png" alt="File transfer creates a separate session in the log" caption="File transfer session creates a separate connection event in rustdesk_rCURRENT.log" />
                                <p className="text-gray-700 leading-relaxed">
                                    File transfer creates a <B>separate session</B> from the remote-control session — a new connection request event appears in the log.
                                </p>
                                <Img src="img-44.png" alt="RustDesk file manager UI" caption="RustDesk file manager — browse, upload, download, create folders, delete files" />
                                <Img src="img-45.png" alt="Demo of file operations on end device" caption="Demo: download, upload, new folder, delete file on end device" />
                                <Img src="img-46.png" alt="new read File entry in log showing path and size of downloaded file" caption="'new read File:' in access log — full path and size of file downloaded from end device" />
                                <p className="text-gray-700 leading-relaxed">
                                    When a file is <B>downloaded from the end device</B>, the access log records the full path and size with <C>new read File:</C>. Note: there are <B>no explicit log entries for folder creation or file deletion</B>.
                                </p>
                                <Img src="img-47.png" alt="new write File in clipboard manager log for file uploaded to end device" caption="Clipboard manager log — 'new write File:' for files uploaded to the end device" />
                                <p className="text-gray-700 leading-relaxed">
                                    When a file is <B>uploaded to the end device</B>, it is logged in the clipboard manager log with <C>new write File:</C>.
                                </p>
                                <Img src="img-48.png" alt="File transfer session closed log" caption="File transfer session closed — no monitor exit events (differentiates from remote-control session)" />
                            </SubSection>

                            <SubSection title="File Transfer via Clipboard">
                                <Img src="img-49.png" alt="Clipboard-based file transfer log events" caption="Clipboard-based transfer — no file path logged, but transfer events are detectable" />
                                <p className="text-gray-700 leading-relaxed">
                                    File transfer via clipboard leaves <B>no file path</B> in logs, but you can detect it:
                                </p>
                                <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                    <li><C>server_file_content_request</C> + <C>client_file_content_response</C> → file sent to remote device</li>
                                    <li><C>client_file_contents_request</C> + <C>server_file_contents_response</C> → file downloaded from remote</li>
                                </ul>
                            </SubSection>

                            <SubSection title="File Transfer via --file-transfer CLI">
                                <Img src="img-50.png" alt="rustdesk --file-transfer ID command" caption="rustdesk --file-transfer &lt;ID&gt; — requests a file transfer-only session" />
                                <Img src="img-51.png" alt="File transfer only session: no remote control" caption="File transfer-only session: files transferred and deleted, but no remote control" />
                                <Img src="img-52.png" alt="Transfer chisel from remote system to target and download credential file from target to remote" caption="Transfer chisel from remote system to target and download credential file from target to remote" />
                                <Img src="img-53.png" alt="File transfer activities event that could be seen from log file" caption="File transfer activities event that could be seen from log file" />
                                <Img src="img-54.png" alt="File transferred from remote host logged in clipboard manager" caption="File transferred from remote host logged in clipboard manager" />
                                <p className="text-gray-700 leading-relaxed">
                                    <C>rustdesk --file-transfer &lt;ID&gt;</C> creates a file transfer-only session. The same logging methodology applies for identifying download/upload activity.
                                </p>
                                <Callout type="warning">
                                    <p>Clipboard-based transfers leave <B>no file path</B> in logs. Use <B>file creation event monitoring</B> and <B>network activity analysis</B> to compensate.</p>
                                </Callout>
                            </SubSection>
                        </Section>

                        {/* ═══ UNATTENDED ═══ */}
                        <Section id="unattended" title="Investigate RustDesk Connection via Unattended Access" icon="Lock">
                            <Img src="img-55.png" alt="RustDesk permanent password setup via GUI" caption="RustDesk permanent password setup — configurable via GUI or --password CLI flag" />
                            <p className="text-gray-700 leading-relaxed">
                                RustDesk supports <B>Unattended Access</B> via a permanent password (set via GUI or <C>--password</C> flag). The password is stored encrypted in <C>RustDesk.toml</C>.
                            </p>
                            <Img src="img-56.png" alt="RustDesk client deployment automation script in documentation" caption="RustDesk docs provide client deployment scripts — threat actors can copy and abuse these directly" />
                            <p className="text-gray-700 leading-relaxed">
                                The RustDesk documentation provides ready-made automation scripts for client deployment — a threat actor can copy this script, set their desired password, and optionally add a local administrator account creation.
                            </p>
                            <Img src="img-57.png" alt="permanent-password update logged in LocalService RustDesk log" caption="LocalService RustDesk log — explicit 'permanent-password' update event" />
                            <p className="text-gray-700 leading-relaxed">
                                When setting a password with the service installed, a log entry is written to <C>C:\Windows\ServiceProfiles\LocalService\AppData\Roaming\RustDesk\log\server\RustDesk_rCurrent.log</C> — explicit enough to confirm a permanent password was configured.
                            </p>
                            <Img src="img-58.png" alt="Encrypted password stored in RustDesk.toml" caption="Encrypted password stored in RustDesk.toml" />
                            <Img src="img-59.png" alt="Unattended access connection logged in LocalService service log" caption="Unattended access connection logged in LocalService RustDesk service log (not user AppData)" />
                            <p className="text-gray-700 leading-relaxed">
                                Unattended connections are handled by the RustDesk service instance and logged at <C>C:\Windows\ServiceProfiles\LocalService\AppData\Roaming\RustDesk\log\server</C>.
                            </p>
                        </Section>

                        {/* ═══ SELF-HOSTING ═══ */}
                        <Section id="self-hosting" title="Self-Hosting and Custom Client Configuration" icon="Server">
                            <Img src="img-60.png" alt="RustDesk pricing page showing free vs paid plans" caption="RustDesk pricing — free self-hosting has limitations; paid plans unlock Custom Client Generator" />
                            <p className="text-gray-700 leading-relaxed">
                                The free self-hosting plan has these limitations: no audit logging, no web management console, no MFA/2FA, and limited device management. Paid plans unlock the <B>Custom Client Generator</B>.
                            </p>
                            <Img src="img-61.png" alt="RustDesk custom client configuration documentation" caption="Custom Client Generator — embedded server config, custom branding, locked settings" />
                            <p className="text-gray-700 leading-relaxed">
                                From a threat modeling perspective, the Custom Client Generator enables threat actors to:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>Create malicious clients connecting to attacker-controlled infrastructure</li>
                                <li>Deploy branded installers disguised as legitimate IT tools</li>
                                <li>Lock server configuration to prevent victims identifying the malicious backend</li>
                                <li>Bypass user suspicion with legitimate-looking software behavior</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                This blurs the boundary between legitimate RMM tools and malicious remote access implants.
                            </p>
                        </Section>

                        {/* ═══ DECRYPT ═══ */}
                        <Section id="decrypt" title="Decrypt RustDesk Configuration (ID and Password)" icon="Key">
                            <Img src="img-62.png" alt="RustDesk.toml showing encrypted ID with 00 prefix" caption="RustDesk.toml — encrypted ID: 00 prefix + base64-encoded XSalsa20-Poly1305 ciphertext" />
                            <Img src="img-63.png" alt="Encrypted password in RustDesk.toml" caption="Encrypted password in RustDesk.toml — same format as ID" />
                            <p className="text-gray-700 leading-relaxed">
                                RustDesk encrypts both the stored <B>ID and password</B>. Understanding this allows analysts to recover these values during a forensic investigation.
                            </p>

                            <SubSection title="Encryption Process">
                                <ol className="list-decimal list-outside ml-5 space-y-1 text-gray-700">
                                    <li>Retrieve the device ID or password value</li>
                                    <li>Encrypt using <B>XSalsa20-Poly1305</B> cipher</li>
                                    <li>Derive the key from the <B>machine UUID</B></li>
                                    <li>Use a static 24-byte <B>nonce of all zeros</B> (0x00 × 24)</li>
                                    <li>Encode the ciphertext with <B>base64</B></li>
                                    <li>Prepend <C>00</C> to the base64 string</li>
                                </ol>
                                <CodeBlock language="text">{`Format: 00<base64_encoded_ciphertext>`}</CodeBlock>
                            </SubSection>

                            <Img src="img-64.png" alt="Python decryption script for RustDesk configuration" caption="Python decryption script — requires Machine UUID and encrypted config string or file path" />
                            <p className="text-gray-700 leading-relaxed">
                                I wrote a Python decryption script available at <a href="https://github.com/ChickenLoner/rustdesk-decrypt" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">github.com/ChickenLoner/rustdesk-decrypt</a>. It requires the system <B>Machine UUID</B> and the path to the config file (or the encrypted string directly).
                            </p>
                            <Callout type="warning">
                                <p><B>Critical limitation:</B> You need the <B>Machine UUID of the specific compromised system</B> to decrypt its RustDesk config. Obtain it from: <C>HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Cryptography\MachineGuid</C>.</p>
                            </Callout>

                            <SubSection title="Bonus: Folder Creation by Flag">
                                <Img src="img-65.png" alt="Wrong flag causes folder named -- to be created" caption="Even a wrong CLI flag causes RustDesk to create a folder named '--' — useful for MFT analysis" />
                                <p className="text-gray-700 leading-relaxed">
                                    Even providing an incorrect flag causes RustDesk to create a folder named <C>--</C>. Use <B>MFT analysis or file creation monitoring</B> to identify what CLI flags were used with RustDesk.
                                </p>
                            </SubSection>

                            <div className="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">Resources</h3>
                                <ul className="space-y-1 text-sm text-blue-600">
                                    {[
                                        ['https://github.com/rustdesk/rustdesk', 'rustdesk/rustdesk — GitHub'],
                                        ['https://news.drweb.com/show/?i=14755', 'Dr.Web — Fraudsters use remote administration software'],

                                        ['https://asec.ahnlab.com/en/84729/', 'AhnLab ASEC — RustDesk threat analysis'],
                                        ['https://github.com/rustdesk/rustdesk/wiki/FAQ', 'RustDesk FAQ (GitHub Wiki)'],
                                        ['https://rustdesk.com/docs/en/self-host/client-configuration/', 'RustDesk Client Configuration Docs'],
                                    ].map(([url, label]) => (
                                        <li key={url}><a href={url} target="_blank" rel="noopener noreferrer" className="hover:underline">{label}</a></li>
                                    ))}
                                </ul>
                            </div>
                        </Section>

                        <div className="border-t border-gray-200 pt-6 flex items-center justify-between text-sm">
                            <a href="#" className="flex items-center gap-1.5 text-gray-500 hover:text-indigo-600 transition-colors">
                                <Icon name="ArrowUp" className="w-4 h-4" />Back to top
                            </a>
                            <a href="/research/index.html" className="flex items-center gap-1.5 text-gray-500 hover:text-indigo-600 transition-colors">
                                <Icon name="ArrowLeft" className="w-4 h-4" />All Research
                            </a>
                        </div>
                    </main>
                </div>
            );
        };
