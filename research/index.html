<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Research | Chicken0248</title>
    <link rel="icon" href="/chicken0248.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 0.8s linear infinite; }

        /* ── DARK MODE ── */
        .dark.min-h-screen { background: linear-gradient(135deg, #0f172a 0%, #141f35 50%, #0a1628 100%) !important; }
        .dark nav { background-color: rgba(15,23,42,0.96) !important; border-bottom-color: rgba(51,65,85,0.5) !important; }
        .dark .bg-white    { background-color: #1e293b !important; }
        .dark .bg-gray-50  { background-color: #0f172a !important; }
        .dark .bg-gray-100 { background-color: #334155 !important; }
        .dark .bg-red-50   { background-color: rgba(220,38,38,0.10) !important; }
        .dark .bg-red-100  { background-color: rgba(220,38,38,0.20) !important; }
        .dark .bg-orange-100 { background-color: rgba(234,88,12,0.20) !important; }
        .dark .bg-blue-100   { background-color: rgba(37,99,235,0.20) !important; }
        .dark .bg-green-100  { background-color: rgba(22,163,74,0.20) !important; }
        .dark .bg-indigo-100 { background-color: rgba(99,102,241,0.20) !important; }
        .dark .bg-indigo-600 { background-color: #4f46e5 !important; }
        .dark .text-gray-800 { color: #e2e8f0 !important; }
        .dark .text-gray-700 { color: #cbd5e1 !important; }
        .dark .text-gray-600 { color: #94a3b8 !important; }
        .dark .text-gray-500 { color: #64748b !important; }
        .dark .text-gray-400 { color: #475569 !important; }
        .dark .text-red-700    { color: #f87171 !important; }
        .dark .text-blue-700   { color: #93c5fd !important; }
        .dark .text-green-700  { color: #4ade80 !important; }
        .dark .text-orange-700 { color: #fb923c !important; }
        .dark .text-indigo-700 { color: #a5b4fc !important; }
        .dark .text-blue-600   { color: #60a5fa !important; }
        .dark .text-indigo-600 { color: #818cf8 !important; }
        .dark .border-gray-100 { border-color: #334155 !important; }
        .dark .border-gray-200 { border-color: #475569 !important; }
        .dark .border-indigo-200 { border-color: rgba(99,102,241,0.3) !important; }
        .dark .hover\:border-blue-300:hover { border-color: rgba(59,130,246,0.5) !important; }
        .dark .hover\:bg-gray-50:hover { background-color: #1e293b !important; }
        .dark .hover\:bg-indigo-50:hover { background-color: rgba(99,102,241,0.1) !important; }
        .dark input { background-color: #1e293b !important; border-color: #334155 !important; color: #e2e8f0 !important; }
        .dark input::placeholder { color: #64748b !important; }
        .dark ::-webkit-scrollbar       { width: 6px; }
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    const el = lucide.createElement(lucide[name], { class: className });
                    ref.current.innerHTML = '';
                    ref.current.appendChild(el);
                }
            }, [name, className]);
            return <i ref={ref} className={`flex-shrink-0 ${className}`} {...props}></i>;
        };

        const App = () => {
            const [dark, setDark] = useState(() => localStorage.getItem('darkMode') === 'true');
            const [articles, setArticles] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTag, setActiveTag] = useState(null);

            useEffect(() => { localStorage.setItem('darkMode', dark); }, [dark]);

            useEffect(() => {
                fetch('/data/research.json')
                    .then(r => r.json())
                    .then(data => { setArticles(data); setLoading(false); })
                    .catch(() => setLoading(false));
            }, []);

            const allTags = useMemo(() =>
                [...new Set(articles.flatMap(a => a.tags))].sort(),
                [articles]
            );

            const filtered = useMemo(() =>
                activeTag ? articles.filter(a => a.tags.includes(activeTag)) : articles,
                [articles, activeTag]
            );

            return (
                <div className={`min-h-screen bg-gray-50 ${dark ? 'dark' : ''}`}>
                    {/* Navigation */}
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 py-3">
                        <div className="max-w-6xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <a href="/" className="flex items-center gap-2 hover:opacity-80 transition-opacity">
                                    <img src="/chicken0248.png" alt="Logo" className="w-8 h-8 rounded-lg" />
                                    <span className="font-bold text-gray-800">Chicken0248</span>
                                </a>
                                <span className="text-gray-400">/</span>
                                <span className="font-semibold text-gray-600">Research</span>
                            </div>
                            <button onClick={() => setDark(!dark)}
                                className="p-2 rounded-lg hover:bg-gray-100 text-gray-600 transition-colors text-lg">
                                {dark ? '\u2600\uFE0F' : '\uD83C\uDF19'}
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-4 py-8 space-y-8 animate-fadeIn">
                        {/* Hero */}
                        <div className="relative overflow-hidden rounded-2xl bg-gradient-to-r from-indigo-800 to-indigo-900 text-white shadow-xl">
                            <div className="absolute -top-16 -right-16 w-64 h-64 bg-white/5 rounded-full blur-xl" />
                            <div className="relative px-8 py-6 md:py-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                                <div>
                                    <div className="flex items-center gap-3 mb-1">
                                        <Icon name="ScrollText" className="w-5 h-5 text-indigo-300" />
                                        <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight">Security Research</h1>
                                    </div>
                                    <p className="text-indigo-200 text-sm font-medium">Original research on digital forensics, red teaming, and security lab building</p>
                                </div>
                                <div className="flex-shrink-0 bg-white/15 rounded-xl px-5 py-3 text-center sm:text-left">
                                    <div className="text-2xl font-bold">{articles.length}</div>
                                    <div className="text-indigo-200 text-xs">Articles Published</div>
                                </div>
                            </div>
                        </div>

                        {/* Tag Filters */}
                        {!loading && allTags.length > 0 && (
                            <div className="flex flex-wrap gap-2">
                                <button onClick={() => setActiveTag(null)}
                                    className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors border ${
                                        !activeTag
                                            ? 'bg-indigo-600 text-white border-indigo-600'
                                            : 'bg-white text-gray-600 border-gray-200 hover:border-indigo-300 hover:bg-indigo-50'
                                    }`}>
                                    All
                                </button>
                                {allTags.map(tag => (
                                    <button key={tag} onClick={() => setActiveTag(tag === activeTag ? null : tag)}
                                        className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors border ${
                                            activeTag === tag
                                                ? 'bg-indigo-600 text-white border-indigo-600'
                                                : 'bg-white text-gray-600 border-gray-200 hover:border-indigo-300 hover:bg-indigo-50'
                                        }`}>
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* Loading */}
                        {loading && (
                            <div className="flex justify-center py-20">
                                <div className="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin" />
                            </div>
                        )}

                        {/* Article Cards */}
                        {!loading && (
                            <div className="grid md:grid-cols-2 gap-6">
                                {filtered.map(article => (
                                    <a key={article.slug} href={article.url}
                                       className="group bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-lg hover:border-blue-300 transition-all duration-200">
                                        <div className="aspect-video overflow-hidden">
                                            <img src={article.cover} alt={article.title}
                                                 className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                                        </div>
                                        <div className="p-5 space-y-3">
                                            <div className="flex items-center gap-2 text-sm text-gray-500">
                                                <Icon name="Calendar" className="w-4 h-4" />
                                                <span>{new Date(article.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                                                <span className="mx-1">|</span>
                                                <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-xs font-semibold">{article.source}</span>
                                            </div>
                                            <h2 className="text-lg font-bold text-gray-800 group-hover:text-blue-600 transition-colors">{article.title}</h2>
                                            <p className="text-gray-600 text-sm line-clamp-3">{article.summary}</p>
                                            <div className="flex flex-wrap gap-2 pt-1">
                                                {article.tags.map(tag => (
                                                    <span key={tag} className="bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full text-xs font-medium">{tag}</span>
                                                ))}
                                            </div>
                                            <div className="flex items-center gap-1 text-blue-600 text-sm font-medium pt-2">
                                                <span>Read Article</span>
                                                <Icon name="ArrowRight" className="w-4 h-4 group-hover:translate-x-1 transition-transform" />
                                            </div>
                                        </div>
                                    </a>
                                ))}
                            </div>
                        )}

                        {/* Empty State */}
                        {!loading && filtered.length === 0 && (
                            <div className="text-center py-16 text-gray-500">
                                <Icon name="ScrollText" className="w-12 h-12 mx-auto mb-3 opacity-40" />
                                <p className="text-lg font-medium">No articles found for this tag.</p>
                                <button onClick={() => setActiveTag(null)} className="mt-3 text-indigo-600 text-sm font-medium hover:underline">
                                    Clear filter
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
