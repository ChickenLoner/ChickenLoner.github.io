                        {/* ═══ INTRODUCTION ═══ */}
                                                <Section id="introduction" title="Introduction" icon="BookOpen">
                                                    <p className="text-gray-700 leading-relaxed">
                                                        Hey everyone — Chicken0248 here. In this post, I'll be sharing my research on investigating <B>GotoHTTP</B>, a cross-platform Remote Monitoring and Management (RMM) tool that, once deployed on a target endpoint, behaves very much like a Remote Access Trojan (RAT). The entire session can be controlled through a web browser, which makes it both operationally convenient for attackers and an interesting target for forensic investigation.
                                                    </p>
                                                    <Img src="img-01.png" alt="GotoHTTP website" caption="Figure 1: GotoHTTP website" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        To control a machine running a GotoHTTP instance — or to download its binary — you can visit <a href="https://gotohttp.com/" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">gotohttp.com</a> and use the web interface from there.
                                                    </p>
                                                    <Img src="img-02.png" alt="Downloading GotoHTTP agent/client" caption="Figure 2: Downloading GotoHTTP agent/client" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        The GotoHTTP client binary is available at <C>https://gotohttp.com/goto/download.12x</C>. It supports a wide range of platforms: Windows, Linux (both ARM and AMD64), macOS, Android, and even Raspberry Pi.
                                                    </p>
                                                    <Img src="img-03.png" alt="Defender blocked GotoHTTP download - 1" caption="Figure 3: Windows Defender blocked — 1" />
                                                    <Img src="img-04.png" alt="Defender blocked GotoHTTP download - 2" caption="Figure 4: Windows Defender blocked — 2" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        On Windows, Defender flags and blocks the binary immediately upon download. This is a bit unusual — Defender typically leaves other RMM tools like AnyDesk or TeamViewer alone. The aggressive detection likely reflects GotoHTTP's track record in malicious campaigns. In most legitimate environments, remote support is handled via TeamViewer, AnyDesk, Quick Assist, or RDP, so there is very little reason for GotoHTTP to appear on a corporate endpoint.
                                                    </p>
                                                </Section>
                        
                                                {/* ═══ BINARY OVERVIEW ═══ */}
                                                <Section id="binary" title="Binary Overview" icon="FileCode">
                                                    <Img src="img-05.png" alt="GotoHTTP Windows binary metadata" caption="Figure 5: GotoHTTP Windows binary metadata" />
                                                    <Img src="img-06.png" alt="GotoHTTP Windows binary digital signature" caption="Figure 6: GotoHTTP Windows binary digital signature" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        Once downloaded (with Defender exclusion or in a lab environment), the Windows binary is a <B>self-contained standalone executable</B> — no installer, no additional dependencies. It is digitally signed by <B>"Hefei Pingbo Network Technology Co. Ltd."</B>, indicating Chinese origin. The GotoHTTP website contains Chinese text and references an ICP filing.
                                                    </p>
                                                    <p className="text-gray-700 leading-relaxed">
                                                        The original filename is <C>GotoHTTP.exe</C>, with both the Product Name and File Description fields set to "GotoHTTP."
                                                    </p>
                                                </Section>
                        
                                                {/* ═══ USAGE & BEHAVIOR ═══ */}
                                                <Section id="behavior" title="Usage & Behavior" icon="Monitor">
                                                    <Img src="img-07.png" alt="gotohttp.ini creation" caption="Figure 7: gotohttp.ini creation in the same directory as the binary" />
                                                    <Img src="img-08.png" alt="Content of gotohttp.ini" caption="Figure 8: Content of gotohttp.ini — sf, host, name (Computer ID), tmp (Access Code)" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        GotoHTTP is designed to run as Administrator. On first launch, the binary contacts the relay server to retrieve a <B>Computer ID</B> (9-digit code) and an <B>Access Code</B> (4-digit code). It then creates a configuration file, <C>gotohttp.ini</C>, in the same directory as the binary. This file contains four fields: <C>sf</C> (purpose unclear, likely a session or fingerprint value), <C>host</C> (the relay server — the observed subdomain was <C>hk</C>, suggesting a Hong Kong relay), <C>name</C> (the Computer ID), and <C>tmp</C> (the Access Code).
                                                    </p>
                                                    <Img src="img-09.png" alt="Type Computer ID and Access Code in GotoHTTP website to start control" caption="Figure 9: Enter Computer ID and Access Code on the GotoHTTP website to start control" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        To connect to a running GotoHTTP instance, the operator navigates to the GotoHTTP website, enters the Computer ID and Access Code, and clicks <B>"Start Control"</B> — gaining full administrator-level remote access. No prompt or consent is required on the victim's side.
                                                    </p>
                                                    <p className="text-gray-700 leading-relaxed">
                                                        Before diving into what happens over an active session, let's first look at what the binary does immediately after launch.
                                                    </p>
                                                    <Img src="img-10.png" alt="Sysmon Event ID 1 reveals command line argument of GotoHTTP binary" caption="Figure 10: Sysmon Event ID 1 — command line argument of the GotoHTTP binary" />
                                                    <Img src="img-11.png" alt="System Event ID 7045 shows service creation" caption="Figure 11: System Event ID 7045 — Windows service creation for 'TTXN GotoHTTP Agent'" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        When executed with administrator privileges, GotoHTTP escalates to <B>SYSTEM</B> and relaunches itself with the <C>server</C> argument. This creates a Windows service named <B>"TTXN GotoHTTP Agent"</B> with an auto-start configuration, running as SYSTEM on every boot without any user interaction. This service creation event is a key forensic indicator, alongside the <C>gotohttp.ini</C> file creation.
                                                    </p>
                                                    <Img src="img-12.png" alt="DNS request to *.gotohttp.com" caption="Figure 12: DNS request to *.gotohttp.com" />
                                                    <Img src="img-13.png" alt="Another DNS request to *.gotohttp.com" caption="Figure 13: Additional DNS request to *.gotohttp.com" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        From a network perspective, the most reliable indicator is DNS queries to <C>*.gotohttp.com</C>. Since GotoHTTP is entirely browser-controlled via an HTTP relay, these queries will be present whenever the agent is running or being actively controlled.
                                                    </p>
                                                    <Img src="img-14.png" alt="Start control from browser, shortcut panel on right side" caption="Figure 14: Active session — browser control panel with one-click shortcuts" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        Once connected, there is no prompt or notification on the victim's side — this is unattended access by design, with full administrator privileges. On the controller's browser panel, a suite of one-click shortcuts is available:
                                                    </p>
                                                    <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                                        <li>Open Start Menu</li>
                                                        <li>Go to Desktop</li>
                                                        <li>Open File Explorer</li>
                                                        <li>Open Run Dialog</li>
                                                        <li>Open Command Prompt</li>
                                                        <li>Open Registry Editor (<C>regedit</C>)</li>
                                                        <li>Open Task Manager</li>
                                                        <li>Open Control Panel</li>
                                                        <li>Open Device Manager</li>
                                                        <li>Open SuperTerminal (covered below)</li>
                                                    </ul>
                                                    <Img src="img-15.png" alt="Super Terminal" caption="Figure 15: SuperTerminal — server-side command execution, no visible window on victim's screen" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        The <B>SuperTerminal</B> solves the window visibility problem. Opening a regular Command Prompt through screen sharing would be visible to the victim. The SuperTerminal renders entirely on the controller's side, executing commands on the victim machine and returning output without any visible window appearing on the client end.
                                                    </p>
                                                    <Img src="img-16.png" alt="More advanced GotoHTTP capabilities" caption="Figure 16: Additional built-in capabilities — audio capture, screenshots, file transfer, video chat, messaging" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        Beyond screen sharing and the SuperTerminal, GotoHTTP includes built-in capabilities that put it firmly in RAT territory: <B>audio capture, screenshots, file transfer, video chat</B>, and the ability to send messages directly to the victim's screen.
                                                    </p>
                                                    <Img src="img-17.png" alt="Sending message from browser controller to client" caption="Figure 17: Sending a message from the controller's browser to the client machine" />
                                                    <Img src="img-18.png" alt="Message box displayed on client" caption="Figure 18: Message box displayed on the client's screen" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        The built-in chat feature is illustrated above. Notably, no artifacts from this interaction are written to disk on the client side — the entire chat history lives in memory only.
                                                    </p>
                                                    <Img src="img-19.png" alt="Process Monitor showing process tree" caption="Figure 19: Process Monitor — system utilities spawned as direct child processes of GotoHTTP binary" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        If Sysmon or Security Event 4688 (with command-line auditing enabled) is deployed, every shortcut button click leaves a trace — the associated executable is spawned as a direct child process of the GotoHTTP binary. The SuperTerminal specifically produces <C>cmd.exe</C> with <C>chcp.com 65001</C> as a child, which is a reliable behavioral indicator that the feature was used.
                                                    </p>
                                                    <Img src="img-20.png" alt="File transfer UI" caption="Figure 20: File transfer — full read/write access via browser-based UI" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        For file transfer, the operator has full read/write access to the victim's filesystem — download, upload, create, rename, and delete — through a clean browser-based UI.
                                                    </p>
                                                    <Img src="img-21.png" alt="File transfer showing unique ID before renaming to original name" caption="Figure 21: Uploaded files written with a random unique name first, then renamed to the intended filename on completion" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        GotoHTTP generates no dedicated log entries or Windows events for file transfer operations. The only reliable ways to catch file activity are the <B>USN Journal</B> or a <B>File Integrity Monitoring (FIM)</B> solution. One useful behavioral pattern: uploaded files are initially written with the correct extension but a random unique filename, then renamed to the intended name only after the transfer completes. This two-step write-then-rename sequence can be correlated through USN Journal records or FIM alerts.
                                                    </p>
                                                    <Img src="img-22.png" alt="All file transfers visible in client message box during connection" caption="Figure 22: File transfers visible in the chat panel while GotoHTTP is running — no disk persistence" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        If GotoHTTP is still running at investigation time, file transfers are visible in the chat panel. However, no chat history is persisted to disk — once the process is terminated, that evidence is gone permanently.
                                                    </p>
                                                    <Img src="img-23.png" alt="Warning box displayed after clicking exit on GotoHTTP client" caption="Figure 23: Exit warning — keeping GotoHTTP running enables auto-start on next boot" />
                                                    <Img src="img-24.png" alt="GotoHTTP web message confirming unattended mode" caption="Figure 24: GotoHTTP web panel confirms it always operates in unattended mode" />
                                                    <p className="text-gray-700 leading-relaxed">
                                                        When the operator closes the GotoHTTP window, a popup warns that keeping the application running will auto-start it on the next boot, while closing it removes that persistence — though the service entry remains.
                                                    </p>
                                                </Section>
                        
                                                {/* ═══ DETECTION SUMMARY ═══ */}
                                                <Section id="detection" title="Detection Summary" icon="Shield">
                                                    <Callout type="warning">
                                                        <p>GotoHTTP's artifact footprint is minimal by design — no session logs, no chat history on disk, no file transfer events in standard Windows logs. Detection relies on telemetry quality.</p>
                                                    </Callout>
                                                    <p className="text-gray-700 leading-relaxed">Consolidated indicators and detection opportunities for GotoHTTP abuse on Windows endpoints:</p>
                                                    <ul className="list-disc list-outside ml-5 space-y-2 text-gray-700">
                                                        <li><B><C>gotohttp.ini</C> creation</B> in the same directory as the GotoHTTP binary — contains relay host, Computer ID, and Access Code</li>
                                                        <li><B>DNS queries and connections to <C>*.gotohttp.com</C></B> — detectable via DNS logging, firewall logs, or network monitoring</li>
                                                        <li><B>Windows service creation — "TTXN GotoHTTP Agent"</B> — auto-start, SYSTEM context (Event ID 7045)</li>
                                                        <li><B>Child process anomalies</B> — system utilities (<C>regedit.exe</C>, <C>taskmgr.exe</C>, <C>cmd.exe</C>, etc.) spawned as children of the GotoHTTP binary (Sysmon Event ID 1 / Security Event 4688 with command-line logging)</li>
                                                        <li><B>SuperTerminal indicator</B> — <C>cmd.exe</C> spawning <C>chcp.com 65001</C> as a child of GotoHTTP</li>
                                                        <li><B>USN Journal or FIM alerts</B> — random-named temp files appearing then being renamed to their final filename, indicating an in-progress file upload via the transfer module</li>
                                                    </ul>
                                                </Section>
                        
                                                {/* ═══ CONCLUSION ═══ */}
                                                <Section id="conclusion" title="Conclusion" icon="CheckCircle">
                                                    <p className="text-gray-700 leading-relaxed">
                                                        GotoHTTP is a lean, capable, and dangerously easy-to-deploy RMM tool that blurs the line between legitimate remote support software and a fully-featured RAT. Its broker-relay architecture, unattended access model, SYSTEM-level persistence via service installation, and built-in SuperTerminal make it attractive for threat actors who want to avoid deploying custom malware.
                                                    </p>
                                                    <p className="text-gray-700 leading-relaxed">
                                                        From a defensive standpoint, the artifact footprint is minimal by design — no session logs, no chat history on disk, no file transfer events in standard Windows logs. Detection relies almost entirely on getting your telemetry right: DNS visibility, service creation monitoring, and process tree analysis via Sysmon. If you're not collecting those, GotoHTTP can operate with very little noise.
                                                    </p>
                                                    <p className="text-gray-700 leading-relaxed">
                                                        Know your environment, baseline your RMM tool usage, and flag anything that doesn't belong.
                                                    </p>
                                                    <p className="text-gray-700 leading-relaxed">
                                                        Thanks for reading — see you on the next one. peace! ✌️
                                                    </p>
