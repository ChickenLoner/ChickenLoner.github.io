                        <Section id="introduction" title="Introduction" icon="BookOpen">
                            <p className="text-gray-700 leading-relaxed">Hey everyone, it's me, Chicken0248. If you read my <a href="/research/download-interrupt-reason-41/index.html">last post on interrupt reason 41</a>, you already know I have a bit of a thing for the numbers Chromium writes into the downloads history table. This one is a follow-up of sorts, about a different value that tripped me up: <B>interrupt reason 12</B>.</p>

                            <p className="text-gray-700 leading-relaxed">Quick refresher in case you skipped the last one. Every Chromium-based browser keeps a <C>downloads</C> table in its <C>History</C> SQLite database, and for every download it records a numeric <C>interrupt_reason</C> describing what happened along the way. You can find all of them in the Chromium source at <a href="https://source.chromium.org/chromium/chromium/src/+/main:components/download/public/common/download_interrupt_reason_values.h" target="_blank" rel="noopener noreferrer">download_interrupt_reason_values.h</a>, and Ryan Benson (author of <a href="https://dfir.blog/" target="_blank" rel="noopener noreferrer">Hindsight</a>) already mapped them to readable meanings in his <a href="https://dfir.blog/chrome-values-lookup-tables/" target="_blank" rel="noopener noreferrer">Chrome Values Lookup Tables</a>.</p>

                            <p className="text-gray-700 leading-relaxed">This one came out of a real case, and it flipped an assumption I didn't realize I was making about what a "failed" download even means. Let me walk you through how I got there.</p>
                        </Section>

                        <Section id="how-i-ran-into-this" title="How I Ran Into This" icon="Fingerprint">
                            <p className="text-gray-700 leading-relaxed">This all started on a real case. I was reviewing a user's browser download history and saw a handful of zip downloads recorded with <C>interrupt_reason = 12</C>. On paper that reads like the downloads failed, so the files never made it to the machine. I almost moved on.</p>

                            <p className="text-gray-700 leading-relaxed">Two other artifacts said otherwise. The zip files were still on disk, and their file system creation timestamps lined up with the download start times sitting in the History table. That alone was a flag. Then the shellbags sealed it. Windows treats a zip as a browsable folder, so opening one in Explorer leaves a shellbag behind, and the shellbags showed each of those archives had been opened. After opening them, the user renamed the extracted files.</p>

                            <Img src="img-01.png" alt="ShellBags Explorer showing a zip archive traversed in Windows Explorer" caption="Windows treats a zip as a browsable folder, so opening one leaves a shellbag behind. Reconstructed in a lab, not the case data." />

                            <p className="text-gray-700 leading-relaxed">So here's what I was staring at. The browser history called these downloads interrupted. The interrupted rows didn't even carry an <C>end_time</C> I could anchor a timeline to, so I leaned on the file system and the shellbags instead. Together they told a complete story: the files downloaded, landed, got opened, and got renamed. The whole user sequence was reconstructable without trusting the browser's "interrupted" label at all.</p>

                            <p className="text-gray-700 leading-relaxed">That contradiction is what sent me to the Chromium source. If the download failed, why was the complete file sitting there, opened and renamed? The rest of this post is the answer.</p>
                        </Section>

                        <Section id="what-it-means" title="What Reason 12 Actually Means" icon="Database">
                            <p className="text-gray-700 leading-relaxed">Reason 12 is <C>FILE_SECURITY_CHECK_FAILED</C>. The source comment is short and honestly a little vague: <em>"An attempt to check the safety of the download failed due to unexpected reasons. See http://crbug.com/153212."</em></p>

                            <Img src="img-02.png" alt="Chromium source code defining interrupt reason 12 as FILE_SECURITY_CHECK_FAILED" caption="The Chromium source defines reason 12 as FILE_SECURITY_CHECK_FAILED: the safety check failed for unexpected reasons." />

                            <p className="text-gray-700 leading-relaxed">Ryan's table labels it <B>Security Check Failed</B> with basically the same description. Notice the word <em>unexpected</em>. That's the whole story of this value, and I didn't appreciate it until I read how it gets written.</p>

                            <p className="text-gray-700 leading-relaxed">On Windows, when a download finishes, Chromium doesn't just leave the file alone. It hands the finished file to Windows to apply Mark-of-the-Web and run the attachment scan, through <C>IAttachmentExecute::Save()</C>. That one call fans out to whatever antivirus and AMSI providers are registered on the machine. The result of that call gets mapped in <a href="https://chromium.googlesource.com/chromium/src/+/main/components/services/quarantine/quarantine_win.cc" target="_blank" rel="noopener noreferrer">quarantine_win.cc</a>, and the mapping is the key to everything:</p>

                            <Table
                                headers={['What the scan returned', 'Result', 'interrupt_reason']}
                                rows={[
                                    ['Clean', 'OK', '<code class="res-c">0</code> (None)'],
                                    ['<code class="res-c">INET_E_SECURITY_PROBLEM</code> (policy / Restricted Sites)', 'Blocked by policy', '<code class="res-c">11</code>'],
                                    ['<code class="res-c">E_FAIL</code> (AV reports infection)', 'Virus infected', '<code class="res-c">7</code>'],
                                    ['<strong>Any other unexpected HRESULT</strong>', '<strong>Security check failed</strong>', '<strong><code class="res-c">12</code></strong>'],
                                ]}
                            />

                            <p className="text-gray-700 leading-relaxed">So 7 and 11 are verdicts. The scanner looked at the file and decided it was bad. <B>Reason 12 is not a verdict.</B> It's the fall-through case, the "something went wrong with the check itself and we don't have an answer" bucket. A broken AV provider, an AMSI provider that errors out, the file getting moved out from under the scan, that kind of thing.</p>

                            <p className="text-gray-700 leading-relaxed">That distinction is why I couldn't reproduce it by messing with the file, which is where I went first.</p>
                        </Section>

                        <Section id="not-the-file" title="It's Not the File (I Tried)" icon="Search">
                            <p className="text-gray-700 leading-relaxed">My initial theory was that something about the archive caused it. Maybe a nested zip, one archive inside another, made the scanner choke on recursion. So I built a set of nested zips, one level deep all the way to fifty levels deep, with a harmless text file at the core. Downloaded every one of them in Edge on a normal Defender box.</p>

                            <p className="text-gray-700 leading-relaxed">Every single one completed clean. <C>interrupt_reason = 0</C> across the board.</p>

                            <p className="text-gray-700 leading-relaxed">Okay, maybe it's size. Maybe a big file blows past some scan limit. So I made incompressible zips from 10 MB up to 200 MB, plus one that was both large and nested. Downloaded all of them. Clean again. Every one.</p>

                            <p className="text-gray-700 leading-relaxed">That negative result actually taught me the answer. Nesting and size are properties of the <em>file</em>, and reason 12 has nothing to do with the file. Making a scanner skip a file because it's too big just gives you a clean result. To get reason 12 you need the <em>scan</em> to fail, and that depends on the security stack on the host, not on anything you put in the download. My lab box has a healthy Defender, so it never fails. The case host was a different machine with a different setup, and that's where the "unexpected" HRESULT came from.</p>
                        </Section>

                        <Section id="still-there" title="Interrupted, But the File Was There" icon="FolderOpen">
                            <p className="text-gray-700 leading-relaxed">Here's the part that actually matters for our job.</p>

                            <p className="text-gray-700 leading-relaxed">In the case, the downloads were flagged with reason 12, which the browser treats as interrupted. If you stopped reading the artifact right there, you'd conclude the files never landed on the machine. <B>They did. They were sitting on disk, complete.</B></p>

                            <p className="text-gray-700 leading-relaxed">This isn't a fluke, it's how the sequence works. Look at the order of operations:</p>

                            <ol>
                                <li>The bytes download into the temporary <C>.crdownload</C> file.</li>
                                <li>The transfer finishes, and Chromium renames the file to its final name. The full content is on disk at this point.</li>
                                <li><em>Then</em> Chromium runs <C>IAttachmentExecute::Save()</C> on that finished file to annotate and scan it.</li>
                                <li>If that scan returns an unexpected HRESULT, you get reason 12, and the download is marked interrupted.</li>
                            </ol>

                            <p className="text-gray-700 leading-relaxed">By the time the "security check" fails, the download is already done. Reason 12 describes the <em>annotation</em> failing, not the <em>transfer</em> failing. And unlike reason 7 (infected) and reason 11 (blocked), where <C>Save()</C> deletes the file as part of the verdict, reason 12 has no verdict, so nothing gets deleted. The complete file just stays there, marked in history as interrupted.</p>

                            <p className="text-gray-700 leading-relaxed">There's a nice corroborating artifact for this. <C>IAttachmentExecute::Save()</C> is the same call that writes the <C>Zone.Identifier</C> alternate data stream, the Mark-of-the-Web. When that call fails, the MOTW often never gets written. So the signature of a reason-12 download looks like this:</p>

                            <ul>
                                <li><B>History:</B> <C>state = interrupted</C>, <C>interrupt_reason = 12</C></li>
                                <li><B>Disk:</B> the file is present and complete at its target path</li>
                                <li><B>ADS:</B> <C>Zone.Identifier</C> is missing or partial</li>
                            </ul>

                            <p className="text-gray-700 leading-relaxed">A complete file, with no Mark-of-the-Web, that the browser history calls interrupted. If you see that combination, don't write off the download.</p>

                            <Callout type="warning">
                                <p>Reason 12 is a failed <em>security check</em>, not a failed <em>download</em>. The file finishes writing to disk before the check runs, and reason 12 does not delete it. Do not read <C>interrupt_reason = 12</C> as "the file never reached the host." Go look on disk, and check for a missing <C>Zone.Identifier</C> stream.</p>
                            </Callout>
                        </Section>

                        <Section id="summary" title="Summary" icon="CheckCircle">
                            <p className="text-gray-700 leading-relaxed">Reason 41 was ambiguous: a benign shutdown and a security block collapse into the same number. Reason 12 is almost the opposite problem. It looks decisive, like the browser caught something and stopped it, but it really means the safety check couldn't finish, and the file it was supposed to check is already sitting on disk, complete.</p>

                            <p className="text-gray-700 leading-relaxed">Two things to take from this. One is that reason 12 is about the host's security stack failing to return an answer, not about the file, so you won't reproduce it by tuning what you download. The other, and this is the one that matters, is that an interrupted download in the history is not proof the file never arrived. With reason 12, it almost certainly did.</p>

                            <p className="text-gray-700 leading-relaxed">Same lesson as always. The number is a starting point, not the conclusion. Go check the disk.</p>
