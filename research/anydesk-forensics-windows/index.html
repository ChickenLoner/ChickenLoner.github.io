                                <div><span className="text-gray-500 block">Published</span><span className="font-semibold text-gray-800">January 10, 2026</span></div>

                        {/* ═══════════ INTRODUCTION ═══════════ */}
                        <Section id="introduction" title="Introduction" icon="BookOpen">
                            <p className="text-gray-700 leading-relaxed">
                                In this article, I share my research on investigating <B>AnyDesk</B> — covering its normal behavior, basic CLI usage, how it can be abused to set up quick persistence, and how to investigate AnyDesk connection and file transfer activity.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                <B>AnyDesk</B> is a cross-platform remote desktop software (often considered an RMM or remote access tool) that allows users to remotely control another device over a network by specifying the target device's <B>AnyDesk ID</B>. Since AnyDesk operates cross-platform without requiring matching operating systems, threat actors frequently exploit it. The software's ease of use and reliability make it attractive to both legitimate users and malicious actors.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                The <B>unattended access</B> feature is particularly concerning for persistence, as it permits threat actors to reconnect to compromised devices at will. AnyDesk can be downloaded from <C>https://anydesk.com/en/downloads/</C> or via CLI at <C>http://download.anydesk.com/AnyDesk.exe</C>.
                            </p>
                            <Img src="img-01.png" alt="AnyDesk investigation overview" caption="AnyDesk forensics overview" />
                        </Section>

                        {/* ═══════════ BEHAVIOR ═══════════ */}
                        <Section id="behavior" title="AnyDesk Usage and Behavior (Without Remote Connection)" icon="Monitor">
                            <SubSection title="Binary and Initial Execution">
                                <p className="text-gray-700 leading-relaxed">
                                    The Windows executable carries a digital signature from <B>"AnyDesk Software GmbH"</B> with version information visible in file metadata. Upon execution, a DLL file named <C>gcapi.dll</C> (Google Cloud API DLL) downloads automatically to enable communication with Google Cloud infrastructure and core AnyDesk functionality.
                                </p>
                                <Img src="img-02.png" alt="AnyDesk binary signature and metadata" caption="AnyDesk binary digital signature" />
                            </SubSection>

                            <SubSection title="AppData Artifacts">
                                <p className="text-gray-700 leading-relaxed">
                                    Launching AnyDesk creates a folder structure at <C>C:\Users\%username%\AppData\Roaming\AnyDesk</C>. This directory contains critical forensic artifacts:
                                </p>
                                <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                    <li><C>ad.trace</C> — The primary log file storing most activity logs</li>
                                    <li><C>system.conf</C> — Contains the unique AnyDesk ID stored as variable <C>ad.anynet.id</C> and last relay address information</li>
                                    <li><C>chat/</C> subfolder — Chat logs named after the connecting device's AnyDesk ID</li>
                                </ul>
                                <Callout type="tip">
                                    <p>Users can reset their ID by deleting the entire <C>C:\Users\%username%\AppData\Roaming\AnyDesk</C> folder and restarting the application.</p>
                                </Callout>
                                <Img src="img-03.png" alt="AnyDesk AppData folder structure" caption="AnyDesk AppData directory artifacts" />
                                <Img src="img-04.png" alt="system.conf contents showing AnyDesk ID" caption="system.conf containing AnyDesk ID" />
                            </SubSection>

                            <SubSection title="Screenshots and Recordings">
                                <p className="text-gray-700 leading-relaxed">
                                    AnyDesk creates folders for screenshots in the <C>Pictures</C> directory and screen recordings in the <C>Videos</C> directory of the user profile.
                                </p>
                            </SubSection>

                            <SubSection title="Service Installation">
                                <p className="text-gray-700 leading-relaxed">
                                    Installation requires <B>local administrator privileges</B>. When installed, AnyDesk copies the executable to <C>C:\Program Files (x86)\AnyDesk</C> and creates a Windows service that starts with the <C>--service</C> flag, enabling system startup execution. This service triggers <B>Event ID 7045</B> in Windows Event Viewer.
                                </p>
                                <Img src="img-05.png" alt="AnyDesk service installation" caption="AnyDesk service creation — Event ID 7045" />
                            </SubSection>

                            <SubSection title="Multiple Process Instances">
                                <p className="text-gray-700 leading-relaxed">
                                    Two AnyDesk processes typically run on an installed system:
                                </p>
                                <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                    <li>One in <B>SYSTEM context</B> (from the service)</li>
                                    <li>One in <B>user context</B> (from startup folder shortcuts)</li>
                                </ul>
                                <p className="text-gray-700 leading-relaxed">
                                    The SYSTEM instance can connect to AnyDesk servers even if the user context instance fails, accepting connections using the same device ID.
                                </p>
                                <Img src="img-06.png" alt="AnyDesk process instances" caption="Two AnyDesk processes running simultaneously" />
                                <Img src="img-07.png" alt="AnyDesk startup folder shortcut" caption="AnyDesk startup folder shortcut" />
                            </SubSection>
                        </Section>

                        {/* ═══════════ CLI ═══════════ */}
                        <Section id="cli" title="Managing AnyDesk via CLI" icon="Terminal">
                            <p className="text-gray-700 leading-relaxed">
                                AnyDesk supports command-line management, enabling automation of installation and configuration. Key CLI commands:
                            </p>
                            <CodeBlock language="cmd">
{`# Retrieve the device's unique AnyDesk ID
anydesk.exe --get-id

# Configure unattended access with a password
echo <my_password> | anydesk.exe --set-password

# Install AnyDesk as a service
anydesk.exe --install`}
                            </CodeBlock>
                            <p className="text-gray-700 leading-relaxed">
                                The <B>Conti ransomware gang leak</B> revealed their playbook included creating backdoor users and installing AnyDesk with unattended access for persistence mechanisms — highlighting how commonly this feature is abused.
                            </p>
                            <Img src="img-08.png" alt="AnyDesk CLI usage" caption="AnyDesk CLI commands for unattended access setup" />

                            <SubSection title="PowerShell — Retrieving AnyDesk ID">
                                <CodeBlock language="powershell">
{`Get-Content "$env:ProgramData\\AnyDesk\\system.conf" | Select-String "ad.anynet.id"

$p = New-Object System.Diagnostics.Process
$p.StartInfo = @{
    FileName="C:\\Program Files (x86)\\AnyDesk\\AnyDesk.exe"
    Arguments="--get-id"
    RedirectStandardOutput=$true
    UseShellExecute=$false
    CreateNoWindow=$true
}
$p.Start() | Out-Null
$p.WaitForExit()
$p.StandardOutput.ReadToEnd().Trim()`}
                                </CodeBlock>
                            </SubSection>
                        </Section>

                        {/* ═══════════ CONNECTIONS ═══════════ */}
                        <Section id="connections" title="Investigate AnyDesk Connection" icon="Network">
                            <SubSection title="Connection Request Process">
                                <p className="text-gray-700 leading-relaxed">
                                    When a remote device initiates a connection, the target device receives a request window displaying the connecting device's ID and profile name. The permissions the remote device would receive are shown: <em>Allow to take control, Allow to use file manager, Allow to use clipboard, Allow to hear sound</em>, etc.
                                </p>
                                <Img src="img-09.png" alt="AnyDesk connection request popup" caption="Incoming AnyDesk connection request" />
                            </SubSection>

                            <SubSection title="Connection Log File">
                                <p className="text-gray-700 leading-relaxed">
                                    Connection logs appear in <C>connection_trace.txt</C>:
                                </p>
                                <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                    <li>Installed AnyDesk (service-based): <C>C:\ProgramData\AnyDesk\connection_trace.txt</C></li>
                                    <li>Portable AnyDesk (user context): <C>C:\Users\%username%\AppData\Roaming\AnyDesk\connection_trace.txt</C></li>
                                </ul>
                                <p className="text-gray-700 leading-relaxed">
                                    Timestamps are in <B>UTC format</B> (YYYY-MM-DD, HH:MM). The file includes three authentication types:
                                </p>
                                <Table
                                    headers={['Auth Type', 'Description']}
                                    rows={[
                                        ['<code>User</code>', 'Remote user manually accepted the connection request'],
                                        ['<code>Passwd</code>', 'Unattended access authenticated with password'],
                                        ['<code>Token</code>', 'Connection authenticated using stored credentials from a previous session'],
                                    ]}
                                />
                                <Img src="img-10.png" alt="connection_trace.txt contents" caption="connection_trace.txt log entries" />
                            </SubSection>

                            <SubSection title="Session Activity in ad.trace">
                                <p className="text-gray-700 leading-relaxed">
                                    The <C>ad.trace</C> file records incoming requests with the device's profile name, AnyDesk ID, operating system, and both public and private IP addresses of connecting devices. Session termination is also logged, allowing investigators to calculate session duration by comparing acceptance and closure timestamps. For service-based connections, <C>ad_svc.trace</C> logs activity instead.
                                </p>
                                <Img src="img-11.png" alt="ad.trace log showing connection details" caption="ad.trace showing connecting device IP and ID details" />
                                <Img src="img-12.png" alt="ad.trace session timing" caption="Session start and end timestamps in ad.trace" />
                                <Img src="img-13.png" alt="ad_svc.trace for service-based connections" caption="ad_svc.trace for service-based connection logging" />
                            </SubSection>
                        </Section>

                        {/* ═══════════ FILE TRANSFER ═══════════ */}
                        <Section id="file-transfer" title="Investigate File Transfer Activity over AnyDesk" icon="FolderOpen">
                            <SubSection title="File Manager Access">
                                <p className="text-gray-700 leading-relaxed">
                                    Once a connection establishes, the connecting device can access the target's file system if <B>file manager permissions</B> are enabled. Users can upload, download, and delete files. Clipboard-based file transfer is also supported.
                                </p>
                                <Img src="img-14.png" alt="AnyDesk file manager interface" caption="AnyDesk file manager during an active session" />
                            </SubSection>

                            <SubSection title="File Transfer Log File">
                                <p className="text-gray-700 leading-relaxed">
                                    A <C>file_transfer_trace.txt</C> file logs transfers with timestamps for upload/download start and completion:
                                </p>
                                <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                    <li>Installed AnyDesk: <C>C:\ProgramData\AnyDesk\file_transfer_trace.txt</C></li>
                                    <li>Portable AnyDesk: <C>C:\Users\%username%\AppData\Roaming\AnyDesk\file_transfer_trace.txt</C></li>
                                </ul>
                                <p className="text-gray-700 leading-relaxed">
                                    Upload activities show file paths; download activities show filenames and sizes. Deletion operations log paths but not in the transfer trace file.
                                </p>
                                <Callout type="warning">
                                    <p><B>Anti-forensics consideration:</B> Deleting <C>file_transfer_trace.txt</C> removes evidence unless correlated with other file creation events or network logs.</p>
                                </Callout>
                                <Img src="img-15.png" alt="file_transfer_trace.txt contents" caption="file_transfer_trace.txt showing upload and download events" />

                                <p className="text-gray-700 leading-relaxed">
                                    Unattended access can be configured via <B>GUI</B> or <B>CLI</B>, requiring administrator privileges. When configured via CLI, the command appears in <C>ad.trace</C> — a forensic artifact that can confirm the persistence mechanism was set up.
                                </p>

                            </SubSection>

                            <SubSection title="Connection Characteristics">
                                <p className="text-gray-700 leading-relaxed">
                                    Unattended connections bypass manual acceptance requirements. The connecting device provides the correct ID and password, and the target device establishes the session automatically. Despite this, threat actors still require valid credentials to fully interact with the compromised system — which is why many backdoor scripts also create new local administrator accounts.
                                </p>
