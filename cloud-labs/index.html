<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Cloud Investigation Labs | Chicken0248</title>
    <meta name="description" content="Curated AWS, Azure, and GCP investigation labs from top cybersecurity platforms — searchable and always up to date." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chicken0248" />
    <meta property="og:url" content="https://chickenloner.github.io/cloud-labs/" />
    <meta property="og:title" content="Awesome Cloud Investigation Labs | Chicken0248" />
    <meta property="og:description" content="Curated AWS, Azure, and GCP investigation labs from top cybersecurity platforms — searchable and always up to date." />
    <meta property="og:image" content="https://chickenloner.github.io/chicken0248.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Chicken_0248" />
    <meta name="twitter:title" content="Awesome Cloud Investigation Labs | Chicken0248" />
    <meta name="twitter:description" content="Curated AWS, Azure, and GCP investigation labs from top cybersecurity platforms — searchable and always up to date." />
    <meta name="twitter:image" content="https://chickenloner.github.io/chicken0248.png" />
    <link rel="canonical" href="https://chickenloner.github.io/cloud-labs/" />
    <link rel="icon" href="/chicken0248.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.2/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@1.14.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="/themes/soc.css">
    <script src="/themes/soc-theme.js"></script>
    <script src="/themes/soc-nav.js"></script>
    <script src="/themes/soc-components.js"></script>
    <style>
        /* Violet accent */
        .soc-page-hero { background:linear-gradient(180deg,var(--soc-vi-tint-lo),transparent 40%),linear-gradient(180deg,var(--soc-bg-1),var(--soc-bg)); }
        .soc-page-hero-strap .seg .v { color:var(--soc-vi); }
        .soc-page-hero-icon { background:var(--soc-vi-tint-md);border:1px solid var(--soc-vi-tint-bdr); }
        h2.soc-section::before { background:var(--soc-vi);box-shadow:rgba(167,139,250,.7) 0 0 8px; }
        .soc-hs-lbl::before { background:var(--soc-vi); }
        .soc-hs-lbl.am::before { background:var(--soc-am); }
        .soc-hs-lbl.cy::before { background:var(--soc-cy); }
        .soc-hs-lbl.rd::before { background:var(--soc-rd); }
        .soc-hs-lbl.gn::before { background:var(--soc-gn); }
        .soc-pill:hover { border-color:var(--soc-vi);color:var(--soc-vi); }
        .soc-pill.active { background:var(--soc-vi-tint-md);border-color:var(--soc-vi-tint-bdr);color:var(--soc-vi); }
        .soc-search-bar { background:var(--soc-bg-2); }
        .soc-table tbody tr:hover { background:var(--soc-vi-tint-lo); }
        /* Provider cards */
        .soc-provider-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px; }
        .soc-provider-card { border:1px solid var(--soc-line);border-radius:6px;padding:14px;text-align:center;cursor:pointer;background:var(--soc-bg-1);transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:8px; }
        .soc-provider-card:hover { border-color:var(--soc-line2); }
        .soc-provider-card.active { border-color:var(--soc-vi);background:var(--soc-vi-tint-lo);box-shadow:0 0 0 1px var(--soc-vi-tint-box); }
        .soc-provider-icon { width:36px;height:36px;border-radius:8px;display:grid;place-items:center;font-size:18px; }
        .soc-provider-name { font-weight:700;color:var(--soc-ink);font-size:13px;font-family:'JetBrains Mono',monospace; }
        .soc-provider-count { font-size:11px;color:var(--soc-ink3);font-family:'JetBrains Mono',monospace; }
        /* Provider badges */
        .soc-prov { display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap; }
        .soc-prov.aws   { background:var(--soc-am-tint-md); color:var(--soc-am); border:1px solid var(--soc-am-tint-bdr); }
        .soc-prov.azure { background:var(--soc-cy-tint-md);  color:var(--soc-cy); border:1px solid var(--soc-cy-tint-bdr); }
        .soc-prov.gcp   { background:var(--soc-rd-tint-md);  color:var(--soc-rd); border:1px solid var(--soc-rd-tint-bdr); }
        .soc-prov.other { background:var(--soc-neutral-tint-md);color:var(--soc-ink3);border:1px solid var(--soc-neutral-tint-bdr); }
        /* Open button */
        .soc-open-btn { display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--soc-vi-tint-md);border:1px solid var(--soc-vi-tint-bdr);border-radius:3px;color:var(--soc-vi);font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;text-decoration:none;white-space:nowrap;transition:all .12s; }
        .soc-open-btn:hover { background:var(--soc-vi-tint-hov);border-color:var(--soc-vi-tint-bdr); }
    </style>
</head>
<body>
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:bg-white focus:px-4 focus:py-2 focus:rounded-lg focus:shadow-lg focus:text-blue-600 focus:font-semibold">
        Skip to content
    </a>
    <noscript>
        <style>body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}</style>
        <div style="text-align:center;padding:2rem">
            <h1>JavaScript required</h1>
            <p>This site requires JavaScript to display content. Please enable it in your browser settings.</p>
            <a href="https://chickenloner.github.io">chickenloner.github.io</a>
        </div>
    </noscript>
    <div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const README_URL = 'https://raw.githubusercontent.com/ChickenLoner/Awesome-Cloud-Investigation-Labs/main/README.md';

    const { SocClock, Icon, ThemeToggle } = window.SocComponents;

    /* ── Parser ── */
    function normDiff(d) {
        if (!d) return '';
        const m = { easy:'Easy', medium:'Medium', hard:'Hard', insane:'Insane', none:'None' };
        return m[d.toLowerCase()] || d;
    }

    function getProvider(title) {
        if (title.toUpperCase().includes('AWS'))   return 'AWS';
        if (title.toUpperCase().includes('AZURE')) return 'Azure';
        if (title.toUpperCase().includes('GCP'))   return 'GCP';
        return 'Other';
    }

    function parseReadme(text) {
        const lines = text.split('\n');
        const sections = [];
        let cur = null, inTable = false;

        for (const raw of lines) {
            const line = raw.trim();
            if (line.startsWith('## ')) {
                const title = line.replace(/^##\s+/, '');
                const id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                cur = { title, id, provider: getProvider(title), labs: [] };
                sections.push(cur);
                inTable = false;
                continue;
            }
            if (!cur) continue;
            if (line.startsWith('|-') || line === '* * *' || line === '***') continue;
            if (line.includes('Lab Name') && line.includes('|')) { inTable = true; continue; }

            if (inTable && line.includes('|')) {
                const cols = line.startsWith('|')
                    ? line.slice(1).split('|').map(c => c.trim())
                    : line.split('|').map(c => c.trim());
                if (cols.length >= 4 && cols[0]) {
                    const linkMatch = cols[4] ? cols[4].match(/\[.*?\]\((.*?)\)/) : null;
                    const lab = {
                        name: cols[0], platform: cols[1] || '',
                        difficulty: normDiff(cols[2] || ''), pricing: cols[3] || '',
                        url: linkMatch ? linkMatch[1] : '#',
                        provider: cur.provider, sectionId: cur.id,
                    };
                    if (lab.name && lab.platform) cur.labs.push(lab);
                }
            } else if (inTable && !line.includes('|') && line !== '') {
                inTable = false;
            }
        }
        return sections;
    }

    /* ── Helpers ── */
    function diffClass(d) {
        const m = { Easy:'easy', Medium:'medium', Hard:'hard', Insane:'insane', None:'none' };
        return m[d] || 'none';
    }

    function provClass(p) {
        const m = { AWS:'aws', Azure:'azure', GCP:'gcp' };
        return m[p] || 'other';
    }

    const PROVIDER_META = {
        AWS:   { icon: '☁️',  color: 'var(--soc-am)', label: 'AWS' },
        Azure: { icon: '🔷', color: 'var(--soc-cy)',  label: 'Azure' },
        GCP:   { icon: '🔴', color: 'var(--soc-rd)',  label: 'GCP' },
    };

    /* ── App ── */
    const App = () => {
        const [sections, setSections]     = useState([]);
        const [loading, setLoading]       = useState(true);
        const [error, setError]           = useState(null);
        const [providerFilter, setProviderFilter] = useState('all');
        const [platFilter, setPlatFilter]         = useState('all');
        const [diffFilter, setDiffFilter]         = useState('all');
        const [freeOnly, setFreeOnly]             = useState(false);
        const [search, setSearch]                 = useState('');

        useEffect(() => {
            fetch(README_URL)
                .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
                .then(txt => { setSections(parseReadme(txt)); setLoading(false); })
                .catch(e  => { setError(e.message); setLoading(false); });
        }, []);

        const allLabs   = useMemo(() => sections.flatMap(s => s.labs), [sections]);
        const providers = useMemo(() => [...new Set(allLabs.map(l => l.provider))].filter(Boolean), [allLabs]);
        const platforms = useMemo(() => [...new Set(allLabs.map(l => l.platform))].filter(Boolean).sort(), [allLabs]);
        const DIFFS     = ['Easy', 'Medium', 'Hard', 'Insane'];

        const filtered = useMemo(() => allLabs.filter(lab => {
            if (providerFilter !== 'all' && lab.provider   !== providerFilter) return false;
            if (platFilter     !== 'all' && lab.platform   !== platFilter)     return false;
            if (diffFilter     !== 'all' && lab.difficulty !== diffFilter)     return false;
            if (freeOnly && lab.pricing !== 'Free') return false;
            if (search && !lab.name.toLowerCase().includes(search.toLowerCase())) return false;
            return true;
        }), [allLabs, providerFilter, platFilter, diffFilter, freeOnly, search]);

        const stats = useMemo(() => {
            const byProvider = (p) => allLabs.filter(l => l.provider === p).length;
            return {
                total: allLabs.length,
                aws:   byProvider('AWS'),
                azure: byProvider('Azure'),
                gcp:   byProvider('GCP'),
                free:  allLabs.filter(l => l.pricing === 'Free').length,
            };
        }, [allLabs]);

        return (
            <div style={{minHeight:'100vh',background:'var(--soc-bg)'}}>
                {/* Top bar */}
                <div className="soc-tb">
                    <div className="soc-tb-row">
                        <a href="/" className="soc-live" style={{textDecoration:"none",color:"inherit"}}>UPLINK</a>
                        <span className="soc-crumb hidden md:flex">
                            SOC <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                            <a href="/" style={{color:'var(--soc-ink3)',textDecoration:'none'}}>OPERATOR.PROFILE</a>
                            <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                            <b>CLOUD.LABS</b>
                        </span>
                        <span className="hidden md:flex" style={{marginLeft:'auto',gap:'8px',alignItems:'center'}}>
                            <span className="sev cyan"><span className="dot"></span>TLP:CLEAR</span>
                            <span className="sev violet"><span className="dot"></span>CLOUD</span>
                        </span>
                        <span className="hidden md:block"><SocClock /></span>
                        <span style={{flex:1}} className="md:hidden" />
                        <ThemeToggle />
                    </div>
                </div>

                <main id="main-content" style={{maxWidth:'1152px',margin:'0 auto',padding:'28px 22px 48px'}}>
                    <div className="animate-fadeIn">
                        {/* Page hero */}
                        <div className="soc-page-hero">
                            <div className="soc-page-hero-strap">
                                <div className="seg"><b>console</b> <span className="v">portfolio/cloud-labs</span></div>
                                <div className="seg"><b>source</b> <span className="v">github/awesome-cloud-labs</span></div>
                                <span style={{marginLeft:'auto'}} className="sev green"><span className="dot"></span>ACTIVE</span>
                            </div>
                            <div className="soc-page-hero-body">
                                <div className="soc-page-hero-icon">
                                    <Icon name="Cloud" className="w-6 h-6" style={{color:'var(--soc-vi)'}} />
                                </div>
                                <div>
                                    <h1 className="soc-page-hero-title">Awesome Cloud Investigation Labs</h1>
                                    <p className="soc-page-hero-sub">aws · azure · gcp · curated from top cybersecurity platforms · always up to date</p>
                                </div>
                            </div>
                            {!loading && !error && (
                                <div className="soc-hs-bar">
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl">Total</div>
                                        <div className="soc-hs-val">{stats.total}</div>
                                    </div>
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl am">AWS</div>
                                        <div className="soc-hs-val">{stats.aws}</div>
                                    </div>
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl cy">Azure</div>
                                        <div className="soc-hs-val">{stats.azure}</div>
                                    </div>
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl rd">GCP</div>
                                        <div className="soc-hs-val">{stats.gcp}</div>
                                    </div>
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl gn">Free</div>
                                        <div className="soc-hs-val">{stats.free}</div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Loading */}
                        {loading && (
                            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 0',gap:'12px'}}>
                                <div style={{width:'32px',height:'32px',borderRadius:'50%',border:'3px solid var(--soc-line2)',borderTopColor:'var(--soc-vi)'}} className="animate-spin" />
                                <span style={{color:'var(--soc-ink3)',fontFamily:"'JetBrains Mono',monospace",fontSize:'12px'}}>Fetching labs from GitHub…</span>
                            </div>
                        )}

                        {/* Error */}
                        {error && (
                            <div style={{border:'1px solid var(--soc-rd-tint-bdr)',borderRadius:'6px',padding:'24px',textAlign:'center',background:'var(--soc-err-tint-bg)'}}>
                                <p style={{color:'var(--soc-rd)',fontWeight:600,margin:'0 0 6px'}}>Failed to load: {error}</p>
                                <p style={{color:'var(--soc-ink3)',fontSize:'12px',margin:0}}>Check your connection or try again later.</p>
                            </div>
                        )}

                        {/* Content */}
                        {!loading && !error && (
                            <>
                                {/* Filters */}
                                <div className="soc-filter-panel">
                                    <div className="soc-search-bar">
                                        <Icon name="Search" className="w-4 h-4" style={{color:'var(--soc-ink4)',flexShrink:0}} />
                                        <input
                                            type="text"
                                            placeholder="Search labs…"
                                            value={search}
                                            onChange={e => setSearch(e.target.value)}
                                        />
                                    </div>

                                    <div>
                                        <div className="soc-filter-label">Cloud Provider</div>
                                        <div className="soc-pills">
                                            <button className={`soc-pill ${providerFilter === 'all' ? 'active' : ''}`} onClick={() => setProviderFilter('all')}>All</button>
                                            {providers.map(p => (
                                                <button key={p}
                                                    className={`soc-pill ${providerFilter === p ? 'active' : ''}`}
                                                    onClick={() => setProviderFilter(p)}>
                                                    {p}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="soc-filter-label">Platform</div>
                                        <div className="soc-pills">
                                            <button className={`soc-pill ${platFilter === 'all' ? 'active' : ''}`} onClick={() => setPlatFilter('all')}>All</button>
                                            {platforms.map(p => (
                                                <button key={p}
                                                    className={`soc-pill ${platFilter === p ? 'active' : ''}`}
                                                    onClick={() => setPlatFilter(p)}>
                                                    {p}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="soc-filter-label">Difficulty</div>
                                        <div className="soc-pills">
                                            <button className={`soc-pill ${diffFilter === 'all' ? 'active' : ''}`} onClick={() => setDiffFilter('all')}>All</button>
                                            {DIFFS.map(d => (
                                                <button key={d}
                                                    className={`soc-pill ${diffFilter === d ? 'active' : ''}`}
                                                    onClick={() => setDiffFilter(d)}>
                                                    {d}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div style={{paddingTop:'4px',borderTop:'1px solid var(--soc-line)'}}>
                                        <button
                                            className={`soc-toggle ${freeOnly ? 'active' : ''}`}
                                            onClick={() => setFreeOnly(f => !f)}>
                                            {freeOnly ? '✓ ' : ''}Free Only
                                        </button>
                                    </div>
                                </div>

                                {/* Section label */}
                                <h2 className="soc-section">
                                    Lab Index
                                    <span className="meta">
                                        <b style={{color:'var(--soc-vi)'}}>{filtered.length}</b> of {allLabs.length} labs
                                    </span>
                                </h2>

                                {/* Table */}
                                <div className="soc-table-wrap">
                                    <table className="soc-table">
                                        <thead>
                                            <tr>
                                                <th>Lab Name</th>
                                                <th>Platform</th>
                                                <th>Difficulty</th>
                                                <th>Pricing</th>
                                                <th>Provider</th>
                                                <th></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filtered.map((lab, i) => {
                                                const pricingColor = lab.pricing === 'Free' ? 'var(--soc-gn)' : lab.pricing === 'Premium' ? 'var(--soc-am)' : 'var(--soc-ink3)';
                                                return (
                                                    <tr key={i}>
                                                        <td className="lab-name">{lab.name}</td>
                                                        <td><span className="soc-plat">{lab.platform}</span></td>
                                                        <td><span className={`soc-diff ${diffClass(lab.difficulty)}`}>{lab.difficulty || '—'}</span></td>
                                                        <td style={{color:pricingColor,fontSize:'11px',fontFamily:"'JetBrains Mono',monospace"}}>{lab.pricing}</td>
                                                        <td><span className={`soc-prov ${provClass(lab.provider)}`}>{lab.provider}</span></td>
                                                        <td style={{textAlign:'right'}}>
                                                            <a href={lab.url} target="_blank" rel="noopener noreferrer" className="soc-open-btn">
                                                                Open ↗
                                                            </a>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {filtered.length === 0 && (
                                                <tr>
                                                    <td colSpan={6} style={{textAlign:'center',padding:'48px',color:'var(--soc-ink3)',fontFamily:"'JetBrains Mono',monospace",fontSize:'12px'}}>
                                                        No labs match your filters
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="soc-ft">
                                    Data fetched live from{' '}
                                    <a href="https://github.com/ChickenLoner/Awesome-Cloud-Investigation-Labs" target="_blank" rel="noopener noreferrer" style={{color:'var(--soc-vi)'}}>
                                        GitHub
                                    </a>
                                    {' '}— always up to date
                                </div>
                            </>
                        )}

                        <div className="soc-ft">
                            SOC · CLOUD.LABS · CHICKEN0248 · <a href="/">↩ OPERATOR.PROFILE</a>
                        </div>
                    </div>
                </main>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
