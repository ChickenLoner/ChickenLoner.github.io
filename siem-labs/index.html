    <style>

        .soc-tb { position:sticky;top:0;z-index:50;background:rgba(7,11,20,0.94);backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);border-bottom:1px solid var(--soc-line); }

        .sev .dot { width:6px;height:6px;border-radius:50%;background:currentcolor;flex-shrink:0; }

        /* ── Filter panel ── */
        .soc-filter-panel { background:var(--soc-bg-1);border:1px solid var(--soc-line);border-radius:6px;padding:16px 18px;display:flex;flex-direction:column;gap:14px;margin-bottom:16px; }

        .soc-toggle.active { background:rgba(61,220,132,.1);border-color:rgba(61,220,132,.4);color:var(--soc-gn); }
        .soc-toggle.active-cy { background:rgba(34,225,255,.1);border-color:rgba(34,225,255,.4);color:var(--soc-cy); }

        /* ── Section label ── */
        h2.soc-section { font-size:11.5px;font-family:'JetBrains Mono',monospace;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--soc-ink2);margin:0 0 12px;display:flex;align-items:center;gap:12px; }

        .soc-table tbody tr { border-bottom:1px solid var(--soc-line);transition:background .1s; }
        .soc-table tbody tr:last-child { border-bottom:none; }

        .soc-table td { padding:10px 14px;color:var(--soc-ink2); }

        /* ── Diff badges ── */
        .soc-diff { display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;white-space:nowrap; }
        .soc-diff.easy   { background:rgba(61,220,132,.1); color:var(--soc-gn); border:1px solid rgba(61,220,132,.25); }
        .soc-diff.medium { background:rgba(255,181,71,.1); color:var(--soc-am); border:1px solid rgba(255,181,71,.25); }
        .soc-diff.hard   { background:rgba(255,85,119,.1); color:var(--soc-rd); border:1px solid rgba(255,85,119,.25); }
        .soc-diff.insane { background:rgba(167,139,250,.1);color:var(--soc-vi); border:1px solid rgba(167,139,250,.25); }
        .soc-diff.none   { background:rgba(107,122,156,.08);color:var(--soc-ink3);border:1px solid rgba(107,122,156,.2); }

        /* ── SIEM type tags ── */
        .soc-siem { display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap; }
        .soc-siem.splunk  { background:rgba(255,181,71,.1); color:var(--soc-am); border:1px solid rgba(255,181,71,.25); }
        .soc-siem.elastic { background:rgba(34,225,255,.1);  color:var(--soc-cy); border:1px solid rgba(34,225,255,.25); }
        .soc-siem.both    { background:rgba(167,139,250,.1); color:var(--soc-vi); border:1px solid rgba(167,139,250,.25); }

        /* ── Platform badges ── */
        .soc-plat { display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap;background:rgba(107,122,156,.08);color:var(--soc-ink2);border:1px solid rgba(107,122,156,.2); }

        /* ── Open button ── */
        .soc-open-btn { display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(34,225,255,.08);border:1px solid rgba(34,225,255,.25);border-radius:3px;color:var(--soc-cy);font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;text-decoration:none;white-space:nowrap;transition:all .12s; }
        .soc-open-btn:hover { background:rgba(34,225,255,.15);border-color:rgba(34,225,255,.5); }

        /* ── Footer ── */
        .soc-ft { margin-top:32px;padding:16px 0;text-align:center;color:var(--soc-ink4);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;border-top:1px solid var(--soc-line); }
        .soc-ft a { color:var(--soc-ink3);text-decoration:none; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width:6px;height:6px; }

    <div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const README_URL = 'https://raw.githubusercontent.com/ChickenLoner/Awesome-Splunk-and-Elastic-SIEM-Practice-Labs/main/README.md';

    const SocClock = () => {
        const ref = useRef(null);
        useEffect(() => {
            const tick = () => {
                if (!ref.current) return;
                const n = new Date();
                ref.current.textContent = n.toISOString().slice(0,10) + ' · ' + n.toISOString().slice(11,19) + 'Z';
            };
            tick();
            const id = setInterval(tick, 1000);
            return () => clearInterval(id);
        }, []);
        return <span ref={ref} className="soc-clock" />;
    };

    /* ── Parser ── */
    function normDiff(d) {
        if (!d) return '';
        const m = { meidum:'Medium', easy:'Easy', medium:'Medium', hard:'Hard', insane:'Insane', none:'None' };
        return m[d.toLowerCase()] || d;
    }

    function parseReadme(text) {
        const lines = text.split('\n');
        const sections = [];
        let cur = null, inTable = false;

        for (const raw of lines) {
            const line = raw.trim();
            if (line.startsWith('## ')) {
                const title = line.replace(/^##\s+/, '');
                const id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                cur = { title, id, labs: [] };
                sections.push(cur);
                inTable = false;
                continue;
            }
            if (!cur) continue;
            if (line.startsWith('|-') || line === '* * *' || line === '***') continue;
            if (line.includes('Lab Name') && line.includes('|')) { inTable = true; continue; }

            if (inTable && line.includes('|')) {
                const cols = line.startsWith('|')
                    ? line.slice(1).split('|').map(c => c.trim())
                    : line.split('|').map(c => c.trim());
                if (cols.length >= 4 && cols[0]) {
                    const linkMatch = cols[4] ? cols[4].match(/\[.*?\]\((.*?)\)/) : null;
                    const lab = {
                        name: cols[0], platform: cols[1] || '',
                        difficulty: normDiff(cols[2] || ''), pricing: cols[3] || '',
                        url: linkMatch ? linkMatch[1] : '#',
                        ad: cols[5] !== undefined ? cols[5].trim() : '',
                        sectionId: cur.id, sectionTitle: cur.title,
                    };
                    if (lab.name && lab.platform) cur.labs.push(lab);
                }
            } else if (inTable && !line.includes('|') && line !== '') {
                inTable = false;
            }
        }
        return sections;
    }

    /* ── Helpers ── */
    function diffClass(d) {
        const m = { Easy:'easy', Medium:'medium', Hard:'hard', Insane:'insane', None:'none' };
        return m[d] || 'none';
    }

    function siemClass(id) {
        if (id === 'splunk') return { cls: 'splunk', label: 'Splunk' };
        if (id === 'elastic') return { cls: 'elastic', label: 'Elastic' };
        return { cls: 'both', label: 'Spl / Ela' };
    }

    /* ── App ── */
    const App = () => {
        const [sections, setSections] = useState([]);
        const [loading, setLoading]   = useState(true);
        const [error, setError]       = useState(null);

        const [secFilter,  setSecFilter]  = useState('all');
        const [platFilter, setPlatFilter] = useState('all');
        const [diffFilter, setDiffFilter] = useState('all');
        const [freeOnly,   setFreeOnly]   = useState(false);
        const [adFilter,   setAdFilter]   = useState('all');
        const [search,     setSearch]     = useState('');

        useEffect(() => {
            fetch(README_URL)
                .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
                .then(txt => { setSections(parseReadme(txt)); setLoading(false); })
                .catch(e  => { setError(e.message); setLoading(false); });
        }, []);

        const allLabs    = useMemo(() => sections.flatMap(s => s.labs), [sections]);
        const platforms  = useMemo(() => [...new Set(allLabs.map(l => l.platform))].filter(Boolean).sort(), [allLabs]);
        const DIFFS      = ['Easy', 'Medium', 'Hard', 'Insane', 'None'];

        const filtered = useMemo(() => allLabs.filter(lab => {
            if (secFilter  !== 'all' && lab.sectionId !== secFilter)  return false;
            if (platFilter !== 'all' && lab.platform  !== platFilter)  return false;
            if (diffFilter !== 'all' && lab.difficulty !== diffFilter) return false;
            if (freeOnly && lab.pricing !== 'Free') return false;
            if (adFilter === 'yes' && lab.ad !== '✅') return false;
            if (adFilter === 'no'  && lab.ad !== '❌') return false;
            if (search && !lab.name.toLowerCase().includes(search.toLowerCase())) return false;
            return true;
        }), [allLabs, secFilter, platFilter, diffFilter, freeOnly, adFilter, search]);

        const stats = useMemo(() => {
            const get = (kw) => sections.find(s => s.id.includes(kw))?.labs.length || 0;
            return {
                total:   allLabs.length,
                splunk:  get('splunk'),
                elastic: get('elastic'),
                both:    sections.filter(s => s.id.includes('splunk') && s.id.includes('elastic')).reduce((a,s) => a + s.labs.length, 0),
                free:    allLabs.filter(l => l.pricing === 'Free').length,
            };
        }, [allLabs, sections]);

        const cycleAd = () => setAdFilter(f => f === 'all' ? 'yes' : f === 'yes' ? 'no' : 'all');

        return (
            <div style={{minHeight:'100vh',background:'var(--soc-bg)'}}>
                {/* Top bar */}
                <div className="soc-tb">
                    <div className="soc-tb-row">
                        <span className="soc-live">UPLINK</span>
                        <span className="soc-crumb">
                            SOC <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                            <a href="/" style={{color:'var(--soc-ink3)',textDecoration:'none'}}>OPERATOR.PROFILE</a>
                            <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                            <b>SIEM.LABS</b>
                        </span>
                        <span style={{marginLeft:'auto',display:'flex',gap:'8px',alignItems:'center'}}>
                            <span className="sev cyan"><span className="dot"></span>TLP:CLEAR</span>
                            <span className="sev amber"><span className="dot"></span>SIEM</span>
                        </span>
                        <SocClock />
                    </div>
                </div>

                <main id="main-content" style={{maxWidth:'1152px',margin:'0 auto',padding:'28px 22px 48px'}}>
                    <div className="animate-fadeIn">
                        {/* Page hero */}
                        <div className="soc-page-hero">
                            <div className="soc-page-hero-strap">
                                <div className="seg"><b>console</b> <span className="v">portfolio/siem-labs</span></div>
                                <div className="seg"><b>source</b> <span className="v">github/awesome-siem-labs</span></div>
                                <span style={{marginLeft:'auto'}} className="sev green"><span className="dot"></span>LIVE</span>
                            </div>
                            <div className="soc-page-hero-body">
                                <div className="soc-page-hero-icon">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:'var(--soc-am)'}}>
                                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="soc-page-hero-title">Awesome SIEM Practice Labs</h1>
                                    <p className="soc-page-hero-sub">splunk · elastic · curated from top cybersecurity platforms · always up to date</p>
                                </div>
                                <span style={{marginLeft:'auto',flexShrink:0}}>
                                    <a href="https://github.com/ChickenLoner/Awesome-Splunk-and-Elastic-SIEM-Practice-Labs"
                                       target="_blank" rel="noopener noreferrer"
                                       style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'6px 12px',border:'1px solid var(--soc-line2)',borderRadius:'4px',color:'var(--soc-ink3)',fontSize:'12px',textDecoration:'none',fontFamily:"'JetBrains Mono',monospace",transition:'border-color .12s,color .12s'}}
                                       onMouseOver={e=>{e.currentTarget.style.borderColor='var(--soc-am)';e.currentTarget.style.color='var(--soc-am)';}}
                                       onMouseOut={e=>{e.currentTarget.style.borderColor='var(--soc-line2)';e.currentTarget.style.color='var(--soc-ink3)';}}>
                                        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                                        Source
                                    </a>
                                </span>
                            </div>
                            {!loading && !error && (
                                <div className="soc-hero-stats">
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl">Total</div>
                                        <div className="soc-hs-val">{stats.total}</div>
                                    </div>
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl">Splunk</div>
                                        <div className="soc-hs-val">{stats.splunk}</div>
                                    </div>
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl cy">Elastic</div>
                                        <div className="soc-hs-val">{stats.elastic}</div>
                                    </div>
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl vi">Both</div>
                                        <div className="soc-hs-val">{stats.both}</div>
                                    </div>
                                    <div className="soc-hs-cell">
                                        <div className="soc-hs-lbl gn">Free</div>
                                        <div className="soc-hs-val">{stats.free}</div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Loading */}
                        {loading && (
                            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 0',gap:'12px'}}>
                                <div style={{width:'32px',height:'32px',borderRadius:'50%',border:'3px solid var(--soc-line2)',borderTopColor:'var(--soc-am)'}} className="animate-spin" />
                                <span style={{color:'var(--soc-ink3)',fontFamily:"'JetBrains Mono',monospace",fontSize:'12px'}}>Fetching labs from GitHub…</span>
                            </div>
                        )}

                        {/* Error */}
                        {error && (
                            <div style={{border:'1px solid rgba(255,85,119,.3)',borderRadius:'6px',padding:'24px',textAlign:'center',background:'rgba(255,85,119,.06)'}}>
                                <p style={{color:'var(--soc-rd)',fontWeight:600,margin:'0 0 6px'}}>Failed to load: {error}</p>
                                <p style={{color:'var(--soc-ink3)',fontSize:'12px',margin:0}}>Check your connection or try again later.</p>
                            </div>
                        )}

                        {/* Content */}
                        {!loading && !error && (
                            <>
                                {/* Filters */}
                                <div className="soc-filter-panel">
                                    <div className="soc-search-bar" style={{height:'34px'}}>
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="soc-search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                                        <input
                                            type="text"
                                            placeholder="Search labs…"
                                            value={search}
                                            onChange={e => setSearch(e.target.value)}
                                        />
                                    </div>

                                    <div>
                                        <div className="soc-filter-label">SIEM Type</div>
                                        <div className="soc-pills">
                                            <button className={`soc-pill ${secFilter === 'all' ? 'active' : ''}`} onClick={() => setSecFilter('all')}>All</button>
                                            {sections.map(s => {
                                                const { label } = siemClass(s.id);
                                                return (
                                                    <button key={s.id}
                                                        className={`soc-pill ${secFilter === s.id ? 'active' : ''}`}
                                                        onClick={() => setSecFilter(s.id)}>
                                                        {label}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="soc-filter-label">Platform</div>
                                        <div className="soc-pills">
                                            <button className={`soc-pill ${platFilter === 'all' ? 'active' : ''}`} onClick={() => setPlatFilter('all')}>All</button>
                                            {platforms.map(p => (
                                                <button key={p}
                                                    className={`soc-pill ${platFilter === p ? 'active' : ''}`}
                                                    onClick={() => setPlatFilter(p)}>
                                                    {p}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="soc-filter-label">Difficulty</div>
                                        <div className="soc-pills">
                                            <button className={`soc-pill ${diffFilter === 'all' ? 'active' : ''}`} onClick={() => setDiffFilter('all')}>All</button>
                                            {DIFFS.map(d => (
                                                <button key={d}
                                                    className={`soc-pill ${diffFilter === d ? 'active' : ''}`}
                                                    onClick={() => setDiffFilter(d)}>
                                                    {d}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div style={{display:'flex',gap:'8px',flexWrap:'wrap',paddingTop:'4px',borderTop:'1px solid var(--soc-line)'}}>
                                        <button
                                            className={`soc-toggle ${freeOnly ? 'active' : ''}`}
                                            onClick={() => setFreeOnly(f => !f)}>
                                            {freeOnly ? '✓ ' : ''}Free Only
                                        </button>
                                        <button
                                            className={`soc-toggle ${adFilter !== 'all' ? 'active-cy' : ''}`}
                                            onClick={cycleAd}>
                                            AD: {adFilter === 'all' ? 'All' : adFilter === 'yes' ? '✅ Yes' : '❌ No'}
                                        </button>
                                    </div>
                                </div>

                                {/* Section label */}
                                <h2 className="soc-section">
                                    Lab Index
                                    <span className="meta">
                                        <b style={{color:'var(--soc-am)'}}>{filtered.length}</b> of {allLabs.length} labs
                                    </span>
                                </h2>

                                {/* Table */}
                                <div className="soc-table-wrap">
                                    <table className="soc-table">
                                        <thead>
                                            <tr>
                                                <th>Lab Name</th>
                                                <th>Platform</th>
                                                <th>Difficulty</th>
                                                <th style={{display:'none'}} className="md-show">Pricing</th>
                                                <th>SIEM</th>
                                                <th style={{display:'none'}} className="sm-show">AD</th>
                                                <th></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filtered.map((lab, i) => {
                                                const { cls: siemCls, label: siemLabel } = siemClass(lab.sectionId);
                                                const pricingColor = lab.pricing === 'Free' ? 'var(--soc-gn)' : lab.pricing === 'Pay per access' ? 'var(--soc-am)' : 'var(--soc-ink3)';
                                                return (
                                                    <tr key={i}>
                                                        <td className="lab-name">{lab.name}</td>
                                                        <td><span className="soc-plat">{lab.platform}</span></td>
                                                        <td><span className={`soc-diff ${diffClass(lab.difficulty)}`}>{lab.difficulty || '—'}</span></td>
                                                        <td style={{color:pricingColor,fontSize:'11px',fontFamily:"'JetBrains Mono',monospace"}}>{lab.pricing}</td>
                                                        <td><span className={`soc-siem ${siemCls}`}>{siemLabel}</span></td>
                                                        <td style={{fontSize:'13px'}}>
                                                            {lab.ad === '✅' ? '✅' : lab.ad === '❌' ? '❌' : <span style={{color:'var(--soc-ink4)'}}>—</span>}
                                                        </td>
                                                        <td style={{textAlign:'right'}}>
                                                            <a href={lab.url} target="_blank" rel="noopener noreferrer" className="soc-open-btn">
                                                                Open ↗
                                                            </a>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {filtered.length === 0 && (
                                                <tr>
                                                    <td colSpan={7} style={{textAlign:'center',padding:'48px',color:'var(--soc-ink3)',fontFamily:"'JetBrains Mono',monospace",fontSize:'12px'}}>
                                                        No labs match your filters
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>

                                <div className="soc-ft">
                                    Data fetched live from{' '}
                                    <a href="https://github.com/ChickenLoner/Awesome-Splunk-and-Elastic-SIEM-Practice-Labs" target="_blank" rel="noopener noreferrer" style={{color:'var(--soc-am)'}}>
                                        GitHub
                                    </a>
                                    {' '}— always up to date
                                </div>
                            </>
                        )}

                        <div className="soc-ft">
                            SOC · SIEM.LABS · CHICKEN0248 · <a href="/">↩ OPERATOR.PROFILE</a>
                        </div>
                    </div>
                </main>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
