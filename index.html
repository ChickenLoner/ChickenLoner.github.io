                                <Brow label="Blue Team Labs Online" count={fbBtlo.length} total={fbTotal} max={maxFbCnt} fillColor="#35c2f1" />
                                <Brow label="HackTheBox Sherlock"   count={fbHtb.length}  total={fbTotal} max={maxFbCnt} fillColor="#9fef00" />
                                <Brow label="CyberDefenders"        count={fbCd.length}   total={fbTotal} max={maxFbCnt} fillColor="#297fff" />
                                <div style={{height:'1px',background:'var(--soc-line)',margin:'12px 0'}}></div>
                                <div style={{display:'flex',gap:'10px'}}>
                                    {[{label:'BTLO',n:fbBtlo.length,c:'#35c2f1'},{label:'HTB',n:fbHtb.length,c:'#9fef00'},{label:'CD',n:fbCd.length,c:'#297fff'}].map(p=>(
                                        <div key={p.label} style={{flex:1,textAlign:'center',padding:'10px',background:'var(--soc-bg)',border:'1px solid var(--soc-line)',borderRadius:'5px'}}>
                                            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'20px',fontWeight:700,color:p.c}}>{p.n}</div>
                                            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'9px',color:'var(--soc-ink3)',letterSpacing:'.1em',textTransform:'uppercase',marginTop:'4px'}}>{p.label}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="tile">
                                <TileHd glyph="🔬" label="Recent Bloods" />
                                <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                                    {[...fbBtlo.slice(0,3).map(e=>({...e,plat:'BTLO',c:'#35c2f1'})),
                                      ...fbHtb.slice(0,2).map(e=>({...e,plat:'HTB',c:'#9fef00'})),
                                      ...fbCd.slice(0,1).map(e=>({...e,plat:'CD',c:'#297fff'}))
                                    ].slice(0,6).map((e,i)=>(
                                        <a key={i} href={e.url} target="_blank" rel="noopener noreferrer"
                                            style={{display:'grid',gridTemplateColumns:'auto 1fr auto',gap:'8px',alignItems:'center',
                                                padding:'7px 10px',background:'var(--soc-bg)',border:'1px solid var(--soc-line)',
                                                borderRadius:'4px',textDecoration:'none',color:'inherit',transition:'.15s'}}
                                            onMouseEnter={el=>el.currentTarget.style.borderColor='var(--soc-line2)'}
                                            onMouseLeave={el=>el.currentTarget.style.borderColor='var(--soc-line)'}>
                                            <span style={{padding:'2px 6px',border:`1px solid ${e.c}`,borderRadius:'3px',opacity:.9,display:'inline-flex',alignItems:'center',background:'var(--soc-bg-2)'}}><img src={{'BTLO':'./assets/platforms/btlo.svg','HTB':'./assets/platforms/htb.svg','CD':'./assets/platforms/cd.svg'}[e.plat]} alt={e.plat} style={{height:'14px',width:'auto',display:'block'}} /></span>
                                            <span style={{fontSize:'12px',color:'var(--soc-ink)',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.name}</span>
                                            <span style={{fontSize:'10px',color:'var(--soc-ink4)'}}>›</span>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* ── CONTENT & PUBLICATIONS ── */}
                        <h2 className="soc-section vi">Content &amp; Publications</h2>
                        <div className="content-row">
                            <div className="co-card">
                                <div className="co-cat">Reviews</div>
                                <div className="co-val">{certificationReviews.length}</div>
                                <div className="co-sub">avg {avgRevRating.toFixed(2)} / 5.0</div>
                                <div className="co-list">
                                    {recentRevs.map((r,i)=><a key={i} href={r.url}>{r.title}</a>)}
                                </div>
                                <a className="co-cta" href="/reviews/"><span>Latest Reviews</span><span>›</span></a>
                            </div>
                            <div className="co-card t-am">
                                <div className="co-cat">Research</div>
                                <div className="co-val">{researchData.length}</div>
                                <div className="co-sub">articles &amp; posts</div>
                                <div className="co-list">
                                    {recentRes.map((r,i)=><a key={i} href={r.url}>{r.title}</a>)}
                                </div>
                                <a className="co-cta" href="/research/"><span>All Research</span><span>›</span></a>
                            </div>
                            <div className="co-card t-vi">
                                <div className="co-cat">IR Reports</div>
                                <div className="co-val">{irReports.length}</div>
                                <div className="co-sub">incident reports</div>
                                <div className="co-list">
                                    {recentIR.map((r,i)=><a key={i} href={r.url}>{r.title}</a>)}
                                </div>
                                <a className="co-cta" href="/ir-reports/"><span>All Reports</span><span>›</span></a>
                            </div>
                        </div>

                        {/* ── TWEAKS FAB ── */}
                        <button className="tweaks-fab" onClick={()=>setTweaksOpen(v=>!v)} title="Display tweaks">⚙</button>
                        <div className={`tweaks-panel${tweaksOpen?' open':''}`} role="dialog" aria-label="Tweaks">
                            <div className="tweaks-hd">Stats Tweaks <span className="x" onClick={()=>setTweaksOpen(false)} aria-label="Close">✕</span></div>
                            <div className="tweaks-body">
                                <div className="tw-group">
                                    <div className="tw-lbl">Stat columns</div>
                                    <div className="tw-radio">
                                        {[2,3,6].map(n=>(
                                            <button key={n} className={tweaks.statCols===n?'on':''}
                                                onClick={()=>saveTweaks({...tweaks,statCols:n})}>{n}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="tw-group">
                                    <div className="tw-lbl">Density</div>
                                    <div className="tw-radio">
                                        {['comfortable','compact'].map(d=>(
                                            <button key={d} className={tweaks.density===d?'on':''}
                                                onClick={()=>saveTweaks({...tweaks,density:d})}>{d}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="tw-group">
                                    <div className="tw-lbl">Timeline order</div>
                                    <div className="tw-radio">
                                        {[{v:'desc',l:'Newest first'},{v:'asc',l:'Oldest first'}].map(({v,l})=>(
                                            <button key={v} className={tweaks.actOrder===v?'on':''}
                                                onClick={()=>saveTweaks({...tweaks,actOrder:v})}>{l}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="tw-group">
                                    <div className="tw-lbl">Sections</div>
                                    <div className={`tw-toggle${tweaks.showMitre?' on':''}`} onClick={()=>saveTweaks({...tweaks,showMitre:!tweaks.showMitre})}>
                                        <span className="t">MITRE ATT&amp;CK heatmap</span><span className="sw"></span>
                                    </div>
                                </div>
                            </div>
                            <div className="tw-foot">Saved to <b onClick={()=>saveTweaks({...TWEAKS_DEF})}>localStorage</b> · click to reset</div>
                        </div>
                    </div>
                );
            };

            const CertCard = ({c}) => (
                <a className={`cert-card ${c.cat}${c.s==='expired'?' expired':''}`} href={c.u||'#'} target={c.u?'_blank':undefined} rel="noopener noreferrer">
                    <div className="cert-glyph">
                        {c.badge
                            ? <img src={c.badge} alt={c.g} style={{width:'100%',height:'100%',objectFit:'contain',borderRadius:'4px'}} />
                            : c.g}
                    </div>
                    <div className="cert-body">
                        <div className="cert-name">{c.name}</div>
                        <div className="cert-meta">
                            <span className="iss">{c.iss}</span>
                            <span className="dot"></span>
                            <span>{c.y}</span>
                            <span className="dot"></span>
                            <span className={`status ${c.s}`}>{c.s}</span>
                        </div>
                    </div>
                    <span className="v-arrow">{c.u?'verify ↗':'—'}</span>
                </a>
            );

            const CertificationsPage = () => {
                const CAT_MAP = {"Offensive Security":"off","Blue Team & Detection":"blu","Digital Forensics & DFIR":"fir","General & Foundational":"fnd"};
                const CAT_LABEL = {off:"Offensive",blu:"Blue Team",fir:"DFIR",fnd:"Foundational"};
                const GLYPH_OVR = {
                    "CBTeamer - Certified Blue Teamer":"CBT",
                    "CBTeamerX - Certified Blue Teamer eXpert":"CBT-X",
                    "Cyber5w Certified Digital Forensics Evidence Handler":"EVH",
                    "Cyber5w Certified Digital Forensics Foundations":"CCDF-F",
                    "CompTIA Security+":"Sec+",
                    "CompTIA PenTest+":"PT+",
                    "C-AgAIPen - Certified Agentic AI Pentester":"AgAI",
                };
                const deriveGlyph = name => {
                    if (GLYPH_OVR[name]) return GLYPH_OVR[name];
                    let g = name.includes(' - ') ? name.split(' - ')[0] : name;
                    return g.replace(/^HTB\s+/,'').replace(/^CompTIA\s+/,'').replace(/^Cyber5w\s+/,'');
                };

                const certs = certifications.map(c => ({
                    name: c.name, iss: c.issuer, y: c.year,
                    cat: CAT_MAP[c.category] || 'fnd',
                    s: c.status.toLowerCase(), u: c.url || '',
                    g: deriveGlyph(c.name), badge: c.badge || '',
                    latest: !!c.latest, origCat: c.category,
                }));

                const [tab, setTab] = useState('all');
                const [statusFilter, setStatusFilter] = useState('all');
                const [tweaksOpen, setTweaksOpen] = useState(false);
                const TWEAKS_KEY = 'soc-cert-tweaks-v1';
                const TWEAKS_DEF = {group:'year',grid:'default',density:'comfortable',featured:true,yearDividers:true};
                const [tweaks, setTweaks] = useState(() => {
                    try { return {...TWEAKS_DEF,...JSON.parse(localStorage.getItem(TWEAKS_KEY)||'{}')}; } catch(e) { return TWEAKS_DEF; }
                });
                const saveTweaks = t => { setTweaks(t); try { localStorage.setItem(TWEAKS_KEY,JSON.stringify(t)); } catch(e) {} };

                const total = certs.length;
                const active = certs.filter(c=>c.s==='active').length;
                const expired = total - active;
                const issuerCounts = certs.reduce((a,c)=>{a[c.iss]=(a[c.iss]||0)+1;return a;},{});
                const sortedIssuers = Object.entries(issuerCounts).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]));
                const [topIssuer, topCount] = sortedIssuers[0] || ['—',0];
                const issuerTotal = sortedIssuers.length;
                const catCounts = certs.reduce((a,c)=>{a[c.cat]=(a[c.cat]||0)+1;return a;},{off:0,blu:0,fir:0,fnd:0});
                const featured = certs.find(c=>c.latest)||null;
                const issuerAbbr = name => name.split(/\s+/).filter(w=>w.length>1&&w.toLowerCase()!=='the').map(w=>w[0]).join('').toUpperCase();

                const getPool = () => {
                    let p = certs.slice();
                    if (tab!=='all'&&tab!=='issuers') p=p.filter(c=>c.cat===tab);
                    if (statusFilter!=='all') p=p.filter(c=>c.s===statusFilter);
                    return p.sort((a,b)=>b.y!==a.y?b.y.localeCompare(a.y):a.cat!==b.cat?a.cat.localeCompare(b.cat):a.iss.localeCompare(b.iss));
                };
                const pool = getPool();

                const gridClass = `cert-grid${tweaks.grid==='dense'?' cert-grid-dense':tweaks.grid==='airy'?' cert-grid-airy':''}`;
                const wrapClass = tweaks.density==='compact' ? 'cert-compact' : '';

                const pct = cat => total ? `${Math.round((catCounts[cat]||0)/total*100)}%` : '0%';
                const tabCount = t => t==='all'?total:t==='issuers'?issuerTotal:catCounts[t]||0;

                const renderGroups = () => {
                    if (!pool.length) return (
                        <div style={{textAlign:'center',padding:'60px 20px',color:'var(--soc-ink3)',fontFamily:"'JetBrains Mono',monospace",fontSize:'12px',letterSpacing:'.06em'}}>
                            // NO RESULTS MATCH CURRENT FILTERS
                        </div>
                    );
                    if (tweaks.group==='year') {
                        const groups={};
                        pool.forEach(c=>{(groups[c.y]=groups[c.y]||[]).push(c);});
                        return Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(y=>(
                            <div key={y}>
                                {tweaks.yearDividers && (
                                    <div className="year-bar">
                                        <span className="yr">{y}</span><span className="ln"></span>
                                        <span className="cn">{groups[y].length} credential{groups[y].length!==1?'s':''}</span>
                                    </div>
                                )}
                                <div className={gridClass}>{groups[y].map((c,i)=><CertCard key={i} c={c}/>)}</div>
                            </div>
                        ));
                    }
                    if (tweaks.group==='category') {
                        const groups={};
                        pool.forEach(c=>{(groups[c.cat]=groups[c.cat]||[]).push(c);});
                        return ['off','blu','fir','fnd'].map(cat=>{
                            const list=groups[cat]; if(!list||!list.length) return null;
                            const cls=cat==='off'?'rd':cat==='fir'?'am':cat==='fnd'?'vi':'';
                            return (
                                <div key={cat}>
                                    <h2 className={`soc-section ${cls}`}>{CAT_LABEL[cat]} <span className="meta">{list.length} credentials</span></h2>
                                    <div className={gridClass}>{list.map((c,i)=><CertCard key={i} c={c}/>)}</div>
                                </div>
                            );
                        });
                    }
                    return <div className={gridClass}>{pool.map((c,i)=><CertCard key={i} c={c}/>)}</div>;
                };

                const ISSUER_LOGOS={'APIsec University':'apisec.png','Blue Cape Security':'bluecapsec.png','CompTIA':'comptia.png','Cyber5W':'cyber5w.png','CyberDefenders':'cyberdefenders.png','Cyberwarfare Labs':'CWL.png','EC-Council':'Ec_Council.png','Global Information Assurance Certification (GIAC)':'GIAC.png','HackTheBox':'hackthebox.png','Hackviser':'hackviser.png','INE':'INE.png','OffSec':'offsec.png','PentestingExams.com':'pentestingexams.png','Centri':'centri.png','TCM Security':'tcm.png','TryHackMe':'tryhackme.png'};
                const renderIssuers = () => {
                    let ip=certs.slice();
                    if(statusFilter!=='all') ip=ip.filter(c=>c.s===statusFilter);
                    ip.sort((a,b)=>a.iss.localeCompare(b.iss)||b.y.localeCompare(a.y));
                    return (
                        <React.Fragment>
                            <h2 className="soc-section vi">Issuer Roster <span className="meta">{sortedIssuers.length} organizations · {active} credentials</span></h2>
                            <div className="issuer-roster">
                                {sortedIssuers.map(([iss,cnt])=>{
                                    const logo=ISSUER_LOGOS[iss];
                                    const initials=iss.split(/[\s\-]/).map(w=>w[0]).filter(Boolean).slice(0,3).join('').toUpperCase();
                                    const years=[...new Set(certs.filter(c=>c.iss===iss).map(c=>c.y))].sort().join(', ');
                                    return (
                                        <div key={iss} className="issuer-card">
                                            <div className="ig">{logo?<img src={`./assets/issuers/${logo}`} alt={iss} style={{width:'100%',height:'100%',objectFit:'contain'}} />:initials}</div>
                                            <div><div className="in">{iss}</div><div className="is">{cnt} credential{cnt!==1?'s':''} · {years}</div></div>
                                            <div className="ic">{cnt}</div>
                                        </div>
                                    );
                                })}
                            </div>
                            <h2 className="soc-section">All Credentials — sorted by issuer</h2>
                            <div className={gridClass}>{ip.map((c,i)=><CertCard key={i} c={c}/>)}</div>
                        </React.Fragment>
                    );
                };

                const TABS = [
                    {id:'all',label:'▰ All',cls:''},
                    {id:'off',label:'⚔ Offensive',cls:'t-rd'},
                    {id:'blu',label:'◆ Blue Team',cls:'t-cy'},
                    {id:'fir',label:'⊕ DFIR',cls:'t-am'},
                    {id:'fnd',label:'◯ Foundational',cls:'t-vi'},
                    {id:'issuers',label:'▤ By Issuer',cls:''},
                ];

                const yMax = Math.max(...certs.map(c=>parseInt(c.y)||0));
                const yMin = Math.min(...certs.map(c=>parseInt(c.y)||9999));

                return (
                <div className={`space-y-4 animate-fadeIn${wrapClass?' '+wrapClass:''}`}>

                    {/* Hero */}
                    <section className="soc-page-hero">
                        <div className="soc-page-hero-strap">
                            <div className="seg"><b>portfolio</b><span style={{color:'var(--soc-ink4)'}}>/</span><span className="v">certifications</span></div>
                            <div className="seg" style={{marginLeft:'auto'}}><b>verified_credentials</b> <span className="v">{total}</span> · <b>last_issued</b> <span className="v">{yMax}</span></div>
                        </div>
                        <div className="soc-page-hero-body">
                            <div className="soc-page-hero-icon" style={{color:'var(--soc-cy)'}}>✦</div>
                            <div>
                                <h1 className="soc-page-hero-title">Certifications</h1>
                                <p className="soc-page-hero-sub">credentials.log · {issuerTotal} issuers · 4 disciplines · earned {yMin} → {yMax}</p>
                            </div>
                        </div>
                        <div className="soc-stat-grid">
                            <div className="soc-stat-cell">
                                <div className="soc-stat-lbl">Total Certifications</div>
                                <div className="soc-stat-val">{total}</div>
                                <div className="dist">
                                    <span className="off" title={`Offensive Security: ${catCounts.off}`} style={{width:pct('off')}}></span>
                                    <span className="blu" title={`Blue Team & Detection: ${catCounts.blu}`} style={{width:pct('blu')}}></span>
                                    <span className="fir" title={`Digital Forensics & DFIR: ${catCounts.fir}`} style={{width:pct('fir')}}></span>
                                    <span className="fnd" title={`General & Foundational: ${catCounts.fnd}`} style={{width:pct('fnd')}}></span>
                                </div>
                            </div>
                            <div className="soc-stat-cell gn">
                                <div className="soc-stat-lbl">Active · Verifiable</div>
                                <div className="soc-stat-val">{active}<span className="unit">/{total}</span></div>
                                <div className="dist">
                                    <span title={`Active: ${active}`} style={{width:`${Math.round(active/total*100)}%`,background:'var(--soc-gn)'}}></span>
                                    <span title={`Expired: ${expired}`} style={{width:`${Math.round(expired/total*100)}%`,background:'var(--soc-rd)'}}></span>
                                </div>
                            </div>
                            <div className="soc-stat-cell am">
                                <div className="soc-stat-lbl">Top Issuer</div>
                                <div className="soc-stat-val">{issuerAbbr(topIssuer)}<span className="unit">· {topCount} creds</span></div>
                                <div className="dist">
                                    {sortedIssuers.slice(0,5).map(([iss,cnt],i)=>(
                                        <span key={iss} style={{width:`${Math.round(cnt/total*100)}%`,background:'var(--soc-am)',opacity:1-i*0.15}} title={`${iss} · ${cnt}`}></span>
                                    ))}
                                    <span style={{flex:1,background:'var(--soc-line2)'}}></span>
                                </div>
                            </div>
                            <div className="soc-stat-cell vi">
                                <div className="soc-stat-lbl">Issuers</div>
                                <div className="soc-stat-val">{issuerTotal}</div>
                                <div className="dist">
                                    {sortedIssuers.slice(0,4).map(([iss,cnt],i)=>(
                                        <span key={iss} title={`${iss}: ${cnt}`} style={{width:`${Math.round(cnt/total*100)}%`,background:'var(--soc-vi)',opacity:1-i*0.2}}></span>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Toolbar */}
                    <div className="toolbar">
                        <nav className="soc-seg">
                            {TABS.map(({id,label,cls})=>(
                                <button key={id} className={`soc-seg-btn${cls?' '+cls:''} ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
                                    {label} <span className="soc-seg-count">{tabCount(id)}</span>
                                </button>
                            ))}
                        </nav>
                        {tab!=='issuers' && (
                            <div className="filters">
                                <span className="fchip-label">Status</span>
                                {[{id:'all',l:'All',n:total},{id:'active',l:'Active',n:active},{id:'expired',l:'Expired',n:expired}].map(({id,l,n})=>(
                                    <button key={id} className={`fchip${statusFilter===id?' active':''}`} onClick={()=>setStatusFilter(id)}>
                                        {l} <span className="cnt">{n}</span>
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Featured latest */}
                    {featured && tweaks.featured && tab!=='issuers' && (
                        <a className="featured-latest" href={featured.u||'#'} target={featured.u?'_blank':undefined} rel="noopener noreferrer">
                            <div className="fl-glyph">
                                {featured.badge
                                    ? <img src={featured.badge} alt={featured.g} style={{width:'100%',height:'100%',objectFit:'contain',borderRadius:'6px'}} />
                                    : featured.g}
                            </div>
                            <div>
                                <span className="fl-tag">Newest · Just Earned</span>
                                <div className="fl-title">{featured.name}</div>
                                <div className="fl-meta">
                                    <span>issuer=<b>{featured.iss}</b></span><span>·</span>
                                    <span>category=<b>{featured.origCat}</b></span><span>·</span>
                                    <span>year=<b>{featured.y}</b></span><span>·</span>
                                    <span>status=<b>{featured.s}</b></span>
                                </div>
                            </div>
                            <span className="fl-cta">▸ Verify ↗</span>
                        </a>
                    )}

                    {/* Content panes */}
                    {tab==='issuers' ? renderIssuers() : renderGroups()}

                    {/* Tweaks FAB + Panel */}
                    <button className="tweaks-fab" onClick={()=>setTweaksOpen(v=>!v)} title="Tweaks" aria-label="Open Tweaks">⚙</button>
                    <div className={`tweaks-panel${tweaksOpen?' open':''}`} role="dialog" aria-label="Tweaks">
                        <div className="tweaks-hd">Tweaks <span className="x" onClick={()=>setTweaksOpen(false)} aria-label="Close">✕</span></div>
                        <div className="tweaks-body">
                            <div className="tw-group">
                                <div className="tw-lbl">Group by</div>
                                <div className="tw-radio">
                                    {['year','category','none'].map(v=>(
                                        <button key={v} className={tweaks.group===v?'on':''} onClick={()=>saveTweaks({...tweaks,group:v})}>
                                            {v.charAt(0).toUpperCase()+v.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="tw-group">
                                <div className="tw-lbl">Grid density</div>
                                <div className="tw-radio">
                                    {['dense','default','airy'].map(v=>(
                                        <button key={v} className={tweaks.grid===v?'on':''} onClick={()=>saveTweaks({...tweaks,grid:v})}>
                                            {v.charAt(0).toUpperCase()+v.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="tw-group">
                                <div className="tw-lbl">Layout density</div>
                                <div className="tw-radio">
                                    {['comfortable','compact'].map(v=>(
                                        <button key={v} className={tweaks.density===v?'on':''} onClick={()=>saveTweaks({...tweaks,density:v})}>
                                            {v.charAt(0).toUpperCase()+v.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="tw-group">
                                <div className="tw-lbl">Sections</div>
                                <div className={`tw-toggle${tweaks.featured?' on':''}`} onClick={()=>saveTweaks({...tweaks,featured:!tweaks.featured})}>
                                    <span className="t">Show "Newest" banner</span><span className="sw"></span>
                                </div>
                                <div className={`tw-toggle${tweaks.yearDividers?' on':''}`} onClick={()=>saveTweaks({...tweaks,yearDividers:!tweaks.yearDividers})}>
                                    <span className="t">Show group dividers</span><span className="sw"></span>
                                </div>
                            </div>
                        </div>
                        <div className="tw-foot">Saved to <b onClick={()=>saveTweaks({...TWEAKS_DEF})}>localStorage</b> · click to reset</div>
                    </div>
                </div>
                );
            };

            const LabsPage = () => {
                const TWEAKS_KEY = 'soc-labs-tweaks-v3';
                const TWEAKS_DEF = {density:'comfortable',yearDiv:true,covers:true,tags:true,crowDesc:true,retiredStyle:'A',labSort:'default',descLines:99,showLatest:true};
                const [tweaks, setTweaks] = React.useState(() => {
                    try { return {...TWEAKS_DEF, ...JSON.parse(localStorage.getItem(TWEAKS_KEY)||'{}')}; } catch { return TWEAKS_DEF; }
                });
                const [tweaksOpen, setTweaksOpen] = React.useState(false);
                const [tab, setTab] = React.useState('labs');
                const [labFilter, setLabFilter] = React.useState('all');
                const [platFilter, setPlatFilter] = React.useState('all');
                const [projFilter, setProjFilter] = React.useState('all');
                const saveTweaks = t => { setTweaks(t); try { localStorage.setItem(TWEAKS_KEY, JSON.stringify(t)); } catch {} };

                const CORE_PLATFORMS = ['CyberDefenders', 'HackTheBox', 'Blue Team Labs Online'];
                const labsOnly = labs.filter(l => l.type === 'lab');
                const projectsOnly = labs.filter(l => l.type === 'project');

                const projType = p => {
                    if ((p.tags||[]).includes('Tool')) return 'tool';
                    if (p.platform==='Medium'||p.platform==='Original') return 'research';
                    return 'list';
                };
                const ratingPlace = r => {
                    if (!r) return 'other';
                    if (r >= 4.5) return 'gold';
                    if (r >= 4.0) return 'silver';
                    if (r >= 3.5) return 'bronze';
                    return 'other';
                };

                // Stats
                const ratedLabs = labsOnly.filter(l=>l.rating);
                const avgRating = ratedLabs.length ? ratedLabs.reduce((s,l)=>s+l.rating,0)/ratedLabs.length : 0;
                const platformCount = new Set(labsOnly.map(l=>CORE_PLATFORMS.includes(l.platform)?l.platform:'CTF')).size;

                // Lab filter + sort + group
                const platMatch = l => {
                    if (platFilter==='all') return true;
                    if (platFilter==='ctf') return !CORE_PLATFORMS.includes(l.platform);
                    return l.platform === platFilter;
                };
                const filteredLabs = labsOnly.filter(l => {
                    if (!platMatch(l)) return false;
                    if (labFilter==='top')     return l.rating>=4.5;
                    if (labFilter==='hard')    return l.difficulty==='hard';
                    if (labFilter==='active')  return !l.is_retired;
                    if (labFilter==='retired') return l.is_retired;
                    return true;
                });
                const sortedLabs = [...filteredLabs].sort((a,b) => {
                    if (tweaks.labSort==='rating')     return (b.rating||0)-(a.rating||0);
                    if (tweaks.labSort==='difficulty') { const o={easy:0,medium:1,hard:2}; return (o[a.difficulty]??9)-(o[b.difficulty]??9); }
                    return 0;
                });
                const labGroups = (() => {
                    const map = {}; CORE_PLATFORMS.forEach(p=>{map[p]=[];}); map['CTF']=[];
                    sortedLabs.forEach(l => { const g=CORE_PLATFORMS.includes(l.platform)?l.platform:'CTF'; map[g].push(l); });
                    const result = [];
                    CORE_PLATFORMS.forEach(p => { if(map[p].length) result.push({name:p,items:map[p]}); });
                    if(map['CTF'].length) result.push({name:'CTF',items:map['CTF']});
                    return result;
                })();

                // Project filter + group
                const filteredProjects = projectsOnly.filter(p => {
                    if (projFilter==='tool')     return projType(p)==='tool';
                    if (projFilter==='research') return projType(p)==='research';
                    if (projFilter==='list')     return projType(p)==='list';
                    return true;
                });
                const projGroups = (() => {
                    const g={tool:[],research:[],list:[]};
                    filteredProjects.forEach(p=>g[projType(p)].push(p));
                    const r=[];
                    if(g.tool.length)     r.push({name:'Tools',           items:g.tool});
                    if(g.research.length) r.push({name:'Research & Blog Posts', items:g.research});
                    if(g.list.length)     r.push({name:'Lists & Resources', items:g.list});
                    return r;
                })();

                // Hero dist bar helpers
                const lTotal = labsOnly.length || 1;
                const pTotal = projectsOnly.length || 1;
                const lpct = n => Math.round(n/lTotal*100)+'%';
                const ppct = n => Math.round(n/pTotal*100)+'%';
                const platCnt = plat => labsOnly.filter(l=>l.platform===plat).length;
                const cdCnt = platCnt('CyberDefenders'), htbCnt = platCnt('HackTheBox'), btloCnt = platCnt('Blue Team Labs Online');
                const ctfCnt = labsOnly.length - cdCnt - htbCnt - btloCnt;

                // Total counts for hero (never filtered)
                const totalActive  = labsOnly.filter(l=>!l.is_retired).length;
                const totalRetired = labsOnly.filter(l=>l.is_retired).length;
                const featuredLab  = labsOnly.find(l=>l.latest) || null;

                // Filter counts (scoped to current platform filter)
                const platScoped = labsOnly.filter(platMatch);
                const labFC  = {all:platScoped.length, top:platScoped.filter(l=>l.rating>=4.5).length, hard:platScoped.filter(l=>l.difficulty==='hard').length, active:platScoped.filter(l=>!l.is_retired).length, retired:platScoped.filter(l=>l.is_retired).length};
                const platFC = {all:labsOnly.length, cd:cdCnt, htb:htbCnt, btlo:btloCnt, ctf:ctfCnt};
                const projFC = {all:projectsOnly.length, tool:projectsOnly.filter(p=>projType(p)==='tool').length, research:projectsOnly.filter(p=>projType(p)==='research').length, list:projectsOnly.filter(p=>projType(p)==='list').length};
                const rbucket = b => labsOnly.filter(l=>ratingPlace(l.rating)===b).length;
                const rGold=rbucket('gold'), rSilver=rbucket('silver'), rBronze=rbucket('bronze'), rOther=rbucket('other');

                // Wrapper classes
                const wrapCls = ['labs-page-wrap','animate-fadeIn',tweaks.density==='compact'?'compact-density':'',!tweaks.yearDiv?'hide-year-dividers':'',!tweaks.covers?'hide-covers':'',!tweaks.tags?'hide-tags':'',!tweaks.crowDesc?'hide-crow-desc':''].filter(Boolean).join(' ');

                const LabRow = ({l}) => {
                    const isCTF = !CORE_PLATFORMS.includes(l.platform);
                    const pc = ratingPlace(l.rating);
                    const pl = l.rating ? `★ ${l.rating.toFixed(1)}` : 'N/A';
                    return (
                        <a className={`crow${l.is_retired?' is-retired':''}`} href={l.link} target="_blank" rel="noopener noreferrer">
                            <div className={`cover${!l.image?' placeholder':''}`} style={l.image?{backgroundImage:`url(${l.image})`,backgroundSize:'cover',backgroundPosition:'center'}:{}}>
                                {!l.image && <span>{(l.title||'').slice(0,3).toUpperCase()}</span>}
                                <span className={`place ${pc}`}>{pl}</span>
                            </div>
                            <div className="info">
                                <div className="nm">{l.title}</div>
                                <div className="sub">
                                    {l.difficulty && <span className={`diff-pill ${l.difficulty}`}>{l.difficulty}</span>}
                                    {l.player_difficulty && l.player_difficulty!==l.difficulty && <span className={`diff-pill ${l.player_difficulty} player`} title="Player-rated difficulty">{l.player_difficulty}</span>}
                                    {l.is_retired && <span className="retired-pill">Retired</span>}
                                    {isCTF && <><span className="evt">{l.platform}</span><span className="evt-sep">·</span></>}
                                    <span className="desc" title={l.description}>{l.description}</span>
                                </div>
                                <div className="tags-row">
                                    {(l.tags||[]).slice(0,5).map((t,i)=><span key={i} className="t">{t}</span>)}
                                    {(l.tags||[]).length>5 && <span className="t more">+{(l.tags.length-5)}</span>}
                                </div>
                            </div>
                            <span className="ar play"><span className="ic">▶</span><span className="lbl">Play Now</span></span>
                        </a>

                const ProjRow = ({p}) => {
                    const t = projType(p);

                    return (
                        <a className="crow" href={p.link} target="_blank" rel="noopener noreferrer">

                                <span className={`place ${pc}`}>{pl}</span>
                            </div>
                            <div className="info">
                                <div className="nm">{p.title}</div>
                                <div className="sub">
                                    <span className="evt">{p.platform}</span>
                                    <span className="evt-sep">·</span>
                                    <span className="desc" title={p.description}>{p.description}</span>
                                </div>
                                <div className="tags-row">
                                    {(p.tags||[]).slice(0,5).map((tg,i)=><span key={i} className="t">{tg}</span>)}

                                </div>
                            </div>
                            <span className="ar open"><span className="ic">↗</span><span className="lbl">Open</span></span>

                return (

                                <div className="seg"><b>portfolio</b><span style={{color:'var(--soc-ink4)'}}>/</span><span className="v">labs-and-projects</span></div>

                            </div>
                            <div className="soc-page-hero-body">
                                <div className="soc-page-hero-icon" style={{color:'var(--soc-cy)'}}>⚗</div>
                                <div>

                                    <p className="soc-page-hero-sub">hands-on DFIR scenarios · forensic challenges · tools &amp; research</p>
                                </div>
                            </div>
                            <div className="soc-stat-grid">
                                <div className="soc-stat-cell">
                                    <div className="soc-stat-lbl">Total Labs</div>
                                    <div className="soc-stat-val">{labsOnly.length}</div>
                                    <div className="dist">
                                        <span title={`CyberDefenders: ${cdCnt}`}        style={{width:lpct(cdCnt),  background:'#297fff'}}></span>
                                        <span title={`HackTheBox: ${htbCnt}`}           style={{width:lpct(htbCnt), background:'#9fef00'}}></span>
                                        <span title={`Blue Team Labs Online: ${btloCnt}`} style={{width:lpct(btloCnt),background:'#35c2f1'}}></span>
                                        <span title={`CTF/Other: ${ctfCnt}`}            style={{width:lpct(ctfCnt), background:'var(--soc-vi)'}}></span>
                                    </div>
                                </div>
                                <div className="soc-stat-cell am">
                                    <div className="soc-stat-lbl">★ Avg Rating</div>

                                    <div className="dist">
                                        <span title={`★ 4.8+: ${rGold}`}   style={{width:lpct(rGold),  background:'#ffd380'}}></span>
                                        <span title={`★ 4.5–4.7: ${rSilver}`} style={{width:lpct(rSilver),background:'#dde2ed'}}></span>
                                        <span title={`★ 4.0–4.4: ${rBronze}`} style={{width:lpct(rBronze),background:'#e3a87b'}}></span>
                                        <span title={`Unrated: ${rOther}`}  style={{width:lpct(rOther), background:'var(--soc-cy)',opacity:.5}}></span>
                                    </div>
                                </div>
                                <div className="soc-stat-cell gn">
                                    <div className="soc-stat-lbl">Active · Labs</div>
                                    <div className="soc-stat-val">{totalActive}<span className="unit">/{labsOnly.length}</span></div>
                                    <div className="dist">
                                        <span title={`Active: ${totalActive}`}  style={{width:lpct(totalActive),  background:'var(--soc-gn)'}}></span>
                                        <span title={`Retired: ${totalRetired}`} style={{width:lpct(totalRetired), background:'var(--soc-rd)'}}></span>
                                    </div>
                                </div>
                                <div className="soc-stat-cell vi">
                                    <div className="soc-stat-lbl">Projects</div>
                                    <div className="soc-stat-val">{projectsOnly.length}</div>
                                    <div className="dist">
                                        <span title={`Tools: ${projFC.tool}`}     style={{width:ppct(projFC.tool),     background:'var(--soc-vi)'}}></span>
                                        <span title={`Research: ${projFC.research}`} style={{width:ppct(projFC.research), background:'var(--soc-am)'}}></span>
                                        <span title={`Lists: ${projFC.list}`}     style={{width:ppct(projFC.list),     background:'var(--soc-cy)',opacity:.6}}></span>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Featured latest lab */}
                        {featuredLab && tweaks.showLatest && (
                            <a className="featured-latest am" href={featuredLab.link} target="_blank" rel="noopener noreferrer" style={{marginTop:'18px',display:'grid'}}>
                                <div className="fl-glyph">
                                    {featuredLab.image
                                        ? <img src={featuredLab.image} alt={featuredLab.title} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'6px'}} />
                                        : '⚗'}
                                </div>
                                <div>
                                    <span className="fl-tag">Latest Release</span>
                                    <div className="fl-title">{featuredLab.title}</div>
                                    <div className="fl-meta">
                                        <span>platform=<b>{featuredLab.platform}</b></span><span>·</span>
                                        <span>difficulty=<b>{featuredLab.difficulty||'N/A'}</b></span>
                                        {featuredLab.is_retired && <><span>·</span><span>status=<b>Retired</b></span></>}
                                    </div>
                                </div>
                                <span className="fl-cta">Play Now ↗</span>
                            </a>
                        )}

                        {/* Toolbar */}
                        <div className="toolbar" style={{marginTop:'18px'}}>
                            <nav className="soc-seg">
                                <button className={`soc-seg-btn${tab==='labs'?' active':''}`} onClick={()=>setTab('labs')}>
                                    ▰ Labs <span className="soc-seg-count">{labsOnly.length}</span>
                                </button>
                                <button className={`soc-seg-btn t-vi${tab==='projects'?' active':''}`} onClick={()=>{ setTab('projects'); setPlatFilter('all'); setLabFilter('all'); }}>
                                    ⚙ Projects <span className="soc-seg-count">{projectsOnly.length}</span>
                                </button>
                            </nav>
                            {tab==='labs' && (
                                <div className="filters">
                                    <span className="fchip-label">Platform</span>
                                    {[
                                        {id:'all',  l:'All',  n:platFC.all},
                                        {id:'CyberDefenders',        l:'CD',   n:platFC.cd,   cls:'t-cy'},
                                        {id:'HackTheBox',            l:'HTB',  n:platFC.htb,  cls:'t-gn'},
                                        {id:'Blue Team Labs Online', l:'BTLO', n:platFC.btlo, cls:'t-cy'},
                                        {id:'ctf',  l:'CTF',  n:platFC.ctf},
                                    ].filter(f=>f.n>0||f.id==='all').map(f=>(
                                        <button key={f.id} className={`fchip${f.cls?' '+f.cls:''}${platFilter===f.id?' active':''}`}
                                            onClick={()=>{ setPlatFilter(f.id); setLabFilter('all'); }}>
                                            {f.l} <span className="cnt">{f.n}</span>
                                        </button>
                                    ))}
                                </div>
                            )}
                            {tab==='projects' && (
                                <div className="filters">
                                    <span className="fchip-label">Filter</span>
                                    {[{id:'all',l:'All',n:projFC.all},{id:'tool',l:'⚒ Tools',n:projFC.tool,cls:'t-vi'},{id:'research',l:'✎ Research',n:projFC.research,cls:'t-am'},{id:'list',l:'◧ Lists',n:projFC.list,cls:'t-rd'}].map(f=>(
                                        <button key={f.id} className={`fchip${f.cls?' '+f.cls:''}${projFilter===f.id?' active':''}`} onClick={()=>setProjFilter(f.id)}>
                                            {f.l} <span className="cnt">{f.n}</span>
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                        {tab==='labs' && (
                            <div className="toolbar" style={{marginTop:'4px'}}>
                                <div className="filters">
                                    <span className="fchip-label">Filter</span>
                                    {[{id:'all',l:'All',n:labFC.all},{id:'top',l:'★ 4.5+',n:labFC.top,cls:'t-am'},{id:'hard',l:'Hard',n:labFC.hard,cls:'t-rd'},{id:'active',l:'Active',n:labFC.active,cls:'t-gn'},{id:'retired',l:'Retired',n:labFC.retired}].map(f=>(
                                        <button key={f.id} className={`fchip${f.cls?' '+f.cls:''}${labFilter===f.id?' active':''}`} onClick={()=>setLabFilter(f.id)}>
                                            {f.l} <span className="cnt">{f.n}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Labs pane */}
                        {tab==='labs' && (
                            labGroups.length===0
                            ? <div style={{padding:'40px',textAlign:'center',color:'var(--soc-ink3)',fontFamily:"'JetBrains Mono',monospace",fontSize:'12px'}}>No labs match filter.</div>
                            : platFilter==='all'
                                ? labGroups.map(g => (
                                    <div key={g.name}>
                                        <div className="year-bar"><span className="yr">{g.name}</span><span className="ln"></span><span className="cn">{g.items.length} {g.items.length===1?'scenario':'scenarios'}</span></div>
                                        <div className="comp-list">
                                            {g.items.map((l,i)=><LabRow key={i} l={l} />)}
                                        </div>
                                    </div>
                                ))
                                : <div className="comp-list" style={{marginTop:'18px'}}>
                                    {sortedLabs.map((l,i)=><LabRow key={i} l={l} />)}
                                  </div>
                        )}

                        {/* Projects pane */}
                        {tab==='projects' && (
                            projGroups.length===0
                            ? <div style={{padding:'40px',textAlign:'center',color:'var(--soc-ink3)',fontFamily:"'JetBrains Mono',monospace",fontSize:'12px'}}>No projects match filter.</div>
                            : projGroups.map(g => (
                                <div key={g.name}>
                                    <div className="year-bar"><span className="yr">{g.name}</span><span className="ln"></span><span className="cn">{g.items.length} {g.items.length===1?'entry':'entries'}</span></div>
                                    <div className="comp-list">
                                        {g.items.map((p,i)=><ProjRow key={i} p={p} />)}
                                    </div>
                                </div>
                            ))
                        )}

                        <button className="tweaks-fab" onClick={()=>setTweaksOpen(v=>!v)} title="Tweaks" aria-label="Open Tweaks">⚙</button>
                        <div className={`tweaks-panel${tweaksOpen?' open':''}`} role="dialog" aria-label="Tweaks">
                            <div className="tweaks-hd">Tweaks <span className="x" onClick={()=>setTweaksOpen(false)} aria-label="Close">✕</span></div>
                            <div className="tweaks-body">
                                <div className="tw-group">
                                    <div className="tw-lbl">Density</div>
                                    <div className="tw-radio">
                                        {['comfortable','compact'].map(v=>(
                                            <button key={v} className={tweaks.density===v?'on':''} onClick={()=>saveTweaks({...tweaks,density:v})}>
                                                {v.charAt(0).toUpperCase()+v.slice(1)}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="tw-group">
                                    <div className="tw-lbl">Lab Sort</div>
                                    <div className="tw-radio">
                                        {[{v:'rating',l:'Rating'},{v:'difficulty',l:'Difficulty'},{v:'default',l:'Default'}].map(({v,l})=>(
                                            <button key={v} className={tweaks.labSort===v?'on':''} onClick={()=>saveTweaks({...tweaks,labSort:v})}>{l}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="tw-group">
                                    <div className="tw-lbl">Desc Lines</div>
                                    <div className="tw-radio">
                                        {[1,2,3,5,99].map(v=>(
                                            <button key={v} className={tweaks.descLines===v?'on':''} onClick={()=>saveTweaks({...tweaks,descLines:v})}>{v===99?'Full':v}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="tw-group">
                                    <div className="tw-lbl">Retired Style</div>
                                    <div className="tw-radio">
                                        {['A','B','C'].map(v=>(
                                            <button key={v} className={tweaks.retiredStyle===v?'on':''} onClick={()=>saveTweaks({...tweaks,retiredStyle:v})}>{v}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="tw-group">
                                    <div className="tw-lbl">Show / Hide</div>
                                    <div className={`tw-toggle${tweaks.yearDiv?' on':''}`} onClick={()=>saveTweaks({...tweaks,yearDiv:!tweaks.yearDiv})}>
                                        <span className="t">Group dividers</span><span className="sw"></span>
                                    </div>
                                    <div className={`tw-toggle${tweaks.covers?' on':''}`} onClick={()=>saveTweaks({...tweaks,covers:!tweaks.covers})}>
                                        <span className="t">Cover images</span><span className="sw"></span>
                                    </div>
                                    <div className={`tw-toggle${tweaks.tags?' on':''}`} onClick={()=>saveTweaks({...tweaks,tags:!tweaks.tags})}>
                                        <span className="t">Tags row</span><span className="sw"></span>
                                    </div>
                                    <div className={`tw-toggle${tweaks.crowDesc?' on':''}`} onClick={()=>saveTweaks({...tweaks,crowDesc:!tweaks.crowDesc})}>
                                        <span className="t">Descriptions</span><span className="sw"></span>
                                    </div>
