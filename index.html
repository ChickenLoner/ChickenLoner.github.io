    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }

        @keyframes pulseRing {
            0%   { transform: scale(1);    opacity: 0.5; }
            100% { transform: scale(1.22); opacity: 0; }
        }
        .animate-pulse-ring { animation: pulseRing 2s ease-out infinite; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-slideDown { animation: slideDown 0.18s ease-out; }

        /* Badge marquee */
        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .badge-marquee-track {
            display: flex;
            width: max-content;
            animation: marquee 160s linear infinite;
        }
        .badge-marquee-track:hover { animation-play-state: paused; }

        /* JetBrains Mono for monospace elements */
        .dark code, .dark kbd, .dark pre,
        .dark .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace !important; }

        /* Subtle dot grid background for hero */
        .hero-dots {
            background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* ============================================================
           SOC CONSOLE THEME — Dark mode
           ============================================================ */
        html, body {
            background: #0d1117;
            color: #eef3ff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
        }

        :root {
            --soc-bg:    #0d1117;
            --soc-bg-1:  #161b22;
            --soc-bg-2:  #1c2433;
            --soc-line:  #253040;
            --soc-line2: #374d6c;
            --soc-ink:   #eef3ff;
            --soc-ink2:  #c4ceea;
            --soc-ink3:  #8a9bbf;
            --soc-ink4:  #5e718a;
            --soc-cy:    #22e1ff;
            --soc-cy2:   #06b8d9;
            --soc-am:    #ffb547;
            --soc-gn:    #3ddc84;
            --soc-rd:    #ff5577;
            --soc-vi:    #a78bfa;
            --soc-am-star:     #ffb547;
            --soc-retired-bg:  #ffb547;
            --soc-retired-txt: #1a1a1a;
        }
        [data-theme="light"] {
            --soc-am-star:     #f59e0b;
            --soc-retired-bg:  #f59e0b;
            --soc-retired-txt: #78350f;
        }

        /* Root page: deep dark + radial cyan/violet glows */
        .dark.min-h-screen {
            background:
                radial-gradient(1200px 600px at 100% -10%, rgba(34,225,255,.08), transparent 70%),
                radial-gradient(900px 500px at -10% 30%, rgba(167,139,250,.06), transparent 70%),
                var(--soc-bg) !important;
            position: relative;
        }

        /* Hex grid overlay */
        .dark.min-h-screen::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.45;
            background-image:
                linear-gradient(60deg,  transparent 49.5%, rgba(34,225,255,.08) 50%, transparent 50.5%),
                linear-gradient(-60deg, transparent 49.5%, rgba(34,225,255,.08) 50%, transparent 50.5%),
                linear-gradient(0deg,   transparent 49.5%, rgba(34,225,255,.05) 50%, transparent 50.5%);
            background-size: 36px 62px;
            -webkit-mask-image: radial-gradient(#000 30%, transparent 80%);
            mask-image: radial-gradient(#000 30%, transparent 80%);
        }

        /* Navigation */
        .dark nav.sticky {
            background-color: rgba(7,11,20,0.92) !important;
            backdrop-filter: blur(12px) saturate(150%) !important;
            -webkit-backdrop-filter: blur(12px) saturate(150%) !important;
            border-bottom-color: var(--soc-line) !important;
        }

        /* White / light surface backgrounds */
        .dark .bg-white     { background-color: var(--soc-bg-1) !important; }
        .dark .bg-gray-50   { background-color: var(--soc-bg)   !important; }
        .dark .bg-gray-100  { background-color: var(--soc-bg-2) !important; }

        /* Tinted section backgrounds */
        .dark .bg-blue-50,
        .dark .bg-indigo-50 { background-color: rgba(34,225,255,0.06)  !important; }
        .dark .bg-blue-100  { background-color: rgba(34,225,255,0.12)  !important; }
        .dark .bg-cyan-50   { background-color: rgba(34,225,255,0.06)  !important; }
        .dark .bg-purple-50 { background-color: rgba(167,139,250,0.06) !important; }
        .dark .bg-green-50  { background-color: rgba(61,220,132,0.06)  !important; }
        .dark .bg-orange-50 { background-color: rgba(255,181,71,0.06)  !important; }
        .dark .bg-red-50    { background-color: rgba(255,85,119,0.06)  !important; }
        .dark .bg-yellow-50 { background-color: rgba(255,181,71,0.06)  !important; }

        /* Badge/pill chip backgrounds */
        .dark .bg-green-100  { background-color: rgba(61,220,132,0.12) !important; }
        .dark .bg-orange-100 { background-color: rgba(255,181,71,0.12) !important; }
        .dark .bg-red-100    { background-color: rgba(255,85,119,0.12) !important; }
        .dark .bg-yellow-100 { background-color: rgba(255,181,71,0.12) !important; }

        /* Text hierarchy */
        .dark .text-gray-800 { color: var(--soc-ink)  !important; }
        .dark .text-gray-700 { color: var(--soc-ink2) !important; }
        .dark .text-gray-600 { color: var(--soc-ink3) !important; }
        .dark .text-gray-500 { color: var(--soc-ink3) !important; }
        .dark .text-gray-400 { color: var(--soc-ink4) !important; }
        .dark .text-gray-300 { color: var(--soc-line2) !important; }

        /* Badge text — vivid SOC accent colors */
        .dark .text-green-700  { color: var(--soc-gn) !important; }
        .dark .text-orange-700 { color: var(--soc-am) !important; }
        .dark .text-red-700    { color: var(--soc-rd) !important; }
        .dark .text-blue-700   { color: var(--soc-cy) !important; }
        .dark .text-purple-500 { color: var(--soc-vi) !important; }
        .dark .text-yellow-700 { color: var(--soc-am) !important; }
        .dark .text-yellow-500 { color: var(--soc-am-star) !important; }

        /* Accent / interactive text — SOC cyan */
        .dark .text-blue-600 { color: var(--soc-cy)  !important; }
        .dark .text-blue-500 { color: var(--soc-cy)  !important; }
        .dark .text-cyan-500 { color: var(--soc-cy)  !important; }
        .dark .text-blue-400 { color: var(--soc-cy2) !important; }

        /* Border colors */
        .dark .border-gray-100   { border-color: var(--soc-line)  !important; }
        .dark .border-gray-200   { border-color: var(--soc-line)  !important; }
        .dark .border-gray-300   { border-color: var(--soc-line2) !important; }
        .dark .border-blue-100   { border-color: rgba(34,225,255,0.2)   !important; }
        .dark .border-blue-200   { border-color: rgba(34,225,255,0.3)   !important; }
        .dark .border-purple-100 { border-color: rgba(167,139,250,0.3)  !important; }
        .dark .border-yellow-200 { border-color: rgba(255,181,71,0.3)   !important; }

        /* Hover backgrounds */
        .dark .hover\:bg-gray-100:hover { background-color: var(--soc-bg-2) !important; }
        .dark .hover\:bg-gray-50:hover  { background-color: var(--soc-bg-1) !important; }
        .dark .hover\:border-blue-200:hover   { border-color: rgba(34,225,255,0.45)  !important; }
        .dark .hover\:border-blue-400:hover   { border-color: rgba(34,225,255,0.65)  !important; }
        .dark .hover\:border-red-200:hover    { border-color: rgba(255,85,119,0.45)  !important; }
        .dark .hover\:border-indigo-200:hover { border-color: rgba(34,225,255,0.4)   !important; }

        /* Light gradient stops → SOC dark */
        .dark .from-blue-50   { --tw-gradient-from: var(--soc-bg-1) !important; }
        .dark .to-blue-50     { --tw-gradient-to:   var(--soc-bg-1) !important; }
        .dark .from-cyan-50   { --tw-gradient-from: var(--soc-bg-1) !important; }
        .dark .to-cyan-50     { --tw-gradient-to:   var(--soc-bg-1) !important; }
        .dark .from-indigo-50 { --tw-gradient-from: var(--soc-bg-2) !important; }
        .dark .to-indigo-50   { --tw-gradient-to:   var(--soc-bg-2) !important; }
        .dark .from-purple-50 { --tw-gradient-from: var(--soc-bg-2) !important; }
        .dark .to-purple-50   { --tw-gradient-to:   var(--soc-bg-2) !important; }
        .dark .from-slate-50  { --tw-gradient-from: var(--soc-bg)   !important; }
        .dark .via-blue-50    { --tw-gradient-via:  var(--soc-bg-1) !important; }

        /* Form / input elements */
        .dark input, .dark textarea, .dark select {
            background-color: var(--soc-bg-1) !important;
            border-color: var(--soc-line2) !important;
            color: var(--soc-ink) !important;
        }
        .dark input::placeholder, .dark textarea::placeholder { color: var(--soc-ink3) !important; }
        .dark input:focus, .dark textarea:focus {
            border-color: var(--soc-cy) !important;
            --tw-ring-color: rgba(34,225,255,0.25) !important;
        }
        .dark .focus\:border-blue-500:focus { border-color: var(--soc-cy) !important; }

        /* ── Light mode: rgba tint overrides (CSS vars auto-handle everything else) ── */
        [data-theme="light"] .dark .bg-blue-50,
        [data-theme="light"] .dark .bg-indigo-50,
        [data-theme="light"] .dark .bg-cyan-50   { background-color: var(--soc-cy-tint-lo) !important; }
        [data-theme="light"] .dark .bg-blue-100  { background-color: var(--soc-cy-tint-md) !important; }
        [data-theme="light"] .dark .bg-purple-50 { background-color: var(--soc-vi-tint-lo) !important; }
        [data-theme="light"] .dark .bg-green-50  { background-color: var(--soc-gn-tint-lo) !important; }
        [data-theme="light"] .dark .bg-orange-50,
        [data-theme="light"] .dark .bg-yellow-50 { background-color: var(--soc-am-tint-lo) !important; }
        [data-theme="light"] .dark .bg-red-50    { background-color: var(--soc-rd-tint-lo) !important; }
        [data-theme="light"] .dark .bg-green-100  { background-color: var(--soc-gn-tint-md) !important; }
        [data-theme="light"] .dark .bg-orange-100,
        [data-theme="light"] .dark .bg-yellow-100 { background-color: var(--soc-am-tint-md) !important; }
        [data-theme="light"] .dark .bg-red-100    { background-color: var(--soc-rd-tint-md) !important; }
        [data-theme="light"] .dark .border-blue-100,
        [data-theme="light"] .dark .border-blue-200   { border-color: var(--soc-cy-tint-bdr) !important; }
        [data-theme="light"] .dark .border-purple-100 { border-color: var(--soc-vi-tint-bdr) !important; }
        [data-theme="light"] .dark .border-yellow-200 { border-color: var(--soc-am-tint-bdr) !important; }
        [data-theme="light"] .dark .hover\:border-blue-200:hover,
        [data-theme="light"] .dark .hover\:border-blue-400:hover,
        [data-theme="light"] .dark .hover\:border-indigo-200:hover { border-color: var(--soc-cy-tint-bdr) !important; }
        [data-theme="light"] .dark .hover\:border-red-200:hover    { border-color: var(--soc-rd-tint-bdr) !important; }
        [data-theme="light"] .dark input:focus,
        [data-theme="light"] .dark textarea:focus { --tw-ring-color: rgba(8,145,178,.25) !important; }

        /* Scrollbar — global so the main window scrollbar is also styled */
        ::-webkit-scrollbar              { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track        { background: var(--soc-bg); }
        ::-webkit-scrollbar-thumb        { background: var(--soc-line2); border-radius: 3px; transition: background .15s; }
        ::-webkit-scrollbar-thumb:hover  { background: var(--soc-cy2); }
        ::-webkit-scrollbar-corner       { background: var(--soc-bg); }
        * { scrollbar-color: var(--soc-line2) var(--soc-bg); scrollbar-width: thin; }

        /* ============================================================
           LIQUID GLASS TAB SWITCHER — Certifications page
           ============================================================ */
        .soc-seg { display:inline-flex;gap:1px;background:var(--soc-bg);border:1px solid var(--soc-line);border-radius:4px;padding:3px; }
        .soc-seg-btn { padding:7px 16px;font-size:12.5px;font-weight:500;color:var(--soc-ink3);border-radius:3px;cursor:pointer;background:transparent;border:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit;transition:.15s;outline:none; }
        .soc-seg-btn:hover { color:var(--soc-ink2); }
        .soc-seg-btn.active { background:var(--soc-bg-2);color:var(--soc-cy);box-shadow:inset 0 0 0 1px var(--soc-line2); }
        .soc-seg-count { font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(34,225,255,0.10);color:var(--soc-ink3);font-family:'JetBrains Mono',monospace;transition:.15s; }
        .soc-seg-btn.active .soc-seg-count { background:rgba(34,225,255,0.15);color:var(--soc-cy); }
        html[data-theme="light"] .soc-seg { background:#f5f8fd !important;border-color:#d8e0ee !important; }
        html[data-theme="light"] .soc-seg-btn { color:#4e6080 !important; }
        html[data-theme="light"] .soc-seg-btn:hover { color:#2c3d58 !important; }
        html[data-theme="light"] .soc-seg-btn.active { background:#ffffff !important;color:#0891b2 !important;box-shadow:inset 0 0 0 1px rgba(8,145,178,.40),0 1px 3px rgba(12,23,41,.08) !important; }
        html[data-theme="light"] .soc-seg-count { background:rgba(8,145,178,.10) !important;color:#4e6080 !important; }
        html[data-theme="light"] .soc-seg-btn.active .soc-seg-count { background:rgba(8,145,178,.18) !important;color:#0891b2 !important; }

        /* ============================================================
           SOC CONSOLE COMPONENTS
           ============================================================ */
        .soc-tb { position:sticky;top:0;z-index:50;background:rgba(7,11,20,0.94);backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);border-bottom:1px solid var(--soc-line); }
        .soc-tb-row { display:flex;align-items:center;gap:14px;padding:9px 22px;font-size:12px;flex-wrap:wrap; }
        .soc-live { display:inline-flex;align-items:center;gap:6px;color:var(--soc-gn);font-weight:600;letter-spacing:.06em;font-family:'JetBrains Mono',ui-monospace,monospace; }
        .soc-live::before { content:"";width:7px;height:7px;border-radius:50%;background:var(--soc-gn);box-shadow:0 0 8px var(--soc-gn);animation:socbp 1.6s ease infinite; }
        @keyframes socbp { 50% { opacity:.3; } }
        .soc-crumb { color:var(--soc-ink3);display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px; }
        .soc-crumb b { color:var(--soc-ink);font-weight:600; }
        .soc-clock { font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:var(--soc-ink3); }
        .sev { display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.1em;font-weight:700;text-transform:uppercase;white-space:nowrap; }
        .sev .dot { width:6px;height:6px;border-radius:50%;background:currentcolor;flex-shrink:0; }
        .sev.green  { background:rgba(61,220,132,.12); color:var(--soc-gn); border:1px solid rgba(61,220,132,.3); }
        .sev.amber  { background:rgba(255,181,71,.12);  color:var(--soc-am); border:1px solid rgba(255,181,71,.3); }
        .sev.cyan   { background:rgba(34,225,255,.1);   color:var(--soc-cy); border:1px solid rgba(34,225,255,.25); }
        .sev.red    { background:rgba(255,85,119,.12);  color:var(--soc-rd); border:1px solid rgba(255,85,119,.3); }
        .sev.violet { background:rgba(167,139,250,.1);  color:var(--soc-vi); border:1px solid rgba(167,139,250,.25); }
        .soc-nav { background:rgba(12,19,34,.88);border-bottom:1px solid var(--soc-line);padding:0 16px;display:flex;align-items:flex-end;position:sticky;top:41px;z-index:49;overflow:visible; }
        .soc-nav-inner { display:flex;gap:2px;align-items:flex-end;flex:1;flex-wrap:wrap; }
        .soc-nav-inner::-webkit-scrollbar { height:0; }
        .soc-nav-sep { width:1px;background:var(--soc-line2);margin:8px 8px;align-self:stretch;flex-shrink:0; }
        .soc-tab { padding:10px 14px 11px;color:var(--soc-ink3);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:7px;white-space:nowrap;border-bottom:2px solid transparent;cursor:pointer;transition:.15s;background:transparent;border-left:none;border-right:none;border-top:none;outline:none; }
        .soc-tab .ix { font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:var(--soc-ink4);letter-spacing:.05em; }
        .soc-tab:hover { color:var(--soc-ink2); }
        .soc-tab.active { color:var(--soc-cy);border-bottom-color:var(--soc-cy);background:linear-gradient(transparent,rgba(34,225,255,.06)); }
        .soc-tab.active .ix { color:var(--soc-cy2); }
        .soc-tab .ext { font-size:10px;color:var(--soc-ink4);margin-left:2px; }
        .soc-divider { border-top:1px solid var(--soc-line);margin:4px 0; }
        .soc-mobile-menu { background:rgba(7,11,20,.98);border-top:1px solid var(--soc-line);padding:10px 14px; }
        .soc-mobile-item { display:flex;align-items:center;gap:10px;padding:9px 12px;color:var(--soc-ink2);font-size:13px;font-weight:500;border-radius:4px;cursor:pointer;transition:.15s;background:transparent;border:none;width:100%;text-align:left;text-decoration:none; }
        .soc-mobile-item:hover,.soc-mobile-item.active { color:var(--soc-cy);background:rgba(34,225,255,.06); }
        .soc-mobile-section { font-family:'JetBrains Mono',ui-monospace,monospace;font-size:9.5px;color:var(--soc-ink4);letter-spacing:.14em;text-transform:uppercase;padding:8px 12px 2px; }
        .soc-hero { border:1px solid var(--soc-line2);border-radius:6px;background:linear-gradient(180deg,rgba(34,225,255,.04),transparent 40%),linear-gradient(180deg,var(--soc-bg-1),var(--soc-bg));overflow:hidden; }
        .soc-hero-strap { display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:8px 18px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:var(--soc-ink3);border-bottom:1px solid var(--soc-line);background:rgba(0,0,0,.25); }
        .soc-hero-strap .seg { display:flex;align-items:center;gap:6px; }
        .soc-hero-strap .seg b { color:var(--soc-ink2);font-weight:500; }
        .soc-hero-strap .seg .v { color:var(--soc-cy);font-weight:600; }
        .soc-hero-body { display:grid;grid-template-columns:auto 1fr auto;gap:22px;align-items:center;padding:22px 26px; }
        .soc-av { position:relative;width:86px;height:86px;border-radius:8px;overflow:hidden;background:#000;border:1px solid var(--soc-line2);box-shadow:rgba(34,225,255,.1) 0 0 0 4px,rgba(0,0,0,.4) 0 6px 24px;flex-shrink:0; }
        .soc-av img { width:100%;height:100%;object-fit:cover; }
        .soc-av .corner { position:absolute;width:12px;height:12px;border:1.5px solid var(--soc-cy);opacity:.8; }
        .soc-av .c-tl { top:5px;left:5px;border-right:none;border-bottom:none; }
        .soc-av .c-tr { top:5px;right:5px;border-left:none;border-bottom:none; }
        .soc-av .c-bl { bottom:5px;left:5px;border-right:none;border-top:none; }
        .soc-av .c-br { bottom:5px;right:5px;border-left:none;border-top:none; }
        .soc-name { font-size:27px;font-weight:800;letter-spacing:-.01em;line-height:1.1;color:var(--soc-ink); }
        .soc-name .accent { color:var(--soc-cy); }
        .soc-role { margin-top:4px;color:var(--soc-ink2);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px; }
        .soc-role .sep { color:var(--soc-ink4); }
        .soc-opmeta { display:grid;grid-template-columns:auto auto;gap:4px 14px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:var(--soc-ink3);text-align:right; }
        .soc-opmeta b { color:var(--soc-ink);font-weight:600; }

        h2.soc-section { font-size:11.5px;font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--soc-ink2);margin:30px 0 12px;display:flex;align-items:center;gap:12px; }

        .soc-alerts { display:flex;flex-direction:column;border:1px solid rgba(34,225,255,.22);border-radius:6px;overflow:hidden;background:var(--soc-bg-1);box-shadow:0 0 0 1px rgba(34,225,255,.07),0 0 28px rgba(34,225,255,.08); }

        .soc-alert:hover { background:rgba(34,225,255,.07); }
        .soc-alert .ts { font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:var(--soc-ink3); }
        .soc-alert .ttl { font-weight:600;color:var(--soc-ink);font-size:13px; }

        .soc-alert .ar { font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--soc-cy);padding:4px 10px;border:1px solid rgba(34,225,255,.35);border-radius:4px;background:rgba(34,225,255,.05);white-space:nowrap;flex-shrink:0;transition:background .15s,border-color .15s; }
        .soc-alert:hover .ar { background:rgba(34,225,255,.12);border-color:rgba(34,225,255,.55); }
        .soc-rail { border:1px solid rgba(34,225,255,.22);border-radius:6px;padding:14px;background:var(--soc-bg-1);overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(34,225,255,.07),0 0 24px rgba(34,225,255,.07); }
        .soc-rail::before,.soc-rail::after { content:"";position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none; }

        .soc-credit { display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;padding:10px 14px;border:1px solid var(--soc-line2);border-radius:5px;background:var(--soc-bg-2);min-width:200px;text-decoration:none;transition:border-color .15s; }

        .soc-credit .glyph img { width:42px;height:42px;object-fit:cover;border-radius:3px; }

        .soc-ttp-hd h3 { margin:0;font-size:13px;font-weight:700;color:var(--soc-ink); }
        .soc-chips { display:flex;flex-wrap:wrap;gap:6px; }
        .soc-chip { padding:4px 9px;border:1px solid var(--soc-line2);border-radius:4px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;color:var(--soc-ink2);background:var(--soc-bg-2); }
        .soc-chip.cy { color:var(--soc-cy);border-color:rgba(34,225,255,.3);background:rgba(34,225,255,.06); }
        .soc-chip.am { color:var(--soc-am);border-color:rgba(255,181,71,.3);background:rgba(255,181,71,.06); }
        .soc-chip.vi { color:var(--soc-vi);border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.06); }
        .soc-chip.gn { color:var(--soc-gn);border-color:rgba(61,220,132,.3);background:rgba(61,220,132,.06); }
        .soc-chip.rd { color:var(--soc-rd);border-color:rgba(255,85,119,.3);background:rgba(255,85,119,.06); }
        .soc-opnote { border-left:3px solid var(--soc-cy);border-radius:6px;background:linear-gradient(90deg,rgba(34,225,255,.05),transparent 40%),var(--soc-bg-1);padding:20px 22px; }
        .soc-opnote .lbl { font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:var(--soc-cy);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px; }
        .soc-opnote .clear { background:rgba(61,220,132,.12);color:var(--soc-gn);border:1px solid rgba(61,220,132,.3);padding:2px 8px;border-radius:3px;font-size:10px;letter-spacing:.1em; }
        .soc-opnote h3 { margin:0 0 8px;font-size:16px;color:var(--soc-ink);font-weight:700; }
        .soc-opnote p { margin:0;color:var(--soc-ink2);line-height:1.65;font-size:13.5px; }
        .soc-platforms { display:flex;flex-wrap:wrap;gap:10px;margin-top:14px; }
        .soc-plat { display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border:1px solid var(--soc-line2);border-radius:99px;background:var(--soc-bg-2);font-size:12px;color:var(--soc-ink);font-weight:500;transition:.15s;text-decoration:none; }
        .soc-plat:hover { border-color:var(--soc-cy);color:var(--soc-cy); }
        .soc-plat .pd { width:7px;height:7px;border-radius:50%;background:var(--soc-gn);flex-shrink:0; }
        .soc-plat.b .pd { background:var(--soc-cy); }
        .soc-plat.v .pd { background:var(--soc-vi); }
        .soc-ch-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
        .soc-ch { display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:12px 14px;border:1px solid var(--soc-line);border-radius:6px;background:var(--soc-bg-1);transition:.15s;text-decoration:none; }
        .soc-ch:hover { border-color:var(--soc-cy);background:var(--soc-bg-2); }
        .soc-ch .ic { width:36px;height:36px;border-radius:5px;display:grid;place-items:center;background:rgba(34,225,255,.08);border:1px solid rgba(34,225,255,.2);color:var(--soc-cy);font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:700;font-size:12px;flex-shrink:0; }
        .soc-ch .h { font-size:13px;font-weight:600;color:var(--soc-ink); }
        .soc-ch .s { font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:var(--soc-ink3);margin-top:2px; }
        .soc-ch .ar { color:var(--soc-ink4); }
        .soc-ch:hover .ar { color:var(--soc-cy); }
        .soc-cta { border:1px solid var(--soc-cy2);border-radius:6px;padding:20px 22px;background:radial-gradient(at 100% 0%,rgba(34,225,255,.15),transparent 60%),linear-gradient(135deg,rgba(14,34,51,.8),rgba(10,22,38,.8));display:flex;align-items:center;gap:22px;flex-wrap:wrap; }
        .soc-cta h3 { margin:0;font-size:17px;font-weight:700;color:var(--soc-ink); }
        .soc-cta p  { margin:3px 0 0;color:var(--soc-ink2);font-size:13px; }
        .soc-btn { padding:8px 16px;border-radius:5px;font-weight:600;font-size:13px;border:1px solid var(--soc-cy);color:#001520;background:var(--soc-cy);transition:.15s;cursor:pointer;text-decoration:none;display:inline-block; }
        .soc-btn:hover { background:#1ed8f5; }
        .soc-btn.ghost { background:transparent;color:var(--soc-cy); }
        .soc-btn.ghost:hover { background:rgba(34,225,255,.1); }
        .soc-feeds { display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--soc-line);border-radius:6px;overflow:hidden;background:var(--soc-bg-1);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px; }
        .soc-feed { padding:10px 14px;border-right:1px solid var(--soc-line);display:flex;align-items:center;gap:8px; }

        .soc-feed .ms { color:var(--soc-ink3); }
        .soc-feed .st { padding:2px 6px;border-radius:3px;font-size:9px;letter-spacing:.05em;font-weight:600; }
        .soc-feed .ok { background:rgba(61,220,132,.14);color:var(--soc-gn); }
        .soc-feed .wn { background:rgba(255,181,71,.14);color:var(--soc-am); }
        .soc-ft { margin-top:24px;text-align:center;color:var(--soc-ink3);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;letter-spacing:.06em; }
        .soc-page-hero { border:1px solid var(--soc-line2);border-radius:6px;background:linear-gradient(180deg,rgba(34,225,255,.04),transparent 40%),linear-gradient(180deg,var(--soc-bg-1),var(--soc-bg));overflow:hidden; }
        .soc-page-hero-strap { display:flex;align-items:center;gap:12px;padding:7px 18px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:var(--soc-ink3);border-bottom:1px solid var(--soc-line);background:rgba(0,0,0,.25); }
        .soc-page-hero-strap .seg { display:flex;align-items:center;gap:6px; }

        .soc-page-hero-strap .seg .v { color:var(--soc-cy);font-weight:600; }
        .soc-page-hero-body { display:flex;align-items:center;gap:16px;padding:18px 22px; }
        .soc-page-hero-icon { width:44px;height:44px;border-radius:8px;display:grid;place-items:center;background:rgba(34,225,255,.1);border:1px solid rgba(34,225,255,.3);flex-shrink:0; }
        .soc-page-hero-title { font-size:22px;font-weight:800;color:var(--soc-ink);margin:0;letter-spacing:-.01em; }

            .soc-page-hero-strap .seg:last-child { display:none; }
            .soc-hero-strap .seg:last-child { display:none; }
            .soc-stat-grid { grid-template-columns:1fr 1fr !important; }
            .soc-ttp-grid { grid-template-columns:1fr; }
            .soc-ch-grid { grid-template-columns:1fr; }
            .soc-feeds { grid-template-columns:1fr 1fr; }

        /* ===== CERTIFICATIONS REDESIGN ===== */
        :root{--cat-off:#ff5577;--cat-off-rgb:255,85,119;--cat-blu:#22e1ff;--cat-blu-rgb:34,225,255;--cat-fir:#ffb547;--cat-fir-rgb:255,181,71;--cat-fnd:#a78bfa;--cat-fnd-rgb:167,139,250}
        html[data-theme="light"]{--cat-off:#be1d3a;--cat-off-rgb:190,29,58;--cat-blu:#0891b2;--cat-blu-rgb:8,145,178;--cat-fir:#b45309;--cat-fir-rgb:180,83,9;--cat-fnd:#6d28d9;--cat-fnd-rgb:109,40,217}
        .soc-stat-val .unit{font-size:13px;color:var(--soc-ink3);font-weight:500;margin-left:3px}
        h2.soc-section.am::before{background:var(--cat-fir);box-shadow:0 0 8px var(--cat-fir)}
        h2.soc-section.rd::before{background:var(--cat-off);box-shadow:0 0 8px var(--cat-off)}
        h2.soc-section.vi::before{background:var(--cat-fnd);box-shadow:0 0 8px var(--cat-fnd)}

        .dist span{height:100%}
        .dist .off{background:var(--cat-off)}.dist .blu{background:var(--cat-blu)}.dist .fir{background:var(--cat-fir)}.dist .fnd{background:var(--cat-fnd)}
        .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .soc-seg-btn.t-rd.active{color:var(--cat-off)!important}
        .soc-seg-btn.t-rd.active .soc-seg-count{background:rgba(var(--cat-off-rgb),.15)!important;color:var(--cat-off)!important}
        .soc-seg-btn.t-cy.active{color:var(--cat-blu)!important}
        .soc-seg-btn.t-cy.active .soc-seg-count{background:rgba(var(--cat-blu-rgb),.15)!important;color:var(--cat-blu)!important}
        .soc-seg-btn.t-am.active{color:var(--cat-fir)!important}
        .soc-seg-btn.t-am.active .soc-seg-count{background:rgba(var(--cat-fir-rgb),.15)!important;color:var(--cat-fir)!important}
        .soc-seg-btn.t-vi.active{color:var(--cat-fnd)!important}
        .soc-seg-btn.t-vi.active .soc-seg-count{background:rgba(var(--cat-fnd-rgb),.15)!important;color:var(--cat-fnd)!important}

        .fl-title{font-size:18px;font-weight:700;color:var(--soc-ink);margin:6px 0 4px;letter-spacing:-.01em}
        .fl-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soc-ink2);letter-spacing:.04em;display:flex;flex-wrap:wrap;gap:10px}
        .fl-meta b{color:var(--soc-cy);font-weight:600}

        .featured-latest.am::before{background:linear-gradient(90deg,transparent,var(--soc-am),transparent)}
        .featured-latest.am:hover{border-color:rgba(255,181,71,.55)}
        .featured-latest.am .fl-glyph{background:linear-gradient(135deg,rgba(255,181,71,.18),rgba(255,181,71,.04));border-color:rgba(255,181,71,.45);color:var(--soc-am)}
        .featured-latest.am .fl-tag{background:rgba(255,181,71,.10);color:var(--soc-am);border-color:rgba(255,181,71,.35)}
        .featured-latest.am .fl-tag::before{background:var(--soc-am);box-shadow:0 0 6px var(--soc-am)}
        .featured-latest.am .fl-meta b{color:var(--soc-am)}
        .featured-latest.am .fl-cta{color:var(--soc-am);border-color:rgba(255,181,71,.4);background:rgba(255,181,71,.05)}
        .featured-latest.am:hover .fl-cta{background:rgba(255,181,71,.12)}
        .featured-latest.gd{border-color:rgba(255,211,80,.45);background:radial-gradient(ellipse at 100% 0%,rgba(255,211,80,.10),transparent 60%),linear-gradient(180deg,var(--soc-bg-1),var(--soc-bg))}
        .featured-latest.gd::before{background:linear-gradient(90deg,transparent,#ffd350,transparent)}
        .featured-latest.gd:hover{border-color:rgba(255,211,80,.65)}
        .featured-latest.gd .fl-glyph{background:linear-gradient(135deg,rgba(255,211,80,.18),rgba(255,211,80,.04));border-color:rgba(255,211,80,.5);color:#ffd350}
        .featured-latest.gd .fl-tag{background:rgba(255,211,80,.10);color:#ffd350;border-color:rgba(255,211,80,.4)}
        .featured-latest.gd .fl-tag::before{background:#ffd350;box-shadow:0 0 6px #ffd350}
        .featured-latest.gd .fl-meta b{color:#ffd350}
        .featured-latest.gd .fl-cta{color:#ffd350;border-color:rgba(255,211,80,.45);background:rgba(255,211,80,.06)}
        .featured-latest.gd:hover .fl-cta{background:rgba(255,211,80,.14)}
        .featured-latest.rd{border-color:rgba(255,80,80,.35);background:radial-gradient(ellipse at 100% 0%,rgba(255,80,80,.08),transparent 60%),linear-gradient(180deg,var(--soc-bg-1),var(--soc-bg))}
        .featured-latest.rd::before{background:linear-gradient(90deg,transparent,var(--soc-rd),transparent)}
        .featured-latest.rd:hover{border-color:rgba(255,80,80,.55)}
        .featured-latest.rd .fl-glyph{background:linear-gradient(135deg,rgba(255,80,80,.18),rgba(255,80,80,.04));border-color:rgba(255,80,80,.45);color:var(--soc-rd)}
        .featured-latest.rd .fl-tag{background:rgba(255,80,80,.10);color:var(--soc-rd);border-color:rgba(255,80,80,.35)}
        .featured-latest.rd .fl-tag::before{background:var(--soc-rd);box-shadow:0 0 6px var(--soc-rd)}
        .featured-latest.rd .fl-meta b{color:var(--soc-rd)}
        .featured-latest.rd .fl-cta{color:var(--soc-rd);border-color:rgba(255,80,80,.4);background:rgba(255,80,80,.05)}
        .featured-latest.rd:hover .fl-cta{background:rgba(255,80,80,.12)}
        .fl-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        @media(max-width:600px){.fl-pair{grid-template-columns:1fr}}
        .cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
        .cert-grid.cert-grid-dense{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
        .cert-grid.cert-grid-airy{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
        .cert-card{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;padding:14px;background:var(--soc-bg-1);border:1px solid var(--soc-line);border-radius:6px;text-decoration:none;color:inherit;transition:.15s;position:relative;overflow:hidden;--cat:var(--soc-cy);--cat-rgb:34,225,255}
        .cert-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cat);opacity:.7}
        .cert-card.off{--cat:var(--cat-off);--cat-rgb:var(--cat-off-rgb)}
        .cert-card.blu{--cat:var(--cat-blu);--cat-rgb:var(--cat-blu-rgb)}
        .cert-card.fir{--cat:var(--cat-fir);--cat-rgb:var(--cat-fir-rgb)}
        .cert-card.fnd{--cat:var(--cat-fnd);--cat-rgb:var(--cat-fnd-rgb)}
        .cert-card:hover{border-color:rgba(var(--cat-rgb),.45);transform:translateY(-2px);background:var(--soc-bg-2);text-decoration:none}
        .cert-glyph{width:54px;height:54px;border-radius:6px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(var(--cat-rgb),.18),rgba(var(--cat-rgb),.04));border:1px solid rgba(var(--cat-rgb),.4);color:var(--cat);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;letter-spacing:.01em;text-align:center;line-height:1.05;padding:4px;flex-shrink:0}
        .cert-card.expired .cert-glyph{filter:saturate(.2) opacity(.65)}
        .cert-card.expired .cert-name{color:var(--soc-ink2)}
        .cert-body{min-width:0}
        .cert-name{font-size:13px;font-weight:600;color:var(--soc-ink);line-height:1.3;letter-spacing:-.005em;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
        .cert-meta{margin-top:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--soc-ink3);letter-spacing:.04em;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
        .cert-meta .iss{color:var(--cat);font-weight:600}
        .cert-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--soc-ink4);flex-shrink:0}
        .cert-meta .status{display:inline-flex;align-items:center;gap:4px;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
        .cert-meta .status.active{background:rgba(61,220,132,.10);color:var(--soc-gn);border:1px solid rgba(61,220,132,.3)}
        .cert-meta .status.expired{background:rgba(255,85,119,.10);color:var(--soc-rd);border:1px solid rgba(255,85,119,.3)}
        .cert-card .v-arrow{position:absolute;right:10px;bottom:8px;color:var(--soc-ink4);font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;opacity:0;transition:.15s}
        .cert-card:hover .v-arrow{opacity:1;color:var(--cat)}
        .issuer-roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:18px}
        .issuer-card{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px 12px;background:var(--soc-bg-1);border:1px solid var(--soc-line);border-radius:5px;font-family:'JetBrains Mono',monospace}
        .issuer-card .ig{width:32px;height:32px;border-radius:5px;display:grid;place-items:center;background:var(--soc-bg-2);border:1px solid var(--soc-line2);color:var(--soc-ink2);font-size:10px;font-weight:700;letter-spacing:.02em;overflow:hidden;padding:3px}
        .issuer-card .in{font-size:11.5px;color:var(--soc-ink);font-weight:600;font-family:system-ui,sans-serif;letter-spacing:-.005em}
        .issuer-card .is{font-size:9.5px;color:var(--soc-ink3);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
        .issuer-card .ic{padding:3px 10px;border-radius:99px;background:rgba(34,225,255,.10);color:var(--soc-cy);border:1px solid rgba(34,225,255,.3);font-size:11px;font-weight:700;letter-spacing:.04em;text-align:center}
        .tweaks-fab{position:fixed;bottom:20px;right:20px;z-index:90;width:42px;height:42px;border-radius:50%;background:var(--soc-bg-1);border:1px solid var(--soc-line2);color:var(--soc-cy);display:grid;place-items:center;font-size:18px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.4),inset 0 0 0 1px rgba(34,225,255,.15);transition:.15s;font-family:'JetBrains Mono',monospace}
        .tweaks-fab:hover{transform:rotate(45deg);border-color:var(--soc-cy);box-shadow:0 4px 22px rgba(34,225,255,.3)}
        .tweaks-panel{position:fixed;bottom:72px;right:20px;z-index:91;width:280px;background:var(--soc-bg-1);border:1px solid var(--soc-line2);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,.6);overflow:hidden;font-family:system-ui,sans-serif;display:none}
        .tweaks-panel.open{display:block;animation:tweakIn .2s ease}
        @keyframes tweakIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .tweaks-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--soc-line);background:rgba(0,0,0,.25);font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--soc-cy);letter-spacing:.18em;font-weight:700;text-transform:uppercase}
        .tweaks-hd::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--soc-cy);box-shadow:0 0 6px var(--soc-cy)}
        .tweaks-hd .x{margin-left:auto;cursor:pointer;color:var(--soc-ink3);font-size:14px;padding:0 4px;line-height:1}
        .tweaks-hd .x:hover{color:var(--soc-rd)}
        .tweaks-body{padding:14px;display:flex;flex-direction:column;gap:14px;max-height:60vh;overflow:auto}
        .tw-group{display:flex;flex-direction:column;gap:6px}
        .tw-lbl{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--soc-ink3);letter-spacing:.14em;text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:5px}
        .tw-lbl::before{content:"▸";color:var(--soc-cy2)}
        .tw-radio{display:flex;gap:1px;background:var(--soc-bg);border:1px solid var(--soc-line);border-radius:4px;padding:3px}
        .tw-radio button{flex:1;padding:6px 8px;font-size:11px;font-weight:600;font-family:inherit;background:transparent;color:var(--soc-ink3);border:0;border-radius:3px;cursor:pointer;transition:.12s}
        .tw-radio button:hover{color:var(--soc-ink2)}
        .tw-radio button.on{background:var(--soc-bg-2);color:var(--soc-cy);box-shadow:inset 0 0 0 1px var(--soc-line2)}
        .tw-toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;background:var(--soc-bg);border:1px solid var(--soc-line);border-radius:4px;cursor:pointer}
        .tw-toggle .t{font-size:12px;color:var(--soc-ink2);font-weight:500}
        .tw-toggle .sw{width:30px;height:16px;border-radius:99px;background:var(--soc-line2);position:relative;transition:.18s;flex-shrink:0}
        .tw-toggle .sw::after{content:"";position:absolute;top:1px;left:1px;width:12px;height:12px;border-radius:50%;background:var(--soc-ink2);transition:.18s}
        .tw-toggle.on .sw{background:var(--soc-cy)}
        .tw-toggle.on .sw::after{transform:translateX(14px);background:#001520}
        .tw-foot{padding:10px 14px;border-top:1px solid var(--soc-line);background:rgba(0,0,0,.18);font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--soc-ink3);letter-spacing:.04em}
        .tw-foot b{color:var(--soc-cy);cursor:pointer}
        .tw-foot b:hover{text-decoration:underline}
        .cert-compact .cert-card{padding:10px 12px}
        .cert-compact .cert-glyph{width:46px;height:46px;font-size:11px}
        .cert-compact .featured-latest{padding:14px 18px}
        html[data-theme="light"] .featured-latest{background:linear-gradient(135deg,rgba(8,145,178,.08),transparent 70%),var(--soc-bg-1)}
        html[data-theme="light"] .cert-card{background:var(--soc-bg-1)}
        html[data-theme="light"] .cert-card:hover{background:var(--soc-bg-2)}
        html[data-theme="light"] .issuer-card{background:var(--soc-bg-1)}
        html[data-theme="light"] .cert-meta .status.active{background:rgba(21,128,61,.08);border-color:rgba(21,128,61,.30)}
        html[data-theme="light"] .cert-meta .status.expired{background:rgba(190,29,58,.08);border-color:rgba(190,29,58,.30)}
        html[data-theme="light"] .tweaks-fab{background:var(--soc-bg-1)}
        html[data-theme="light"] .tweaks-panel{background:var(--soc-bg-1)}
        html[data-theme="light"] .tweaks-hd{background:var(--soc-bg-2)}
        html[data-theme="light"] .tw-radio,html[data-theme="light"] .tw-toggle{background:var(--soc-bg-2)}
        html[data-theme="light"] .tw-radio button.on{background:var(--soc-bg-1)}
        html[data-theme="light"] .tw-foot{background:var(--soc-bg-2)}
        html[data-theme="light"] .fchip{background:var(--soc-bg-1)}
        html[data-theme="light"] .fchip.active{background:rgba(8,145,178,.06);border-color:rgba(8,145,178,.40)}
        html[data-theme="light"] .dist{background:var(--soc-bg-2)}
        html[data-theme="light"] .soc-alerts{border-color:rgba(8,145,178,.22);box-shadow:0 0 0 1px rgba(8,145,178,.06),0 0 24px rgba(8,145,178,.07)}
        html[data-theme="light"] .soc-alert:hover{background:rgba(8,145,178,.05)}
        html[data-theme="light"] .soc-rail{border-color:rgba(8,145,178,.22);box-shadow:0 0 0 1px rgba(8,145,178,.06),0 0 20px rgba(8,145,178,.06)}

            .featured-latest{grid-template-columns:auto 1fr;padding:14px 16px}
            .featured-latest .fl-cta{grid-column:1 / -1;text-align:center}
        }

        /* ===== LABS PAGE ===== */
        /* Soft fills for light mode */
        html[data-theme="light"]{--cy-soft:#cffafe;--am-soft:#fef3c7;--rd-soft:#fee2e6;--gn-soft:#dcfce7;--vi-soft:#ede9fe}

        /* Fchip coloured variants */
        .fchip.t-am.active{color:var(--soc-am);border-color:rgba(255,181,71,.4);background:rgba(255,181,71,.06)}
        .fchip.t-am.active .cnt{background:rgba(255,181,71,.15);color:var(--soc-am)}
        .fchip.t-rd.active{color:var(--soc-rd);border-color:rgba(255,85,119,.4);background:rgba(255,85,119,.06)}
        .fchip.t-rd.active .cnt{background:rgba(255,85,119,.15);color:var(--soc-rd)}
        .fchip.t-vi.active{color:var(--soc-vi);border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.06)}
        .fchip.t-vi.active .cnt{background:rgba(167,139,250,.15);color:var(--soc-vi)}
        .fchip.t-gn.active{color:var(--soc-gn);border-color:rgba(61,220,132,.4);background:rgba(61,220,132,.06)}
        .fchip.t-gn.active .cnt{background:rgba(61,220,132,.15);color:var(--soc-gn)}

        /* Comp-list container */
        .comp-list{display:flex;flex-direction:column;border:1px solid var(--soc-line);border-radius:6px;overflow:hidden;background:var(--soc-bg-1)}
        html[data-theme="light"] .comp-list{background:var(--soc-bg-1);box-shadow:0 1px 0 rgba(12,23,41,.03)}

        /* Crow row */
        .crow{display:grid;grid-template-columns:160px 1fr auto;gap:14px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--soc-line);transition:.15s;text-decoration:none;color:inherit;position:relative}
        .crow:last-child{border-bottom:none}
        .crow:hover{background:rgba(34,225,255,.04)}
        html[data-theme="light"] .crow:hover{background:var(--cy-soft)}
        .crow .cover{width:160px;min-height:88px;align-self:stretch;border-radius:4px;background-color:#000;background-size:cover;background-position:center;background-repeat:no-repeat;border:1px solid var(--soc-line);flex-shrink:0;position:relative;overflow:hidden}
        .crow .cover::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 38%,transparent 60%,rgba(0,0,0,.7) 100%);pointer-events:none;opacity:.9}
        .crow .cover.placeholder{background:var(--soc-bg-2);display:grid;place-items:center}
        .crow .cover.placeholder span{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--soc-ink4);letter-spacing:.08em}
        .crow:hover .cover{border-color:var(--soc-line2)}
        .crow .place{position:absolute;top:5px;left:5px;z-index:3;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:3px;display:inline-flex;align-items:center;gap:4px;backdrop-filter:blur(4px);text-shadow:0 1px 2px rgba(0,0,0,.6);line-height:1.2}
        .place.gold  {background:rgba(20,12,2,.78);color:#ffd380;border:1px solid rgba(255,181,71,.55)}
        .place.silver{background:rgba(10,14,22,.78);color:#dde2ed;border:1px solid rgba(140,154,180,.55)}
        .place.bronze{background:rgba(22,12,6,.78);color:#e3a87b;border:1px solid rgba(214,143,90,.55)}
        .place.other {background:rgba(2,18,24,.78);color:#7df1ff;border:1px solid rgba(34,225,255,.55)}
        html[data-theme="light"] .place.gold  {background:var(--am-soft);color:var(--soc-am);border-color:rgba(180,83,9,.40);text-shadow:none}
        html[data-theme="light"] .place.silver{background:#e8ecf4;color:#3a4a66;border-color:#b8c4dc;text-shadow:none}
        html[data-theme="light"] .place.bronze{background:#fde7d8;color:#9c4319;border-color:rgba(156,67,25,.40);text-shadow:none}
        html[data-theme="light"] .place.other {background:var(--cy-soft);color:var(--soc-cy);border-color:rgba(8,145,178,.35);text-shadow:none}
        .crow .info{min-width:0;display:flex;flex-direction:column;gap:2px}
        .crow .info .nm{font-size:13px;font-weight:600;color:var(--soc-ink)}
        .crow .info .sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--soc-ink3);margin-top:2px;letter-spacing:.04em;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
        .crow .info .sub .evt{color:var(--soc-cy);font-weight:600}
        .crow .info .sub .evt-sep{color:var(--soc-line2)}
        .crow .info .sub .desc{flex:1 1 100%;display:-webkit-box;-webkit-line-clamp:var(--crow-desc-lines,2);-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;color:var(--soc-ink3);font-family:system-ui,-apple-system,sans-serif;font-size:11.5px;letter-spacing:0;margin-top:3px}
        .crow .info .tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
        .crow .info .tags-row .t{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--soc-ink3);padding:2px 7px;border:1px solid var(--soc-line);border-radius:3px;background:var(--soc-bg-2)}
        .crow .info .tags-row .t.more{color:var(--soc-ink4);background:transparent;border-style:dashed}
        .crow .ar{display:inline-flex;align-items:center;gap:7px;padding:7px 13px 7px 11px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:1px solid;transition:.15s;white-space:nowrap;line-height:1;text-decoration:none;flex-shrink:0}
        .crow .ar .ic{font-size:11px;line-height:1}
        .crow .ar.play{background:rgba(34,225,255,.08);border-color:rgba(34,225,255,.35);color:var(--soc-cy)}
        .crow:hover .ar.play{background:var(--soc-cy);border-color:var(--soc-cy);color:#001520;box-shadow:0 0 14px rgba(34,225,255,.35)}
        .crow .ar.open{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.35);color:var(--soc-vi)}
        .crow:hover .ar.open{background:var(--soc-vi);border-color:var(--soc-vi);color:#0e0820;box-shadow:0 0 14px rgba(167,139,250,.35)}
        html[data-theme="light"] .crow .ar.play{background:var(--cy-soft);color:var(--soc-cy);border-color:rgba(8,145,178,.35)}
        html[data-theme="light"] .crow:hover .ar.play{background:var(--soc-cy);color:#fff;border-color:var(--soc-cy)}
        html[data-theme="light"] .crow .ar.open{background:var(--vi-soft);color:var(--soc-vi);border-color:rgba(109,40,217,.35)}
        html[data-theme="light"] .crow:hover .ar.open{background:var(--soc-vi);color:#fff;border-color:var(--soc-vi)}

        /* Difficulty / star / retired pills */
        .diff-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;white-space:nowrap}
        .diff-pill.easy{background:rgba(61,220,132,.12);color:var(--soc-gn);border:1px solid rgba(61,220,132,.3)}
        .diff-pill.medium{background:rgba(255,181,71,.12);color:var(--soc-am);border:1px solid rgba(255,181,71,.3)}
        .diff-pill.hard{background:rgba(255,85,119,.12);color:var(--soc-rd);border:1px solid rgba(255,85,119,.3)}
        html[data-theme="light"] .diff-pill.easy{background:var(--gn-soft);border-color:rgba(21,128,61,.3)}
        html[data-theme="light"] .diff-pill.medium{background:var(--am-soft);border-color:rgba(180,83,9,.3)}
        html[data-theme="light"] .diff-pill.hard{background:var(--rd-soft);border-color:rgba(190,29,58,.3)}
        .diff-pill.player::before{content:"player · ";font-size:8px;opacity:.6;letter-spacing:.06em}
        .star-pill{display:inline-flex;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;color:var(--soc-am);letter-spacing:.04em}
        .retired-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.08em;font-weight:700;background:rgba(255,181,71,.10);color:var(--soc-am);border:1px solid rgba(255,181,71,.3);text-transform:uppercase}

        /* Labs tweaks (scoped to .labs-page-wrap) */
        .labs-page-wrap.compact-density .crow{padding:8px 12px;gap:10px;grid-template-columns:88px 1fr auto}
        .labs-page-wrap.compact-density .crow .cover{min-height:54px;width:88px;align-self:stretch}
        .labs-page-wrap.compact-density .crow .ar{padding:5px 10px 5px 9px;font-size:9.5px;gap:5px}
        .labs-page-wrap.compact-density .crow .info .tags-row{display:none}
        .labs-page-wrap.hide-year-dividers .year-bar{display:none}
        .labs-page-wrap.hide-covers .crow{grid-template-columns:1fr auto;gap:10px}
        .labs-page-wrap.hide-covers .crow .cover{display:none}
        .labs-page-wrap.hide-tags .crow .info .tags-row{display:none}
        .labs-page-wrap.hide-crow-desc .crow .info .sub .desc{display:none}

        /* Retired lab styles A/B/C (scoped to .labs-page-wrap) */
        .labs-page-wrap[data-retired-style] .crow .retired-pill{display:none}
        .labs-page-wrap[data-retired-style="A"] .crow.is-retired .cover{box-shadow:inset 0 0 0 1px rgba(240,182,87,.4)}
        .labs-page-wrap[data-retired-style="A"] .crow.is-retired .cover::before{content:"";position:absolute;top:0;right:0;z-index:3;width:0;height:0;border-style:solid;border-width:0 26px 26px 0;border-color:transparent #f0b657 transparent transparent;pointer-events:none}
        .labs-page-wrap[data-retired-style="B"] .crow.is-retired .cover{box-shadow:inset 0 0 0 2px rgba(240,182,87,.7),inset 0 0 0 3px rgba(0,0,0,.25)}
        .labs-page-wrap[data-retired-style="B"] .crow.is-retired .cover::before{content:"RETIRED";position:absolute;bottom:5px;right:5px;z-index:3;font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:800;letter-spacing:.14em;padding:2px 7px;border-radius:2px;background:linear-gradient(180deg,#ffc468,#d68a1a);color:#1a1208;pointer-events:none;line-height:1.2}
        .labs-page-wrap[data-retired-style="C"] .crow.is-retired{background:linear-gradient(90deg,rgba(255,181,71,.05),transparent 40%)}
        .labs-page-wrap[data-retired-style="C"] .crow.is-retired::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:linear-gradient(180deg,var(--soc-am),rgba(255,181,71,.3));border-radius:0 2px 2px 0}
        .labs-page-wrap[data-retired-style="C"] .crow.is-retired:hover{background:linear-gradient(90deg,rgba(255,181,71,.10),rgba(34,225,255,.03) 60%)}
        html[data-theme="light"] .labs-page-wrap[data-retired-style="A"] .crow.is-retired .cover{box-shadow:inset 0 0 0 1px rgba(180,83,9,.4)}
        html[data-theme="light"] .labs-page-wrap[data-retired-style="A"] .crow.is-retired .cover::before{border-color:transparent #d4942a transparent transparent}
        html[data-theme="light"] .labs-page-wrap[data-retired-style="B"] .crow.is-retired .cover{box-shadow:inset 0 0 0 2px rgba(180,83,9,.65),inset 0 0 0 3px rgba(255,255,255,.4)}
        html[data-theme="light"] .labs-page-wrap[data-retired-style="B"] .crow.is-retired .cover::before{background:linear-gradient(180deg,#f4c178,#b45309);color:#fff}
        html[data-theme="light"] .labs-page-wrap[data-retired-style="C"] .crow.is-retired{background:linear-gradient(90deg,var(--am-soft),transparent 40%)}
        html[data-theme="light"] .labs-page-wrap[data-retired-style="C"] .crow.is-retired:hover{background:linear-gradient(90deg,#fde8c4,var(--cy-soft) 70%)}

        @media(max-width:820px){
            .crow{grid-template-columns:84px 1fr auto;gap:10px;padding:10px 12px}
            .crow .cover{width:84px;min-height:54px;align-self:stretch}
            .crow .ar .lbl{display:none}
            .crow .ar{padding:8px 10px}
            .crow .info .tags-row{display:none}
        }
        @media(max-width:480px){
            .crow{grid-template-columns:1fr}
            .crow .cover{display:none}
            .crow .ar{display:none}
        }

        /* ─── Achievements Page ─── */
        .achiev-page-wrap{position:relative}

        /* Competition list rows (scoped — labs .crow stays separate) */
        .achiev-page-wrap .crow{display:grid;grid-template-columns:90px 1fr auto;gap:14px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--soc-line);transition:background .12s;text-decoration:none;color:inherit;cursor:default}
        .achiev-page-wrap .crow.linked{cursor:pointer}
        .achiev-page-wrap .comp-list > div:last-child .crow{border-bottom:none}
        .achiev-page-wrap .comp-list > div:last-child .crow-expand{border-bottom:none}
        .achiev-page-wrap .crow:hover{background:rgba(34,225,255,.04)}
        .achiev-page-wrap .crow .place{position:static;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.05em;display:inline-flex;align-items:center;justify-content:center;padding:4px 10px;border-radius:99px;white-space:nowrap;backdrop-filter:none;text-shadow:none}
        .achiev-page-wrap .crow .place.gold  {background:rgba(255,181,71,.14);color:var(--soc-am);border:1px solid rgba(255,181,71,.35)}
        .achiev-page-wrap .crow .place.silver{background:rgba(196,206,234,.08);color:var(--soc-ink2);border:1px solid var(--soc-line2)}
        .achiev-page-wrap .crow .place.bronze{background:rgba(166,100,51,.14);color:#d68f5a;border:1px solid rgba(166,100,51,.4)}
        .achiev-page-wrap .crow .place.other {background:rgba(34,225,255,.08);color:var(--soc-cy);border:1px solid rgba(34,225,255,.25)}
        .achiev-page-wrap .crow .info .nm{font-size:13px;font-weight:600;color:var(--soc-ink)}
        .achiev-page-wrap .crow .info .sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--soc-ink3);margin-top:2px;letter-spacing:.04em}
        .achiev-page-wrap .crow .info .sub .org{color:var(--soc-cy)}

        .achiev-page-wrap .crow .ar{color:var(--soc-ink4);font-size:16px;font-weight:400;padding:0;border:none;background:none;letter-spacing:0;text-transform:none;display:inline;line-height:1}
        .achiev-page-wrap .crow:hover .ar{color:var(--soc-cy)}

        /* Featured win cards (text only, no image) */
        .feat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:4px}
        .fcard{position:relative;background:radial-gradient(ellipse at 100% 0%,rgba(255,181,71,.10),transparent 60%),linear-gradient(135deg,var(--soc-bg-1),var(--soc-bg));border:1px solid var(--soc-line2);border-radius:6px;padding:18px 18px 16px;overflow:hidden;transition:border-color .15s,transform .15s;display:flex;flex-direction:column;gap:8px;cursor:default}
        .fcard::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--soc-am),transparent)}
        .fcard:hover{border-color:rgba(255,181,71,.5);transform:translateY(-2px)}
        .fcard .crown{position:absolute;top:14px;right:14px;font-size:24px;color:var(--soc-am);opacity:.8;filter:drop-shadow(0 0 8px rgba(255,181,71,.4))}
        .fcard .fc-yr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--soc-am);letter-spacing:.18em;text-transform:uppercase;font-weight:700}
        .fcard h3{margin:0;font-size:15px;font-weight:700;color:var(--soc-ink);line-height:1.3;padding-right:28px}
        .fcard .fc-org{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soc-ink2);letter-spacing:.04em}
        .fcard .fc-org .lead{color:var(--soc-cy);margin-right:4px}
        .fcard .fc-meta{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--soc-ink3);letter-spacing:.04em;display:flex;gap:10px;flex-wrap:wrap}
        .fcard .fc-meta b{color:var(--soc-ink2);font-weight:600}
        .fcard .placement-stamp{position:absolute;bottom:14px;right:14px;font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;background:rgba(255,181,71,.15);color:var(--soc-am);border:1px solid rgba(255,181,71,.4);border-radius:3px;letter-spacing:.14em;font-weight:700}

        /* Speaking cards (gradient cover, no real image) */
        .talk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
        .talk-grid.compact{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
        .tcard{background:var(--soc-bg-1);border-radius:6px;border:1px solid var(--soc-line);overflow:hidden;transition:border-color .15s}
        .tcard:hover{border-color:rgba(167,139,250,.45)}
        .tcard.video:hover{border-color:rgba(255,85,119,.45)}
        .tcard .tc-cover{height:140px;position:relative;display:grid;place-items:center;overflow:hidden;background:repeating-linear-gradient(-45deg,rgba(167,139,250,.05) 0 1px,transparent 1px 14px),linear-gradient(135deg,#1a1828,#1f2042);border-bottom:1px solid var(--soc-line)}
        .tcard.video .tc-cover{background:repeating-linear-gradient(-45deg,rgba(255,85,119,.04) 0 1px,transparent 1px 14px),linear-gradient(135deg,#1a1018,#26121a)}
        .tcard .tc-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55}
        .tcard .tc-cover .tc-play{width:54px;height:54px;display:grid;place-items:center;border-radius:50%;background:#dc2626;box-shadow:0 4px 18px rgba(220,38,38,.4);color:#fff;font-size:22px;padding-left:4px;position:relative;z-index:1}
        .tcard .tc-cover .tc-role{position:absolute;top:10px;left:10px;font-family:'JetBrains Mono',monospace;font-size:9.5px;background:rgba(167,139,250,.85);color:#fff;padding:2px 8px;border-radius:3px;letter-spacing:.08em;font-weight:700;text-transform:uppercase}
        .tcard.video .tc-cover .tc-role{background:rgba(220,38,38,.85)}
        .tcard .tc-cover .tc-yr{position:absolute;top:10px;right:10px;font-family:'JetBrains Mono',monospace;font-size:9.5px;background:rgba(7,11,20,.8);color:var(--soc-ink2);padding:2px 8px;border:1px solid var(--soc-line2);border-radius:3px}
        .tcard .tc-body{padding:14px 16px;display:flex;flex-direction:column;gap:6px}
        .tcard .tc-name{font-size:13px;font-weight:700;color:var(--soc-ink);line-height:1.3}
        .tcard .tc-event{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soc-vi);letter-spacing:.04em}
        .tcard.video .tc-event{color:var(--soc-rd)}
        .tcard .tc-watch{align-self:flex-start;margin-top:4px;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#dc2626;color:#fff;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;text-decoration:none;letter-spacing:.08em;text-transform:uppercase}
        .tcard .tc-watch:hover{background:#b91c1c}

        /* First Bloods panels */
        .fb-platforms{display:flex;flex-direction:column;gap:14px}
        .fb-panel{border:1px solid var(--soc-line);border-radius:6px;background:var(--soc-bg-1);overflow:hidden}
        .fb-panel-hd{display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center;padding:14px 18px;background:linear-gradient(90deg,rgba(255,85,119,.06),transparent 60%);border-bottom:1px solid var(--soc-line)}
        .fb-panel-hd .fb-icon{height:36px;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid var(--soc-line);display:grid;place-items:center;flex-shrink:0}
        .fb-panel-hd .fb-icon img{height:20px;width:auto;display:block}
        .fb-panel-hd .fb-plat{font-size:14px;font-weight:700;color:var(--soc-ink)}
        .fb-panel-hd .fb-plat-sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--soc-ink3);margin-top:2px;letter-spacing:.04em}
        .fb-panel-hd .fb-cnt-big{font-family:'JetBrains Mono',monospace;padding:6px 16px;border-radius:99px;background:rgba(255,85,119,.10);border:1px solid rgba(255,85,119,.35);color:var(--soc-rd);display:inline-flex;align-items:baseline;gap:5px;white-space:nowrap}
        .fb-panel-hd .fb-cnt-big .n{font-size:20px;font-weight:800;letter-spacing:-.02em;line-height:1}
        .fb-panel-hd .fb-cnt-big .l{font-size:9.5px;letter-spacing:.14em;font-weight:700}
        .fb-detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:14px}
        .fb-detail-grid.compact{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding:10px}
        .fb-detail .fb-d-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--soc-rd);letter-spacing:.04em}
        .fb-detail{border:1px solid var(--soc-line);border-radius:6px;overflow:hidden;background:var(--soc-bg-2);display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:border-color .15s,transform .15s}
        .fb-detail:hover{border-color:rgba(255,85,119,.45);transform:translateY(-2px)}
        .fb-detail .fb-cover{height:88px;overflow:hidden;position:relative;display:grid;place-items:center;background:linear-gradient(135deg,#1a0c10,#26101a);border-bottom:1px solid var(--soc-line)}
        .fb-detail .fb-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.9}
        .fb-detail .fb-cover .fb-plat-tag{position:absolute;top:8px;left:8px;font-family:'JetBrains Mono',monospace;font-size:9.5px;background:rgba(255,85,119,.85);color:#fff;padding:2px 8px;border-radius:3px;letter-spacing:.08em;font-weight:700;text-transform:uppercase;z-index:1}
        .fb-detail .fb-cover .fb-id-tag{position:absolute;top:8px;right:8px;font-family:'JetBrains Mono',monospace;font-size:9.5px;background:rgba(7,11,20,.85);color:var(--soc-rd);padding:2px 8px;border:1px solid rgba(255,85,119,.3);border-radius:3px;font-weight:700;z-index:1}
        .fb-detail .fb-body{padding:12px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
        .fb-detail .fb-d-name{font-size:13px;font-weight:700;color:var(--soc-ink);line-height:1.3}
        .fb-detail .fb-d-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--soc-ink3);letter-spacing:.04em}
        .fb-detail .fb-verify{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--soc-rd);font-weight:600;letter-spacing:.06em;margin-top:auto;padding-top:6px;text-decoration:none}
        .fb-detail .fb-verify:hover{color:var(--soc-ink)}

        /* Achievements — tab colors (override cert-specific --cat vars with !important) */
        .achiev-page-wrap .soc-seg-btn.t-am.active{color:var(--soc-am)!important}
        .achiev-page-wrap .soc-seg-btn.t-am.active .soc-seg-count{background:rgba(255,181,71,.15)!important;color:var(--soc-am)!important}
        .achiev-page-wrap .soc-seg-btn.t-rd.active{color:var(--soc-rd)!important}
        .achiev-page-wrap .soc-seg-btn.t-rd.active .soc-seg-count{background:rgba(255,85,119,.15)!important;color:var(--soc-rd)!important}
        .achiev-page-wrap .soc-seg-btn.t-vi.active{color:var(--soc-vi)!important}
        .achiev-page-wrap .soc-seg-btn.t-vi.active .soc-seg-count{background:rgba(167,139,250,.15)!important;color:var(--soc-vi)!important}

        /* Expandable competition row */
        .achiev-page-wrap .crow-expand{border-bottom:1px solid var(--soc-line);background:var(--soc-bg-2);overflow:hidden}
        .achiev-page-wrap .crow-expand .expand-body{padding:10px 16px 14px;font-size:11.5px;color:var(--soc-ink3);line-height:1.65;font-family:system-ui,-apple-system,sans-serif}

        /* Achievements tweaks panel (reuses .tweaks-fab/.tweaks-panel CSS) */
        .achiev-page-wrap .tweaks-fab{bottom:20px}

        /* Light mode — achievements */
        html[data-theme="light"] .fcard{background:radial-gradient(ellipse at 100% 0%,rgba(180,83,9,.07),transparent 60%),linear-gradient(135deg,var(--soc-bg-1),var(--soc-bg));border-color:var(--soc-line2)}
        html[data-theme="light"] .fcard:hover{border-color:rgba(180,83,9,.4)}
        html[data-theme="light"] .fcard .placement-stamp{background:rgba(180,83,9,.12);color:var(--soc-am);border-color:rgba(180,83,9,.35)}
        html[data-theme="light"] .tcard .tc-cover{background:repeating-linear-gradient(-45deg,rgba(109,40,217,.05) 0 1px,transparent 1px 14px),linear-gradient(135deg,#f0eeff,#e8e0ff)}
        html[data-theme="light"] .tcard.video .tc-cover{background:repeating-linear-gradient(-45deg,rgba(190,29,58,.04) 0 1px,transparent 1px 14px),linear-gradient(135deg,#fff0f2,#ffe0e6)}
        html[data-theme="light"] .fb-panel-hd{background:linear-gradient(90deg,rgba(190,29,58,.04),transparent 60%)}
        html[data-theme="light"] .fb-detail{background:var(--soc-bg-1)}
        html[data-theme="light"] .fb-detail .fb-cover{background:linear-gradient(135deg,#f5e8ea,#fde0e6)}

        /* ===== STATS PAGE ===== */
        .act-wrap{background:linear-gradient(180deg,var(--soc-bg-1),rgba(22,27,34,.6));border:1px solid var(--soc-line);border-radius:6px;padding:20px 22px}
        .act-row{display:grid;grid-template-columns:64px 1fr 50px;gap:14px;align-items:center;padding:8px 0;border-bottom:1px dashed rgba(55,77,108,.4)}
        .act-row:last-child{border-bottom:none}
        .act-yr{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--soc-ink);letter-spacing:-.01em}
        .act-bar{display:flex;height:18px;border-radius:3px;overflow:hidden;background:rgba(0,0,0,.25);border:1px solid var(--soc-line)}
        .act-seg{height:100%;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:rgba(0,0,0,.85);transition:.2s}
        .act-seg.s-cert{background:var(--cat-blu)}.act-seg.s-comp{background:var(--cat-fir)}.act-seg.s-talk{background:var(--cat-fnd)}.act-seg.s-res{background:var(--soc-gn)}.act-seg.s-ir{background:var(--cat-off)}
        .act-tot{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--soc-cy);font-weight:700;text-align:right}
        .act-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--soc-ink3)}
        .act-legend span{display:inline-flex;align-items:center;gap:5px}
        .act-legend span::before{content:"";width:9px;height:9px;border-radius:2px}
        .act-legend .lg-cert::before{background:var(--cat-blu)}.act-legend .lg-comp::before{background:var(--cat-fir)}.act-legend .lg-talk::before{background:var(--cat-fnd)}.act-legend .lg-res::before{background:var(--soc-gn)}.act-legend .lg-ir::before{background:var(--cat-off)}
        .tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .tile{background:linear-gradient(180deg,var(--soc-bg-1),rgba(22,27,34,.6));border:1px solid var(--soc-line);border-radius:6px;padding:18px 20px}
        .tile-hd{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soc-ink2);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:14px}
        .tile-hd .tglyph{width:20px;height:20px;border-radius:4px;display:grid;place-items:center;background:rgba(34,225,255,.10);color:var(--soc-cy);border:1px solid rgba(34,225,255,.25);font-size:10px;flex-shrink:0}
        .tile-hd .tcnt{margin-left:auto;font-size:10px;color:var(--soc-ink3);letter-spacing:.08em;font-weight:500}
        .tile.am .tile-hd .tglyph{background:rgba(255,181,71,.10);color:var(--cat-fir);border-color:rgba(255,181,71,.25)}
        .tile.rd .tile-hd .tglyph{background:rgba(255,85,119,.10);color:var(--cat-off);border-color:rgba(255,85,119,.25)}
        .tile.vi .tile-hd .tglyph{background:rgba(167,139,250,.10);color:var(--cat-fnd);border-color:rgba(167,139,250,.25)}
        .tile.gn .tile-hd .tglyph{background:rgba(61,220,132,.10);color:var(--soc-gn);border-color:rgba(61,220,132,.25)}
        .stats-page-wrap .soc-stat-cell{border-bottom:1px solid var(--soc-line)}
        .stats-page-wrap .soc-stat-cell:nth-last-child(-n+3){border-bottom:none}
        .stats-page-wrap .soc-stat-cell:nth-child(3n){border-right:none}
        .stats-compact .tile{padding:14px 16px}
        .stats-compact .brow{padding:3px 0}
        .stats-compact .act-row{padding:6px 0}
        .brow{display:grid;grid-template-columns:130px 1fr 40px 38px;gap:10px;align-items:center;padding:4px 0;font-family:'JetBrains Mono',monospace}
        .brow .blbl{font-size:11px;color:var(--soc-ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:system-ui,sans-serif;font-weight:500}
        .brow .btrack{height:6px;background:rgba(0,0,0,.3);border-radius:99px;overflow:hidden;border:1px solid var(--soc-line)}

                    if (!ref.current) return;
                    const n = new Date();
                    ref.current.textContent = n.toISOString().slice(0,10) + ' \xb7 ' + n.toISOString().slice(11,19) + 'Z';
                };
                tick();
                const id = setInterval(tick, 1000);
                return () => clearInterval(id);
            }, []);
            return <span ref={ref} className="soc-clock" />;
        };

        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            const ref = React.useRef(null);
            
            useEffect(() => {
                if (ref.current && lucide[name]) {
                    const iconElement = lucide.createElement(lucide[name], {
                        class: className
                    });
                    ref.current.innerHTML = '';
                    ref.current.appendChild(iconElement);
                }

            return <i ref={ref} className={`flex-shrink-0 ${className}`} {...props}></i>;
        };
