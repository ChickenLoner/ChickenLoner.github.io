            const AchievementsPage = () => {
                const TWEAKS_DEF = {groupBy:'year', featuredWins:true, density:'comfortable', fbCovers:true, showLatest:true};
                const TWEAKS_KEY = 'soc-achiev-tweaks-v3';
                const [tweaks,        setTweaks]        = useState(()=>{ try{ return {...TWEAKS_DEF,...JSON.parse(localStorage.getItem(TWEAKS_KEY)||'{}')}; }catch(e){ return TWEAKS_DEF; } });
                const [tweaksOpen,    setTweaksOpen]    = useState(false);
                const [tab,           setTab]            = useState('competitions');
                const [compFilter,    setCompFilter]     = useState('all');
                const fbLoading = fbData === null;
                const [expandedComps, setExpandedComps]  = useState(new Set());
                const [fbOpen,        setFbOpen]         = useState(new Set(['btlo','htb','cd']));
                const saveTweaks = v => { setTweaks(v); try{ localStorage.setItem(TWEAKS_KEY, JSON.stringify(v)); }catch(e){} };
                const toggleComp    = name => setExpandedComps(prev => { const n=new Set(prev); n.has(name)?n.delete(name):n.add(name); return n; });
                const toggleFbPanel = id   => setFbOpen(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });

                const comps = achievements.filter(a => a.category === 'competition');
                const talks = achievements.filter(a => a.category === 'talk');

                // Placement helpers
                const isWin = p => { const s=(p||'').toLowerCase(); return s.includes('winner')||s.includes('champion')||s.includes('1st')||s.includes('first'); };
                const isPod = p => { const s=(p||'').toLowerCase(); return s.includes('2nd')||s.includes('second')||s.includes('3rd')||s.includes('third'); };
                const placeClass = p => { if(isWin(p)) return 'gold'; if(isPod(p)) return 'silver'; return 'other'; };

                const winsArr    = comps.filter(c => isWin(c.placement));
                const winsCount  = winsArr.length;
                const podCount   = comps.filter(c => isPod(c.placement)).length;
                const featuredWin  = winsArr.find(c => c.latest) || winsArr[0] || null;
                const allFb        = fbData ? [...(fbData.btlo||[]), ...(fbData.htb_sherlock||[]), ...(fbData.cd||[])] : [];
                const latestBlood  = allFb.find(f => f.latest) || allFb[0] || null;
                const latestBloodPlat = fbData && latestBlood
                    ? (fbData.btlo||[]).includes(latestBlood) ? 'Blue Team Labs Online'
                    : (fbData.htb_sherlock||[]).includes(latestBlood) ? 'HackTheBox Sherlock'
                    : 'CyberDefenders'
                    : '';

                // Filter
                const FILTERS = [
                    {id:'all',    label:'All',    count:comps.length},
                    {id:'wins',   label:'★ Wins', count:winsCount},
                    {id:'podium', label:'Podium', count:podCount},
                ];
                const matchFilter = c => {
                    if (compFilter==='wins')   return isWin(c.placement);
                    if (compFilter==='podium') return isPod(c.placement);
                    return true;
                };

                const showFeatured  = tweaks.featuredWins && (compFilter==='all' || compFilter==='wins');
                const filteredComps = comps.filter(matchFilter);
                const nonFeatured   = showFeatured ? filteredComps.filter(c=>!isWin(c.placement)) : filteredComps;
                const byYear        = nonFeatured.reduce((acc,c)=>{ (acc[c.year]=acc[c.year]||[]).push(c); return acc; }, {});
                const sortedYears   = Object.keys(byYear).sort((a,b)=>b-a);

                // Hero dist
                const cTotal = comps.length || 1;
                const cpct   = n => Math.round(n/cTotal*100)+'%';

                const isYT = url => url && (url.includes('youtube.com') || url.includes('youtu.be'));

                // Sub-components
                const FCard = ({comp}) => (
                    <div className="fcard">
                        <span className="crown">👑</span>
                        <div className="fc-yr">{comp.year}</div>
                        <h3>{comp.name}</h3>
                        <div className="fc-org"><span className="lead">▲</span>{comp.organizer}</div>
                        {comp.team && <div className="fc-meta"><b>Team</b> {comp.team}</div>}
                        <span className="placement-stamp">{comp.placement}</span>
                    </div>
                );

                const CompRow = ({comp}) => {
                    const hasDetail = !!comp.description;
                    const expanded  = expandedComps.has(comp.name);
                    return (
                        <div>
                            <div className={`crow${hasDetail?' linked':''}`}
                                style={hasDetail?{cursor:'pointer'}:undefined}
                                onClick={hasDetail ? ()=>toggleComp(comp.name) : undefined}>
                                <span className={`place ${placeClass(comp.placement)}`}>{comp.placement||'—'}</span>
                                <div className="info">
                                    <div className="nm">{comp.name}</div>
                                    <div className="sub"><span className="org">{comp.organizer}</span>{comp.team && <> · <b>{comp.team}</b></>}</div>
                                </div>
                                {hasDetail
                                    ? <span className="ar" style={{display:'inline-block',transition:'transform .2s',transform:expanded?'rotate(90deg)':'none'}}>›</span>
                                    : <span style={{width:'16px',flexShrink:0}}></span>
                                }
                            </div>
                            {expanded && hasDetail && (
                                <div className="crow-expand">
                                    <div className="expand-body">{comp.description}</div>
                                </div>
                            )}
                        </div>
                    );
                };

                const FbDetailCard = ({item, platform, idLabel}) => (
                    <a className="fb-detail" href={item.url} target="_blank" rel="noopener noreferrer">
                        {tweaks.fbCovers && (
                            <div className="fb-cover">
                                {item.image && <img src={item.image} alt={item.name} />}
                                <div className="fb-plat-tag">First Blood</div>
                                {idLabel && <div className="fb-id-tag">{idLabel}</div>}
                            </div>
                        )}
                        <div className="fb-body">
                            <div className="fb-d-name">{item.name}</div>
                            {idLabel && !tweaks.fbCovers && <div className="fb-d-id">{idLabel}</div>}
                            <div className="fb-d-lbl">{platform}</div>
                            <span className="fb-verify">Verify ›</span>
                        </div>
                    </a>
                );

                return (
                <div className="achiev-page-wrap space-y-4 animate-fadeIn">
                    {/* ── Hero ── */}
                    <section className="soc-page-hero">
                        <div className="soc-page-hero-strap">
                            <div className="seg"><b>portfolio</b><span style={{color:'var(--soc-ink4)'}}>/</span><span className="v">achievements</span></div>
                            <div className="seg" style={{marginLeft:'auto'}}><b>competitions</b> <span className="v">{comps.length}</span> · <b>talks</b> <span className="v">{talks.length}</span></div>
                        </div>
                        <div className="soc-page-hero-body">
                            <div className="soc-page-hero-icon" style={{color:'var(--soc-am)'}}>★</div>
                            <div>
                                <h1 className="soc-page-hero-title">Achievements</h1>
                                <p className="soc-page-hero-sub">competitions.log · public-talks · notable-milestones</p>
                            </div>
                        </div>
                        <div className="soc-stat-grid">
                            <div className="soc-stat-cell">
                                <div className="soc-stat-lbl">Competitions</div>
                                <div className="soc-stat-val">{comps.length}</div>
                                <div className="dist">
                                    <span title={`Wins: ${winsCount}`}   style={{width:cpct(winsCount),background:'var(--soc-am)'}}></span>
                                    <span title={`Podiums: ${podCount}`} style={{width:cpct(podCount),background:'var(--soc-gn)'}}></span>
                                    <span title={`Other: ${comps.length-winsCount-podCount}`} style={{width:cpct(comps.length-winsCount-podCount),background:'var(--soc-vi)',opacity:.5}}></span>
                                </div>
                            </div>
                            <div className="soc-stat-cell am">
                                <div className="soc-stat-lbl">★ Wins</div>
                                <div className="soc-stat-val">{winsCount}</div>
                                <div className="dist">
                                    <span title={`Wins: ${winsCount}`} style={{width:cpct(winsCount),background:'var(--soc-am)'}}></span>
                                    <span title={`Non-wins: ${comps.length-winsCount}`} style={{width:cpct(comps.length-winsCount),background:'var(--soc-bg-2)'}}></span>
                                </div>
                            </div>
                            <div className="soc-stat-cell rd">
                                <div className="soc-stat-lbl">First Bloods</div>
                                <div className="soc-stat-val">{fbData ? (fbData.btlo||[]).length+(fbData.htb_sherlock||[]).length+(fbData.cd||[]).length : '—'}</div>
                                <div className="dist">
                                    {fbData ? (() => {
                                        const b=(fbData.btlo||[]).length, h=(fbData.htb_sherlock||[]).length, c=(fbData.cd||[]).length;
                                        const t=b+h+c||1, p=n=>Math.round(n/t*100)+'%';
                                        return (<>
                                            <span title={`BTLO: ${b}`} style={{width:p(b),background:'#35c2f1'}}></span>
                                            <span title={`HTB: ${h}`}  style={{width:p(h),background:'#9fef00'}}></span>
                                            <span title={`CD: ${c}`}   style={{width:p(c),background:'#297fff'}}></span>
                                        </>);
                                    })() : <span style={{width:'100%',background:'var(--soc-line2)'}}></span>}
                                </div>
                            </div>
                            <div className="soc-stat-cell vi">
                                <div className="soc-stat-lbl">Speaking</div>
                                <div className="soc-stat-val">{talks.length}</div>
                                <div className="dist">
                                    <span style={{width:'100%',background:'var(--soc-vi)'}}></span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Featured banner — tab-aware */}
                    {tab === 'competitions' && featuredWin && tweaks.showLatest && (
                        <div className="featured-latest gd" style={{marginTop:'18px',cursor:'default'}}>
                            <div className="fl-glyph">
                                {featuredWin.image
                                    ? <img src={featuredWin.image} alt={featuredWin.name} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'6px'}} />
                                    : '👑'}
                            </div>
                            <div>
                                <span className="fl-tag">Latest Win</span>
                                <div className="fl-title">{featuredWin.name}</div>
                                <div className="fl-meta">
                                    <span>organizer=<b>{featuredWin.organizer}</b></span><span>·</span>
                                    <span>year=<b>{featuredWin.year}</b></span>
                                    {featuredWin.team && <><span>·</span><span>team=<b>{featuredWin.team}</b></span></>}
                                </div>
                            </div>
                            <span className="fl-cta">{featuredWin.placement}</span>
                        </div>
                    )}
                    {tab === 'firstbloods' && latestBlood && tweaks.showLatest && (
                        <a className="featured-latest rd" href={latestBlood.url} target="_blank" rel="noopener noreferrer" style={{marginTop:'18px',display:'grid'}}>
                            <div className="fl-glyph">
                                {latestBlood.image
                                    ? <img src={latestBlood.image} alt={latestBlood.name} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'6px'}} />
                                    : '🩸'}
                            </div>
                            <div>
                                <span className="fl-tag">Latest First Blood</span>
                                <div className="fl-title">{latestBlood.name}</div>
                                <div className="fl-meta">
                                    <span>platform=<b>{latestBloodPlat}</b></span>
                                </div>
                            </div>
                            <span className="fl-cta">Verify ↗</span>
                        </a>
                    )}

                    {/* ── Tabs ── */}
                    {(() => {
                        const fbCount = fbData ? (fbData.btlo||[]).length+(fbData.htb_sherlock||[]).length+(fbData.cd||[]).length : null;
                        return (
                        <nav className="soc-seg">
                            {[
                                {id:'competitions', label:'Competitions', icon:'Trophy', count:comps.length,  cls:'t-am'},
                                {id:'firstbloods',  label:'First Bloods', icon:'Zap',   count:fbCount,        cls:'t-rd'},
                                {id:'speaking',     label:'Speaking',     icon:'Mic',   count:talks.length,   cls:'t-vi'},
                            ].map(t=>(
                                <button key={t.id} onClick={()=>setTab(t.id)}
                                    className={`soc-seg-btn ${t.cls}${tab===t.id?' active':''}`}>
                                    <Icon name={t.icon} className="w-4 h-4" />
                                    {t.label}
                                    {t.count!==null && <span className="soc-seg-count">{t.count}</span>}
                                </button>
                            ))}
                        </nav>
                        );
                    })()}

                    {/* ── COMPETITIONS TAB ── */}
                    {tab==='competitions' && (
                    <div>
                        {/* Filter chips */}
                        <div className="achiev-comp-filters" style={{display:'flex',flexWrap:'wrap',gap:'6px',alignItems:'center',marginBottom:'14px'}}>
                            <span className="fchip-label">Filter</span>
                            {FILTERS.map(f=>(
                                <button key={f.id}
                                    className={`fchip${compFilter===f.id?' active':''}`}
                                    onClick={()=>setCompFilter(f.id)}>
                                    {f.label}
                                    {f.count>0 && <span className="cnt">{f.count}</span>}
                                </button>
                            ))}
                        </div>

                        {/* Featured wins */}
                        {showFeatured && winsArr.length>0 && (
                            <div style={{marginBottom:'20px'}}>
                                <div className="year-bar" style={{marginTop:0}}>
                                    <span className="yr" style={{fontSize:'11px',color:'var(--soc-am)',letterSpacing:'.12em'}}>★ FEATURED WINS</span>
                                    <span className="ln" style={{background:'linear-gradient(90deg,rgba(255,181,71,.4),transparent)'}}></span>
                                    <span className="cn">{winsArr.length} win{winsArr.length!==1?'s':''}</span>
                                </div>
                                <div className="feat-row">
                                    {winsArr.map((c,i)=><FCard key={i} comp={c} />)}
                                </div>
                            </div>
                        )}

                        {/* Year-grouped rows */}
                        {nonFeatured.length>0 && (tweaks.groupBy==='year'
                            ? sortedYears.map(year=>(
                                <div key={year} style={{marginBottom:'14px'}}>
                                    <div className="year-bar" style={{marginTop:0}}>
                                        <span className="yr" style={{fontSize:'13px'}}>{year}</span>
                                        <span className="ln"></span>
                                        <span className="cn">{byYear[year].length} entr{byYear[year].length!==1?'ies':'y'}</span>
                                    </div>
                                    <div className="comp-list">
                                        {byYear[year].map((c,i)=><CompRow key={i} comp={c} />)}
                                    </div>
                                </div>
                            ))
                            : <div className="comp-list">{nonFeatured.map((c,i)=><CompRow key={i} comp={c} />)}</div>
                        )}

                        {nonFeatured.length===0 && winsArr.length===0 && (
                            <div style={{padding:'40px',textAlign:'center',color:'var(--soc-ink3)',fontSize:'11px'}}>No entries match this filter</div>
                        )}
                    </div>
                    )}

                    {/* ── FIRST BLOODS TAB ── */}
                    {tab==='firstbloods' && (
                    <div className="fb-platforms">
                        {fbLoading && (
                            <div style={{padding:'40px',textAlign:'center',color:'var(--soc-ink3)',fontSize:'11px'}}>Loading…</div>
                        )}
                        {!fbLoading && fbData!==null && (() => {
                            const btlo = (fbData.btlo||[]);
                            const htb  = (fbData.htb_sherlock||[]);
                            const cd   = (fbData.cd||[]);
                            const totalFB = btlo.length + htb.length + cd.length;
                            if (totalFB===0) return (
                                <div style={{padding:'48px',textAlign:'center',color:'var(--soc-ink3)',fontSize:'11px'}}>
                                    <Icon name="Zap" className="w-10 h-10" style={{display:'block',margin:'0 auto 12px',opacity:.3}} />
                                    Populate <code style={{background:'var(--soc-bg-2)',padding:'1px 5px',borderRadius:'3px'}}>data/firstbloods.json</code> to show first blood data
                                </div>
                            );
                            const FbPanel = ({id, logo, plat, sub, items, idFn}) => (
                                <div className="fb-panel">
                                    <div className="fb-panel-hd" style={{cursor:'pointer'}} onClick={()=>toggleFbPanel(id)}>
                                        <div className="fb-icon"><img src={logo} alt={plat} /></div>
                                        <div>
                                            <div className="fb-plat">{plat}</div>
                                            <div className="fb-plat-sub">{sub}</div>
                                        </div>
                                        <div className="fb-cnt-big">
                                            <div className="n">{items.length}</div>
                                            <div className="l">BLOODS</div>
                                        </div>
                                        <span style={{color:'var(--soc-ink3)',fontSize:'16px',lineHeight:1,transition:'transform .2s',transform:fbOpen.has(id)?'none':'rotate(-90deg)'}}>▾</span>
                                    </div>
                                    {fbOpen.has(id) && (
                                        <div className={`fb-detail-grid${tweaks.density==='compact'?' compact':''}`}>
                                            {items.map((item,i)=>(
                                                <FbDetailCard key={i} item={item} platform={plat} idLabel={idFn?idFn(item):null} />
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                            return (<>
                                {btlo.length>0 && <FbPanel id="btlo" logo="./assets/platforms/btlo.svg" plat="Blue Team Labs Online"  sub="Investigation &amp; Forensics Challenges" items={btlo} idFn={it=>`#${it.id}`} />}
                                {htb.length>0  && <FbPanel id="htb"  logo="./assets/platforms/htb.svg"  plat="HackTheBox — Sherlock" sub="Blue Team Forensic Challenges"            items={htb}  idFn={it=>it.id?`#${it.id}`:null} />}
                                {cd.length>0   && <FbPanel id="cd"   logo="./assets/platforms/cd.svg"   plat="CyberDefenders"        sub="Blue Team CTF Challenges"                 items={cd}   idFn={null} />}
                            </>);
                        })()}
                    </div>
                    )}

                    {/* ── SPEAKING TAB ── */}
                    {tab==='speaking' && (
                    <div>
                        {talks.length===0 ? (
                            <div style={{padding:'40px',textAlign:'center',color:'var(--soc-ink3)',fontSize:'11px'}}>No talks yet</div>
                        ) : (() => {
                            const tByYear = talks.reduce((acc,t)=>{ (acc[t.year]=acc[t.year]||[]).push(t); return acc; }, {});
                            const tYears  = Object.keys(tByYear).sort((a,b)=>b-a);
                            const TalkCard = (talk, idx) => {
                                const yt = isYT(talk.url);
                                return (
                                <div key={idx} className={`tcard${yt?' video':''}`}>
                                    <div className="tc-cover">
                                        {talk.image && <img src={talk.image} alt="" />}
                                        {yt
                                            ? <div className="tc-play">▶</div>
                                            : <Icon name="Mic" className="w-10 h-10" style={{color:'var(--soc-vi)',opacity:.9,position:'relative',zIndex:1,filter:'drop-shadow(0 2px 8px rgba(167,139,250,.5))'}} />
                                        }
                                        {talk.role && <div className="tc-role">{talk.role}</div>}
                                        <div className="tc-yr">{talk.year}</div>
                                    </div>
                                    <div className="tc-body">
                                        <div className="tc-name">{talk.name}</div>
                                        <div className="tc-event">⌖ {talk.event}</div>
                                        {yt && <a href={talk.url} target="_blank" rel="noopener noreferrer" className="tc-watch">▶ Watch</a>}
                                    </div>
                                </div>
                                );
                            };
                            return tweaks.groupBy==='year' ? (
                                <div>
                                    {tYears.map(year=>(
                                        <div key={year} style={{marginBottom:'18px'}}>
                                            <div className="year-bar" style={{marginTop:0}}>
                                                <span className="yr" style={{fontSize:'13px'}}>{year}</span>
                                                <span className="ln"></span>
                                                <span className="cn">{tByYear[year].length} talk{tByYear[year].length!==1?'s':''}</span>
                                            </div>
                                            <div className={`talk-grid${tweaks.density==='compact'?' compact':''}`}>
                                                {tByYear[year].map((talk,idx)=>TalkCard(talk,idx))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className={`talk-grid${tweaks.density==='compact'?' compact':''}`}>
                                    {talks.map((talk,idx)=>TalkCard(talk,idx))}
                                </div>
                            );
                        })()}
                    </div>
                    )}

                    {/* ── Tweaks FAB ── */}
                    <button className="tweaks-fab" onClick={()=>setTweaksOpen(v=>!v)} title="Tweaks" aria-label="Open Tweaks">⚙</button>
                    <div className={`tweaks-panel${tweaksOpen?' open':''}`} role="dialog" aria-label="Tweaks">
                        <div className="tweaks-hd">Achievements Tweaks <span className="x" onClick={()=>setTweaksOpen(false)} aria-label="Close">✕</span></div>
                        <div className="tweaks-body">
                            <div className="tw-group">
                                <div className="tw-lbl">Group by</div>
                                <div className="tw-radio">
                                    {['year','flat'].map(v=>(
                                        <button key={v} className={tweaks.groupBy===v?'on':''} onClick={()=>saveTweaks({...tweaks,groupBy:v})}>
                                            {v.charAt(0).toUpperCase()+v.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="tw-group">
                                <div className="tw-lbl">Density</div>
                                <div className="tw-radio">
                                    {['comfortable','compact'].map(v=>(
                                        <button key={v} className={tweaks.density===v?'on':''} onClick={()=>saveTweaks({...tweaks,density:v})}>
                                            {v.charAt(0).toUpperCase()+v.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="tw-group">
                                <div className="tw-lbl">Show / Hide</div>
                                <div className={`tw-toggle${tweaks.featuredWins?' on':''}`} onClick={()=>saveTweaks({...tweaks,featuredWins:!tweaks.featuredWins})}>
                                    <span className="t">Featured wins</span><span className="sw"></span>
                                </div>
                                <div className={`tw-toggle${tweaks.fbCovers?' on':''}`} onClick={()=>saveTweaks({...tweaks,fbCovers:!tweaks.fbCovers})}>
                                    <span className="t">First blood covers</span><span className="sw"></span>
                                </div>
                                <div className={`tw-toggle${tweaks.showLatest?' on':''}`} onClick={()=>saveTweaks({...tweaks,showLatest:!tweaks.showLatest})}>
                                    <span className="t">Latest banner</span><span className="sw"></span>
                                </div>
                            </div>
                            <div className="tw-group">
                                <div className="tw-lbl">First Bloods panels</div>
                                <div className="tw-radio">
                                    <button onClick={()=>setFbOpen(new Set(['btlo','htb','cd']))}>Expand all</button>
                                    <button onClick={()=>setFbOpen(new Set())}>Collapse all</button>
                                </div>
                            </div>
                        </div>
                        <div className="tw-foot">Saved to <b onClick={()=>saveTweaks({...TWEAKS_DEF})}>localStorage</b> · click to reset</div>
                    </div>
                </div>
                );
            };

            const renderPage = () => {
                switch (activePage) {
                    case 'home': return <HomePage />;
                    case 'certifications': return <CertificationsPage />;
                    case 'labs': return <LabsPage />;
                    case 'achievements': return <AchievementsPage />;
                    case 'stats': return <StatsPage />;
                    default: return <HomePage />;
                }
            };

            return (
                <div className="min-h-screen dark">
                    {/* SOC Top Bar */}
                    <div className="soc-tb">
                        <div className="soc-tb-row">
                            <span className="soc-live">UPLINK</span>
                            <span className="soc-crumb hidden md:flex">SOC <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span> <b>OPERATOR.PROFILE</b></span>
                            <span className="hidden md:flex" style={{marginLeft:'auto',gap:'8px',alignItems:'center'}}>
                                <span className="sev cyan"><span className="dot"></span>TLP:CLEAR</span>
                                <span className="sev green"><span className="dot"></span>SHIFT · DAY</span>
                            </span>
                            <span className="hidden md:block"><SocClock /></span>
                            <span style={{flex:1}} className="md:hidden" />
                            <ThemeToggle />
                            <button className="md:hidden" onClick={() => setMobileMenuOpen(!mobileMenuOpen)} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--soc-ink3)',padding:'2px 6px'}}>
                                <Icon name={mobileMenuOpen ? 'X' : 'Menu'} className="w-4 h-4" />
                            </button>
                        </div>
                        {mobileMenuOpen && (
                            <div className="soc-mobile-menu md:hidden animate-slideDown">
                                <div className="soc-mobile-section">Portfolio</div>
                                {navigation.filter(i => !i.external).map((item) => (
                                    <button key={item.id} onClick={() => { setActivePage(item.id); setMobileMenuOpen(false); }} className={`soc-mobile-item${activePage === item.id ? ' active' : ''}`}>
                                        <Icon name={item.icon} className="w-4 h-4" />
                                        <span>{item.label}</span>
                                    </button>
                                ))}
                                <div className="soc-divider" />
                                <div className="soc-mobile-section">Content</div>
                                {navigation.filter(i => i.external).map((item) => (
                                    <a key={item.id} href={item.url} className="soc-mobile-item" onClick={() => setMobileMenuOpen(false)}>
                                        <Icon name={item.icon} className="w-4 h-4" />
                                        <span>{item.label}</span>
                                        <Icon name="ExternalLink" className="w-3 h-3" style={{marginLeft:'auto',opacity:.5}} />
                                    </a>
                                ))}
                            </div>
                        )}
                    </div>
                    {/* SOC Tab Nav */}
                    <nav className="soc-nav hidden md:flex" aria-label="Site navigation">
                        <div className="soc-nav-inner">
                            {navigation.filter(i => !i.external).map((item, idx) => (
                                <button key={item.id} onClick={() => setActivePage(item.id)} className={`soc-tab${activePage === item.id ? ' active' : ''}`}>
                                    <span className="ix">0{idx + 1}</span>
                                    <span>{item.label}</span>
                                </button>
                            ))}
                            <span className="soc-nav-sep" aria-hidden="true" />
                            {navigation.filter(i => i.external).map(item => (
                                <a key={item.id} href={item.url} className="soc-tab">
                                    <span className="ix">↗</span>
                                    <span>{item.label}</span>
                                </a>
                            ))}
                        </div>
                    </nav>

                    <main id="main-content" className="max-w-6xl mx-auto px-4 py-8">
                        {renderPage()}
                    </main>
                </div>
            );
        };

        ReactDOM.render(<Portfolio />, document.getElementById('root'));
    </script>
</body>
</html>
