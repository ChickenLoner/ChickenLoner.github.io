<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken0248's site</title>
    <link rel="icon" href="/chicken0248.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }

        @keyframes pulseRing {
            0%   { transform: scale(1);    opacity: 0.5; }
            100% { transform: scale(1.22); opacity: 0; }
        }
        .animate-pulse-ring { animation: pulseRing 2s ease-out infinite; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-slideDown { animation: slideDown 0.18s ease-out; }

        /* Subtle dot grid background for hero */
        .hero-dots {
            background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* ============================================================
           DARK MODE
           Activate by adding class "dark" to the root .min-h-screen div
           ============================================================ */

        /* Root page background */
        .dark.min-h-screen {
            background: linear-gradient(135deg, #0f172a 0%, #141f35 50%, #0a1628 100%) !important;
        }

        /* Navigation */
        .dark nav.sticky { background-color: rgba(15,23,42,0.96) !important; border-bottom-color: rgba(51,65,85,0.5) !important; }

        /* White / light surface backgrounds */
        .dark .bg-white     { background-color: #1e293b !important; }
        .dark .bg-gray-50   { background-color: #0f172a !important; }
        .dark .bg-gray-100  { background-color: #334155 !important; }

        /* Tinted section backgrounds */
        .dark .bg-blue-50   { background-color: rgba(37,99,235,0.12)  !important; }
        .dark .bg-blue-100  { background-color: rgba(37,99,235,0.22)  !important; }
        .dark .bg-cyan-50   { background-color: rgba(8,145,178,0.10)  !important; }
        .dark .bg-purple-50 { background-color: rgba(124,58,237,0.10) !important; }
        .dark .bg-green-50  { background-color: rgba(22,163,74,0.10)  !important; }
        .dark .bg-orange-50 { background-color: rgba(234,88,12,0.10)  !important; }
        .dark .bg-red-50    { background-color: rgba(220,38,38,0.10)  !important; }
        .dark .bg-yellow-50 { background-color: rgba(202,138,4,0.10)  !important; }

        /* Badge/pill chip backgrounds */
        .dark .bg-green-100  { background-color: rgba(22,163,74,0.20)  !important; }
        .dark .bg-orange-100 { background-color: rgba(234,88,12,0.20)  !important; }
        .dark .bg-red-100    { background-color: rgba(220,38,38,0.20)  !important; }
        .dark .bg-yellow-100 { background-color: rgba(202,138,4,0.20)  !important; }

        /* Text hierarchy */
        .dark .text-gray-800 { color: #e2e8f0 !important; }
        .dark .text-gray-700 { color: #cbd5e1 !important; }
        .dark .text-gray-600 { color: #94a3b8 !important; }
        .dark .text-gray-500 { color: #64748b !important; }
        .dark .text-gray-400 { color: #475569 !important; }
        .dark .text-gray-300 { color: #334155 !important; }

        /* Badge text - keep vivid on dark tinted backgrounds */
        .dark .text-green-700  { color: #4ade80 !important; }
        .dark .text-orange-700 { color: #fb923c !important; }
        .dark .text-red-700    { color: #f87171 !important; }
        .dark .text-blue-700   { color: #93c5fd !important; }
        .dark .text-purple-500 { color: #c084fc !important; }
        .dark .text-yellow-700 { color: #fbbf24 !important; }

        /* Accent / interactive text — keep vivid */
        .dark .text-blue-600 { color: #60a5fa !important; }
        .dark .text-blue-500 { color: #60a5fa !important; }
        .dark .text-cyan-500 { color: #22d3ee !important; }
        .dark .text-blue-400 { color: #93c5fd !important; }

        /* Border colors */
        .dark .border-gray-100  { border-color: #334155 !important; }
        .dark .border-gray-200  { border-color: #475569 !important; }
        .dark .border-gray-300  { border-color: #475569 !important; }
        .dark .border-blue-100  { border-color: rgba(59,130,246,0.3) !important; }
        .dark .border-blue-200  { border-color: rgba(59,130,246,0.5) !important; }
        .dark .border-purple-100 { border-color: rgba(124,58,237,0.3) !important; }
        .dark .border-yellow-200 { border-color: rgba(202,138,4,0.35) !important; }

        /* Hover backgrounds */
        .dark .hover\:bg-gray-100:hover { background-color: #334155 !important; }
        .dark .hover\:bg-gray-50:hover  { background-color: #1e293b !important; }
        .dark .hover\:border-blue-200:hover { border-color: rgba(59,130,246,0.5) !important; }
        .dark .hover\:border-blue-400:hover { border-color: rgba(96,165,250,0.7) !important; }

        /* Light gradient stops → dark */
        .dark .from-blue-50   { --tw-gradient-from: #1e293b !important; }
        .dark .to-blue-50     { --tw-gradient-to:   #1e293b !important; }
        .dark .from-cyan-50   { --tw-gradient-from: #1e293b !important; }
        .dark .to-cyan-50     { --tw-gradient-to:   #1e293b !important; }
        .dark .from-purple-50 { --tw-gradient-from: #1e2040 !important; }
        .dark .to-purple-50   { --tw-gradient-to:   #1e2040 !important; }
        .dark .from-slate-50  { --tw-gradient-from: #0f172a !important; }
        .dark .via-blue-50    { --tw-gradient-via:  #1e293b !important; }

        /* Form / input elements */
        .dark input, .dark textarea, .dark select {
            background-color: #1e293b !important;
            border-color: #334155 !important;
            color: #e2e8f0 !important;
        }
        .dark input::placeholder, .dark textarea::placeholder { color: #64748b !important; }
        .dark input:focus, .dark textarea:focus {
            border-color: #60a5fa !important;
            --tw-ring-color: rgba(96,165,250,0.3) !important;
        }
        .dark .focus\:border-blue-500:focus { border-color: #60a5fa !important; }

        /* Scrollbar */
        .dark ::-webkit-scrollbar       { width: 6px; }
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;
        const { useEffect } = React;
        
        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            const ref = React.useRef(null);
            
            useEffect(() => {
                if (ref.current) {
                    const iconElement = lucide.createElement(lucide[name], {
                        class: className 
                    });
                    ref.current.innerHTML = '';
                    ref.current.appendChild(iconElement);
                }
            }, [name, className]);
            
            return <i ref={ref} className={`flex-shrink-0 ${className}`} {...props}></i>;
        };

        const Portfolio = () => {
            const [activePage, setActivePage] = useState('home');
            const [labsMetadata, setLabsMetadata] = useState({});
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');

            // Data state — loaded from JSON files
            const [certifications, setCertifications] = useState([]);
            const [certificationReviews, setCertificationReviews] = useState([]);
            const [labsData, setLabsData] = useState([]);
            const [skills, setSkills] = useState([]);
            const [socialMedia, setSocialMedia] = useState([]);
            const [achievements, setAchievements] = useState([]);

            // Merge static lab data with dynamic metadata at render time
            const labs = labsData.map(lab => ({ ...lab, ...(labsMetadata[lab.title] || {}) }));

            useEffect(() => { localStorage.setItem('darkMode', darkMode); }, [darkMode]);

            // Load all static content from JSON files
            useEffect(() => {
                Promise.all([
                    fetch('./data/certifications.json').then(r => r.json()),
                    fetch('./data/reviews.json').then(r => r.json()),
                    fetch('./data/labs.json').then(r => r.json()),
                    fetch('./data/skills.json').then(r => r.json()),
                    fetch('./data/social.json').then(r => r.json()),
                    fetch('./data/achievements.json').then(r => r.json()),
                ]).then(([certs, reviews, labsRaw, skillsData, social, achievementsData]) => {
                    setCertifications(certs);
                    setCertificationReviews(reviews);
                    setLabsData(labsRaw);
                    setSkills(skillsData);
                    setSocialMedia(social);
                    setAchievements(achievementsData);
                }).catch(err => console.error('Failed to load site data:', err));
            }, []);

            // Load dynamic lab metadata (updated daily by GitHub Actions)
            useEffect(() => {
                fetch('./data/labs_metadata.json')
                    .then(res => {
                        if (!res.ok) throw new Error('Metadata file not found');
                        return res.json();
                    })
                    .then(data => {
                        console.log('✓ Loaded dynamic metadata for', Object.keys(data).length, 'labs');
                        setLabsMetadata(data);
                    })
                    .catch(err => {
                        console.log('ℹ Using static data only:', err.message);
                    });
            }, []);

            const navigation = [
                { id: 'home', label: 'Home', icon: 'User' },
                { id: 'certifications', label: 'Certifications', icon: 'Award' },
                { id: 'labs', label: 'Labs & Projects', icon: 'Code' },
                { id: 'achievements', label: 'Achievements', icon: 'Star' },
                { id: 'stats', label: 'Stats', icon: 'BarChart2' },
                { id: 'cloud-labs', label: 'Cloud Labs', icon: 'Cloud', external: true, url: '/cloud-labs/index.html' },
                { id: 'siem-labs', label: 'SIEM Labs', icon: 'Shield', external: true, url: '/siem-labs/index.html' },
                { id: 'writeups', label: 'Write-Ups', icon: 'BookOpen', external: true, url: 'https://chickenloner.github.io/Write_It_UP/index.html' },
            ];


            const HomePage = () => (
                <div className="space-y-10 animate-fadeIn">
                    {/* Hero */}
                    <div className="relative overflow-hidden rounded-3xl bg-gradient-to-br from-blue-600 via-blue-700 to-cyan-600 text-white shadow-2xl shadow-blue-200">
                        <div className="hero-dots absolute inset-0" />
                        <div className="absolute -top-16 -right-16 w-64 h-64 bg-white/10 rounded-full blur-xl" />
                        <div className="absolute -bottom-12 -left-12 w-48 h-48 bg-cyan-400/20 rounded-full blur-xl" />
                        <div className="relative px-8 py-14 md:py-20 text-center">
                            <div className="flex justify-center mb-7">
                                <div className="relative">
                                    <div className="absolute inset-0 rounded-2xl bg-white/30 animate-pulse-ring" />
                                    <div className="relative bg-white/10 p-1 rounded-2xl border border-white/25">
                                        <img src="/chicken0248.png" alt="Chicken0248" className="w-28 h-28 rounded-xl" />
                                    </div>
                                </div>
                            </div>
                            <h1 className="text-4xl md:text-5xl font-extrabold mb-2 tracking-tight">Chicken0248</h1>
                            <p className="text-blue-100 text-lg md:text-xl font-medium mb-10">DFIR Analyst &amp; Blue Team Enthusiast</p>
                            <div className="flex justify-center gap-8 md:gap-16 flex-wrap">
                                {[
                                    { value: certifications.length, label: 'Certifications' },
                                    { value: labs.filter(l => l.type === 'lab').length, label: 'Labs Built' },
                                    { value: certificationReviews.length, label: 'Reviews' },
                                ].map((s, i) => (
                                    <div key={i} className="text-center">
                                        <div className="text-3xl font-bold">{s.value}</div>
                                        <div className="text-blue-200 text-sm font-medium mt-0.5">{s.label}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Skills */}
                    <div>
                        <h2 className="text-xl font-bold text-gray-800 mb-5 flex items-center gap-2">
                            <span className="w-1 h-5 bg-gradient-to-b from-blue-500 to-cyan-400 rounded-full inline-block flex-shrink-0"></span>
                            Skills &amp; Expertise
                        </h2>
                        <div className="grid md:grid-cols-2 gap-4">
                            {skills.map((skillGroup, idx) => (
                                <div key={idx} className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 hover:border-blue-200 hover:shadow-md transition-all group">
                                    <h3 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2 uppercase tracking-wide">
                                        <Icon name="Trophy" className="w-4 h-4 text-blue-500" />
                                        {skillGroup.category}
                                    </h3>
                                    <div className="flex flex-wrap gap-2">
                                        {skillGroup.items.map((skill, i) => (
                                            <span key={i} className="px-3 py-1 bg-blue-50 text-blue-700 rounded-full text-sm font-medium group-hover:bg-blue-100 transition-colors">
                                                {skill}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* About */}
                    <div className="bg-gradient-to-br from-slate-800 to-blue-900 rounded-3xl p-8 md:p-10 text-white shadow-xl shadow-slate-200">
                        <h2 className="text-xl font-bold mb-4 flex items-center gap-2">
                            <Icon name="User" className="w-5 h-5 text-blue-300" />
                            About Me
                        </h2>
                        <p className="text-blue-100/90 leading-relaxed text-[15px] max-w-3xl">
                            As a dedicated DFIR professional, I spend my time solving complex blue team challenges across various platforms
                            and creating educational content to help others develop their skills. I believe in learning by doing, which is
                            why I create comprehensive labs that simulate real-world scenarios. My mission is to make digital forensics and
                            incident response accessible and engaging for everyone in the cybersecurity community.
                        </p>
                        <div className="flex flex-wrap gap-3 mt-6">
                            {[
                                { label: 'HackTheBox', icon: 'Target', url: 'https://app.hackthebox.com/users/1438364', color: 'hover:bg-green-500/20 hover:border-green-400/50' },
                                { label: 'CyberDefenders', icon: 'Shield', url: 'https://cyberdefenders.org/p/Chicken_0248/', color: 'hover:bg-blue-500/20 hover:border-blue-400/50' },
                                { label: 'Blue Team Labs', icon: 'Search', url: 'https://blueteamlabs.online/public/user/chicken0248', color: 'hover:bg-cyan-500/20 hover:border-cyan-400/50' },
                            ].map((p, i) => (
                                <a key={i} href={p.url} target="_blank" rel="noopener noreferrer"
                                    className={`flex items-center gap-2 px-4 py-2 rounded-xl border border-white/20 bg-white/10 text-white text-sm font-medium transition-all ${p.color}`}>
                                    <Icon name={p.icon} className="w-4 h-4" />
                                    {p.label}
                                    <Icon name="ExternalLink" className="w-3 h-3 opacity-60" />
                                </a>
                            ))}
                        </div>
                    </div>

                    {/* Connect */}
                    <div className="space-y-6">
                        <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                            <span className="w-1 h-5 bg-gradient-to-b from-blue-500 to-cyan-400 rounded-full inline-block flex-shrink-0"></span>
                            Connect
                        </h2>

                        <div className="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                            {socialMedia.map((social, idx) => (
                                <a key={idx} href={social.url} target="_blank" rel="noopener noreferrer" className="bg-white rounded-lg p-6 shadow-lg border-2 border-gray-100 hover:border-blue-400 hover:shadow-xl transition-all group">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-blue-50 p-4 rounded-full group-hover:bg-blue-100 transition-colors">
                                            <Icon name={social.icon} className="w-8 h-8 text-blue-600" />
                                        </div>
                                        <div className="flex-1">
                                            <h3 className="text-xl font-bold text-gray-800 mb-1">{social.platform}</h3>
                                            <p className="text-gray-600">{social.handle}</p>
                                        </div>
                                        <Icon name="ExternalLink" className="w-5 h-5 text-gray-400 group-hover:text-blue-600" />
                                    </div>
                                </a>
                            ))}
                        </div>

                        <div className="bg-gradient-to-r from-blue-500 to-cyan-500 rounded-lg p-8 text-white text-center max-w-2xl mx-auto">
                            <h3 className="text-2xl font-bold mb-3">Open to Collaboration</h3>
                            <p className="mb-4">
                                Interested in collaborating on DFIR labs, contributing to open-source projects, or discussing blue team tactics?
                                I'm always excited to connect with fellow cybersecurity enthusiasts!
                            </p>
                            <div className="flex justify-center gap-4">
                                <a href="mailto:warawut_manosong@hotmail.com" className="bg-white text-blue-600 px-6 py-3 rounded-lg font-bold hover:bg-gray-100 transition-colors">
                                    Send Email
                                </a>
                            </div>
                        </div>

                        <div className="text-center text-gray-500 text-sm">
                            <p>&copy; 2025 Chicken0248. Built with React and deployed on GitHub Pages.</p>
                        </div>
                    </div>
                </div>
            );

            const StatsPage = () => {
                const [showCertsByIssuer, setShowCertsByIssuer] = useState(true);
                const [showByPlatform, setShowByPlatform] = useState(true);
                const [showLabDiff, setShowLabDiff] = useState(true);
                const [showLabRatings, setShowLabRatings] = useState(true);
                const [showAchievements, setShowAchievements] = useState(true);

                const activeCerts = certifications.filter(c => c.status === 'Active').length;
                const expiredCerts = certifications.filter(c => c.status === 'Expired').length;
                const statsLabsOnly = labs.filter(l => l.type === 'lab');
                const statsProjects = labs.filter(l => l.type === 'project');
                const avgReviewRating = (certificationReviews.reduce((sum, r) => sum + (r.rating || 0), 0) / certificationReviews.filter(r => r.rating).length);

                // Achievements stats
                const comps = achievements.filter(a => a.category === 'competition');
                const talks = achievements.filter(a => a.category === 'talk');
                const podiums = comps.filter(c => {
                    const p = (c.placement || '').toLowerCase();
                    return p.includes('1st') || p.includes('2nd') || p.includes('3rd') ||
                           p.includes('first') || p.includes('second') || p.includes('third') ||
                           p.includes('winner') || p.includes('champion');
                });
                const wins = comps.filter(c => {
                    const p = (c.placement || '').toLowerCase();
                    return p.includes('1st') || p.includes('first') || p.includes('winner') || p.includes('champion');
                });

                // Competitions by organizer
                const compsByOrganizer = comps.reduce((acc, c) => { acc[c.organizer] = (acc[c.organizer] || 0) + 1; return acc; }, {});
                const sortedOrganizers = Object.entries(compsByOrganizer).sort((a, b) => b[1] - a[1]);
                const maxOrgCount = sortedOrganizers[0]?.[1] || 1;

                // Competitions by year
                const compsByYear = comps.reduce((acc, c) => { acc[c.year] = (acc[c.year] || 0) + 1; return acc; }, {});
                const sortedYears = Object.entries(compsByYear).sort((a, b) => b[0] - a[0]);
                const maxYearCount = sortedYears[0]?.[1] || 1;

                const certsByIssuer = certifications.reduce((acc, c) => { acc[c.issuer] = (acc[c.issuer] || 0) + 1; return acc; }, {});
                const sortedIssuers = Object.entries(certsByIssuer).sort((a, b) => b[1] - a[1]);
                const maxIssuerCount = sortedIssuers[0]?.[1] || 1;

                const labsByPlatform = labs.reduce((acc, l) => { acc[l.platform] = (acc[l.platform] || 0) + 1; return acc; }, {});
                const sortedPlatforms = Object.entries(labsByPlatform).sort((a, b) => b[1] - a[1]);
                const maxPlatformCount = sortedPlatforms[0]?.[1] || 1;

                const labDifficultyCounts = { easy: 0, medium: 0, hard: 0 };
                statsLabsOnly.forEach(l => { if (l.difficulty) labDifficultyCounts[l.difficulty]++; });
                const maxLabDiff = Math.max(...Object.values(labDifficultyCounts), 1);

                const playerDifficultyCounts = { easy: 0, medium: 0, hard: 0 };
                statsLabsOnly.forEach(l => { if (l.player_difficulty) playerDifficultyCounts[l.player_difficulty]++; });
                const maxPlayerDiff = Math.max(...Object.values(playerDifficultyCounts), 1);

                const ratedLabs = statsLabsOnly.filter(l => l.rating != null);
                const labAvgRating = ratedLabs.length ? ratedLabs.reduce((sum, l) => sum + l.rating, 0) / ratedLabs.length : 0;
                const labMaxRating = ratedLabs.length ? Math.max(...ratedLabs.map(l => l.rating)) : 0;
                const labMinRating = ratedLabs.length ? Math.min(...ratedLabs.map(l => l.rating)) : 0;
                const highestRatedLab = ratedLabs.find(l => l.rating === labMaxRating);
                const lowestRatedLab = ratedLabs.find(l => l.rating === labMinRating);
                const ratingBands = [
                    { label: '5.0', min: 5.0, max: 5.0 },
                    { label: '4.5 – 4.9', min: 4.5, max: 4.9 },
                    { label: '4.0 – 4.4', min: 4.0, max: 4.4 },
                    { label: 'Below 4.0', min: 0, max: 3.9 },
                ];
                const ratingBandCounts = ratingBands.map(b => ({ label: b.label, count: ratedLabs.filter(l => l.rating >= b.min && l.rating <= b.max).length }));
                const maxBandCount = Math.max(...ratingBandCounts.map(b => b.count), 1);

                const StatCard = ({ icon, value, label, sub, color = 'blue' }) => {
                    const colors = { blue: 'from-blue-500 to-blue-600', cyan: 'from-cyan-500 to-cyan-600', purple: 'from-purple-500 to-purple-600', green: 'from-green-500 to-green-600' };
                    return (
                        <div className="bg-white rounded-xl p-6 shadow-lg border-2 border-gray-100 hover:border-blue-300 hover:shadow-xl transition-all">
                            <div className={`inline-flex items-center justify-center w-12 h-12 rounded-xl bg-gradient-to-br ${colors[color]} mb-4`}>
                                <Icon name={icon} className="w-6 h-6 text-white" />
                            </div>
                            <div className="text-4xl font-bold text-gray-800 mb-1">{value}</div>
                            <div className="text-base font-semibold text-gray-700 mb-1">{label}</div>
                            {sub && <div className="text-sm text-gray-500">{sub}</div>}
                        </div>
                    );
                };

                const BarRow = ({ label, count, max, colorClass, pct }) => (
                    <div className="flex items-center gap-3 py-1">
                        <span className="text-sm text-gray-700 w-28 flex-shrink-0 truncate" title={label}>{label}</span>
                        <div className="flex-1 bg-gray-100 rounded-full h-4 overflow-hidden">
                            <div className={`h-4 rounded-full transition-all ${colorClass}`} style={{ width: `${Math.round((count / max) * 100)}%` }} />
                        </div>
                        <span className="text-sm font-bold text-gray-700 w-6 text-right">{count}</span>
                        {pct !== undefined && <span className="text-xs text-gray-400 w-9 text-right">{pct}%</span>}
                    </div>
                );

                const diffBarColors = { easy: 'bg-gradient-to-r from-green-400 to-green-600', medium: 'bg-gradient-to-r from-orange-400 to-orange-500', hard: 'bg-gradient-to-r from-red-400 to-red-600' };

                const SectionToggle = ({ title, icon, iconColor, show, onToggle }) => (

                                            </span>
                                            {lab.player_difficulty && lab.player_difficulty !== lab.difficulty && (
                                                <span className="text-xs text-gray-500">
                                                    (Players: <span className={`font-semibold ${
                                                        lab.player_difficulty === 'easy' ? 'text-green-600' :
                                                        lab.player_difficulty === 'medium' ? 'text-orange-600' :
                                                        'text-red-600'
                                                    }`}>{lab.player_difficulty}</span>)
                                                </span>
                                            )}
                                        </div>
                                    )}
                                </div>
                                {lab.rating && (
                                    <div className="flex items-center gap-2 mb-2">
                                        {renderStars(lab.rating)}
                                        <span className="text-sm font-semibold text-gray-700">{lab.rating.toFixed(1)}/5.0</span>
                                        {lab.is_retired && <span className="px-2 py-1 bg-orange-50 text-orange-700 rounded text-xs font-medium">Retired</span>}
                                    </div>
                                )}
                                <p className="text-gray-600 mb-4">{lab.description}</p>
                                {lab.tactics && lab.tactics.length > 0 && (
                                    <div className="mb-3 flex flex-wrap gap-2">
                                        {lab.tactics.slice(0, 4).map((tactic, i) => (
                                            <span key={i} className="px-2 py-1 bg-red-50 text-red-700 border border-red-200 rounded text-xs">{tactic}</span>
                                        ))}
                                        {lab.tactics.length > 4 && (
                                            <span className="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">+{lab.tactics.length - 4} more</span>
                                        )}
                                    </div>
                                )}
                                <div className="flex flex-wrap gap-2 mb-3">
                                    {lab.tags.map((tag, i) => (
                                        <span key={i} className="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm">{tag}</span>
                                    ))}
                                </div>
                                <div className="flex items-center justify-between pt-4 border-t border-gray-100">
                                    <span className="text-sm font-medium text-gray-500">{lab.platform}</span>
                                    <a href={lab.link} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 font-medium text-green-600 hover:text-green-700">
                                        Play Now <Icon name="ExternalLink" className="w-4 h-4 self-center" />
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                );

                const ProjectCard = ({ project }) => {
                    const category = getProjectCategory(project);
                    const categoryStyle = {
                        Tool: 'bg-purple-100 text-purple-700',
                        Misc: 'bg-blue-100 text-blue-700',
                        Blog: 'bg-cyan-100 text-cyan-700',
                    }[category];
                    return (
                        <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 hover:border-blue-200 hover:shadow-md transition-all">
                            <div className="flex flex-col md:flex-row gap-6">
                                {project.image && (
                                    <div className="flex-shrink-0 w-full md:w-64">
                                        <img src={project.image} alt={`${project.title} cover`} className="rounded-lg object-cover w-full h-auto shadow-md" />
                                    </div>
                                )}
                                <div className="flex-1">
                                    <div className="flex items-start justify-between mb-2">
                                        <h3 className="text-xl font-bold text-gray-800">{project.title}</h3>
                                        <span className={`px-3 py-1 rounded-full text-xs font-bold uppercase flex-shrink-0 ml-2 ${categoryStyle}`}>{category}</span>
                                    </div>
                                    <p className="text-gray-600 mb-4">{project.description}</p>
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {project.tags.map((tag, i) => (
                                            <span key={i} className="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm">{tag}</span>
                                        ))}
                                    </div>
                                    <div className="flex items-center justify-between pt-4 border-t border-gray-100">
                                        <span className="text-sm font-medium text-gray-500">{project.platform}</span>
                                        <a href={project.link} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 font-medium text-blue-600 hover:text-blue-700">
                                            View Project <Icon name="ExternalLink" className="w-4 h-4 self-center" />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                };

                const FilterPills = ({ options, selected, onSelect, counts }) => (
                    <div className="flex flex-wrap gap-2 items-center">
                        <Icon name="Filter" className="w-4 h-4 text-gray-500 flex-shrink-0" />
                        {options.map(opt => (
                            <button
                                key={opt}
                                onClick={() => onSelect(opt)}
                                className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all border-2 ${
                                    selected === opt
                                        ? 'bg-blue-600 text-white border-blue-600'
                                        : 'bg-white text-gray-600 border-gray-200 hover:border-blue-400 hover:text-blue-600'
                                }`}
                            >
                                {opt}{opt !== 'All' && counts && ` (${counts[opt] || 0})`}
                            </button>
                        ))}
                    </div>
                );

                const labPlatformCounts = Object.fromEntries(labPlatforms.slice(1).map(p => [p, labsOnly.filter(l => l.platform === p).length]));
                const projectCategoryCounts = Object.fromEntries(projectCategories.slice(1).map(c => [c, projectsOnly.filter(p => getProjectCategory(p) === c).length]));

                return (
                    <div className="space-y-8 animate-fadeIn">
                        <div className="text-center space-y-4">
                            <h1 className="text-4xl font-bold text-gray-800 flex items-center justify-center gap-3">
                                <Icon name="Code" className="w-10 h-10 text-blue-500" />
                                Labs & Projects
                            </h1>
                            <p className="text-gray-600">Hands-on DFIR scenarios and educational content I've created</p>
                        </div>

                        {/* ── Tab switcher ── */}
                        <div className="flex gap-1 p-1 bg-gray-100 rounded-xl w-fit">
                            {[
                                { id: 'labs',     label: 'Labs',     count: labsOnly.length,     icon: 'FlaskConical' },
                                { id: 'projects', label: 'Projects', count: projectsOnly.length, icon: 'FolderOpen'   },
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-semibold transition-all ${
                                        activeTab === tab.id
                                            ? 'bg-white text-blue-600 shadow-sm'
                                            : 'text-gray-500 hover:text-gray-700'
                                    }`}
                                >
                                    <Icon name={tab.icon} className="w-4 h-4" />
                                    {tab.label}
                                    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${activeTab === tab.id ? 'bg-blue-100 text-blue-600' : 'bg-gray-200 text-gray-500'}`}>
                                        {tab.count}
                                    </span>
                                </button>
                            ))}
                        </div>

                        {/* ── Labs tab ── */}
                        {activeTab === 'labs' && (
                            <div className="space-y-5">
                                <FilterPills options={labPlatforms} selected={selectedLabPlatform} onSelect={setSelectedLabPlatform} counts={labPlatformCounts} />
                                <div className="grid gap-5">
                                    {filteredLabs.map((lab, idx) => <LabCard key={idx} lab={lab} />)}
                                </div>
                            </div>
                        )}

                        {/* ── Projects tab ── */}
                        {activeTab === 'projects' && (
                            <div className="space-y-5">
                                <FilterPills options={projectCategories} selected={selectedProjectCategory} onSelect={setSelectedProjectCategory} counts={projectCategoryCounts} />
                                <div className="grid gap-5">
                                    {filteredProjects.map((project, idx) => <ProjectCard key={idx} project={project} />)}
                                </div>
                            </div>
                        )}

                        <div className="bg-gradient-to-br from-cyan-50 to-blue-50 rounded-2xl p-6 text-center border border-blue-100">
                            <h3 className="font-bold text-gray-800 mb-2">More Coming Soon!</h3>
                            <p className="text-gray-600 text-sm">
                                I'm constantly creating new labs and writeups. Follow me on GitHub and Medium to stay updated with my latest work.
                            </p>
                        </div>
                    </div>
                );
            };

            const AchievementsPage = () => {
                const [tab, setTab] = useState('competitions');

                const comps  = achievements.filter(a => a.category === 'competition');
                const talks  = achievements.filter(a => a.category === 'talk');
                const active = tab === 'competitions' ? comps : talks;

                // Competition helpers
                const getPlacementStyle = (placement) => {
                    const p = (placement || '').toLowerCase();
                    if (p.includes('1st') || p.includes('first') || p.includes('winner') || p.includes('champion'))
                        return 'bg-yellow-50 text-yellow-700 border-yellow-200';
                    if (p.includes('2nd') || p.includes('second'))
                        return 'bg-gray-100 text-gray-600 border-gray-200';
                    if (p.includes('3rd') || p.includes('third'))
                        return 'bg-orange-50 text-orange-700 border-orange-200';
                    if (p.includes('top') || p.includes('finalist'))
                        return 'bg-blue-50 text-blue-600 border-blue-100';
                    return 'bg-gray-100 text-gray-500 border-gray-200';
                };

                const podiums = comps.filter(c => {
                    const p = (c.placement || '').toLowerCase();
                    return p.includes('1st') || p.includes('2nd') || p.includes('3rd') ||
                           p.includes('first') || p.includes('second') || p.includes('third') ||
                           p.includes('winner') || p.includes('champion');
                }).length;

                return (
                <div className="space-y-8 animate-fadeIn">
                    {/* Header */}
                    <div className="text-center space-y-3">
                        <h1 className="text-4xl font-bold text-gray-800 flex items-center justify-center gap-3">
                            <Icon name="Star" className="w-10 h-10 text-blue-500" />
                            Achievements
                        </h1>
                        <p className="text-gray-500">Competitions, public talks, and notable milestones</p>
                    </div>

                    {/* Stats strip — shown when there's data */}
                    {achievements.length > 0 && (
                    <div className="grid grid-cols-3 gap-3">
                        {[
                            { label: 'Competitions', value: comps.length, icon: 'Trophy' },
                            { label: 'Podiums', value: podiums, icon: 'Medal' },
                            { label: 'Talks', value: talks.length, icon: 'Mic' },
                        ].map(stat => (
                            <div key={stat.label} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 text-center">
                                <div className="text-2xl font-bold text-blue-600">{stat.value}</div>
                                <div className="text-xs text-gray-500 mt-1 flex items-center justify-center gap-1">
                                    <Icon name={stat.icon} className="w-3 h-3" />{stat.label}
                                </div>
                            </div>
                        ))}
                    </div>
                    )}

                    {/* Tab switcher */}
                    <div className="flex gap-1 p-1 bg-gray-100 rounded-xl w-fit">
                        {[
                            { id: 'competitions', label: 'Competitions', icon: 'Trophy' },
                            { id: 'speaking',     label: 'Speaking',     icon: 'Mic'    },
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)}
                                className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all
                                    ${tab === t.id ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                                <Icon name={t.icon} className="w-4 h-4" />
                                {t.label}
                            </button>
                        ))}
                    </div>

                    {/* ── COMPETITIONS TAB ── */}
                    {tab === 'competitions' && (
                    <>
                        {comps.length === 0 ? (
                            <div className="text-center py-20 text-gray-400">
                                <Icon name="Trophy" className="w-14 h-14 mx-auto mb-4 opacity-25" />
                                <p className="font-semibold text-gray-500 text-lg">No competitions yet</p>
                                <p className="text-sm mt-1">Add entries with <code className="bg-gray-100 px-1.5 py-0.5 rounded text-xs">"category": "competition"</code> to <code className="bg-gray-100 px-1.5 py-0.5 rounded text-xs">data/achievements.json</code></p>
                            </div>
                        ) : (
                        <div className="grid md:grid-cols-2 gap-4">
                            {comps.map((comp, idx) => (
                                <div key={idx} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg hover:border-blue-200 transition-all group">
                                    <div className="w-full h-48 bg-gray-50 border-b border-gray-100 overflow-hidden relative">
                                        {comp.image ? (
                                            <img src={comp.image} alt={comp.name}
                                                className="w-full h-full object-cover group-hover:scale-[1.03] transition-transform duration-300" />
                                        ) : (
                                            <div className="w-full h-full flex flex-col items-center justify-center gap-2 text-gray-300">
                                                <Icon name="Trophy" className="w-10 h-10" />
                                                <span className="text-xs font-medium">No image</span>
                                            </div>
                                        )}
                                        {comp.type && (
                                            <span className="absolute top-3 left-3 px-2 py-0.5 bg-gray-900/60 text-white rounded-md text-xs font-semibold backdrop-blur-sm">
                                                {comp.type}
                                            </span>
                                        )}
                                    </div>
                                    <div className="p-4 space-y-2.5">
                                        <div className="flex items-start justify-between gap-2">
                                            <h3 className="font-bold text-gray-800 text-sm leading-snug group-hover:text-blue-600 transition-colors">{comp.name}</h3>
                                            {comp.placement && (
                                                <span className={`flex-shrink-0 px-2 py-0.5 rounded-full text-xs font-semibold border ${getPlacementStyle(comp.placement)}`}>
                                                    {comp.placement}
                                                </span>
                                            )}
                                        </div>
                                        <div className="flex flex-wrap items-center gap-x-2 gap-y-1 text-xs text-gray-500">
                                            <span className="font-medium text-blue-600 flex items-center gap-1">
                                                <Icon name="Building2" className="w-3 h-3" />{comp.organizer}
                                            </span>
                                            <span>·</span>
                                            <span className="flex items-center gap-1">
                                                <Icon name="Calendar" className="w-3 h-3" />{comp.year}
                                            </span>
                                            {comp.team && (
                                                <>
                                                    <span>·</span>
                                                    <span className="flex items-center gap-1">
                                                        <Icon name="Users" className="w-3 h-3" />{comp.team}
                                                    </span>
                                                </>
                                            )}
                                        </div>
                                        {comp.description && <p className="text-xs text-gray-500 leading-relaxed">{comp.description}</p>}
                                        {(comp.tags || []).length > 0 && (
                                        <div className="flex flex-wrap gap-1.5">
                                            {comp.tags.map((tag, i) => (
                                                <span key={i} className="px-2 py-0.5 bg-blue-50 text-blue-600 rounded-md text-xs font-medium border border-blue-100">{tag}</span>
                                            ))}
                                        </div>
                                        )}
                                        {comp.url && (
                                            <a href={comp.url} target="_blank" rel="noopener noreferrer"
                                                className="inline-flex items-center gap-1 text-xs text-blue-500 hover:text-blue-700 font-medium">
                                                View Details <Icon name="ExternalLink" className="w-3 h-3" />
                                            </a>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                        )}
                    </>
                    )}

                    {/* ── SPEAKING TAB ── */}
                    {tab === 'speaking' && (
                    <>
                        {talks.length === 0 ? (
                            <div className="text-center py-20 text-gray-400">
                                <Icon name="Mic" className="w-14 h-14 mx-auto mb-4 opacity-25" />
                                <p className="font-semibold text-gray-500 text-lg">No talks yet</p>
                                <p className="text-sm mt-1">Add entries with <code className="bg-gray-100 px-1.5 py-0.5 rounded text-xs">"category": "talk"</code> to <code className="bg-gray-100 px-1.5 py-0.5 rounded text-xs">data/achievements.json</code></p>
                            </div>
                        ) : (
                        <div className="grid md:grid-cols-2 gap-4">
                            {talks.map((talk, idx) => (
                                <div key={idx} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg hover:border-blue-200 transition-all group">
                                    <div className="w-full h-48 bg-gray-50 border-b border-gray-100 overflow-hidden relative">
                                        {talk.image ? (
                                            <img src={talk.image} alt={talk.name}
                                                className="w-full h-full object-cover group-hover:scale-[1.03] transition-transform duration-300" />
                                        ) : (
                                            <div className="w-full h-full flex flex-col items-center justify-center gap-2 text-gray-300">
                                                <Icon name="Mic" className="w-10 h-10" />
                                                <span className="text-xs font-medium">No image</span>
                                            </div>
                                        )}
                                        {talk.role && (
                                            <span className="absolute top-3 left-3 px-2 py-0.5 bg-gray-900/60 text-white rounded-md text-xs font-semibold backdrop-blur-sm">
                                                {talk.role}
                                            </span>
                                        )}
                                    </div>
                                    <div className="p-4 space-y-2.5">
                                        <h3 className="font-bold text-gray-800 text-sm leading-snug group-hover:text-blue-600 transition-colors">{talk.name}</h3>
                                        <div className="flex flex-wrap items-center gap-x-2 gap-y-1 text-xs text-gray-500">
                                            <span className="font-medium text-blue-600 flex items-center gap-1">
                                                <Icon name="MapPin" className="w-3 h-3" />{talk.event}
                                            </span>
                                            <span>·</span>
                                            <span className="flex items-center gap-1">
                                                <Icon name="Calendar" className="w-3 h-3" />{talk.year}
                                            </span>
                                        </div>
                                        {talk.description && <p className="text-xs text-gray-500 leading-relaxed">{talk.description}</p>}
                                        {(talk.tags || []).length > 0 && (
                                        <div className="flex flex-wrap gap-1.5">
                                            {talk.tags.map((tag, i) => (
                                                <span key={i} className="px-2 py-0.5 bg-purple-50 text-blue-600 rounded-md text-xs font-medium border border-blue-100">{tag}</span>
                                            ))}
                                        </div>
                                        )}
                                        {talk.url && (
                                            <a href={talk.url} target="_blank" rel="noopener noreferrer"
                                                className="inline-flex items-center gap-1 text-xs text-blue-500 hover:text-blue-700 font-medium">
                                                Slides / Recording <Icon name="ExternalLink" className="w-3 h-3" />
                                            </a>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                        )}
                    </>
                    )}
                </div>
                );
            };

            const renderPage = () => {
                switch (activePage) {
                    case 'home': return <HomePage />;
                    case 'certifications': return <CertificationsPage />;
                    case 'labs': return <LabsPage />;
                    case 'achievements': return <AchievementsPage />;
                    case 'stats': return <StatsPage />;
                    default: return <HomePage />;
                }
            };

            return (
                <div className={`min-h-screen bg-gradient-to-br from-slate-50 via-blue-50/40 to-cyan-50/30${darkMode ? ' dark' : ''}`}>
                    <nav className="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100/80">
                        <div className="max-w-6xl mx-auto px-4">
                            <div className="flex justify-between items-center py-3">
                                {/* Brand */}
                                <div className="flex items-center gap-2.5">
                                    <div className="relative flex-shrink-0">
                                        <img src="/chicken0248.png" alt="Chicken0248" className="w-9 h-9 rounded-xl shadow-sm" />
                                        <span className="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-green-400 rounded-full border-2 border-white"></span>
                                    </div>
                                    <span className="text-lg font-extrabold bg-gradient-to-r from-blue-600 to-cyan-500 bg-clip-text text-transparent tracking-tight">Chicken0248</span>
                                </div>
                                {/* Right side: desktop nav + controls */}
                                <div className="flex items-center gap-1.5">
                                    {/* Desktop nav items */}
                                    <div className="hidden md:flex gap-0.5 items-center">
                                        {navigation.map((item) => {
                                            if (item.external) {
                                                return (
                                                    <a key={item.id} href={item.url} className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-all">
                                                        <Icon name={item.icon} className="w-4 h-4" />
                                                        <span>{item.label}</span>
                                                    </a>
                                                );
                                            }
                                            return (
                                                <button key={item.id} onClick={() => setActivePage(item.id)} className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all ${activePage === item.id ? 'bg-blue-600 text-white shadow-sm shadow-blue-200' : 'text-gray-600 hover:bg-gray-100'}`}>
                                                    <Icon name={item.icon} className="w-4 h-4" />
                                                    <span>{item.label}</span>
                                                </button>
                                            );
                                        })}
                                    </div>
                                    {/* Dark mode toggle — always visible */}
                                    <button
                                        onClick={() => setDarkMode(!darkMode)}
                                        className="p-2 rounded-xl hover:bg-gray-100 transition-colors"
                                        title={darkMode ? 'Switch to light mode' : 'Switch to dark mode'}
                                    >
                                        <Icon name={darkMode ? 'Sun' : 'Moon'} className="w-4 h-4 text-gray-600" />
                                    </button>
                                    {/* Hamburger — mobile only */}
                                    <button className="md:hidden p-2 rounded-xl hover:bg-gray-100 transition-colors" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                        <Icon name={mobileMenuOpen ? 'X' : 'Menu'} className="w-5 h-5 text-gray-600" />
                                    </button>
                                </div>
                            </div>
                            {/* Mobile dropdown */}
                            {mobileMenuOpen && (
                                <div className="md:hidden pb-3 pt-2 border-t border-gray-100 flex flex-col gap-0.5 animate-slideDown">
                                    {navigation.map((item) => {
                                        if (item.external) {
                                            return (
                                                <a key={item.id} href={item.url} className="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">
                                                    <Icon name={item.icon} className="w-4 h-4 text-gray-400" />
                                                    <span>{item.label}</span>
                                                </a>
                                            );
                                        }
                                        return (
                                            <button key={item.id} onClick={() => { setActivePage(item.id); setMobileMenuOpen(false); }} className={`flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium transition-all text-left w-full ${activePage === item.id ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-50'}`}>
                                                <Icon name={item.icon} className={`w-4 h-4 ${activePage === item.id ? 'text-blue-500' : 'text-gray-400'}`} />
                                                <span>{item.label}</span>
                                                {activePage === item.id && <Icon name="ChevronRight" className="w-4 h-4 ml-auto text-blue-400" />}
                                            </button>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-4 py-10">
                        {renderPage()}
                    </main>
                </div>
            );
        };

        ReactDOM.render(<Portfolio />, document.getElementById('root'));
    </script>
</body>
</html>
