    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }

        /* ── DARK MODE ── */
        .dark.min-h-screen { background: linear-gradient(135deg, #0f172a 0%, #141f35 50%, #0a1628 100%) !important; }
        .dark nav { background-color: rgba(15,23,42,0.96) !important; border-bottom-color: rgba(51,65,85,0.5) !important; }
        .dark .bg-white    { background-color: #1e293b !important; }
        .dark .bg-gray-50  { background-color: #0f172a !important; }
        .dark .bg-gray-100 { background-color: #334155 !important; }
        .dark .bg-amber-50   { background-color: rgba(245,158,11,0.10) !important; }
        .dark .bg-amber-100  { background-color: rgba(245,158,11,0.20) !important; }
        .dark .bg-orange-50  { background-color: rgba(234,88,12,0.10) !important; }
        .dark .bg-orange-100 { background-color: rgba(234,88,12,0.20) !important; }
        .dark .bg-blue-50    { background-color: rgba(37,99,235,0.12) !important; }
        .dark .bg-blue-100   { background-color: rgba(37,99,235,0.20) !important; }
        .dark .bg-green-100  { background-color: rgba(22,163,74,0.20) !important; }
        .dark .text-gray-800 { color: #e2e8f0 !important; }
        .dark .text-gray-700 { color: #cbd5e1 !important; }
        .dark .text-gray-600 { color: #94a3b8 !important; }
        .dark .text-gray-500 { color: #64748b !important; }
        .dark .text-gray-400 { color: #475569 !important; }
        .dark .text-amber-700  { color: #fbbf24 !important; }
        .dark .text-orange-700 { color: #fb923c !important; }
        .dark .text-blue-600   { color: #60a5fa !important; }
        .dark .text-green-700  { color: #4ade80 !important; }
        .dark .border-gray-100 { border-color: #334155 !important; }
        .dark .border-gray-200 { border-color: #475569 !important; }
        .dark .border-amber-200  { border-color: rgba(245,158,11,0.3) !important; }
        .dark .border-orange-200 { border-color: rgba(234,88,12,0.3) !important; }
        .dark .hover\:bg-gray-50:hover { background-color: #1e293b !important; }
        .dark .hover\:text-blue-600:hover { color: #60a5fa !important; }
        .dark ::-webkit-scrollbar       { width: 6px; }
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    const el = lucide.createElement(lucide[name], { class: className });
                    ref.current.innerHTML = '';
                    ref.current.appendChild(el);
                }
            }, [name, className]);
            return <i ref={ref} className={`flex-shrink-0 ${className}`} {...props}></i>;
        };

        /* ── Reusable Components ── */

        const Section = ({ id, title, icon, children }) => (
            <section id={id} className="scroll-mt-24">
                <h2 className="text-2xl font-bold text-gray-800 mb-5 flex items-center gap-3 border-b border-gray-200 pb-3">
                    <Icon name={icon} className="w-6 h-6 text-amber-600" />
                    {title}
                </h2>
                <div className="space-y-4">{children}</div>
            </section>
        );

        let figCount = 0;
        const resetFigCount = () => { figCount = 0; };

        const Fig = ({ src, alt }) => {
            figCount += 1;
            const n = figCount;
            return (
                <figure className="my-5">
                    <img src={src} alt={alt || `Figure ${n}`}
                         className="rounded-xl border border-gray-200 shadow-sm max-w-full mx-auto block" loading="lazy" />
                    <figcaption className="text-center text-xs text-gray-400 mt-1.5 font-mono">Figure {n}</figcaption>
                </figure>
            );
        };

        const Callout = ({ children }) => (
            <blockquote className="bg-amber-50 border-l-4 border-amber-400 rounded-r-xl px-5 py-4 my-4 text-gray-700 italic text-sm leading-relaxed">
                {children}
            </blockquote>
        );

        const TipList = ({ items }) => (
            <ul className="list-disc list-outside ml-5 space-y-2 text-gray-700">
                {items.map((item, i) => <li key={i}>{item}</li>)}
            </ul>
        );

        const B = ({ children }) => <strong className="text-gray-800">{children}</strong>;
        const A = ({ href, children }) => (
            <a href={href} target="_blank" rel="noopener noreferrer"
               className="text-blue-600 hover:underline">{children}</a>
        );

        const renderStars = (rating) => {
            const full = Math.floor(rating);
            const half = rating - full >= 0.5;
            return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
        };

        /* ── App ── */

        const App = () => {
            const [dark, setDark] = useState(() => localStorage.getItem('darkMode') === 'true');
            const [meta, setMeta] = useState(null);
            useEffect(() => { localStorage.setItem('darkMode', dark); }, [dark]);

            useEffect(() => {
                fetch('/data/reviews.json')
                    .then(r => r.json())
                    .then(data => {
                        const entry = data.find(r => r.url === '/reviews/ccdff/index.html');
                        if (entry) setMeta(entry);
                    })
                    .catch(() => {});
            }, []);

            resetFigCount();

            const tocItems = [
                { id: 'introduction',    label: 'Introduction',             icon: 'BookOpen'     },
                { id: 'exam-preparation', label: 'Exam Preparation',        icon: 'ListChecks'   },
                { id: 'exam-experience', label: 'Exam Experience',           icon: 'ClipboardList'},
                { id: 'exam-tips',       label: 'Exam Tips & Key Takeaways', icon: 'Lightbulb'   },
            ];

            return (
                <div className={`min-h-screen bg-gradient-to-br from-slate-50 via-amber-50 to-orange-50 ${dark ? 'dark' : ''}`}>

                    {/* Navigation */}
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 py-3">
                        <div className="max-w-4xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-2 text-sm flex-wrap">
                                <a href="/" className="flex items-center gap-2 hover:opacity-80 transition-opacity">
                                    <img src="/chicken0248.png" alt="Logo" className="w-7 h-7 rounded-lg" />
                                    <span className="font-bold text-gray-800 hidden sm:inline">Chicken0248</span>
                                </a>
                                <span className="text-gray-400">/</span>
                                <a href="/reviews/index.html" className="font-medium text-gray-600 hover:text-blue-600 transition-colors">Reviews</a>
                                <span className="text-gray-400">/</span>
                                <span className="font-semibold text-gray-700">CCDFF</span>
                            </div>
                            <button onClick={() => setDark(!dark)}
                                className="p-2 rounded-lg hover:bg-gray-100 text-gray-600 transition-colors text-lg">
                                {dark ? '\u2600\uFE0F' : '\uD83C\uDF19'}
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-4 py-8 space-y-10 animate-fadeIn">

                        {/* Hero */}
                        <div className="relative overflow-hidden rounded-3xl shadow-2xl">
                            <img src="cover.png" alt="Cyber5W Certified Digital Forensics Foundations (CCDFF)"
                                 className="w-full h-48 sm:h-64 md:h-80 object-cover" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent" />
                            <div className="absolute bottom-0 left-0 right-0 p-6 md:p-8 text-white">
                                <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight mb-3 leading-snug">
                                    My Thoughts on Cyber5W Certified Digital Forensics Foundations (CCDFF) — a solid foundation exam for digital forensics folks
                                </h1>
                                <div className="flex flex-wrap gap-2 text-sm">
                                    <span className="bg-white/20 backdrop-blur-sm px-3 py-1 rounded-full flex items-center gap-1.5">
                                        <Icon name="Building2" className="w-3.5 h-3.5" /> Cyber5W
                                    </span>
                                    <span className="bg-white/20 backdrop-blur-sm px-3 py-1 rounded-full flex items-center gap-1.5">
                                        <Icon name="Calendar" className="w-3.5 h-3.5" /> June 2025
                                    </span>
                                    <span className="bg-amber-500/80 backdrop-blur-sm px-3 py-1 rounded-full flex items-center gap-1.5">
                                        <Icon name="Shield" className="w-3.5 h-3.5" /> Blue Team · Digital Forensics
                                    </span>
                                    <span className="bg-green-500/80 backdrop-blur-sm px-3 py-1 rounded-full flex items-center gap-1.5">
                                        <Icon name="CheckCircle" className="w-3.5 h-3.5" /> Passed
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Metadata */}
                        <div className="bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                                <div><span className="text-gray-500 block">Certification</span><span className="font-semibold text-gray-800">CCDFF</span></div>
                                <div><span className="text-gray-500 block">Provider</span><span className="font-semibold text-gray-800">Cyber5W</span></div>
                                <div><span className="text-gray-500 block">Difficulty</span><span className="font-semibold text-amber-600">{meta?.difficulty ?? '—'}</span></div>
                                <div><span className="text-gray-500 block">Rating</span>
                                    {meta?.rating ? (
                                        <span className="font-semibold text-gray-800 flex items-center gap-1">
                                            <span className="text-yellow-500">{renderStars(meta.rating)}</span>
                                            <span className="text-gray-500 font-normal text-xs ml-0.5">{meta.rating.toFixed(1)}/5.0</span>
                                        </span>
                                    ) : <span className="text-gray-400">—</span>}
                                </div>
                            </div>
                        </div>

                        {/* Table of Contents */}
                        <div className="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm">
                            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <Icon name="List" className="w-5 h-5 text-amber-600" />
                                Table of Contents
                            </h2>
                            <div className="grid sm:grid-cols-2 gap-1">
                                {tocItems.map((item, i) => (
                                    <a key={item.id} href={`#${item.id}`}
                                       className="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-700 hover:bg-gray-50 hover:text-blue-600 transition-colors text-sm">
                                        <Icon name={item.icon} className="w-4 h-4 text-gray-400" />
                                        <span className="text-gray-400 font-mono text-xs w-5">{i + 1}.</span>
                                        <span className="font-medium">{item.label}</span>
                                    </a>
                                ))}
                            </div>
                        </div>

                        {/* ═══════════ INTRODUCTION ═══════════ */}
                        <Section id="introduction" title="Introduction" icon="BookOpen">
                            <p className="text-gray-700 leading-relaxed">
                                Hello everyone, it's me <B>Chicken0248</B> again. In this blog, I'll briefly talk about the newly released certification
                                that focuses on the foundational knowledge of Digital Forensics — one I had been waiting for for a while,
                                and I was not disappointed. There is room for improvement, but since I was among the very first people to try
                                out this exam, I expected to encounter some issues, which I did. It took a while before they were finally
                                addressed, and I've explained everything in this blog, so make sure to read until the end!
                            </p>

                            <Fig src="image-1.png" alt="CCDFF exam page on Cyber5W labs" />

                            <p className="text-gray-700 leading-relaxed">
                                The exam is called <B>CCDFF</B> — or <B>C5W-Certified Digital Forensics Foundations</B> — and it tests students
                                on foundational digital forensics knowledge through both theory and hands-on approaches. The exam costs
                                <B>$50 per attempt</B>, and there is no course bundled with it; it is a standalone exam attempt.
                                At the time I wrote this, Cyber5W announced that only the first 20 participants would receive a 50% discount,
                                reducing the cost to $25 per attempt (I've since rechecked and the discount is no longer available).
                                I purchased it and tried it out to see whether it holds up as a good exam for testing foundational digital
                                forensics knowledge, as it claims.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Without further ado, the next section covers exam preparation.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM PREPARATION ═══════════ */}
                        <Section id="exam-preparation" title="Exam Preparation" icon="ListChecks">
                            <Fig src="image-2.png" alt="CCDFF exam focus areas listed on the Cyber5W exam page" />

                            <p className="text-gray-700 leading-relaxed">
                                To prepare for the exam, we first need to know its focus areas.
                                Cyber5W lists them on the <A href="https://academy.cyber5w.com/courses/c5w-certified-digital-forensics-foundations">exam page</A>,
                                and while none of the topics are particularly specific or revealing about the actual exam content,
                                they still give a useful signal about what you'll be expected to know.
                                We can piece things together to figure out which knowledge will really be required.
                            </p>

                            <Fig src="image-3.png" alt="Exam topics: evidence acquisition, file systems, FTK Imager, timestamp analysis, reporting" />

                            <p className="text-gray-700 leading-relaxed">
                                Evidence acquisition, file systems, FTK Imager, timestamp analysis, and reporting are all listed —
                                which tells us we're dealing with disk image files, and we even get the name of a specific tool to study.
                            </p>

                            <Fig src="image-4.png" alt="Cyber5W recommended course: C5W-100 Introduction to Digital Forensics" />

                            <p className="text-gray-700 leading-relaxed">
                                Cyber5W recommends that students complete the <B>C5W-100: Introduction to Digital Forensics</B> course beforehand.
                            </p>

                            <Fig src="image-5.png" alt="C5W-100 course content overview" />

                            <p className="text-gray-700 leading-relaxed">
                                After reviewing the course again post-exam, I was surprised to find that completing C5W-100 is genuinely
                                sufficient to pass. The exam feels purpose-built for students who have finished the course and want to
                                validate their knowledge. If you already have this background — whether from the course or prior experience
                                — you can go straight to the exam.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM EXPERIENCE ═══════════ */}
                        <Section id="exam-experience" title="Exam Experience" icon="ClipboardList">
                            <Fig src="image-6.png" alt="Exam structure overview — theory and hands-on sections" />

                            <Fig src="image-7.png" alt="Exam format: multiple choice questions with theory and practical challenges" />

                            <p className="text-gray-700 leading-relaxed">
                                The exam tests both theory and practical application of your knowledge, but it is multiple-choice throughout —
                                there are no flag submission fields or reports to write. You can realistically finish within 1–2 hours,
                                which aligns with Cyber5W's own time estimate.
                            </p>

                            <Fig src="image-8.png" alt="Passing criteria: 80% required to pass" />

                            <p className="text-gray-700 leading-relaxed">
                                The passing threshold is <B>80%</B>. I breezed through all the theory questions in under an hour,
                                but got stuck on the hands-on portion — and not because it was difficult.
                            </p>

                            <Fig src="image-9.png" alt="Exam issue: files stuck on infinite loading, VM disappeared" />

                            <p className="text-gray-700 leading-relaxed">
                                I could not download the exam files, and the VM had disappeared from my session entirely.
                                No matter what I tried — different browsers, incognito mode, different network connections —
                                nothing worked. I reached out to support to get this sorted.
                            </p>

                            <Fig src="image-10.png" alt="Help function on Course Stack returning an error" />

                            <Fig src="image-11.png" alt="Second support contact attempt — email to info@cyber5w.com" />

                            <p className="text-gray-700 leading-relaxed">
                                The built-in "Help" function on the Course Stack kept throwing an error, so I fell back to emailing
                                <B> info@cyber5w.com</B> directly.
                            </p>

                            <Fig src="image-12.png" alt="FAQ stating a VM will be provided — which I did not see in my session" />

                            <p className="text-gray-700 leading-relaxed">
                                The FAQ explicitly states "you will be provided with a virtual machine," but in my case it simply wasn't
                                there — no VM appeared in the left sidebar alongside "Files" and "Help." I sent two separate emails
                                about the two issues: the missing VM and the undownloadable exam files.
                                Support added a VM to my exam session and provided an alternative download link for the files.
                            </p>

                            <Fig src="image-13.png" alt="VM added to exam and credit provided — but credit could not be applied mid-exam" />

                            <p className="text-gray-700 leading-relaxed">
                                The VM was added and 192 credits were issued, but since my exam had already started I couldn't use them.
                                I contacted support again, and they provided a code to reimburse a second attempt.
                            </p>

                            <Fig src="image-14.png" alt="Alternative download link now available for exam files" />

                            <p className="text-gray-700 leading-relaxed">
                                With the alternative download link now available, I downloaded the files onto my Flare-VM and worked through
                                the hands-on portion, aiming for the highest score I could on the first attempt — and I passed without
                                needing a second one.
                            </p>

                            <Fig src="image-15.png" alt="Hands-on questions completed on Flare-VM" />

                            <p className="text-gray-700 leading-relaxed">
                                The hands-on portion is very straightforward and foundational — everything traces back to the C5W-100 course and its labs.
                                You won't need to worry about network forensics or UEBA artifacts like Prefetch, Shellbags, UserAssist,
                                or Jump Lists, since those aren't covered in the course and won't appear on this exam.
                            </p>

                            <Fig src="image-16.png" alt="Exam results — passed on first attempt" />

                            <p className="text-gray-700 leading-relaxed">
                                I contacted support once more to have my certificate issued and to ask whether I could use the reimbursement
                                code for another attempt (I wanted to use the VM for review purposes). They confirmed I could attempt again,
                                though it turned out I couldn't start a new session — but that's fine.
                            </p>

                            <Fig src="image-17.png" alt="Certificate issued and second attempt confirmed available" />

                            <p className="text-gray-700 leading-relaxed">
                                If you purchase and take the exam now, you should not encounter the same issues I did.
                                From my experience with the CCEH exam, Cyber5W's VMs run smoothly — the hands-on portion should take
                                well under an hour.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM TIPS ═══════════ */}
                        <Section id="exam-tips" title="Exam Tips &amp; Key Takeaways" icon="Lightbulb">
                            <div className="bg-amber-50 rounded-2xl border border-amber-200 p-6">
                                <TipList items={[
                                    'Finish the C5W-100 course, or at least skim through it.',
                                    'The exam is straightforward enough that you can clearly identify the correct answers — no need to stress.',
                                    'Learn how to use the tools covered in the C5W-100 course.',
                                    'Have a stable internet connection — especially important for the hands-on portion.',
                                ]} />
                            </div>
                            <p className="text-gray-700 leading-relaxed">Good luck~ ✌</p>
                        </Section>

                        {/* Footer navigation */}
                        <div className="text-center py-8 border-t border-gray-200">
                            <a href="#" className="text-blue-600 hover:text-blue-700 font-medium text-sm inline-flex items-center gap-1">
                                <Icon name="ArrowUp" className="w-4 h-4" /> Back to top
                            </a>
                            <span className="mx-3 text-gray-300">|</span>
                            <a href="/reviews/index.html" className="text-blue-600 hover:text-blue-700 font-medium text-sm inline-flex items-center gap-1">
                                <Icon name="ArrowLeft" className="w-4 h-4" /> All Reviews
                            </a>
                        </div>

                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
