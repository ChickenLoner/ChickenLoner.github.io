                        {/* ═══════════ INTRODUCTION ═══════════ */}
                        <Section id="introduction" title="Introduction" icon="BookOpen">
                            <p className="text-gray-700 leading-relaxed">
                                Hello everyone, Chicken0248 here. In this blog I'll be talking about how to prepare for the CPTS exam from HackTheBox, the most popular professional cybersecurity certification from one of the most well-known platforms in the space.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Coming from a blue team / DFIR background, this certification is not something to be taken lightly. It requires a completely different set of skills. Without further ado, let's jump right in.
                            </p>

                        {/* ═══════════ EXAM PREPARATION ═══════════ */}
                        <Section id="exam-prep" title="Exam Preparation" icon="GraduationCap">
                            <Fig src="image-1.png" alt="HTB Penetration Tester path overview" />

                            <p className="text-gray-700 leading-relaxed">
                                To take the CPTS exam, you need to complete its job-role path first: the Penetration Tester path. It consists of 28 modules and will cost around 1,970 Cubes.
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>7 x Tier 0 = 70 Cubes</li>
                                <li>4 x Tier I = 200 Cubes</li>
                                <li>17 x Tier II = 1,700 Cubes</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                On top of that, completing all modules gives you 450 Cubes back and roughly 70% completion progress on the Web Penetration Tester path.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Let me tell you, each module is no joke. They contain a wealth of information that is directly required for the exam itself. On top of that, every single one gave me new ideas about possible attack surfaces and privilege escalation paths that may not be well known to blue teamers.
                            </p>

                            <Fig src="image-2.png" alt="CPTS exam knowledge domains overview" />

                            <p className="text-gray-700 leading-relaxed">
                                Before diving into which modules to pay close attention to, let's look at the exam page to see the knowledge domains covered. To sum it up, the exam covers:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>Web application attacks</li>
                                <li>Linux &amp; Windows privilege escalation</li>
                                <li>Active Directory attacks</li>
                                <li>Pivoting &amp; Lateral Movement</li>
                                <li>Post-exploitation</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                And I can guarantee you, they did it justice. You will be tested thoroughly, and sometimes you will doubt yourself if you go into the exam unprepared.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Here are the modules I recommend spending serious time on:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-2 text-gray-700">
                                <li><A href="https://academy.hackthebox.com/app/module/112"><B>Footprinting</B></A> - you'll learn to enumerate many network protocols such as FTP, SMB, NFS, DNS, SMTP, SNMP, MySQL/MSSQL and more. Important foundational knowledge for penetration testing.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/144"><B>Information Gathering - Web Edition</B></A> - you'll learn how to conduct web recon including DNS enumeration, web crawling, analysis of web archives and HTTP headers, and fingerprinting web technologies. A foundation for basic web pentesting.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/24"><B>File Transfers</B></A> - you'll learn various ways to transfer files between machines. There's a lot of useful technique here that you'll put to use directly in the exam.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/147"><B>Password Attacks</B></A> - you'll learn the fundamentals of password attacks: cracking, spraying, stuffing, and Windows/Linux-specific attacks. Getting valid credentials is required to move laterally or gain a foothold, so this one matters.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/116"><B>Attacking Common Services</B></A> - you'll learn how to attack common services such as FTP, SMB, SQL databases, RDP, DNS, and SMTP. Think of it as the second step, an extension of the Footprinting module.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/158"><B>Pivoting, Tunneling, and Port Forwarding</B></A> - you'll learn how to pivot. To pass the exam, double-pivoting is a must. The tools taught here are not the most beginner-friendly, so I recommend using the labs to practice Ligolo-ng or Ligolo-MP effectively.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/143"><B>Active Directory Enumeration &amp; Attacks</B></A> - you'll learn the fundamentals of AD enumeration and attacks, which prove useful again and again in the actual exam. Spend your time here and digest everything.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/33"><B>SQL Injection Fundamentals</B></A> - you'll learn the fundamentals of SQL injection attacks and how to conduct them. After finishing this module, spend extra time on the SQLMap Essentials module as well.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/23"><B>File Inclusion</B></A> - you'll learn a few techniques for file inclusion attacks.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/136"><B>File Upload Attacks</B></A> - you'll learn file upload attacks and a few bypass techniques.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/113"><B>Attacking Common Applications</B></A> - you'll learn various common application attacks including CMS platforms like WordPress, Joomla, and Drupal, as well as Splunk, Jenkins, Tomcat, PRTG Network Monitor, GitLab, osticket, and more.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/51"><B>Linux Privilege Escalation</B></A> - self-explanatory.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/67"><B>Windows Privilege Escalation</B></A> - self-explanatory.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/162"><B>Documentation &amp; Reporting</B></A> - self-explanatory.</li>
                                <li><A href="https://academy.hackthebox.com/app/module/163"><B>Attacking Enterprise Networks</B></A> - the ultimate test that summarizes your journey in a single module. It lets you recap and practice in a larger network. The scale is not the same as the exam, but it is still important to practice this one.</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                That's a lot to go through, but it is necessary because the CPTS exam is no joke.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                What about the CPTS preparation path on the HTB Labs platform? Honestly, I don't think it prepares you for the CPTS exam all that much. It consists of standalone machines, while in the actual exam you're dealing with a full enterprise network with multiple endpoints that you need to compromise to pass.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                So if you're looking for additional labs to practice outside of the path, HTB ProLabs is your best bet, as it consists of multiple endpoints.
                            </p>

                            <Fig src="image-3.png" alt="HTB ProLabs section" />

                            <p className="text-gray-700 leading-relaxed">
                                With that said, let's jump right into the exam experience.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM EXPERIENCE ═══════════ */}
                        <Section id="exam-experience" title="Exam Experience" icon="ClipboardList">
                            <Fig src="image-4.png" alt="CPTS exam portal start screen" />

                            <p className="text-gray-700 leading-relaxed">
                                I started my exam on 2nd May 2026. A lot of enumeration happened on that first day, which had me digging through notes I wrote back during my OSCP cramming days and revisiting parts of the Penetration Tester path to refresh some techniques I thought would work.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                After wrestling with each endpoint, going back and forth with all the credentials I had gathered, and pushing through some self-doubt, I finally obtained all the flags on 4th May 2026. For reference, you need at least 12 out of 14 flags while documenting everything in a customer-ready report within 10 days. Looking back at it, I think I did pretty well considering I came from a DFIR background.
                            </p>

                            <Fig src="image-5.png" alt="CPTS flag submission progress" />

                            <Fig src="image-6.png" alt="All flags captured" />

                            <p className="text-gray-700 leading-relaxed">
                                I submitted my report on 8th May 2026, which came out to over 150 pages. More flags mean more findings, and more findings mean more documentation. That's just how it works. I've seen many people stop at flag 12, but I wanted a perfect score so I wouldn't have any regrets.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                One thing I forgot to mention: for the report, I used <A href="https://sysreptor.com/">Sysreptor</A>, and honestly, why not? It carried me through CDSA, CJCA, and now CPTS. Without it, my Word would have crashed repeatedly and I probably wouldn't have finished in time, and might have even failed on formatting alone. 🤣
                            </p>

                            <Fig src="image-7.png" alt="Sysreptor report in progress" />

                            <p className="text-gray-700 leading-relaxed">
                                Once the report was submitted, VPN access to the exam environment was cut off and it was just a waiting game from there, as results are announced in batches.
                            </p>

                            <Fig src="image-8.png" alt="Exam status: awaiting review" />

                            <Fig src="image-9.png" alt="Waiting for results notification" />

                            <p className="text-gray-700 leading-relaxed">
                                Five days later, I got my result back during a Thai holiday. Just like that, another cert added to the collection.
                            </p>

                            <Fig src="image-10.png" alt="CPTS result notification email" />

                            <Fig src="image-11.png" alt="CPTS certificate on Credly" />

                            <p className="text-gray-700 leading-relaxed">
                                After claiming the cert, the role is automatically assigned to your Discord profile without needing to manually type a verification command anymore.
                            </p>

                            <Fig src="image-12.png" alt="CPTS Discord role assigned" />

                            <p className="text-gray-700 leading-relaxed">
                                You can also visit your exam history page to read the feedback provided. I won't be sharing mine here.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM TIPS ═══════════ */}
                        <Section id="exam-tips" title="Exam Tips &amp; Key Takeaways" icon="Lightbulb">
                            <div className="bg-amber-50 rounded-2xl border border-amber-200 p-6">
                                <TipList items={[
                                    'The exam is fairly linear. Do not jump ahead chasing other flags before completing the current objective. You simply won\'t find them until you\'re meant to.',
                                    'Take screenshots as you go, along with the commands and their outputs.',
                                    'Some applications and services are there for a reason. You might not think they are useful at first, but sometimes they end up being the key to moving forward.',
                                    'Double pivoting and file transfer techniques are a must to learn before going into the exam.',
                                    'Sometimes there are multiple ways to exploit the same vulnerability. If one approach fails, look for another PoC or even write your own.',
                                    'If you have a valid domain user credential, do not forget to run BloodHound.',
                                    'If you cannot get a reverse shell due to connection issues from double pivoting or any other reason, consider creating a backdoor admin account and logging in using that instead. 😉',
                                    'Avoid using RustScan. The HTB VPN simply cannot handle the scan speed and it will cause more problems, costing you important information.',
                                    <span>Use <A href="https://github.com/Syslifters/sysreptor">SysReptor</A> for report writing. It has an HTB exam template ready to go.</span>,
                                ]} />
                            </div>
                        </Section>
