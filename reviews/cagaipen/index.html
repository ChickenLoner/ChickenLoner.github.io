                        {/* ═══════════ INTRODUCTION ═══════════ */}
                        <Section id="introduction" title="Introduction" icon="BookOpen">
                            <p className="text-gray-700 leading-relaxed">
                                Hello everyone, it's me <B>Chicken0248</B> again. In this blog, I'll be sharing my <B>review, experience, and tips</B> for the{' '}
                                <A href="https://pentestingexams.com/certifications/professional/certified-agentic-ai-pentester/">Certified Agentic AI Pentester (C-AgAIPen)</A>{' '}
                                exam from SecOps Group / pentestingexams.com.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                To be transparent, the CEO reached out and asked me to try their AI exam in exchange for an honest review. At the time, they only had two AI-focused certifications (<B>Certified AI/ML Pentester</B> and <B>Certified Agentic AI Pentester</B>), and since many organizations are now adopting AI into their platforms, I thought it was worth exploring, so I asked them to give me a voucher for this certification.
                            </p>

                            <Fig src="image-1.png" alt="C-AgAIPen certification page overview" />

                            <p className="text-gray-700 leading-relaxed">
                                But first, what even is Agentic AI? Most people think AI security is just about jailbreaking a chatbot. An agentic AI goes further than that: it doesn't just chat; it takes real actions on your behalf by calling tools and APIs. Think submitting forms, approving workflows, and reading databases, all autonomously. That's where the real attack surface starts to get interesting. You don't just want to jailbreak your AI anymore, because it's not the only attack surface. Now you have a whole application to analyze: where the vulnerability might be, what can be leveraged, and how AI agents (individually or as a group) might be performing actions that you can exploit. The exam focuses exactly on that.
                            </p>

                            <Fig src="image-2.png" alt="Agentic AI concept illustration" />

                            <p className="text-gray-700 leading-relaxed">
                                I should also mention the price. The original cost is <B>250 GBP</B>, but pentestingexams.com regularly offers discounts across all their exams, so I doubt anyone would pay full price. The discounted price is <B>63 GBP</B>, as shown in the image above.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                The voucher comes with <B>2 attempts</B> (1 free retake if your first attempt fails), but there is no associated course. You are expected to study on your own or already possess the relevant knowledge.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Now let's talk about the exam. As far as I know, none of the certifications from pentestingexams.com come with a course, so in the next section, I'll cover how I prepared, including information I think is safe to share.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM PREPARATION ═══════════ */}
                        <Section id="exam-preparation" title="Exam Preparation" icon="GraduationCap">
                            <p className="text-gray-700 leading-relaxed">
                                To be upfront: I had <B>zero knowledge</B> of AI-related attacks before this exam. All I knew were some basic encoding tricks and simple jailbreaking techniques like "ignore previous instruction" and the classic "You are Abdul the all-knowing." But I wanted to force myself to study the topic: it's clearly becoming mainstream, and agentic AI pentesting is something I might actually get to do on the job.
                            </p>

                            <Fig src="image-3.png" alt="C-AgAIPen exam syllabus page" />

                            <p className="text-gray-700 leading-relaxed">
                                On the official exam page, they list a syllabus covering all possible agentic AI pentesting topics, though not everything listed actually appears in the exam. I focused on: <B>Agent Goal Hijack</B> (direct and indirect prompt injection), <B>Sensitive Information Disclosure</B>, <B>Insecure Output Handling</B>, <B>Tool Misuse and Exploitation</B>, <B>Identity and Privilege Abuse</B>, <B>RCE</B>, <B>Memory &amp; Context Poisoning</B>, <B>Insecure Inter-Agent Communication</B>, and <B>Human-Agent Trust Exploitation</B>. Trying to learn all of this in one week was already a stretch: I was also preparing for my first GIAC cert and working full-time.
                            </p>

                            <Fig src="image-4.png" alt="pentestingexams.com free resources list" />

                            <p className="text-gray-700 leading-relaxed">
                                pentestingexams.com also lists free resources on the exam page. These are useful for getting a grounding in basic AI pentesting, but for agentic AI specifically, you'll need to explore real-world case studies and understand how AI agents are actually integrated into applications: how they work at a high level and where the attack surface lies.
                            </p>

                            <Fig src="image-5.png" alt="HTB Academy AI Red Teamer path modules" />

                            <p className="text-gray-700 leading-relaxed">
                                For fundamentals, I also used my <B>HTB Academy</B> subscription and worked through a few modules from the AI Red Teamer path. There I learned about model recon, jailbreaking techniques, prompt leaking and sensitive data exposure attacks, and, most importantly, function calling and LLM output attacks.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Most AI pentesting exercises, like Gandalf, focus on sensitive data exposure rather than agentic AI pentesting, so I planned to use my first attempt to understand how the exam works and study more before coming back to pass it properly.
                            </p>

                            <Fig src="image-6.png" alt="Mock exam availability note on exam page" />

                            <p className="text-gray-700 leading-relaxed">
                                One thing worth mentioning: this certification is quite new, and the mock exam had not been released at the time of writing. If it becomes available, definitely take it first: it'll give you a feel for how the exam is structured before you start the clock.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM EXPERIENCE ═══════════ */}
                        <Section id="exam-experience" title="Exam Experience" icon="ClipboardList">

                            <Fig src="image-7.png" alt="Exam registration email with exam details" />

                            <p className="text-gray-700 leading-relaxed">
                                When you purchase or receive an exam voucher, you'll get two emails. The first contains the exam information as shown here.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                It tells you that the exam can be taken any time you like, runs for <B>4 hours and 15 minutes</B>, and has three possible outcomes based on your score: <B>Failed</B> (0–59.99%), <B>Passed</B> (60–74.99%), and <B>Passed with Merit</B> (75–100%).
                            </p>

                            <Fig src="image-8.png" alt="VPN access email with OpenVPN download instructions" />

                            <p className="text-gray-700 leading-relaxed">
                                The second email contains your VPN access information: the same core details plus instructions on how to connect to the exam environment. The OpenVPN configuration file can be downloaded from <B>certvpn.secops.group</B> using credentials provided in this email.
                            </p>

                            <Fig src="image-9.png" alt="certvpn.secops.group download page" />
                            <Fig src="image-10.png" alt="OpenVPN connection confirmation page" />

                            <p className="text-gray-700 leading-relaxed">
                                After downloading the OpenVPN config and connecting to the exam environment, you'll need to verify access to the confirmation page. If it loads, your VPN is working: just start the exam and the firewall rule will push through to allow connections to the designated exam endpoints.
                            </p>

                            <Fig src="image-11.png" alt="Exam portal login at candidate.speedexam.net" />

                            <p className="text-gray-700 leading-relaxed">
                                To start the exam, log in to the exam portal at{' '}
                                <A href="https://candidate.speedexam.net/signin.aspx">candidate.speedexam.net</A>.
                            </p>

                            <Fig src="image-12.png" alt="Upcoming Exams section showing C-AgAIPen exam" />

                            <p className="text-gray-700 leading-relaxed">
                                Your exam should appear in the <B>Upcoming Exams</B> section. If you don't see it, switch to the C-AgAIPen group first.
                            </p>

                            <Fig src="image-13.png" alt="Exam portal pre-start system checks" />

                            <p className="text-gray-700 leading-relaxed">
                                I started the exam on <B>Thursday, April 23, 2026</B>, after work. The portal runs a few checks before you can begin: once everything passes, you're in.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                You'll be redirected to the exam submission portal, where you'll need to accept the terms and conditions, at which point the countdown begins. You're presented with <B>8 questions</B>. Each one tells you what type of vulnerability to identify and exploit. As I mentioned in the introduction, this isn't just "jailbreak the chatbot and get the flag." An AI agent is integrated into different parts of the application, and the vulnerability could be anywhere in the system. The agent might be invoking a specific function or leaking data it wasn't supposed to, and that's your foothold.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                After starting, you'll be directed to the designated URL once the firewall rule is applied. Wait 5–7 minutes; if it still isn't working, disconnect from the VPN and reconnect.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                The difficulty of each question is already factored into its score weighting, which you can look up to calculate how many flags you need to pass or achieve merit. I found the experience genuinely interesting: every question felt distinct. This isn't about brute-forcing a jailbreak; when the correct vulnerability is identified and exploited, the flag reveals itself cleanly.
                            </p>

                            <Fig src="image-14.png" alt="Exam submission portal with active countdown timer" />

                            <p className="text-gray-700 leading-relaxed">
                                I managed to find flags for <B>6 of the 8 questions</B>, which gave me just enough to pass. The remaining 2 were weighted heavily (almost half the total score between them), and I couldn't identify them within the 4-hour window despite spending every available minute on them. Six flags it was, skill issue on my part.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Looking back, I hadn't originally planned to pass on this attempt: I wanted to use it as a recon run and come back better prepared. As it turned out, that won't be possible anymore. But let's move on to the final review.
                            </p>
                        </Section>

                        <Section id="final-review" title="Final Review" icon="Star">
                            <p className="text-gray-700 leading-relaxed">
                                C-AgAIPen is a certification focused on exploiting applications that integrate AI agents, systems that perform real actions on behalf of users rather than just responding to prompts.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                At <B>63 GBP</B> (75% off the 250 GBP list price), you get 2 exam attempts and no associated course. You're responsible for your own preparation, though the provider supplies a reasonable collection of free resources to get you started.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                <B>Definitely recommended</B> for anyone looking for a place to test their AI pentesting skills and explore how agentic AI can be integrated into (and exploited within) real applications.
                            </p>
                        </Section>
