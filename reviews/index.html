<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Reviews | Chicken0248</title>
    <meta name="description" content="Honest certification reviews from Chicken0248 — covering exam prep, course content, hands-on labs, and career value for SOC, DFIR, and Red Team certifications." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chicken0248" />
    <meta property="og:url" content="https://chickenloner.github.io/reviews/" />
    <meta property="og:title" content="Certification Reviews | Chicken0248" />
    <meta property="og:description" content="Honest certification reviews from Chicken0248 — covering exam prep, course content, hands-on labs, and career value for SOC, DFIR, and Red Team certifications." />
    <meta property="og:image" content="https://chickenloner.github.io/chicken0248.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Chicken_0248" />
    <meta name="twitter:title" content="Certification Reviews | Chicken0248" />
    <meta name="twitter:description" content="Honest certification reviews from Chicken0248 — covering exam prep, course content, hands-on labs, and career value for SOC, DFIR, and Red Team certifications." />
    <meta name="twitter:image" content="https://chickenloner.github.io/chicken0248.png" />
    <link rel="canonical" href="https://chickenloner.github.io/reviews/" />
    <link rel="icon" href="/chicken0248.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/themes/soc.css">
    <script src="/themes/soc-nav.js"></script>
    <style>
        :root {
            --soc-bg:    #070b14;
            --soc-bg-1:  #0c1322;
            --soc-bg-2:  #121a2e;
            --soc-line:  #1c2740;
            --soc-line2: #2a3a5c;
            --soc-ink:   #e4ecff;
            --soc-ink2:  #a9b6d3;
            --soc-ink3:  #6c7a9c;
            --soc-ink4:  #475070;
            --soc-cy:    #22e1ff;
            --soc-cy2:   #06b8d9;
            --soc-am:    #ffb547;
            --soc-gn:    #3ddc84;
            --soc-rd:    #ff5577;
            --soc-vi:    #a78bfa;
        }

        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background: var(--soc-bg); color: var(--soc-ink); font-family: system-ui, -apple-system, sans-serif; margin: 0; }

        @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin   { to { transform: rotate(360deg); } }
        @keyframes socbp  { 50% { opacity:.3; } }

        .animate-fadeIn { animation: fadeIn 0.45s ease-out; }
        .animate-spin   { animation: spin 0.8s linear infinite; }

        /* ── Top bar ── */
        .soc-tb { position:sticky;top:0;z-index:50;background:rgba(7,11,20,0.94);backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);border-bottom:1px solid var(--soc-line); }
        .soc-tb-row { display:flex;align-items:center;gap:14px;padding:9px 22px;font-size:12px;flex-wrap:wrap; }
        .soc-live { display:inline-flex;align-items:center;gap:6px;color:var(--soc-gn);font-weight:600;letter-spacing:.06em;font-family:'JetBrains Mono',monospace; }
        .soc-live::before { content:"";width:7px;height:7px;border-radius:50%;background:var(--soc-gn);box-shadow:0 0 8px var(--soc-gn);animation:socbp 1.6s ease infinite; }
        .soc-crumb { color:var(--soc-ink3);display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px; }
        .soc-crumb b { color:var(--soc-ink);font-weight:600; }
        .soc-clock { font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soc-ink3); }

        /* ── Badges ── */
        .sev { display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;font-weight:700;text-transform:uppercase;white-space:nowrap; }
        .sev .dot { width:6px;height:6px;border-radius:50%;background:currentcolor;flex-shrink:0; }
        .sev.green  { background:rgba(61,220,132,.12); color:var(--soc-gn); border:1px solid rgba(61,220,132,.3); }
        .sev.red    { background:rgba(255,85,119,.12);  color:var(--soc-rd); border:1px solid rgba(255,85,119,.3); }
        .sev.cyan   { background:rgba(34,225,255,.1);   color:var(--soc-cy); border:1px solid rgba(34,225,255,.25); }
        .sev.amber  { background:rgba(255,181,71,.12);  color:var(--soc-am); border:1px solid rgba(255,181,71,.3); }
        .sev.violet { background:rgba(167,139,250,.1);  color:var(--soc-vi); border:1px solid rgba(167,139,250,.25); }

        /* ── Page hero ── */
        .soc-page-hero { border:1px solid var(--soc-line2);border-radius:6px;background:linear-gradient(180deg,rgba(255,181,71,.04),transparent 40%),linear-gradient(180deg,var(--soc-bg-1),var(--soc-bg));overflow:hidden;margin-bottom:24px; }
        .soc-page-hero-strap { display:flex;align-items:center;gap:12px;padding:7px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soc-ink3);border-bottom:1px solid var(--soc-line);background:rgba(0,0,0,.25); }
        .soc-page-hero-strap .seg { display:flex;align-items:center;gap:6px; }
        .soc-page-hero-strap .seg b { color:var(--soc-ink2);font-weight:500; }
        .soc-page-hero-strap .seg .v { color:var(--soc-am);font-weight:600; }
        .soc-page-hero-body { display:flex;align-items:center;gap:16px;padding:18px 22px; }
        .soc-page-hero-icon { width:44px;height:44px;border-radius:8px;display:grid;place-items:center;background:rgba(255,181,71,.1);border:1px solid rgba(255,181,71,.3);flex-shrink:0; }
        .soc-page-hero-title { font-size:22px;font-weight:800;color:var(--soc-ink);margin:0;letter-spacing:-.01em; }
        .soc-page-hero-sub { font-size:12px;color:var(--soc-ink3);font-family:'JetBrains Mono',monospace;margin:4px 0 0; }
        .soc-stat-lbl { font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--soc-ink3);letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:6px; }
        .soc-stat-lbl::before { content:"";width:6px;height:6px;border-radius:50%;background:var(--soc-am); }
        .soc-stat-lbl.cy::before { background:var(--soc-cy); }
        .soc-stat-val { font-size:22px;font-weight:700;letter-spacing:-.01em;margin-top:4px;font-variant-numeric:tabular-nums;color:var(--soc-ink);font-family:'JetBrains Mono',monospace; }

        /* ── Cards ── */
        .rev-card { display:flex;flex-direction:column;background:var(--soc-bg-1);border:1px solid var(--soc-line);border-radius:6px;overflow:hidden;text-decoration:none;color:inherit;transition:border-color .15s,box-shadow .15s; }
        .rev-card:hover { border-color:var(--soc-line2);box-shadow:0 0 0 1px var(--soc-line2),0 8px 32px rgba(0,0,0,.4); }
        .rev-card-body { padding:16px;display:flex;flex-direction:column;gap:10px;flex:1; }
        .rev-card-header { display:flex;align-items:flex-start;gap:12px; }
        .rev-card-badge { width:48px;height:48px;border-radius:6px;object-fit:contain;background:var(--soc-bg-2);border:1px solid var(--soc-line);padding:4px;flex-shrink:0; }
        .rev-card-title { font-size:14px;font-weight:700;color:var(--soc-ink);line-height:1.4;transition:color .15s; }
        .rev-card:hover .rev-card-title { color:var(--soc-am); }
        .rev-card-rating { display:flex;align-items:center;gap:5px;margin-top:4px; }
        .rev-card-rating-val { font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soc-am);font-weight:600; }
        .rev-card-meta { display:flex;align-items:center;gap:8px;font-size:11px;color:var(--soc-ink3);font-family:'JetBrains Mono',monospace;flex-wrap:wrap; }
        .rev-card-excerpt { font-size:12px;color:var(--soc-ink3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; }
        .rev-card-tags { display:flex;flex-wrap:wrap;gap:6px; }
        .rev-tag { font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;background:rgba(255,181,71,.1);color:var(--soc-am);border:1px solid rgba(255,181,71,.2);font-family:'JetBrains Mono',monospace;letter-spacing:.04em; }
        .rev-card-cta { display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--soc-am);margin-top:auto;padding-top:10px;border-top:1px solid var(--soc-line); }

        /* ── Search / filter ── */
        .soc-search-bar { display:flex;align-items:center;gap:8px;padding:0 12px;border:1px solid var(--soc-line2);border-radius:4px;background:var(--soc-bg-1);height:38px;flex:1; }
        .soc-search-bar input { background:transparent;border:none;outline:none;color:var(--soc-ink);font-size:13px;width:100%; }
        .soc-search-bar input::placeholder { color:var(--soc-ink4); }
        .soc-select { padding:0 12px;height:38px;border:1px solid var(--soc-line2);border-radius:4px;background:var(--soc-bg-1);color:var(--soc-ink2);font-size:13px;outline:none;cursor:pointer;font-family:inherit; }

        /* ── Section label ── */
        h2.soc-section { font-size:11.5px;font-family:'JetBrains Mono',monospace;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--soc-ink2);margin:0 0 12px;display:flex;align-items:center;gap:12px; }
        h2.soc-section::before { content:"";width:4px;height:14px;background:var(--soc-am);box-shadow:rgba(255,181,71,.7) 0 0 8px;flex-shrink:0; }
        h2.soc-section .meta { margin-left:auto;color:var(--soc-ink3);font-weight:400;letter-spacing:.06em;font-size:10px; }

        /* ── Footer ── */
        .soc-ft { margin-top:32px;padding:16px 0;text-align:center;color:var(--soc-ink4);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;border-top:1px solid var(--soc-line); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width:6px;height:6px; }
        ::-webkit-scrollbar-track { background:var(--soc-bg); }
        ::-webkit-scrollbar-thumb { background:var(--soc-line2);border-radius:4px; }
        * { scrollbar-color:var(--soc-line2) var(--soc-bg); }
    </style>
</head>
<body>
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:bg-white focus:px-4 focus:py-2 focus:rounded-lg focus:shadow-lg focus:text-blue-600 focus:font-semibold">
        Skip to content
    </a>
    <noscript>
        <style>body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}</style>
        <div style="text-align:center;padding:2rem">
            <h1>JavaScript required</h1>
            <p>This site requires JavaScript to display content. Please enable it in your browser settings.</p>
            <a href="https://chickenloner.github.io">chickenloner.github.io</a>
        </div>
    </noscript>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const SocClock = () => {
            const ref = useRef(null);
            useEffect(() => {
                const tick = () => {
                    if (!ref.current) return;
                    const n = new Date();
                    ref.current.textContent = n.toISOString().slice(0,10) + ' · ' + n.toISOString().slice(11,19) + 'Z';
                };
                tick();
                const id = setInterval(tick, 1000);
                return () => clearInterval(id);
            }, []);
            return <span ref={ref} className="soc-clock" />;
        };

        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    const el = lucide.createElement(lucide[name], { class: className });
                    ref.current.innerHTML = '';
                    ref.current.appendChild(el);
                }
            }, [name, className]);
            return <i ref={ref} className={`flex-shrink-0 ${className}`} {...props}></i>;
        };

        const DIFF_SEV = { Beginner: 'green', Intermediate: 'amber', Advanced: 'red' };

        const renderStars = (rating) => {
            const full = Math.floor(rating);
            const hasHalf = rating - full >= 0.5;
            const uid = `sr-${Math.round(rating * 10)}`;
            const stars = [];
            for (let i = 1; i <= 5; i++) {
                const isFull = i <= full;
                const isHalf = !isFull && hasHalf && i === full + 1;
                const clipId = `${uid}-${i}`;
                stars.push(
                    <svg key={i} width="13" height="13" viewBox="0 0 24 24" style={{display:'inline-block',verticalAlign:'middle',flexShrink:0}}>
                        {isHalf && <defs><clipPath id={clipId}><rect x="0" y="0" width="12" height="24"/></clipPath></defs>}
                        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
                            fill="none" stroke="rgba(107,114,128,0.4)" strokeWidth="2" strokeLinejoin="round"/>
                        {(isFull || isHalf) && (
                            <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
                                fill="#ffb547" stroke="#ffb547" strokeWidth="2" strokeLinejoin="round"
                                clipPath={isHalf ? `url(#${clipId})` : undefined}/>
                        )}
                    </svg>
                );
            }
            return <span style={{display:'inline-flex',alignItems:'center',gap:'1px'}}>{stars}</span>;
        };

        const App = () => {
            const [reviews, setReviews]           = useState([]);
            const [loading, setLoading]           = useState(true);
            const [search, setSearch]             = useState('');
            const [activeDifficulty, setActiveDifficulty] = useState(null);

            useEffect(() => {
                fetch('/data/reviews.json')
                    .then(r => r.json())
                    .then(data => { setReviews(data); setLoading(false); })
                    .catch(() => setLoading(false));
            }, []);

            const filtered = useMemo(() => {
                let result = reviews;
                if (search.trim()) {
                    const q = search.toLowerCase();
                    result = result.filter(r =>
                        r.title.toLowerCase().includes(q) ||
                        r.excerpt.toLowerCase().includes(q) ||
                        r.tags.some(t => t.toLowerCase().includes(q))
                    );
                }
                if (activeDifficulty) result = result.filter(r => r.difficulty === activeDifficulty);
                return result;
            }, [reviews, search, activeDifficulty]);

            const avgRating = useMemo(() => {
                const rated = reviews.filter(r => r.rating);
                if (!rated.length) return null;
                return (rated.reduce((s, r) => s + r.rating, 0) / rated.length).toFixed(1);
            }, [reviews]);

            return (
                <div style={{minHeight:'100vh',background:'var(--soc-bg)'}}>
                    {/* Top bar */}
                    <div className="soc-tb">
                        <div className="soc-tb-row">
                            <span className="soc-live">UPLINK</span>
                            <span className="soc-crumb">
                                SOC <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                                <a href="/" style={{color:'var(--soc-ink3)',textDecoration:'none'}}>OPERATOR.PROFILE</a>
                                <span style={{color:'var(--soc-ink4)',margin:'0 4px'}}>/</span>
                                <b>REVIEWS</b>
                            </span>
                            <span style={{marginLeft:'auto',display:'flex',gap:'8px',alignItems:'center'}}>
                                <span className="sev cyan"><span className="dot"></span>TLP:CLEAR</span>
                                <span className="sev amber"><span className="dot"></span>CERT-REV</span>
                            </span>
                            <SocClock />
                        </div>
                    </div>

                    <main id="main-content" style={{maxWidth:'1152px',margin:'0 auto',padding:'28px 22px 48px'}}>
                        <div className="animate-fadeIn">
                            {/* Page hero */}
                            <div className="soc-page-hero">
                                <div className="soc-page-hero-strap">
                                    <div className="seg"><b>console</b> <span className="v">portfolio/reviews</span></div>
                                    <div className="seg"><b>type</b> <span className="v">certification-review</span></div>
                                    <span style={{marginLeft:'auto'}} className="sev green"><span className="dot"></span>ACTIVE</span>
                                </div>
                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'16px'}}>
                                    <div className="soc-page-hero-body">
                                        <div className="soc-page-hero-icon">
                                            <Icon name="Star" className="w-6 h-6" style={{color:'var(--soc-am)'}} />
                                        </div>
                                        <div>
                                            <h1 className="soc-page-hero-title">Certification Reviews</h1>
                                            <p className="soc-page-hero-sub">soc-analyst · dfir · red-team · penetration-testing</p>
                                        </div>
                                    </div>
                                    {!loading && (
                                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderTop:'none',borderLeft:'1px solid var(--soc-line)',paddingLeft:'24px',marginRight:'22px',gap:'16px 32px'}}>
                                            <div>
                                                <div className="soc-stat-lbl">Reviews</div>
                                                <div className="soc-stat-val">{reviews.length}</div>
                                            </div>
                                            {avgRating && (
                                                <div>
                                                    <div className="soc-stat-lbl cy">Avg Rating</div>
                                                    <div className="soc-stat-val">{avgRating}</div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Filters */}
                            {!loading && (
                                <div style={{display:'flex',gap:'10px',marginBottom:'20px',flexWrap:'wrap'}}>
                                    <div className="soc-search-bar">
                                        <Icon name="Search" className="w-4 h-4" style={{color:'var(--soc-ink4)',flexShrink:0}} />
                                        <input
                                            type="text"
                                            placeholder="Search reviews, tags, providers…"
                                            value={search}
                                            onChange={e => setSearch(e.target.value)}
                                            aria-label="Search reviews"
                                        />
                                    </div>
                                    <select
                                        value={activeDifficulty || ''}
                                        onChange={e => setActiveDifficulty(e.target.value || null)}
                                        className="soc-select"
                                        aria-label="Filter by difficulty">
                                        <option value="">All Levels</option>
                                        <option value="Beginner">Beginner</option>
                                        <option value="Intermediate">Intermediate</option>
                                        <option value="Advanced">Advanced</option>
                                    </select>
                                </div>
                            )}

                            {/* Section label */}
                            {!loading && reviews.length > 0 && (
                                <h2 className="soc-section">
                                    Review Index
                                    <span className="meta">
                                        <b>{filtered.length}</b> of {reviews.length} reviews
                                        {(search || activeDifficulty) && (
                                            <button onClick={() => { setSearch(''); setActiveDifficulty(null); }}
                                                style={{marginLeft:'10px',color:'var(--soc-am)',background:'none',border:'none',cursor:'pointer',font:'inherit',fontSize:'10px'}}>
                                                clear ×
                                            </button>
                                        )}
                                    </span>
                                </h2>
                            )}

                            {/* Loading */}
                            {loading && (
                                <div style={{display:'flex',justifyContent:'center',padding:'80px 0'}}>
                                    <div style={{width:'32px',height:'32px',borderRadius:'50%',border:'3px solid var(--soc-line2)',borderTopColor:'var(--soc-am)'}} className="animate-spin" />
                                </div>
                            )}

                            {/* Cards */}
                            {!loading && filtered.length > 0 && (
                                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:'16px'}}>
                                    {filtered.map(review => (
                                        <a key={review.url} href={review.url} className="rev-card">
                                            <div className="rev-card-body">
                                                <div className="rev-card-header">
                                                    {review.image && (
                                                        <img src={review.image} alt={review.title} className="rev-card-badge" />
                                                    )}
                                                    <div style={{flex:1,minWidth:0}}>
                                                        <div className="rev-card-title">{review.title}</div>
                                                        {review.rating && (
                                                            <div className="rev-card-rating">
                                                                {renderStars(review.rating)}
                                                                <span className="rev-card-rating-val">{review.rating.toFixed(1)}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="rev-card-meta">
                                                    <Icon name="Calendar" className="w-3.5 h-3.5" />
                                                    <span>{review.date}</span>
                                                    {review.readTime && <span>· {review.readTime}</span>}
                                                    {review.difficulty && (
                                                        <span className={`sev ${DIFF_SEV[review.difficulty] || 'amber'}`} style={{fontSize:'9px',padding:'1px 6px'}}>
                                                            <span className="dot"></span>{review.difficulty}
                                                        </span>
                                                    )}
                                                </div>
                                                <p className="rev-card-excerpt">{review.excerpt}</p>
                                                {review.tags && review.tags.length > 0 && (
                                                    <div className="rev-card-tags">
                                                        {review.tags.map(tag => (
                                                            <span key={tag} className="rev-tag">{tag}</span>
                                                        ))}
                                                    </div>
                                                )}
                                                <div className="rev-card-cta">
                                                    <Icon name="BookOpen" className="w-3.5 h-3.5" />
                                                    <span>Read Review</span>
                                                    <Icon name="ArrowRight" className="w-3.5 h-3.5" style={{marginLeft:'auto'}} />
                                                </div>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            )}

                            {/* Empty state */}
                            {!loading && filtered.length === 0 && (
                                <div style={{textAlign:'center',padding:'80px 0',color:'var(--soc-ink3)'}}>
                                    <Icon name="Star" className="w-12 h-12" style={{margin:'0 auto 12px',opacity:.3,display:'block'}} />
                                    <p style={{fontSize:'15px',fontWeight:600,color:'var(--soc-ink2)',margin:'0 0 6px'}}>
                                        {reviews.length === 0 ? 'No reviews published yet.' : 'No reviews match your filters.'}
                                    </p>
                                    {reviews.length > 0 && (
                                        <button onClick={() => { setSearch(''); setActiveDifficulty(null); }}
                                            style={{marginTop:'10px',color:'var(--soc-am)',background:'none',border:'none',cursor:'pointer',fontSize:'13px',fontFamily:'inherit'}}>
                                            Clear filters
                                        </button>
                                    )}
                                </div>
                            )}
