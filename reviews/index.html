<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Reviews | Chicken0248</title>
    <meta name="description" content="Honest certification reviews from Chicken0248 — covering exam prep, course content, hands-on labs, and career value for SOC, DFIR, and Red Team certifications." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chicken0248" />
    <meta property="og:url" content="https://chickenloner.github.io/reviews/" />
    <meta property="og:title" content="Certification Reviews | Chicken0248" />
    <meta property="og:description" content="Honest certification reviews from Chicken0248 — covering exam prep, course content, hands-on labs, and career value for SOC, DFIR, and Red Team certifications." />
    <meta property="og:image" content="https://chickenloner.github.io/chicken0248.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Chicken_0248" />
    <meta name="twitter:title" content="Certification Reviews | Chicken0248" />
    <meta name="twitter:description" content="Honest certification reviews from Chicken0248 — covering exam prep, course content, hands-on labs, and career value for SOC, DFIR, and Red Team certifications." />
    <meta name="twitter:image" content="https://chickenloner.github.io/chicken0248.png" />
    <link rel="icon" href="/chicken0248.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 0.8s linear infinite; }

        /* ── DARK MODE ── */
        .dark.min-h-screen { background: linear-gradient(135deg, #0f172a 0%, #141f35 50%, #0a1628 100%) !important; }
        .dark nav { background-color: rgba(15,23,42,0.96) !important; border-bottom-color: rgba(51,65,85,0.5) !important; }
        .dark .bg-white    { background-color: #1e293b !important; }
        .dark .bg-gray-50  { background-color: #0f172a !important; }
        .dark .bg-gray-100 { background-color: #334155 !important; }
        .dark .bg-yellow-50  { background-color: rgba(234,179,8,0.10) !important; }
        .dark .bg-yellow-100 { background-color: rgba(234,179,8,0.20) !important; }
        .dark .bg-amber-100  { background-color: rgba(245,158,11,0.20) !important; }
        .dark .bg-orange-100 { background-color: rgba(234,88,12,0.20) !important; }
        .dark .bg-blue-100   { background-color: rgba(37,99,235,0.20) !important; }
        .dark .bg-green-100  { background-color: rgba(22,163,74,0.20) !important; }
        .dark .bg-red-100    { background-color: rgba(220,38,38,0.20) !important; }
        .dark .bg-purple-100 { background-color: rgba(147,51,234,0.20) !important; }
        .dark .text-gray-800 { color: #e2e8f0 !important; }
        .dark .text-gray-700 { color: #cbd5e1 !important; }
        .dark .text-gray-600 { color: #94a3b8 !important; }
        .dark .text-gray-500 { color: #64748b !important; }
        .dark .text-gray-400 { color: #475569 !important; }
        .dark .text-yellow-700 { color: #fde047 !important; }
        .dark .text-amber-700  { color: #fbbf24 !important; }
        .dark .text-orange-700 { color: #fb923c !important; }
        .dark .text-blue-700   { color: #93c5fd !important; }
        .dark .text-green-700  { color: #4ade80 !important; }
        .dark .text-red-700    { color: #f87171 !important; }
        .dark .text-purple-700 { color: #c084fc !important; }
        .dark .text-blue-600   { color: #60a5fa !important; }
        .dark .text-amber-600  { color: #f59e0b !important; }
        .dark .border-gray-100 { border-color: #334155 !important; }
        .dark .border-gray-200 { border-color: #475569 !important; }
        .dark .hover\:border-blue-300:hover { border-color: rgba(59,130,246,0.5) !important; }
        .dark .hover\:bg-gray-50:hover { background-color: #1e293b !important; }
        .dark .hover\:bg-amber-50:hover { background-color: rgba(245,158,11,0.1) !important; }
        .dark input { background-color: #1e293b !important; border-color: #334155 !important; color: #e2e8f0 !important; }
        .dark input::placeholder { color: #64748b !important; }
        .dark select { background-color: #1e293b !important; border-color: #334155 !important; color: #e2e8f0 !important; }
        .dark ::-webkit-scrollbar       { width: 6px; }
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    const el = lucide.createElement(lucide[name], { class: className });
                    ref.current.innerHTML = '';
                    ref.current.appendChild(el);
                }
            }, [name, className]);
            return <i ref={ref} className={`flex-shrink-0 ${className}`} {...props}></i>;
        };

        const DIFFICULTY_STYLES = {
            Beginner:     'bg-green-100 text-green-700',
            Intermediate: 'bg-amber-100 text-amber-700',
            Advanced:     'bg-red-100 text-red-700',
        };

        const renderStars = (rating) => {
            const full = Math.floor(rating);
            const half = rating - full >= 0.5;
            return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
        };

        const App = () => {
            const [dark, setDark]         = useState(() => localStorage.getItem('darkMode') === 'true');
            const [reviews, setReviews]   = useState([]);
            const [loading, setLoading]   = useState(true);
            const [search, setSearch]     = useState('');
            const [activeTag, setActiveTag]           = useState(null);
            const [activeDifficulty, setActiveDifficulty] = useState(null);

            useEffect(() => { localStorage.setItem('darkMode', dark); }, [dark]);

            useEffect(() => {
                fetch('/data/reviews.json')
                    .then(r => r.json())
                    .then(data => { setReviews(data); setLoading(false); })
                    .catch(() => setLoading(false));
            }, []);

            const allTags = useMemo(() =>
                [...new Set(reviews.flatMap(r => r.tags))].sort(),
                [reviews]
            );

            const filtered = useMemo(() => {
                let result = reviews;
                if (search.trim()) {
                    const q = search.toLowerCase();
                    result = result.filter(r =>
                        r.title.toLowerCase().includes(q) ||
                        r.excerpt.toLowerCase().includes(q) ||
                        r.tags.some(t => t.toLowerCase().includes(q))
                    );
                }
                if (activeTag)        result = result.filter(r => r.tags.includes(activeTag));
                if (activeDifficulty) result = result.filter(r => r.difficulty === activeDifficulty);
                return result;
            }, [reviews, search, activeTag, activeDifficulty]);

            const avgRating = useMemo(() => {
                const rated = reviews.filter(r => r.rating);
                if (!rated.length) return null;
                return (rated.reduce((s, r) => s + r.rating, 0) / rated.length).toFixed(1);
            }, [reviews]);

            return (
                <div className={`min-h-screen bg-gray-50 ${dark ? 'dark' : ''}`}>
                    {/* Navigation */}
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 py-3">
                        <div className="max-w-6xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <a href="/" className="flex items-center gap-2 hover:opacity-80 transition-opacity">
                                    <img src="/chicken0248.png" alt="Logo" className="w-8 h-8 rounded-lg" />
                                    <span className="font-bold text-gray-800">Chicken0248</span>
                                </a>
                                <span className="text-gray-400">/</span>
                                <span className="font-semibold text-gray-600">Reviews</span>
                            </div>
                            <button onClick={() => setDark(!dark)}
                                className="p-2 rounded-lg hover:bg-gray-100 text-gray-600 transition-colors text-lg">
                                {dark ? '\u2600\uFE0F' : '\uD83C\uDF19'}
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-4 py-8 space-y-6 animate-fadeIn">
                        {/* Hero */}
                        <div className="relative overflow-hidden rounded-2xl bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow-xl">
                            <div className="absolute -top-16 -right-16 w-64 h-64 bg-white/5 rounded-full blur-xl" />
                            <div className="relative px-8 py-6 md:py-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                                <div>
                                    <div className="flex items-center gap-3 mb-1">
                                        <Icon name="Star" className="w-5 h-5 text-amber-200" />
                                        <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight">Certification Reviews</h1>
                                    </div>
                                    <p className="text-amber-100 text-sm font-medium">Honest reviews from my certification journey — covering exam prep, course content, and career value</p>
                                </div>
                                <div className="flex gap-3 flex-shrink-0">
                                    <div className="bg-white/15 rounded-xl px-5 py-3 text-center">
                                        <div className="text-2xl font-bold">{reviews.length}</div>
                                        <div className="text-amber-100 text-xs">Reviews</div>
                                    </div>
                                    {avgRating && (
                                        <div className="bg-white/15 rounded-xl px-5 py-3 text-center">
                                            <div className="text-2xl font-bold">{avgRating}</div>
                                            <div className="text-amber-100 text-xs">Avg Rating</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Search + Difficulty Filter */}
                        {!loading && (
                            <div className="flex flex-col sm:flex-row gap-3">
                                <div className="relative flex-1">
                                    <Icon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" />
                                    <input
                                        type="text"
                                        placeholder="Search reviews..."
                                        value={search}
                                        onChange={e => setSearch(e.target.value)}
                                        className="w-full pl-9 pr-4 py-2 rounded-xl border border-gray-200 bg-white text-gray-800 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400"
                                    />
                                </div>
                                <div className="flex gap-2 flex-shrink-0">
                                    {['Beginner', 'Intermediate', 'Advanced'].map(d => (
                                        <button key={d} onClick={() => setActiveDifficulty(activeDifficulty === d ? null : d)}
                                            className={`px-3 py-2 rounded-xl border text-sm font-medium transition-colors ${
                                                activeDifficulty === d
                                                    ? DIFFICULTY_STYLES[d] + ' border-transparent'
                                                    : 'bg-white text-gray-600 border-gray-200 hover:border-amber-300'
                                            }`}>
                                            {d}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Tag Filters */}
                        {!loading && allTags.length > 0 && (
                            <div className="flex flex-wrap gap-2">
                                <button onClick={() => setActiveTag(null)}
                                    className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors border ${
                                        !activeTag
                                            ? 'bg-amber-600 text-white border-amber-600'
                                            : 'bg-white text-gray-600 border-gray-200 hover:border-amber-300 hover:bg-amber-50'
                                    }`}>
                                    All
                                </button>
                                {allTags.map(tag => (
                                    <button key={tag} onClick={() => setActiveTag(tag === activeTag ? null : tag)}
                                        className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors border ${
                                            activeTag === tag
                                                ? 'bg-amber-600 text-white border-amber-600'
                                                : 'bg-white text-gray-600 border-gray-200 hover:border-amber-300 hover:bg-amber-50'
                                        }`}>
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* Loading */}
                        {loading && (
                            <div className="flex justify-center py-20">
                                <div className="w-8 h-8 border-4 border-amber-200 border-t-amber-600 rounded-full animate-spin" />
                            </div>
                        )}

                        {/* Review Cards */}
                        {!loading && (
                            <div className="grid md:grid-cols-2 gap-6">
                                {filtered.map((review, idx) => (
                                    <a key={idx} href={review.url} target="_blank" rel="noopener noreferrer"
                                       className="group bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-lg hover:border-amber-300 transition-all duration-200">
                                        <div className="p-5 space-y-3">
                                            {/* Header: badge + title */}
                                            <div className="flex items-start gap-4">
                                                {review.image && (
                                                    <img src={review.image} alt={review.title}
                                                         className="w-14 h-14 rounded-xl object-contain flex-shrink-0 bg-gray-50 border border-gray-100 p-1" />
                                                )}
                                                <div className="flex-1 min-w-0">
                                                    <h2 className="text-base font-bold text-gray-800 group-hover:text-amber-600 transition-colors leading-snug line-clamp-2">
                                                        {review.title}
                                                    </h2>
                                                    {review.rating && (
                                                        <div className="flex items-center gap-1.5 mt-1">
                                                            <span className="text-yellow-500 text-sm leading-none">{renderStars(review.rating)}</span>
                                                            <span className="text-xs text-gray-500 font-medium">{review.rating.toFixed(1)}/5.0</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Meta */}
                                            <div className="flex items-center flex-wrap gap-x-3 gap-y-1 text-xs text-gray-500">
                                                <span className="flex items-center gap-1">
                                                    <Icon name="Calendar" className="w-3 h-3" />{review.date}
                                                </span>
                                                <span className="flex items-center gap-1">
                                                    <Icon name="Clock" className="w-3 h-3" />{review.readTime}
                                                </span>
                                                {review.difficulty && (
                                                    <span className={`px-2 py-0.5 rounded-full font-bold uppercase text-xs ${DIFFICULTY_STYLES[review.difficulty] || 'bg-gray-100 text-gray-600'}`}>
                                                        {review.difficulty}
                                                    </span>
                                                )}
                                            </div>

                                            {/* Excerpt */}
                                            <p className="text-gray-600 text-sm line-clamp-3">{review.excerpt}</p>

                                            {/* Tags */}
                                            <div className="flex flex-wrap gap-1.5 pt-1">
                                                {review.tags.map(tag => (
                                                    <span key={tag} className="bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full text-xs font-medium">{tag}</span>
                                                ))}
                                            </div>

                                            {/* CTA */}
                                            <div className="flex items-center gap-1 text-amber-600 text-sm font-medium pt-1">
                                                <span>Read Review</span>
                                                <Icon name="ExternalLink" className="w-4 h-4 group-hover:translate-x-0.5 transition-transform" />
                                            </div>
                                        </div>
                                    </a>
                                ))}
                            </div>
                        )}

                        {/* Empty State */}
                        {!loading && filtered.length === 0 && (
                            <div className="text-center py-16 text-gray-500">
                                <Icon name="Star" className="w-12 h-12 mx-auto mb-3 opacity-40" />
                                <p className="text-lg font-medium">No reviews match your filters.</p>
                                <button onClick={() => { setSearch(''); setActiveTag(null); setActiveDifficulty(null); }}
                                    className="mt-3 text-amber-600 text-sm font-medium hover:underline">
                                    Clear filters
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
