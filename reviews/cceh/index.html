    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6", ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    const el = lucide.createElement(lucide[name], { class: className });
                    ref.current.innerHTML = '';
                    ref.current.appendChild(el);
                }
            }, [name, className]);
            return <i ref={ref} className={`flex-shrink-0 ${className}`} {...props}></i>;
        };

        /* ── Reusable Components ── */

        const Section = ({ id, title, icon, children }) => (
            <section id={id} className="res-section">
                <div className="res-section-title">
                    <div className="res-section-icon">
                        <Icon name={icon} className="w-4 h-4" style={{color:'var(--soc-cy)'}} />
                    </div>
                    {title}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>{children}</div>
            </section>
        );

        let figCount = 0;
        const resetFigCount = () => { figCount = 0; };

        const Fig = ({ src, alt }) => {
            figCount += 1;
            const n = figCount;
            return (
                <figure className="my-5">
                    <img src={src} alt={alt || `Figure ${n}`}
                         className="rounded-xl border border-gray-200 shadow-sm max-w-full mx-auto block" loading="lazy" />
                    <figcaption className="text-center text-xs text-gray-400 mt-1.5 font-mono">Figure {n}</figcaption>
                </figure>
            );
        };

        const Callout = ({ children }) => (
            <blockquote className="bg-amber-50 border-l-4 border-amber-400 rounded-r-xl px-5 py-4 my-4 text-gray-700 italic text-sm leading-relaxed">
                {children}
            </blockquote>
        );

        const TipList = ({ items }) => (
            <ul className="list-disc list-outside ml-5 space-y-2 text-gray-700">
                {items.map((item, i) => <li key={i}>{item}</li>)}
            </ul>
        );

        const B = ({ children }) => <strong className="text-gray-800">{children}</strong>;
        const A = ({ href, children }) => (
            <a href={href} target="_blank" rel="noopener noreferrer"
               className="text-blue-600 hover:underline">{children}</a>
        );

        const renderStars = (rating) => {
            const full = Math.floor(rating);
            const half = rating - full >= 0.5;
            return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
        };

        const SocClock = () => {
            const ref = useRef(null);
            useEffect(() => {
                const tick = () => {
                    if (!ref.current) return;
                    const n = new Date();
                    ref.current.textContent = n.toISOString().slice(0,10) + ' · ' + n.toISOString().slice(11,19) + 'Z';
                };
                tick();
                const id = setInterval(tick, 1000);
                return () => clearInterval(id);
            }, []);
            return <span ref={ref} className="soc-clock" />;
        };

        /* ── App ── */

                fetch('/data/reviews.json')
                    .then(r => r.json())
                    .then(data => {
                        const entry = data.find(r => r.url === '/reviews/cceh/index.html');
                        if (entry) setMeta(entry);
                    })
                    .catch(() => {});
            }, []);

            resetFigCount();

            const tocItems = [
                { id: 'introduction',    label: 'Introduction',             icon: 'BookOpen'     },
                { id: 'exam-preparation', label: 'Exam Preparation',        icon: 'ListChecks'   },
                { id: 'exam-experience', label: 'Exam Experience',           icon: 'ClipboardList'},
                { id: 'exam-tips',       label: 'Exam Tips & Key Takeaways', icon: 'Lightbulb'   },
            ];

            return (

                        <div className="soc-tb-row">

                            <div className="soc-crumb">

                                <span>/</span>
                                <a href="/" style={{color:'var(--soc-ink3)',textDecoration:'none'}}>OPERATOR.PROFILE</a>
                                <span>/</span>
                                <a href="/reviews/index.html" style={{color:'var(--soc-ink3)',textDecoration:'none'}}>REVIEWS</a>
                                <span>/</span>
                                <b>CCEH</b>
                            </div>
                            <div style={{flex:1}} />
                            <span className="sev cyan"><span className="dot"></span>TLP:CLEAR</span>
                            <span className="sev amber"><span className="dot"></span>CERT.REVIEW</span>
                            <SocClock />
                        </div>
                    </nav>

                    <main id="main-content" style={{maxWidth:'860px',margin:'0 auto',padding:'24px 20px'}} className="animate-fadeIn">

                                                {/* Cover */}
                        <div className="res-cover">
                            <img src="cover.png" alt="Cyber5W Certified Evidence Handler (CCEH)" />
                            <div className="res-cover-overlay" />
                            <div className="res-cover-content">
                                <h1 className="res-cover-title">So I tried Cyber5W — Certified Evidence Handler (CCEH) exam, How was it?</h1>
                                <div className="res-cover-badges">
                                    <span className="sev cyan"><span className="dot"></span>May 2025</span>
                                    <span className="sev amber"><span className="dot"></span>Cyber5W</span>
                                    <span className="sev green"><span className="dot"></span>Passed</span>
                                </div>
                            </div>
                        </div>

                                                {/* Metadata */}
                        <div className="res-meta-grid">
                            <div><div className="res-meta-lbl">Certification</div><div className="res-meta-val">CCEH</div></div>
                            <div><div className="res-meta-lbl">Provider</div><div className="res-meta-val">Cyber5W</div></div>
                            <div><div className="res-meta-lbl">Difficulty</div><div className="res-meta-val" style={{color:'var(--soc-am)'}}>{meta?.difficulty ?? '—'}</div></div>
                            <div><div className="res-meta-lbl">Rating</div>
                                <div className="res-meta-val">
                                    {meta?.rating ? (
                                        <span style={{display:'flex',alignItems:'center',gap:'4px'}}>
                                            <span style={{color:'var(--soc-am)'}}>{renderStars(meta.rating)}</span>
                                            <span style={{color:'var(--soc-ink3)',fontSize:'11px'}}>{meta.rating.toFixed(1)}/5.0</span>
                                        </span>
                                    ) : <span style={{color:'var(--soc-ink4)'}}>—</span>}
                                </div>

                                                {/* Table of Contents */}
                        <div className="res-toc">

                                {tocItems.map((item, i) => (
                                    <a key={item.id} href={`#${item.id}`} className="res-toc-item">
                                        <span className="res-toc-num">{String(i+1).padStart(2,'0')}.</span>
                                        <Icon name={item.icon} className="w-3.5 h-3.5" style={{color:'var(--soc-ink4)',flexShrink:0}} />

                        </div>

                        {/* ═══════════ INTRODUCTION ═══════════ */}
                        <Section id="introduction" title="Introduction" icon="BookOpen">
                            <p className="text-gray-700 leading-relaxed">
                                <A href="https://cyber5w.com/">Cyber5W</A> is a training and certification provider for blue teamers,
                                co-founded by <A href="https://www.ashemery.com/">Ali Hadi</A> — well known in the Digital Forensics
                                community and the author of the popular eCDFP certification and course from INE.
                                My experience with eCDFP was not the most satisfying; it could have been more challenging and engaging,
                                and the hands-on portion felt underwhelming. So I've always been on the lookout for a Digital Forensics
                                certification that is actually fun and relevant to real forensics work.
                            </p>

                            <Fig src="image-1.png" alt="Cyber5W Certified Evidence Handler exam page" />

                            <p className="text-gray-700 leading-relaxed">
                                When I heard about the <B>Certified Evidence Handler (CCEH)</B> exam — which features both theory and
                                hands-on parts, just like eCDFP — I wanted to take it and compare the two, expecting at least a step up
                                in quality given that CCEH was released much later.
                            </p>

                            <Fig src="image-2.png" alt="CCEH certification overview" />

                            <p className="text-gray-700 leading-relaxed">
                                There was one more reason I decided to purchase this cert: the name. I joked with a friend —
                                "If I pass this exam, I'll have (C)CEH 🤣" — and with all of that combined, here we are.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM PREPARATION ═══════════ */}
                        <Section id="exam-preparation" title="Exam Preparation" icon="ListChecks">
                            <Fig src="image-3.png" alt="CCEH required skills listed on the certification page" />

                            <p className="text-gray-700 leading-relaxed">
                                As the name implies, this certification tests your knowledge as a <B>Digital Forensics Evidence Handler</B>.
                                All the required skills are listed on the{' '}
                                <A href="https://academy.cyber5w.com/courses/C5W-Certified-Digital-Forensics-Evidence-Handler-Exam">certification page</A>.
                                If you don't yet have those skills but still want to take the exam, here are the Cyber5W courses that
                                will help you prepare.
                            </p>

                            <Fig src="image-4.png" alt="C5W-100 Introduction to Digital Forensics course bundle" />

                            <p className="text-gray-700 leading-relaxed">
                                First, the <A href="https://academy.cyber5w.com/courses/C5W-100">C5W-100: Introduction to Digital Forensics</A> bundle
                                combines 10 courses (both paid and free) and is offered at no cost to anyone interested in the field.
                                It's a solid resource, though not everything in the bundle is exam-relevant. The five courses most
                                applicable to CCEH are:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>Digital Forensics Concepts</li>
                                <li>Working with Virtual Hard Disk</li>
                                <li>Evidence Acquisition under Windows</li>
                                <li>Working with FTK Imager</li>
                                <li>Writing Forensic Reports</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                There is also one additional course outside the bundle worth looking at:{' '}
                                <A href="https://academy.cyber5w.com/courses/introduction-to-evidence-acquisition">Introduction to Evidence Acquisition</A>.
                            </p>

                            <Fig src="image-5.png" alt="Exam structure: 24-hour window, theory and hands-on parts, VM provided" />

                            <p className="text-gray-700 leading-relaxed">
                                A few key things to know about the exam format:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>You have <B>24 hours</B> to complete the exam.</li>
                                <li>It is split into two parts: theory-based questions and hands-on questions.</li>
                                <li>A virtual machine is provided for the hands-on lab.</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                What they don't mention up front: the hands-on portion also includes an <B>Incident Response</B> component,
                                so you'll need to know how to conduct basic dynamic malware analysis as well. All questions throughout —
                                including the hands-on section — are multiple choice.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                The exam costs <B>$50 per attempt</B>. If you fail, you'll need to purchase another attempt separately.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM EXPERIENCE ═══════════ */}
                        <Section id="exam-experience" title="Exam Experience" icon="ClipboardList">
                            <Fig src="image-6.png" alt="Exam purchased on Friday 2nd May 2025" />

                            <p className="text-gray-700 leading-relaxed">
                                I purchased the exam on Friday, 2nd May 2025, during the workday — with my own money, of course —
                                without any prior preparation, and planned to take it on Saturday. But after nearly a month of grinding
                                nonstop for OSCP, I was burned out and wanted something to re-ignite my motivation. So after finishing
                                work and getting back to my apartment, I started the exam right away at <B>6:26:57 PM</B>.
                            </p>

                            <Fig src="image-7.png" alt="Exam started — theory questions first, hands-on second" />

                            <p className="text-gray-700 leading-relaxed">
                                After starting, I was presented with theory-based questions first, followed by hands-on questions.
                                There were two distinct hands-on labs. I couldn't get an exact question count, but compared to eCDFP
                                (which has 15 theory + 15 hands-on), CCEH has <B>more than 40 questions</B> across both parts combined.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
