                                Hello everyone, it's me Chicken0248 again! After passing the{' '}
                                <a href="/reviews/ccda/index.html" className="text-blue-600 hover:underline">CCDA</a>{' '}
                                exam from CyberWarFare Labs last month, I decided to put my pentesting methodology to the test with
                                the <B>Certified Red Team Analyst [CRTA]</B> certification. I was not disappointed — it was a
                                memorable experience. In this blog I'll briefly review the course, the lab, the exam process,
                                and share some tips.
                            </p>

                            <Fig src="image-1.png" alt="CRTA pricing and discount banner" />

                            <p className="text-gray-700 leading-relaxed">
                                CRTA is regularly priced at <B>$99</B>, but at the time of writing, CyberWarFare Labs had a 90%
                                discount code running that brought the price down to <B>$9</B> — outstanding value for an exam of
                                this quality.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                After purchasing, you'll receive three emails: an <B>invoice</B>, <B>course access credentials</B>

                            </p>

                            <Fig src="image-5.png" alt="PDF download available from the first lesson" />

                            <p className="text-gray-700 leading-relaxed">

                                Lab access comes via a separate credentials email for{' '}
                                <A href="https://labs.cyberwarfare.live/">labs.cyberwarfare.live</A>.
                                Unlike CCDA's 21 labs, CRTA has <B>one practice lab</B> — but the write-up on the lab site is
                                comprehensive, including the full command set you can copy and paste.
                            </p>

                            <Fig src="image-8.png" alt="Lab access request page — 30-day window, OpenVPN required" />

                                <A href="https://labs.cyberwarfare.live/app/mycourse/crta/labaccess">lab access page</A>.

                                My experience with the lab was genuinely good. I learned how to pivot with{' '}
                                <B>ligolo-ng</B>, enumerate an AD environment for low-hanging fruit using{' '}
                                <B>nxc</B> (formerly CrackMapExec), forge a <B>Golden Ticket</B> to move laterally from a child
                                domain to a parent domain, and fully compromise the parent domain. For anyone starting their

                                Like CCDA, the CRTA exam is <B>scheduled by email</B> — send your request to{' '}
                                <A href="mailto:support@cyberwarfare.live">support@cyberwarfare.live</A>{' '}
                                from the same address used to purchase the course, with your preferred time in UK timezone.
                            </p>

                            <Fig src="image-11.png" alt="CyberWarFare Labs email template for scheduling the CRTA exam" />

                            <p className="text-gray-700 leading-relaxed">
                                CyberWarFare Labs provides an email template directly — just fill in your date and time details
                                and send it off.
                            </p>

                            <Fig src="image-12.png" alt="Confirmation reply — two additional emails will follow" />

                            <p className="text-gray-700 leading-relaxed">
                                Once your schedule is confirmed, expect two more emails in addition to the reply:
                            </p>

                                <li><B>First email</B> — sent with the confirmation reply; contains an exam overview with useful general information.</li>
                                <li><B>Second email</B> — sent shortly before the exam; contains the OpenVPN config, initial scope of engagement, exam objectives, VPN credentials, all requirements, and operational notes (such as the automatic revert schedule).</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                I connected via OpenVPN at my scheduled time with no technical issues. I applied everything from the
                                lab and completed all exam objectives within <B>9 hours</B> (with several breaks along the way).
                                I then spent the rest of the day writing the report — I used the{' '}
                                <A href="https://help.offsec.com/hc/en-us/articles/360046787731-PEN-200-Reporting-Requirements">OSCP report template</A>{' '}
                                and documented every step from initial engagement to the final objective. Once I felt confident in it,
                                I submitted by email.
                            </p>

                            <Fig src="image-13.png" alt="Email acknowledging receipt of the exam report" />

                            <p className="text-gray-700 leading-relaxed">

                                In practice, they graded it much faster — I received my result the next day (a Monday, having submitted

                            </p>
