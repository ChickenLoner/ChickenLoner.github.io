                        {/* ═══════════ INTRODUCTION ═══════════ */}
                        <Section id="introduction" title="Introduction" icon="BookOpen">
                            <p className="text-gray-700 leading-relaxed">
                                Hello everyone, it's me, <B>Chicken0248</B>, back again with another course and exam I just passed — the{' '}
                                <B>Certified Cyber Security Engineer (CCSE)</B> certification from CyberWarFare Labs. The name is pretty broad and doesn't tell you much about what's inside, so if you're curious about what the course covers and what the exam is like, stay tuned — I'll break it all down in this post.
                            </p>

                            <Fig src="image.png" alt="CCSE certification badge" />

                            <p className="text-gray-700 leading-relaxed">
                                First, let's talk about the price. The CCSE course and exam come bundled at <B>$199</B>, but CWL occasionally releases discounts. During their latest anniversary event, you could grab it for just <B>$49</B> — incredibly cheap for everything it has to offer.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                From the screenshot above, you can see that once you purchase the course, you get access to <B>12 modules</B> of video content and course materials, along with <B>50+ online lab challenges</B>.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                It also comes with <B>2 exam attempts</B>, which we'll cover in the exam experience section.
                            </p>

                            <Fig src="image 1.png" alt="CWL course portal after purchase" />

                            <p className="text-gray-700 leading-relaxed">
                                After purchasing, you'll be granted access to the CCSE course at{' '}
                                <A href="https://labs.cyberwarfare.live/">labs.cyberwarfare.live</A>,
                                {' '}where you can find everything from study materials and lab access to exam booking.
                            </p>
                            <p className="text-gray-700 leading-relaxed">

                            </p>

                        {/* ═══════════ COURSE & LAB REVIEW ═══════════ */}
                        <Section id="course-review" title="Course & Lab Review and Experience" icon="GraduationCap">
                            <Fig src="image 2.png" alt="CCSE course modules overview" />

                            <Callout>
                                CCSE contains 12+ cyber security domains and each contains practical real-world penetration testing exercises. You will be tasked as a penetration tester to practically complete the exercises taught in the course videos. We have provided either write-up documentation or video walkthrough to help your penetration testing operations. Complete the CCSE exercises &amp; earn the module based badges.
                            </Callout>

                            <p className="text-gray-700 leading-relaxed">
                                This is what CWL claims about their course, and as you can see, it's firmly focused on penetration testing — making this more of a <B>red teaming certification</B>. It covers a wide range of domains, including OSINT, Phishing, Network, Web, Cloud, Docker, Mobile, Active Directory, and even Wi-Fi. That breadth is exactly what made me uncertain about how all of these topics could realistically be tested in an exam, and it's honestly what made me hesitate to take it for nearly a year.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                The course covers various interesting topics, including:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>Basic scripting for IP-to-geolocation lookups and Wi-Fi password dumping</li>
                                <li>OSINT techniques — Google Dorking, finding exposed credentials with TruffleHog, and more</li>
                                <li>Setting up a phishing infrastructure with GoPhish</li>
                                <li>Web vulnerabilities and attacks: XXE, SSTI, File Inclusion, SQLi, RCE, XSS, CSRF, IDOR, parameter injection, and OAuth attacks</li>
                                <li>Network pentesting: SSH, SMB, SNMP, RDP, FTP, WinRM, LDAP, SMTP</li>
                                <li>Network pivoting techniques</li>
                                <li>Windows and Linux privilege escalation, credential dumping and cracking, persistence, and data exfiltration</li>
                                <li>Exploit development (Buffer Overflow)</li>
                                <li>Basic cloud pentesting for AWS S3, Azure Blobs, Entra ID, and a little GCP</li>
                                <li>Docker escape with various techniques</li>
                                <li>Mobile app pentesting (APK analysis, Android device rooting, SSL pinning, etc.)</li>
                                <li>Active Directory attacks</li>
                                <li>Wi-Fi pentesting (WEP, WPA2, WPA3 cracking, MitM attacks, and rogue access points)</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                And now you know why I was hesitant. The scope is enormous, and I was genuinely worried I'd fail if the exam heavily tested Cloud, Mobile, or Buffer Overflow topics. But don't worry — just learn as much as you can, because as you'll hear in the exam experience section, it's nowhere near as intimidating as it initially seems.
                            </p>

                            </p>

                            <Fig src="image 4.png" alt="Lab Access section — Start Lab button" />

                            </p>

                            <Fig src="image 5.png" alt="VPN Lab infrastructure overview" />

                            </p>

                            </p>
                            <p className="text-gray-700 leading-relaxed">

                        <Section id="exam-experience" title="Exam Experience" icon="ClipboardList">
                            <Fig src="image 7.png" alt="CCSP exam portal overview" />

                            <p className="text-gray-700 leading-relaxed">
                                To earn the CCSE certification, you need to book your exam through the <B>CCSP Portal</B> and complete it within <B>48 hours</B>. The first 24 hours are dedicated to the hands-on exam environment — you'll download a VPN configuration file, connect to it, and conduct your engagement. Once that window closes, you have an additional 24 hours to write and submit your exam report. If you successfully complete the exam objectives and clearly document them in your report, you'll qualify for the certification.
                            </p>

                            <Fig src="image 8.png" alt="Exam booking interface — schedule up to 30 days out" />

                            <p className="text-gray-700 leading-relaxed">
                                To book the exam, head to the "Exam" page — you'll see an interface similar to the screenshot above. You can schedule your exam up to <B>30 days from the current date</B>, so if you're booking on April 13th, you can choose any date up to May 13th.
                            </p>

                            <Fig src="image 9.png" alt="Exam scheduled for April 11th, 2026" />

                            <p className="text-gray-700 leading-relaxed">
                                A friend of mine had taken this exam before and reassured me that it wasn't as broad or difficult as the course content might suggest — which finally convinced me to go for it. I scheduled my exam for <B>April 11th, 2026</B>, with a plan to finish everything — hacking and report writing — within the first 24 hours while the exam environment was still accessible.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Writing the report while you still have access to the environment is a key strategy. You can revisit the machines at any time during that window to capture clean screenshots, re-run commands, or verify findings before including them in the report.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Once your exam is booked, the portal will also display additional exam details, including submission instructions and a reminder of the 24-hour hands-on window followed by the 24-hour reporting period.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                On April 11th, I woke up a bit late, but it was still manageable. I logged back into the CCSP portal and found that my 24-hour hands-on timer had already started. I downloaded the OpenVPN configuration file, connected to the exam environment, and read through the exam instructions — covering the objective, scope of engagement, and what was expected.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                To put it simply: you're given a network range as your starting point. The goal is to obtain a <B>secret flag</B> located on the final endpoint in that range, which also requires you to achieve the highest privilege level on that machine before you can read it.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                After enumerating for a while, I found the initial access point, which led me to compromise the first endpoint. From there, everything progressed smoothly until I captured the final flag. One important note: since the scope is strictly within the exam environment, OSINT and Cloud are considered out of scope. The exam is very manageable if you've gone through the course material and taken good notes.
                            </p>

                            <Fig src="image 10.png" alt="CCSE report template from course materials" />

                            <p className="text-gray-700 leading-relaxed">
                                As for the report template, CWL provides one in the introductory course materials, so I downloaded it. What's interesting about this template is that it's close to a <B>client-ready format</B> — it blends a write-up style with a structured findings report, making it a solid foundation to build your submission around.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                I finished writing my report within the first 24 hours and submitted it to the support email using the subject line specified on the exam page.
                            </p>

                            </p>

                            <Fig src="image 12.png" alt="Countdown timer after the 24-hour hands-on window expires" />

                            <p className="text-gray-700 leading-relaxed">
                                The screenshot above shows the countdown timer after the first 24-hour hands-on window has expired. One thing I'd love to see CWL improve is a <B>dedicated report submission portal</B> — it would make the process much smoother and eliminate the risk of forgetting to attach the report to the email.
                            </p>

                            <Fig src="image 13.png" alt="Exam environment after the countdown ended" />
