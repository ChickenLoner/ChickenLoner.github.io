                        {/* ═══════════ INTRODUCTION ═══════════ */}
                        <Section id="introduction" title="Introduction" icon="BookOpen">
                            <p className="text-gray-700 leading-relaxed">
                                Hello everyone! It's me, <B>Chicken0248</B>, again, and in this blog we'll talk about the{' '}
                                <B>Certified CyberDefender Level 1 (CCD L1)</B> certification — the newest certification from the{' '}
                                <B>CyberDefenders</B> platform, which is well-known for its cyber range and blue team labs. I've even made some labs for them myself!
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                CyberDefenders already has one well-established certification — <B>CCD (Certified CyberDefender)</B> — but with the growing trend of SOC L1 and Junior SOC Analyst certifications, many platforms (including big players like TryHackMe) have been launching their own entry-level SOC certs to compete in this space.
                            </p>

                            <Fig src="image-1.png" alt="CCDL1 certification page on CyberDefenders" />

                            <p className="text-gray-700 leading-relaxed">
                                <A href="https://cyberdefenders.org/certifications/certified-cyberdefender-level1/">SOC Analyst Training &amp; Certification — CCDL1</A>
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Since <B>CCD</B> (which we can now think of as CCD L2) is regarded as an intermediate-to-advanced certification for blue teamers and SOC analysts, CyberDefenders finally introduced <B>CCD L1</B> for the SOC L1 audience. I was fortunate enough to join the beta access for both the course and the exam — so keep in mind that this review reflects the beta state, and some content or exam details may have changed since.
                            </p>
                        </Section>

                        {/* ═══════════ COURSE EXPERIENCE ═══════════ */}
                        <Section id="course-experience" title="Course Experience" icon="GraduationCap">
                            <p className="text-gray-700 leading-relaxed">
                                Let's talk about pricing first, because it sets expectations. <B>CCD L1 is priced at USD 500</B>, putting it directly on par with <B>BTL1</B> (GBP 399 ≈ USD 500) — its most direct competitor and one of the most established SOC L1 certifications on the market. CyberDefenders is clearly positioning this as a serious contender, and that ambition shows clearly in the course content.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                The CCD L1 course is divided into <B>six modules</B> that you'll need to complete within <B>four months</B>:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>SOC &amp; Threat Intelligence Foundations</li>
                                <li>Network &amp; Endpoint Essentials</li>
                                <li>SIEM Basics (Splunk &amp; Sentinel)</li>
                                <li>Phishing &amp; Email Security</li>
                                <li>Digital Forensics and Incident Response</li>
                                <li>Cloud Security &amp; AI</li>
                            </ul>

                            <Fig src="image-2.png" alt="CCDL1 course syllabus overview" />

                            <p className="text-xs text-gray-500 -mt-3 mb-2 text-center">
                                Check out the{' '}
                                <A href="https://docs.google.com/spreadsheets/d/1eWyMhBmAaTRT4oHQzovF6xvnm1mBr5AVlIYh3xjBlGk/edit?gid=730246548#gid=730246548">full syllabus</A>
                                {' '}here.
                            </p>

                            <p className="text-gray-700 leading-relaxed">
                                Each module covers a different area — some focusing on mandatory SOC fundamentals, others going well beyond what most SOC L1 analysts would encounter day-to-day. In many cases, the course teaches <B>advanced concepts and real execution</B> that you'd only get to apply in a startup or a very lean SOC environment.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Even for me — having already gone through <B>BTL1, SAL1, PSAA, and HTB CDSA</B> — there were sections I genuinely struggled with. Topics like <B>Microsoft Sentinel, rkhunter, OpenCTI, and AWS log analysis</B> were either new to me or covered at a much deeper level than I expected.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Notably, the course covers <B>Cloud (AWS)</B> and <B>Microsoft Sentinel</B> — which is still surprisingly rare in most SOC-focused courses available today.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                As a beta access member, I watched the content evolve significantly over time. Early on I didn't engage heavily — the material still had room to improve. Later, CyberDefenders announced they would revoke beta access and refund users with little to no activity, since the main goal of the beta phase was to collect <B>feedback</B>. They also launched a beta leaderboard event where the top three participants (measured by lab completions, lessons, investigations, and feedback) would receive a CyberDefenders subscription. That's when I decided to speedrun the course — and I was genuinely impressed. The labs are well-designed and include <B>detailed walkthroughs</B>, which are extremely useful for building the right investigation mindset when you get stuck.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                In addition to labs, each module has its own <B>Investigation</B> — essentially a post-knowledge test without walkthroughs. Students can discuss findings and ask for hints in dedicated Discord channels for each investigation.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Here's a non-exhaustive list of tools used across the course:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>OpenCTI</li>
                                <li>TOR Browser</li>
                                <li>AlienVault OTX</li>
                                <li>VirusTotal, Any.Run, and Hybrid Analysis</li>
                                <li>Wireshark</li>
                                <li>Splunk</li>
                                <li>Microsoft Sentinel</li>
                                <li>AWS Log Analyzer</li>
                                <li>n8n</li>
                                <li>oletools</li>
                                <li>GoPhish</li>
                                <li>log2timeline</li>
                                <li>Eric Zimmerman's Tools (selected) and KAPE</li>
                                <li>DB Browser for SQLite</li>
                                <li>Autopsy</li>
                                <li>FTK Imager</li>
                                <li>Volatility</li>
                                <li>rkhunter</li>
                                <li>AIDE</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                And the list goes on.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Although the certification name suggests it is designed for <B>SOC L1</B>, the course content clearly exceeds what an average SOC L1 analyst would normally handle. Examples include:
                            </p>
                            <ul className="list-disc list-outside ml-5 space-y-1 text-gray-700">
                                <li>Decrypting Cobalt Strike C2 traffic</li>
                                <li>Shellcode extraction and debugging from email attachments</li>
                                <li>n8n workflow integration with Splunk and threat intelligence automation</li>
                            </ul>
                            <p className="text-gray-700 leading-relaxed">
                                Without a solid foundation, you will get stuck — but that's not necessarily a bad thing. The detailed walkthroughs give you the tools to learn new techniques and gradually build a stronger foundation.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                If I had to score the course alone, I'd give it <B>4.8/5</B>. It's long and dense, but the content is information-rich, the walkthroughs are thorough, and the topic coverage spans both essential and advanced areas.
                            </p>
                        </Section>

                        {/* ═══════════ EXAM PREPARATION ═══════════ */}
                        <Section id="exam-preparation" title="Exam Preparation" icon="ListChecks">
                            <Fig src="image-3.png" alt="CyberDefenders exam readiness tracker" />

                            <p className="text-gray-700 leading-relaxed">
                                CyberDefenders has an <B>Exam Readiness</B> feature that tracks your progress through the course. In practice it's more of a completion tracker than a true readiness indicator, but hitting 90% — where the majority of the score comes from labs and investigations — does a good job of building confidence before you sit the exam.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                For my own preparation, I reviewed all the modules again and built an <B>index</B> — a structured list of topics and labs with hyperlinks, so I could jump directly to a relevant section if I encountered something familiar during the exam.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                If you're wondering whether any external labs are worth doing beforehand: honestly, I think the course labs and investigations are sufficient. Any cyber range labs I could point you to would likely feel "out of scope" in some sense and might leave you feeling underprepared rather than more confident.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                Beyond that, I didn't do much additional preparation — this is a SOC L1 exam and I had completed 99% of the course (the remaining 1% was pure laziness). I then waited for the exam to be released. One thing we knew in advance: the exam would be <B>MCQ-format</B>, but not theory-based. Every question would require you to perform an actual investigation before selecting the right answer — no guessing your way through. I appreciate this approach. It gives students instant results without the need for manual grading (as the original CCD requires), and I'm glad they didn't go down the AI-graded path like SAL1 or the OffSec Gauntlet.
                            </p>
                        </Section>

                        {/* ═══════════ MY EXAM EXPERIENCE ═══════════ */}
                        <Section id="exam-experience" title="My Exam Experience" icon="ClipboardList">
                            <p className="text-gray-700 leading-relaxed">
                                A couple of months passed, and on <B>18 January 2026</B> I received an email inviting me to try the exam. I was one of ten beta testers selected for this. Since 19 January was a Monday and I knew I'd be busy from Tuesday onward, I attempted the exam that same evening after getting enough rest from work.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                When I clicked Start, I had to select a region for the exam instance — this directly affects lab performance, so choose the closest one to you. After waiting 6–8 minutes for provisioning to complete, I was in.
                            </p>
                            <p className="text-gray-700 leading-relaxed">
                                All the information I needed was presented upfront. As mentioned, the exam is <B>MCQ-format</B> — but nothing like the theory-based MCQs from CompTIA CySA+ or SAL1. Every question required real technical analysis to find the correct answer. I also only then realised I had just <B>5 hours</B> to complete everything. After exploring the lab environment to get my bearings, I made my first move — and from there, it was smooth sailing. The exam calibration feels right for a SOC L1 certification.
                            </p>

                            <Fig src="image-4.png" alt="CCDL1 exam result — 90%+ score" />

                            <p className="text-gray-700 leading-relaxed">
                                Within 3 hours (it could've been faster, but I was ordering dinner mid-exam), I submitted and scored <B>90%+</B>. I thought a perfect score was within reach, but 90%+ is more than enough — and if CyberDefenders ever introduces a gold distinction for CCD L1, I'd still qualify. Pass is pass regardless of the score.
                            </p>

                            <Fig src="image-5.png" alt="CCDL1 exam feedback — domain breakdown" />

                            <p className="text-gray-700 leading-relaxed">
                                The <B>View Feedback</B> button reveals a domain-by-domain breakdown of what you did well and where to improve. There were two areas where I scored lower — both times because I was too lazy to dig deeper for the answer.
                            </p>

                            <Fig src="image-6.png" alt="Discord — Certified CyberDefender role granted" />

                            <p className="text-gray-700 leading-relaxed">
                                After passing, my Discord account was automatically granted the <B>Certified CyberDefender</B> role. Since there's no dedicated CCD L1 role yet — the existing role was originally created for CCD — I gladly accepted it.
                            </p>

                            <Fig src="image-7.png" alt="CCDL1 certificate from CyberDefenders" />

                            <p className="text-gray-700 leading-relaxed">
                                That's it for my exam experience — fairly short, all things considered. Let's move on to my final review.
                            </p>
